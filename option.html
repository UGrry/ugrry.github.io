項第9款規定評選資訊服務廠商作業，何者正確？","options":["準用採購法有關最有利標之評選規定。","底價應於開標前訂定。","如為固定服務費用或費率者，評選優勝廠商後即辦理決標免議價程序。","評選優勝廠商後即辦理比價。"],"answer":"準用採購法有關最有利標之評選規定。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s3-mc-35","type":"single","question":"依採購法規定，下列協商措施何者錯誤？","options":["應平等對待所有合於招標文件規定之投標廠商。","與廠商個別進行協商。","得採協商措施之項目，不以招標文件已標示得更改項目之內容為限。","執行保密措施。"],"answer":"得採協商措施之項目，不以招標文件已標示得更改項目之內容為限。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s3-mc-36","type":"single","question":"依採購法規定，有關採購評選委員會之成立時點，下列何者作業錯誤？","options":["評選項目、評審標準及評定方式有前例或條件簡單者，於招標前成立。","評選項目、評審標準及評定方式有前例或條件簡單者，於招標後開標前成立。","評選項目、評審標準及評定方式有前例或條件簡單者，於開標後評選前成立。","不論評選項目、評審標準及評定方式是否有前例或條件簡單，均於招標前成立。"],"answer":"評選項目、評審標準及評定方式有前例或條件簡單者，於開標後評選前成立。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s3-mc-37","type":"single","question":"機關辦理採購採最有利標決標者，下列敘述何者正確？","options":["價格納入評選項目者，採購評選委員就價格給予評分時，應以比較入圍廠商標價之高低為評分基礎。","不論案件性質，採購評選委員會應於招標前成立。","採購評選委員評選及出席會議，得由代理人為之。","以不訂底價為原則，其訂有底價，而廠商報價逾底價須減價者，於採行協商措施時洽減之。"],"answer":"以不訂底價為原則，其訂有底價，而廠商報價逾底價須減價者，於採行協商措施時洽減之。","laws":[]},{"id":"s3-mc-38","type":"single","question":"下列敘述何者錯誤？","options":["評選委員會委員對於受評廠商之資料，評選前應予保密，但決標後除有特殊情形外，應予公開。","機關採最有利標決標，以不訂底價為原則。","機關評定最有利標後，應於決標公告公布最有利標及採行協商措施時其他參與協商廠商之標價及總評分或總序位。","評選委員會之會議紀錄，除涉及個別廠商之商業機密者外，投標廠商並得申請閱覽、抄寫等。"],"answer":"評選委員會委員對於受評廠商之資料，評選前應予保密，但決標後除有特殊情形外，應予公開。","laws":[]},{"id":"s3-mc-39","type":"single","question":"下列何者非屬「採購評選委員會審議規則」第6條第2項所稱「明顯差異」之情形？","options":["多家廠商參與評選，同一廠商，有委員評定其序位為最優，同時亦有委員評定其序位為最差；且評定序位最優委員之評定分數為高分，評定序位最差委員之評定分數為低分。","同一廠商之評選分數，有委員評定為高分，亦有委員評定為不合格分數。","同一廠商之同一評選項目，不同委員之評選結果，有委員評定為高分，亦有委員評定為0分。","序位和最低之第1名廠商，但評選委員評定其序位第一非為最多。"],"answer":"序位和最低之第1名廠商，但評選委員評定其序位第一非為最多。","laws":[]},{"id":"s3-mc-40","type":"single","question":"機關於招標文件載明固定費用或費率，準用最有利標公開評選優勝廠商者，下列敘述何者錯誤？","options":["得於招標文件規定廠商報價超過該費用或費率者為不合格標。","該費用或費率之組成內容納入評分者，該評選項目所占比率或權重得低於20%。","於評選優勝廠商後，得免議價程序，依招標文件所載明之固定費用或費率決標。","如廠商於投標文件內自願減價，依自願減價之金額決標。"],"answer":"於評選優勝廠商後，得免議價程序，依招標文件所載明之固定費用或費率決標。","laws":[]},{"id":"s3-mc-41","type":"single","question":"依採購法規定，下列何者須報上級機關核准？","options":["機關辦理公告金額以上之選擇性招標。","招標文件中公告底價。","採最有利標決標。","機關辦理公告金額以上之限制性招標公開評選優勝廠商。"],"answer":"採最有利標決標。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s3-mc-42","type":"single","question":"採購評選委員會召集人及副召集人之產生，下列何者不正確？","options":["召集人及副召集人均為委員。","由委員互選產生。","召集人由機關首長擔任，或由機關首長或其授權人員指定一級主管以上人員擔任。","副召集人由機關首長或其授權人員指定機關內部人員擔任。"],"answer":"由委員互選產生。","laws":[]},{"id":"s3-mc-43","type":"single","question":"下列敘述何者為是？","options":["採購評選作業採分階段辦理評選及淘汰不合格廠商者，因前一階段已淘汰部分不合格廠商，爰評選結果以後階段之評分(比)結果為準。","旅遊服務屬採購法第22條第1項第9款規定所稱之專業服務，得採準用最有利標之決標方式。","機關依採購法第22條第1項第9款規定辦理經公開評選之限制性招標，為提升採購品質，得於招標文件規定，投標廠商如僅有1家並經資格審查合格時，提高合格門檻分數。","準用最有利標決標之採購案，於評選出優勝廠商後，尚有議價程序，爰機關應於議價現場再將投標單交廠商填寫投標價。"],"answer":"旅遊服務屬採購法第22條第1項第9款規定所稱之專業服務，得採準用最有利標之決標方式。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s3-mc-44","type":"single","question":"機關依「最有利標評選辦法」採行分階段辦理評選者，下列敘述何者正確？","options":["得於第1階段評選採票選法(未經評分)，票選前3名廠商始得進入第2階段評選。","第2階段之評選項目應與第1階段之評選項目相同。","分階段辦理評選以3階段為原則。","以上皆非。"],"answer":"以上皆非。","laws":[{"name":"最有利標評選辦法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030080"}]},{"id":"s3-mc-45","type":"single","question":"下列何者錯誤？","options":["公開取得企劃書之招標方式得搭配參考最有利標精神擇最符合需要者議價。","機關依採購法第22條第1項第9款辦理公開評選，機關得評選2家以上優勝廠商辦理比價。","公開取得企劃書之招標方式得搭配參考最有利標精神擇定2家以上符合需要者辦理比價。","依採購法第22條第1項第10款辦理公開評選，得標廠商得不以1家為限。"],"answer":"機關依採購法第22條第1項第9款辦理公開評選，機關得評選2家以上優勝廠商辦理比價。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s3-mc-46","type":"single","question":"依「最有利標評選辦法」規定，價格納入評分者，其所占總滿分之比率不得逾何比率？","options":["百分之十。","百分之二十。","百分之三十。","百分之五十。"],"answer":"百分之五十。","laws":[{"name":"最有利標評選辦法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030080"}]},{"id":"s3-mc-47","type":"single","question":"下列有關最有利標決標規定之敘述何者正確？","options":["採購評選委員會得要求廠商修正所提送企劃書後再辦理評選。","採購評選委員評選不得給予不同廠商相同分數。","公立學校家長會會長如擔任採購評選委員，非屬政府機關之現職人員者，得以專家學者身分擔任評選委員。","以上皆非。"],"answer":"公立學校家長會會長如擔任採購評選委員，非屬政府機關之現職人員者，得以專家學者身分擔任評選委員。","laws":[]},{"id":"s3-mc-48","type":"single","question":"未達公告金額之採購，依「中央機關未達公告金額採購招標辦法」第2條第1項第3款，參考最有利標之精神，擇符合需要者之評審小組之組成人數，下列何者為是？","options":["至少5人。","限於5至17人。","應與工作小組人數相同。","由機關自行核定。"],"answer":"由機關自行核定。","laws":[{"name":"中央機關未達公告金額採購招標辦法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030067"}]},{"id":"s3-mc-49","type":"single","question":"機關以公開招標搭配採購法第56條規定之最有利標決標方式辦理採購，下列敘述何者錯誤？","options":["不論採購金額大小，均應先報經上級機關核准。","招標文件規定於無法評定最有利標時，得採行協商措施。","議價程序不得免除。","應成立採購評選委員會。"],"answer":"議價程序不得免除。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s3-mc-50","type":"single","question":"採購評選委員會會議，出席委員中之專家學者人數應至少2人且不得少於出席委員人數之比率為何？","options":["三分之一。","三分之二。","四分之一。","四分之三。"],"answer":"三分之一。","laws":[]},{"id":"s3-mc-51","type":"single","question":"採購評選委員會會議之決議，有關出席委員人數之敘述，下列何者不符合規定？","options":["委員總額8人，出席委員人數5人，出席委員中之專家學者人數2人。","委員總額7人，出席委員人數4人，出席委員中之專家學者人數2人。","委員總額5人，出席委員人數3人，出席委員中之專家學者人數2人。","委員總額11人，出席委員人數5人，出席委員中之專家學者人數2人。"],"answer":"委員總額11人，出席委員人數5人，出席委員中之專家學者人數2人。","laws":[]},{"id":"s3-mc-52","type":"single","question":"採購評選委員會會議之決議，有關出席委員人數之敘述，下列何者不符合規定？","options":["委員總額11人，出席委員人數9人，出席委員中之專家學者人數4人。","委員總額7人，出席委員人數4人，出席委員中之專家學者人數2人。","委員總額10人，出席委員人數7人，出席委員中之專家學者人數2人。","委員總額5人，出席委員人數3人，出席委員中之專家學者人數2人。"],"answer":"委員總額10人，出席委員人數7人，出席委員中之專家學者人數2人。","laws":[]},{"id":"s3-mc-53","type":"single","question":"機關辦理採購以最有利標決標，成立評選委員會時若委員共5人，則專家學者人數至少為幾人？","options":["1人。","2人。","5人。","4人。"],"answer":"2人。","laws":[]},{"id":"s3-mc-54","type":"single","question":"採購評選委員會會議之決議，有關出席委員人數之敘述，下列何者不符合規定？","options":["委員總額11人，出席委員人數9人，出席委員中之專家學者人數4人。","委員總額11人，出席委員人數8人，出席委員中之專家學者人數4人。","委員總額11人，出席委員人數7人，出席委員中之專家學者人數3人。","委員總額11人，出席委員人數5人，出席委員中之專家學者人數2人。"],"answer":"委員總額11人，出席委員人數5人，出席委員中之專家學者人數2人。","laws":[]},{"id":"s3-mc-55","type":"single","question":"下列有關評選委員會之敘述何者正確？","options":["機關應利用採購法主管機關建置之專家學者建議名單資料庫，遴選專家學者委員。","其他政府機關之現職人員，得以專家學者身分擔任評選委員。","某評選委員與受評廠商間於一年前有僱傭關係，該委員應不計入委員總額，且其評分應不予採計。","以上皆非。"],"answer":"某評選委員與受評廠商間於一年前有僱傭關係，該委員應不計入委員總額，且其評分應不予採計。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s3-mc-56","type":"single","question":"下列敘述，何者正確？","options":["採購案如因評選委員會無法評選出最有利標致廢標者，投標廠商不得申請閱覽、抄寫、複印或攝影評選委員會之會議紀錄。","工作小組成員由機關首長或其授權人員指定機關人員或專業人士擔任，屬機關人員者，均應具有採購專業人員資格。","評選委員對於受評廠商之投標文件內容及資料，於開始評選前應予保密。評定最有利標後，則無須保密。","機關成立評選委員會，專家學者人數不得少於三分之一，且不得為政府機關之現職人員。"],"answer":"機關成立評選委員會，專家學者人數不得少於三分之一，且不得為政府機關之現職人員。","laws":[]},{"id":"s3-mc-57","type":"single","question":"機關評選最有利標，下列何者為正確？","options":["評選委員會會議，應有委員總額二分之一以上出席，其決議應經出席委員過半數之同意行之。出席委員中之專家、學者人數應至少2人且不得少於出席委員人數之三分之一。","評選委員會委員及參與評選工作之人員對於受評廠商之資料，除供公務上使用或法令另有規定外，應保守秘密。惟評選後應予解密。","評選委員會委員自接獲評選有關資料之時起，不得就該採購案參加投標。其有違反者，機關應不決標予該廠商。但得作為分包廠商。","評選委員會委員名單，未公開者，於開始評選前應予保密。評選出優勝廠商或最有利標後，亦同。"],"answer":"評選委員會會議，應有委員總額二分之一以上出席，其決議應經出席委員過半數之同意行之。出席委員中之專家、學者人數應至少2人且不得少於出席委員人數之三分之一。","laws":[]},{"id":"s3-mc-58","type":"single","question":"下列敘述何者錯誤？","options":["採購評選委員會之專家學者，如中途請辭，並非一定要補聘委員。","機關不得於招標文件中預為規定，投標廠商之企劃書份數不足，即為不合格標。","依採購法主管機關之解釋，評選結果應簽報機關首長或其授權人員核定，爰機關首長不宜擔任採購評選委員。","採購評選委員會議之列席人員，雖不得參與評分，惟徵得主席同意後，可對廠商提出詢問。"],"answer":"依採購法主管機關之解釋，評選結果應簽報機關首長或其授權人員核定，爰機關首長不宜擔任採購評選委員。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s3-mc-59","type":"single","question":"依採購法規定，有關採購評選委員會之組成，下列敘述何者錯誤？","options":["委員應具備與採購案相關之專門知識。","委員人數應符合5人以上之規定，而且必須為奇數。","召集人由機關首長擔任，或由機關首長或其授權人員指定一級主管以上人員擔任。","專家學者人數不得少於三分之一，且不得為政府機關之現職人員。"],"answer":"委員人數應符合5人以上之規定，而且必須為奇數。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s3-mc-60","type":"single","question":"有關採購評選委員會之組成，下列敘述何者不符合規定？","options":["委員總額7人，其中專家學者3人。","委員總額6人，其中專家學者3人。","委員總額5人，其中專家學者2人。","委員總額4人，其中專家學者2人。"],"answer":"委員總額4人，其中專家學者2人。","laws":[]},{"id":"s3-mc-61","type":"single","question":"下列何者有誤？","options":["採購評選委員會成立後，其委員名單應即公開於主管機關指定之資訊網站。","採購評選委員會委員名單，公開前應予保密。","採購評選委員會委員名單，其未公開者，於開始評選前應予保密。","採購評選委員會委員名單，於評選出最有利標後，得密封保密，不必解密。"],"answer":"採購評選委員會委員名單，於評選出最有利標後，得密封保密，不必解密。","laws":[]},{"id":"s3-mc-62","type":"single","question":"機關依採購法第22條第1項第9款規定辦理採購，下列何者不正確？","options":["應依採購法第94條成立採購評選委員會。","評定優勝廠商後議價。","招標文件得訂明固定金額或費率。","經評選而無法評選出優勝廠商者，評選委員名單不應解密。"],"answer":"經評選而無法評選出優勝廠商者，評選委員名單不應解密。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s3-mc-63","type":"single","question":"機關成立之工作小組就受評廠商資料擬具初審意見，下列何者不是應載明事項？","options":["採購案名稱。","工作小組人員姓名、職稱及專長。","受評廠商於各評選項目所報內容是否具可行性，並符合招標文件所定之目的、功能、需求、特性、標準、經費及期程。","受評廠商之經驗或實績。"],"answer":"受評廠商之經驗或實績。","laws":[]},{"id":"s3-mc-64","type":"single","question":"下列何者非屬工作小組初審意見所應載明之事項？","options":["採購案名稱。","受評廠商於各評選項目之得分或序位。","受評廠商於各評選項目所報內容是否具可行性，並符合招標文件所定之目的、功能、需求、特性、標準、經費及期程。","受評廠商於各評選項目之差異性。"],"answer":"受評廠商於各評選項目之得分或序位。","laws":[]},{"id":"s3-mc-65","type":"single","question":"機關依採購法第56條規定，以「最有利標決標原則」辦理招標，下列何者不正確？","options":["以不訂底價為原則。","評定最有利標後得議減價格。","評選結果應簽報機關首長或其授權人員核定 。","以公開招標方式辦理，第1次開標應有3家以上合格廠商投標，方可開標。"],"answer":"評定最有利標後得議減價格。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s3-mc-66","type":"single","question":"下列敘述何者為正確？","options":["機關採最有利標之決標，決定最有利標後，應再洽該廠商辦理議價。","機關辦理統包工程採購，可依採購法第22條第1項第9款之規定評選優勝廠商。","評定最有利標涉及評分，評選項目子項有配分者，其配分應載明於招標文件。個別子項不合格即不得作為最有利標者，亦應於招標文件載明其情形。","採最有利標決標原則得通案報上級機關核准。"],"answer":"評定最有利標涉及評分，評選項目子項有配分者，其配分應載明於招標文件。個別子項不合格即不得作為最有利標者，亦應於招標文件載明其情形。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s3-mc-67","type":"single","question":"採購評選委員會之委員評選結果，下列何者有誤？","options":["不同委員之評選結果有明顯差異時，召集人提交本委員會議決。","不同委員之評選結果有明顯差異時，依本委員會決議辦理複評。","不同委員之評選結果有明顯差異，複評結果仍有明顯差異時，由本委員會決議之。","不同委員之評選結果有明顯差異時，應廢棄原評選結果，重新辦理評選。"],"answer":"不同委員之評選結果有明顯差異時，應廢棄原評選結果，重新辦理評選。","laws":[]}]},{"id":"s4","title":"電子採購實務","questions":[{"id":"s4-mc-1","type":"single","question":"17日及18日皆為上班日，若機關於17日上午10時上傳招標公告並選擇刊登政府採購公報，於下午發現其公告招標案件誤填標的分類，請問機關應於何時完成欄位修改並上傳至正式區，才能於18日刊登？","options":["隨時都可以。","17日下午5時30分前。","17日下午11時59分前。","18日上午8時前。"],"answer":"17日下午5時30分前。","laws":[]},{"id":"s4-mc-2","type":"single","question":"下列有關機關端「招標管理」相關功能之敘述何者為錯？","options":["點選「上傳至正式區」按鈕後，暫存區清單即無該筆資料。","暫存區資料，於公告日就會自動公告。","「查詢招標公告」功能可查詢已「上傳至正式區」但尚未公告之資料。","「查詢招標公告」功能可查詢已公告之資料。"],"answer":"暫存區資料，於公告日就會自動公告。","laws":[]},{"id":"s4-mc-3","type":"single","question":"機關依投標廠商資格與特殊或巨額採購認定標準第5條第3項規定辦理者：","options":["應於招標公告或招標文件公開預算金額。","免公開預算金額。","得於招標公告或招標文件公開預算金額。","應於招標公告公開採購金額。"],"answer":"應於招標公告或招標文件公開預算金額。","laws":[{"name":"投標廠商資格與特殊或巨額採購認定標準","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030099"}]},{"id":"s4-mc-4","type":"single","question":"機關允許廠商以電子方式領標者應於以下何者中訂明：","options":["招標公告或招標文件。","招標公告。","招標文件。","招標公告及招標文件。"],"answer":"招標公告及招標文件。","laws":[]},{"id":"s4-mc-5","type":"single","question":"機關允許廠商以電子投標，決標後以書面文件辦理簽約，簽約內容應以何者為準 ?","options":["書面文件。","電子投標文件。","由機關視情況決定。","由上級機關定之。"],"answer":"電子投標文件。","laws":[]},{"id":"s4-mc-6","type":"single","question":"機關辦理採購，其與廠商間作為，下列4項作業(A)通知(B)重新報價(C)協商(D)說明。那些得以電子資料傳輸方式辦理：","options":["AB。","ABC。","ABD。","ABCD。"],"answer":"ABCD。","laws":[]},{"id":"s4-mc-7","type":"single","question":"機關提供電子招標文件，得向廠商收取必要之成本費用，其金額由招標機關定之。其另有書面文件者：","options":["應高於書面文件發售費用。","不得收取費用。","應少於新臺幣1,000元。","不得高於書面文件發售費用。"],"answer":"不得高於書面文件發售費用。","laws":[]},{"id":"s4-mc-8","type":"single","question":"機關提供電子招標文件，得向廠商收取必要之成本費用，其金額由下列何者定之？","options":["主管機關。","上級機關。","資訊系統經營廠商。","招標機關。"],"answer":"招標機關。","laws":[]},{"id":"s4-mc-9","type":"single","question":"機關允許廠商以電子投標者辦理開標及決標下列何者為誤？","options":["得免公開為之。","得由監辦單位採書面審核監辦。","得不通知廠商到場。","電子投標文件不得含有掃描文件。"],"answer":"電子投標文件不得含有掃描文件。","laws":[]},{"id":"s4-mc-10","type":"single","question":"廠商電子投標者，應於何時將所有電子投標文件傳輸至主管機關指定之資訊系統：","options":["開標前。","投標截止期限前。","決標前。","審標前。"],"answer":"投標截止期限前。","laws":[]},{"id":"s4-mc-11","type":"single","question":"下列何者可決定政府採購卡之使用權限：","options":["會計主管。","採購單位主管。","機關首長或其授權人。","辦理採購業務人員。"],"answer":"機關首長或其授權人。","laws":[]},{"id":"s4-mc-12","type":"single","question":"政府採購卡由下列那個單位發給：","options":["各招標機關。","政府採購法主管機關。","國家發展委員會。","信用卡業務機構。"],"answer":"信用卡業務機構。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s4-mc-13","type":"single","question":"刊登決標公告時，得標廠商之應刊登項目不包括以下何者資料：","options":["名稱。","地址。","聯絡電話。","負責人姓名。"],"answer":"負責人姓名。","laws":[]},{"id":"s4-mc-14","type":"single","question":"機關如欲在開標日前取消採購，須刊登以下那一個公告：","options":["更正公告。","決標公告。","定期彙送。","無法決標公告。"],"answer":"無法決標公告。","laws":[]},{"id":"s4-mc-15","type":"single","question":"下列那些資訊應公開於採購網站，必要時並得刊登採購公報？","options":["未達公告金額採購之決標公告資訊。","與政府採購有關之法令、司法裁判、訴願決定、仲裁判斷或宣導資訊。","財物之變賣或出租公告。","多餘不用堪用財物之無償讓與公告。"],"answer":"多餘不用堪用財物之無償讓與公告。","laws":[]},{"id":"s4-mc-16","type":"single","question":"機關辦理決標結果公告，以單價決標者，其決標金額為：","options":["單價。","單價乘以預估數量之總金額。","底價金額。","預算金額。"],"answer":"單價乘以預估數量之總金額。","laws":[]},{"id":"s4-mc-17","type":"single","question":"以下何者非辦理招標公告應登載之項目：","options":["底價金額。","履約期限。","投標截止期限。","投標地點。"],"answer":"底價金額。","laws":[]},{"id":"s4-mc-18","type":"single","question":"機關依採購法第27條第1項辦理招標公告無須刊登：","options":["招標文件領取地點。","廠商資格條件摘要。","是否屬公共工程實施技師簽證者。","契約付款條件。"],"answer":"契約付款條件。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s4-mc-19","type":"single","question":"機關辦理採購招標時，下列何者應於政府採購公報上刊登公告?","options":["委託專業服務之公開評選採購。","集中交易市場採購財物。","屬專利權利之採購。","財物之變賣。"],"answer":"委託專業服務之公開評選採購。","laws":[]},{"id":"s4-mc-20","type":"single","question":"機關利用政府電子採購網進行共同供應契約商品採購，下列4項作業A商品查詢B請購管理（購物車）C下訂管理D訂單管理，如從上網查詢商品至採購驗收排列，依序應為：","options":["ABCD。","ACDB。","CABD。","DABC。"],"answer":"ABCD。","laws":[]},{"id":"s4-mc-21","type":"single","question":"機關若須參考其他機關之招標文件電子檔案時，可利用下列那一系統功能？","options":["領標家數查詢。","檢驗上傳標案。","歷史招標文件查詢。","查詢招標公告。"],"answer":"歷史招標文件查詢。","laws":[]},{"id":"s4-mc-22","type":"single","question":"機關傳輸招標公告後，誤點選「是否為共同供應契約採購」(應為否，而點選為是)，可於以下何時點刊登更正招標公告？","options":["截止投標後。","截止投標前。","開標後。","決標後。"],"answer":"截止投標前。","laws":[]},{"id":"s4-mc-23","type":"single","question":"機關傳輸招標公告後，誤點選「公共工程實施技師簽證範圍」(應為否，而點選為是)，可於以下何時點刊登更正招標公告？","options":["截止投標前。","截止投標後。","開標後。","決標後。"],"answer":"截止投標前。","laws":[]},{"id":"s4-mc-24","type":"single","question":"下列那些作業無須使用憑證IC卡及讀卡機等設備？","options":["共同供應契約之電子下訂。","廠商電子領標。","機關設定押標金收款帳戶。","機關傳輸招標文件。"],"answer":"廠商電子領標。","laws":[]},{"id":"s4-mc-25","type":"single","question":"機關利用政府電子採購網進行共同供應契約商品採購，利用電子支付方式辦理付款作業時下列何項敘述為非？","options":["政府網路採購卡係由發卡機構先行墊付款項。","機關利用政府網路採購卡進行電子支付作業，除可降低各單位零用金儲備靈活庫款調度外，會計從每件共同供應契約採購案需對不同廠商開立付款憑單辦理付款，變成每月只需1次付款給發卡銀行即可。","政府網路採購卡是1張虛擬卡，並限用於政府電子採購網之共同供應契約功能。","利用政府網路採購卡辦理電子支付作業時，只需輸入卡號及使用者帳號密碼即可。"],"answer":"利用政府網路採購卡辦理電子支付作業時，只需輸入卡號及使用者帳號密碼即可。","laws":[]},{"id":"s4-mc-26","type":"single","question":"機關利用主管機關指定之資訊系統辦理，下列4項作業(A)招標文件之公開發給得免另備書面文件(B)招標文件之公開閱覽得免另備書面文件(C)招標文件之公開發給、發售應另備書面文件(D)招標文件之公開閱覽應另備書面文件，那些是正確？","options":["AB。","AC。","BC。","CD。"],"answer":"AB。","laws":[]},{"id":"s4-mc-27","type":"single","question":"機關及廠商以電子化方式辦理採購，依規定應簽名或蓋章者：","options":["應以數位簽章為之。","得以數位簽章為之。","存成磁片並在其上加蓋關防。","以政府採購卡為之。"],"answer":"應以數位簽章為之。","laws":[]},{"id":"s4-mc-28","type":"single","question":"政府採購資訊應刊登採購公報幾日：","options":["5日。","3日。","2日。","1日。"],"answer":"1日。","laws":[]},{"id":"s4-mc-29","type":"single","question":"機關欲檢查其電子招標上傳之標案是否成功，招標機關必須於檢查過程中提供下列那一種檔案，方可進行檢查作業：","options":["招標上傳之電子憑據檔(.tkn)。","招標上傳之結構檔(.str)。","招標上傳之索引檔(.idx)。","安全性憑證檔。"],"answer":"招標上傳之電子憑據檔(.tkn)。","laws":[]},{"id":"s4-mc-30","type":"single","question":"採用複數決標之方式者，其每一次決標及不同標的或底價之項目：","options":["應分別刊登決標公告。","於最後一次決標時再刊登決標公告。","於第1次決標時刊登決標公告即可。","得合併刊登決標公告。"],"answer":"應分別刊登決標公告。","laws":[]},{"id":"s4-mc-31","type":"single","question":"機關利用政府電子採購網進行共同供應契約商品採購，下列敘述何者為非？","options":["利用共同供應契約之契約項目辦理採購，適用機關不須辦理決標公告或定期彙送。","共同供應契約之採購訂約機關仍應辦理決標公告或定期彙送。","機關採購與產品相關之配備，若非屬共同供應契約項目，且其採購金額合計為公告金額十分之一以下，機關得逕洽廠商利用政府電子採購網之共同供應契約功能進行電子訂購。","機關採購與產品相關之配備，若非屬共同供應契約項目，且其採購金額合計逾公告金額十分之一而未達公告金額，機關除逕洽廠商利用政府電子採購網之共同供應契約功能進行電子訂購，並應依政府採購法第62條規定辦理決標資訊定期彙送。"],"answer":"機關採購與產品相關之配備，若非屬共同供應契約項目，且其採購金額合計逾公告金額十分之一而未達公告金額，機關除逕洽廠商利用政府電子採購網之共同供應契約功能進行電子訂購，並應依政府採購法第62條規定辦理決標資訊定期彙送。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s4-mc-32","type":"single","question":"未達公告金額採購之決標公告：","options":["應刊登採購公報1日，並公開於主管機關之政府採購資訊網站。","應公開於採購網站，必要時並得刊登採購公報。","得公開於採購網站，必要時並得刊登採購公報。","報上級機關決定公告方式。"],"answer":"得公開於採購網站，必要時並得刊登採購公報。","laws":[]},{"id":"s4-mc-33","type":"single","question":"檢驗上傳標案功能為何？","options":["可以查詢其他機關歷史招標文件。","只能查詢本機關歷史招標文件。","領取本機關上傳之招標文件。","領取其他機關上傳之招標文件。"],"answer":"領取本機關上傳之招標文件。","laws":[]},{"id":"s4-mc-34","type":"single","question":"下列資訊何者應公開於採購網站，必要時得刊登採購公報？","options":["未達公告金額採購之決標公告資訊。","採購法第34條第1項但書之公開說明或公開徵求廠商提供參考資料之公告。","採購法第22條第1項第14款之公開審查之公告。","財物之變賣或出租公告。"],"answer":"採購法第34條第1項但書之公開說明或公開徵求廠商提供參考資料之公告。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s4-mc-35","type":"single","question":"下列何者應於招標公告或招標文件公開預算金額？","options":["公告金額以上採購。","查核金額以上採購。","巨額金額以上採購。","特殊採購規定廠商具有相當財力。"],"answer":"特殊採購規定廠商具有相當財力。","laws":[]},{"id":"s4-mc-36","type":"single","question":"單筆訂購金額達多少以上時，機關不得透過共同供應契約執行請購及下訂？","options":["公告金額。","查核金額。","巨額。","任何金額皆不限。"],"answer":"查核金額。","laws":[]},{"id":"s4-mc-37","type":"single","question":"下列何者錯誤？","options":["機關允許廠商電子投標，於招標文件中規定，決標後於期限內以書面文件辦理簽約者，書面文件內容應與電子投標文件相同，其不同者，以後者為準。","機關允許廠商電子投標者，得辦理電子開標及電子決標。其開標得免公開為之。","機關辦理採購，除我國締結之條約或協定另有規定者外，依採購法第93條之1規定辦理電子領標並於招標公告敘明者，其等標期得縮短3日。但縮短後均不得少於7日。","機關提供電子招標文件，得向廠商收取必要之成本費用，其金額由招標機關定之。其另有書面文件者，不得高於書面文件發售費用。"],"answer":"機關辦理採購，除我國締結之條約或協定另有規定者外，依採購法第93條之1規定辦理電子領標並於招標公告敘明者，其等標期得縮短3日。但縮短後均不得少於7日。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s4-mc-38","type":"single","question":"下列政府採購資訊何者應刊登採購公報1日，並公開於主管機關之政府採購資訊網站：","options":["採購法第49條公開取得廠商書面報價或企劃書之公告。","採購法第61條規定之決標結果或無法決標之公告。","採購法第100條第2項多餘不用堪用財物之無償讓與公告。","採購法第34條第1項但書規定之公開說明或公開徵求廠商提供參考資料之公告。"],"answer":"採購法第61條規定之決標結果或無法決標之公告。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s4-mc-39","type":"single","question":"下列何者資訊應公開於採購網站：","options":["財物之變賣或出租公告。","與政府採購有關之法令。","採購法第49條公開取得廠商書面報價或企劃書公告。","採購申訴審議委員會之審議判斷。"],"answer":"採購法第49條公開取得廠商書面報價或企劃書公告。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s4-mc-40","type":"single","question":"機關辦理電子採購，下列何者錯誤：","options":["機關利用主管機關指定之資訊系統辦理招標文件之公開發給、發售或公開閱覽，得免另備書面文件。","機關允許廠商電子投標者，得於招標文件中規定，以電子投標文件簽約，或決標後於期限內以書面文件辦理簽約。","機關允許廠商電子投標者，得辦理電子開標及電子決標。","電子開標及電子決標應公開為之，但得不通知投標廠商到場。其監辦方式得由監辦單位採書面審核監辦。"],"answer":"電子開標及電子決標應公開為之，但得不通知投標廠商到場。其監辦方式得由監辦單位採書面審核監辦。","laws":[]},{"id":"s4-mc-41","type":"single","question":"機關得於招標文件中規定廠商電子投標使用之檔案格式，或廠商列印電子招標文件投標之格式，其檔案格式或列印格式為：","options":["任一型態及格式。","須為自由軟體。","不應限制廠商之競爭。","不得壓縮。"],"answer":"不應限制廠商之競爭。","laws":[]},{"id":"s4-mc-42","type":"single","question":"機關登錄完成公告及領標文件傳輸，可利用政府採購資訊網站那一功能來免費模擬廠商領標的使用？以確保招標文件正確無誤。","options":["領標憑據序號。","檢驗上傳標案。","電子領標。","領標家數查詢。"],"answer":"檢驗上傳標案。","laws":[]},{"id":"s4-mc-43","type":"single","question":"電子招標文件若有異動，且刊登公告，則應於機關端那一功能之更正作業，進行抽換：","options":["新增招標公告。","更正招標公告。","領標管理。","檢驗上傳標案。"],"answer":"更正招標公告。","laws":[]},{"id":"s4-mc-44","type":"single","question":"下列何者無須使用憑證IC卡進行數位簽章或加密？","options":["電子訂購。","電子開標。","電子支付。","檢驗上傳標案。"],"answer":"檢驗上傳標案。","laws":[]},{"id":"s4-mc-45","type":"single","question":"下列何者不是政府採購卡的使用方式：","options":["預借現金卡。","轉帳卡。","信用卡。","儲值卡。"],"answer":"預借現金卡。","laws":[]},{"id":"s4-mc-46","type":"single","question":"各式招標公告如登載標的分類為工程類或財物類，採統包方式之採購案，其決標方式可選取何者？(A)最低標。(B)評分及格最低標。(C)最有利標。(D)最高標。","options":["C。","BC。","ABC。","ABCD。"],"answer":"BC。","laws":[]},{"id":"s4-mc-47","type":"single","question":"機關依採購法第49條及第93條之1規定採「公開取得電子報價單」辦理採購，廠商電子報價時，不可使用下列何種憑證進行數位簽章及加密？","options":["廠商本身名義之工商憑證。","廠商本身名義之組織及團體憑證。","投標廠商負責人或取得授權足以代表投標廠商之自然人憑證。","投標廠商負責人之信用卡。"],"answer":"投標廠商負責人之信用卡。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s4-mc-48","type":"single","question":"機關允許廠商以電子化方式辦理領標者，應於招標公告及招標文件中規定，並於招標文件中規定，廠商得以下列方式之一投標：","options":["書面投標。","電子投標。","書面投標或電子投標。","以上皆是。"],"answer":"以上皆是。","laws":[]},{"id":"s4-mc-49","type":"single","question":"依政府採購法第61條規定辦理無法決標之公告，應於廢標後、重行招標前刊登，並不得超過廢標後多少天：","options":["30天。","21天。","14天。","7天。"],"answer":"14天。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s4-mc-50","type":"single","question":"有關電子憑據的描述下列何者有誤？","options":["具有數位簽章。","領標電子憑據可以用來確認廠商是否繳費電子領標。","廠商投標未附領標電子憑據，機關仍得決標予該廠商。","廠商於等標期內以領標之電子憑據，可以再次免費下載同一案同次公告之招標文件。"],"answer":"廠商投標未附領標電子憑據，機關仍得決標予該廠商。","laws":[]},{"id":"s4-mc-51","type":"single","question":"機關辦理電子採購，主管機關指定之資訊系統全部或部分功能，因故暫停服務時，下列處理方式何者有誤？","options":["招標及詢價階段：機關待系統恢復後再行傳輸電子招標文件。","領標階段：廠商以招標文件規定之其他方式領標。","領標階段：待系統恢復後再行電子領標。","開標階段：確知無廠商電子投標時，仍必須待系統恢復後再行開標。"],"answer":"開標階段：確知無廠商電子投標時，仍必須待系統恢復後再行開標。","laws":[]},{"id":"s4-mc-52","type":"single","question":"下列敘述何者錯誤?","options":["機關採未經公告之限制性招標辦理議價，如議價不成無須刊登無法決標公告。","機關採限制性招標公開評選辦理專業服務，第1 次公告結果只有1家廠商投標，應不予開標並刊登無法決標公告。","機關採公開招標，第1次公告結果只有1家廠商投標，應刊登無法決標公告。","機關依採購法第48條第1項第1款不予開標決標，應刊登無法決標公告。"],"answer":"機關採限制性招標公開評選辦理專業服務，第1 次公告結果只有1家廠商投標，應不予開標並刊登無法決標公告。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s4-mc-53","type":"single","question":"下列敘述何者正確？","options":["現行主管機關發行之政府採購公報為紙本及電子化併行。","機關得於招標文件規定採電子投標之廠商，其押標金得予減收50％。","共同供應契約應公開於主管機關指定之資訊網站，供各機關利用。","政府採購卡之持卡人資格經取消者，其政府採購卡即失效。"],"answer":"共同供應契約應公開於主管機關指定之資訊網站，供各機關利用。","laws":[]},{"id":"s4-mc-54","type":"single","question":"於政府電子採購網新增公開取得報價單與企劃書公告，選擇不刊登政府採購公報，於星期一上班日下午17時35分傳輸，該公告於廠商端何時可以查詢：","options":["次二上班日。","次一上班日","當日20時以後。","當日18時以後。"],"answer":"次一上班日","laws":[]},{"id":"s4-mc-55","type":"single","question":"採購法第102條第3項規定之廠商名稱與相關情形（拒絕往來廠商），下列何者正確？","options":["應刊登採購公報1日，並公開於主管機關之政府採購資訊網站。","應公開於採購網站，必要時並得刊登採購公報。","得公開於採購網站，必要時並得刊登採購公報。","報上級機關決定公告方式。"],"answer":"應刊登採購公報1日，並公開於主管機關之政府採購資訊網站。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s4-mc-56","type":"single","question":"電子招標文件檔案：","options":["不可以壓縮。","可以壓縮。","除圖檔可以壓縮外，其餘不可壓縮。","除圖檔不可壓縮外，其餘可以壓縮。"],"answer":"可以壓縮。","laws":[]},{"id":"s4-mc-57","type":"single","question":"下列事項何者無須傳輸至主管機關之政府採購資訊網站？","options":["公告金額十分之一以下之採購。","未得標廠商名單。","得標廠商預估分包予中小企業之金額。","如有契約變更或加減價之情形，致原決標金額增加達公告金額者。"],"answer":"公告金額十分之一以下之採購。","laws":[]},{"id":"s4-mc-58","type":"single","question":"以下就「線上繳納押標金」服務，對於招標方式之適用情形說明，何者正確？","options":["僅適用於「公開取得電子報價單」採購機制。","不適用於公告金額以上之案件。","不適用於經公開評選或公開徵求之限制性招標。","各式招標方式皆適用。"],"answer":"各式招標方式皆適用。","laws":[]}]},{"id":"s5","title":"錯誤採購態樣","questions":[{"id":"s5-mc-1","type":"single","question":"依採購法規定，下列敘述何者正確？","options":["採最有利標決標，於評定出最有利標後，應再洽廠商減價。","訂有底價之採購，廠商報價金額與底價相同時，機關得要求廠商再減價。","公開開標之案件，機關得於招標文件中限制有權參加開標之每一投標廠商人數。","公開客觀評選優勝廠商，其與優勝廠商議價之次數不得超過3次。"],"answer":"公開開標之案件，機關得於招標文件中限制有權參加開標之每一投標廠商人數。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s5-mc-2","type":"single","question":"依採購法規定，下列敘述何者正確？","options":["機關於招標文件規定廠商投標時須檢附之營業稅納稅證明，依採購法令規定廠商不及提出最近一期證明者，得以前一期之納稅證明代之。","機關於招標文件中規定廠商投標時，限使用機關所提供之標封否則投標無效，尚無不可。","依採購法規定，機關發給、發售或郵遞招標文件時，不得登記領標廠商之名稱。但詢問領標廠商名稱或索取名片尚無不可。","採公開招標分段開標者，得僅就資格投標。"],"answer":"機關於招標文件規定廠商投標時須檢附之營業稅納稅證明，依採購法令規定廠商不及提出最近一期證明者，得以前一期之納稅證明代之。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s5-mc-3","type":"single","question":"下列敘述何者正確？","options":["依採購法規定，機關得於招標文件規定廠商應於投標標封封口蓋騎縫章及投標文件應逐頁蓋章，否則為無效標。","依「投標廠商資格與特殊或巨額採購認定標準」規定，機關得就投標廠商資格條件，於招標文件規定廠商投標時須檢附經股東會通過同意該廠商參與本採購案投標之會議紀錄。","依採購法規定，機關不得於招標文件或招標公告規定廠商僅能親自領取招標文件而不得採郵遞方式領取。","依採購法規定，僅就資格、規格合併投標者，以選擇性招標為限。"],"answer":"依採購法規定，機關不得於招標文件或招標公告規定廠商僅能親自領取招標文件而不得採郵遞方式領取。","laws":[{"name":"投標廠商資格與特殊或巨額採購認定標準","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030099"},{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s5-mc-4","type":"single","question":"依採購法規定，下列敘述何者正確？","options":["有一新臺幣85萬元古蹟構造物之修建採購，該採購案於招標文件中不得訂定特定資格。","機關辦理採購，使用主管機關制定之招標投標簽約三用文件，於決標後毋須通知廠商至機關簽約。","評定最有利標，如將廠商簡報列為評選項目者，其配分不得逾10%。","廠商以釘書針裝訂投標標封，非屬書面密封，機關應不予接受。"],"answer":"機關辦理採購，使用主管機關制定之招標投標簽約三用文件，於決標後毋須通知廠商至機關簽約。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s5-mc-5","type":"single","question":"依採購法規定，下列何者正確？","options":["規定廠商代表於開標當時必須攜帶與投標文件所用相同之印鑑，否則無權出席。","招標文件對親自及郵遞領取訂定不同之截止期限。","廠商信用證明限公告日後所取得者。","開標後不公開審標。"],"answer":"開標後不公開審標。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s5-mc-6","type":"single","question":"採購法限制性招標之敘述，下列何者錯誤？","options":["僅適用於公告金額以上之採購。","無須報上級機關核准。","包括採公開評選優勝廠商之情形。","得以比價方式辦理者，優先以比價方式辦理。"],"answer":"僅適用於公告金額以上之採購。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s5-mc-7","type":"single","question":"機關依採購法第22條第1項第7款辦理限制性招標之情形，下列敘述何者正確？","options":["招標公告及招標文件均須載明後續擴充之期間、金額及數量。","招標公告及招標文件均須載明後續擴充之期間、金額或數量。","計算採購金額時無須將預估後續擴充項目所需金額計入。","招標公告及招標文件已敘明後續擴充之金額，機關於該金額內辦理後續擴充，無須經議價程序。"],"answer":"招標公告及招標文件均須載明後續擴充之期間、金額或數量。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s5-mc-8","type":"single","question":"機關擬依採購法第22條第1項第6款辦理限制性招標之情形，下列敘述何者正確？","options":["原契約項目數量之增加，其增加之契約金額，不列入追加累計金額。","原契約項目規格之變更，其增加之契約金額，不列入追加累計金額。","因故減項辦理招標，履約期間因尚有預算，逕依本款向得標廠商辦理契約變更，採購原減項內容。","不同區域之地下管線工程，如契約未載明屬同一招標目的範圍，非屬原招標目的範圍。"],"answer":"不同區域之地下管線工程，如契約未載明屬同一招標目的範圍，非屬原招標目的範圍。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s5-mc-9","type":"single","question":"機關依採購法第22條第1項第16款辦理限制性招標之情形，下列敘述何者錯誤？","options":["公告金額以上採購，招標前應報經主管機關認定。","未達公告金額之採購，招標前無須報經主管機關認定。","未達公告金額採購，其金額逾公告金額十分之一者，通案簽經機關首長或其授權人員核准依該款辦理。","未達公告金額採購，其金額逾公告金額十分之一者，其簽辦文件應就個案敘明邀請指定廠商比價或議價之適當理由。"],"answer":"未達公告金額採購，其金額逾公告金額十分之一者，通案簽經機關首長或其授權人員核准依該款辦理。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s5-mc-10","type":"single","question":"下列敘述何者正確？","options":["依採購法第22條第1項第9款辦理技術服務採購之公開評選，其招標資訊得免刊登政府採購公報。","機關以限制性招標辦理者，均無須刊登政府採購公報。","機關辦理採購，採購標的中僅40％為專屬權利，只要經機關評估無其他合適之替代標的，仍得依採購法第22條第1項第2款規定採限制性招標。","依採購法第22條第1項第10款辦理限制性招標者，投標廠商僅1家即得辦理開標。"],"answer":"依採購法第22條第1項第10款辦理限制性招標者，投標廠商僅1家即得辦理開標。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s5-mc-11","type":"single","question":"採購法第22條第1項第6款有關「未逾原主契約金額百分之五十者」，其是否逾50%之計算，下列分子之計算何者正確？","options":["以單次金額計算。","以追加與追減絕對值之累計金額計算。","以追加與追減之累計金額計算。","以追加累計金額計算。"],"answer":"以追加累計金額計算。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s5-mc-12","type":"single","question":"關於招標文件規定廠商必須取得ISO9000系列驗證者，下列敘述何者正確？","options":["僅巨額採購得規定之。","僅特殊採購得規定之。","巨額採購或特殊採購得規定之。","公告金額以上之採購皆得規定之。"],"answer":"巨額採購或特殊採購得規定之。","laws":[]},{"id":"s5-mc-13","type":"single","question":"下列關於機關辦理巨額採購之描述何者正確？","options":["預期使用情形及其效益目標、開始使用日期及使用年限、評估使用情形及其效益之分析指標，應於採購完成後，開始啟用前簽經機關首長或其授權人員核准。","向主管機關提報採購之使用情形及其效益分析，如屬勞務採購者，其使用期間為契約約定之履約期間，除工作內容重複者外，以契約工作完成後1次提報為原則。","如驗收後因故逾1年仍未啟用者，應自驗收後每屆滿1年之次日起1個月內逐年向上級機關提報未啟用之原因，俟啟用後再改向主管機關提報使採購之使用情形及其效益分析。","向主管機關提報巨額採購之使用情形及其效益分析，除以電子化方式為之外，應另備書面文件通知主管機關。"],"answer":"向主管機關提報採購之使用情形及其效益分析，如屬勞務採購者，其使用期間為契約約定之履約期間，除工作內容重複者外，以契約工作完成後1次提報為原則。","laws":[]},{"id":"s5-mc-14","type":"single","question":"採購法第50條第1項第5款所稱「不同投標廠商間之投標文件內容有重大異常關聯者」不包括下列何種情形？","options":["分包廠商為同一廠商者。","押標金由同一人繳納或申請退還者。","電子郵件網址相同者。","投標文件內容由同一人繕寫或備具者。"],"answer":"分包廠商為同一廠商者。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s5-mc-15","type":"single","question":"經常性採購以選擇性招標建立合格廠商名單方式辦理者，應建立至少幾家以上之合格廠商名單？","options":["3家。","10家。","6家。","2家。"],"answer":"6家。","laws":[]},{"id":"s5-mc-16","type":"single","question":"底價之訂定時機，下列何者為正確？","options":["公開招標採分段開標者，其底價應於價格標開標前定之。","選擇性招標應於規格標審查後之下一階段開標前定之。","限制性招標之比價及議價，訂定底價前應先參考廠商之報價或估價單。","採公開取得3家以上廠商之書面報價或企劃書者，其底價應於進行比價或議價前定之。"],"answer":"採公開取得3家以上廠商之書面報價或企劃書者，其底價應於進行比價或議價前定之。","laws":[]},{"id":"s5-mc-17","type":"single","question":"下列何者超底價決標時，須報經上級機關核准？","options":["超過底價8%者。","超過底價4%而未超過8%者。","查核金額以上之採購而超過底價4%但未超過8%者。","查核金額以上之採購。"],"answer":"查核金額以上之採購而超過底價4%但未超過8%者。","laws":[]},{"id":"s5-mc-18","type":"single","question":"機關依採購法第42條第1項辦理分段開標，下列敘述何者為錯誤？","options":["機關辦理一次投標分段開標，投標廠商已投標而未開標之部分，原封發還。","採公開招標者，得僅就資格投標。","未通過前一階段審標之投標廠商，不得參加後續階段之投標。","採一次投標分段開標者，廠商應將各段開標用之投標文件分別密封。"],"answer":"採公開招標者，得僅就資格投標。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s5-mc-19","type":"single","question":"機關依採購法第42條第1項辦理分段開標，下列敘述何者為正確？","options":["採分段開標者，得先辦理價格標後再審查資格或規格標。","僅就資格投標者，以公開招標為限。","採分段投標，未通過前一階段審標之投標廠商，不得參加後續階段之投標。","不論採分段開標或未分段開標，廠商均應將各段開標用之投標文件分別密封。"],"answer":"採分段投標，未通過前一階段審標之投標廠商，不得參加後續階段之投標。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s5-mc-20","type":"single","question":"下列廠商行為何者非採購法處罰之犯罪行為？","options":["意圖影響決標價格而以契約使廠商不為價格之競爭。","意圖影響採購結果而借用他人名義投標。","意圖獲取不當利益而拒不履行契約。","以詐術使廠商無法投標。"],"answer":"意圖獲取不當利益而拒不履行契約。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s5-mc-21","type":"single","question":"下列何者非屬可能有圍標之嫌？","options":["不明人士蒐集領標廠商名稱。","投標廠商間彼此熟識。","投標文件內容由同一人或同一廠商繕寫或備具。","押標金由同一人或同一廠商繳納或申請退還。"],"answer":"投標廠商間彼此熟識。","laws":[]},{"id":"s5-mc-22","type":"single","question":"以下何者不得採書面驗收，應辦理現場查驗？","options":["未達公告金額之工程採購，其採購金額逾公告金額十分之一者。","小額採購。","部分驗收其驗收金額不逾15萬元者。","即買即用或自供應至使用之期間甚為短暫，現場查驗有困難者。"],"answer":"未達公告金額之工程採購，其採購金額逾公告金額十分之一者。","laws":[]},{"id":"s5-mc-23","type":"single","question":"機關辦理契約變更，「加帳金額」為新臺幣(下同)50萬元，「減帳金額」為50萬元，則其變更部分計算是否監辦之金額為多少？","options":["100萬元。","50萬元。","0元。","依原契約金額。"],"answer":"100萬元。","laws":[]},{"id":"s5-mc-24","type":"single","question":"機關辦理採購採最低標決標時，認為最低標廠商之總標價或部分標價偏低，顯不合理，有降低品質、不能誠信履約之虞或其他特殊情形時，下列處置何者最適法？","options":["不經廠商說明，逕不決標予最低標廠商，押標金退還。","逕洽該廠商承諾繳差額保證金後決標。","不決標予最低標廠商，並不發還押標金。","如不擬決標予該廠商，仍須限期通知該廠商提出說明。"],"answer":"如不擬決標予該廠商，仍須限期通知該廠商提出說明。","laws":[]},{"id":"s5-mc-25","type":"single","question":"依採購法規定，下列敘述，何者正確？","options":["公開招標之開標及決標時間，不得逾等標期屆滿當日或次一上班日，以免相隔天數過長，徒生爭議。","機關得於招標文件規定投標廠商須出席開標以備減價或比減價，否則即視為無效標。","採行協商措施時，其審標程序應公開進行，惟審標內容應予保密。","公開開標之案件，機關得於招標文件中限制有權參加開標之每一投標廠商人數。"],"answer":"公開開標之案件，機關得於招標文件中限制有權參加開標之每一投標廠商人數。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s5-mc-26","type":"single","question":"機關辦理某履約期限為2年之巨額清潔勞務採購，預算金額1年為新臺幣(下同)2,000萬元，合計為4,000萬元，經檢討有必要訂定具有相當財力之特定資格條件，機關得於招標文件訂定投標廠商之實收資本額為？","options":["600萬元。","150萬元。","250萬元。","400萬元。"],"answer":"150萬元。","laws":[]},{"id":"s5-mc-27","type":"single","question":"某機關辦理一非屬特殊性質之財物採購，其採購金額為5,320萬元，廠商資格規定廠商實收資本額得要求不低於下列何者金額？","options":["5,320萬元。","5,400萬元。","500萬元。","不得限定資本額。"],"answer":"不得限定資本額。","laws":[]},{"id":"s5-mc-28","type":"single","question":"招標文件有關廠商資格「投標時須檢附代理日本日立HITACHI公司電梯維護保養之授權書面資料證明影本」之規定，屬於下列何項採購錯誤行為態樣？","options":["投標當時即必須擁有指定之設備。","投標當時即必須於指定地區設有分公司或維護站。","投標時須檢附原廠製造證明、原廠代理證明、原廠願意供應證明、原廠品質保證書。","限定國內廠商投標時須檢附與國外廠商技術合作之證明。"],"answer":"投標時須檢附原廠製造證明、原廠代理證明、原廠願意供應證明、原廠品質保證書。","laws":[]},{"id":"s5-mc-29","type":"single","question":"依採購法規定，機關得於招標文件規定之事項，下列何者正確？","options":["限定國內廠商投標時須檢附與國外廠商技術合作之證明。","廠商投標時所檢附之型錄須蓋代理廠商之章。","廠商投標時所檢附之型錄須為正本，不得為影本。","允許投標廠商於投標文件內預先提出同等品者，廠商應於投標文件內敘明同等品之廠牌、價格及功能、效益、標準或特性等相關資料，以供審查。"],"answer":"允許投標廠商於投標文件內預先提出同等品者，廠商應於投標文件內敘明同等品之廠牌、價格及功能、效益、標準或特性等相關資料，以供審查。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s5-mc-30","type":"single","question":"依採購法令規定，下列敘述何者正確？","options":["僅巨額採購始可訂定特定資格。","採單價決標者，招標文件應載明預估數量。","訂定廠商特定資格時，得限公部門（政府機關、公營事業、公立學校）之實績始可接受。","公會會員證，為廠商投標時所必要檢附的文件證明。"],"answer":"採單價決標者，招標文件應載明預估數量。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s5-mc-31","type":"single","question":"有關廠商資格之敘述，何者為正確？","options":["採購標的內之重要項目，有就該等項目訂定分包廠商資格之必要者，適用採購法有關投標廠商資格之規定。","廠商履行契約所必須具備之資格條件，其僅就廠商在我國之商業活動為整體考量即已符合規定。","機關辦理一採購，其兼有工程、財物及勞務等性質，而以工程認定其採購性質，雖該採購之勞務部分符合特殊採購情形之一，仍不得就勞務部分訂定特定資格。","依政府機關組織法律組成之非公司組織事業機構參加投標時，仍應繳驗目的事業主管機關核發之行業登記證、承攬或營業手冊及依商業團體法加入商業團體等。"],"answer":"採購標的內之重要項目，有就該等項目訂定分包廠商資格之必要者，適用採購法有關投標廠商資格之規定。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s5-mc-32","type":"single","question":"有關投標廠商資格規定之敘述，下列何者正確？","options":["廠商應附公會出具之投標比價證明書，以證明其依法參加工業團體或商業團體。","投標時廠商即應擁有履約所需之設備。","開標時廠商應攜帶所有資格文件正本供查驗。","投標廠商得出具承諾於得標後一定期間內建立自有或特約維修站或場所。"],"answer":"投標廠商得出具承諾於得標後一定期間內建立自有或特約維修站或場所。","laws":[]},{"id":"s5-mc-33","type":"single","question":"下列何者非屬錯誤行為？","options":["營業稅證明限當期。","信用證明限公告日後取得。","得以實績為特定資格。","資本額限公告日前者。"],"answer":"得以實績為特定資格。","laws":[]},{"id":"s5-mc-34","type":"single","question":"下列何者非屬於資格限制競爭的情形？","options":["限公部門（政府機關、公營事業、公立學校）之實績。","限國內之實績。","廠商納稅之證明（如營業稅或所得稅等）。","限特定地區公會之會員。"],"answer":"廠商納稅之證明（如營業稅或所得稅等）。","laws":[]},{"id":"s5-mc-35","type":"single","question":"下列何者正確？","options":["規定投標當時即必須擁有指定之設備。","規定廠商所附型錄均須為正本。","規定廠商提出之實績證明須為公家機關。","規定外標封上應標示廠商名稱及地址。"],"answer":"規定外標封上應標示廠商名稱及地址。","laws":[]},{"id":"s5-mc-36","type":"single","question":"下列非屬政府採購錯誤行為態樣？","options":["履約期限為日曆天未載明假日是否計入。","非特殊採購規定特定資格。","未將選購項目計入採購金額。","特殊或巨額採購不訂定特定資格。"],"answer":"特殊或巨額採購不訂定特定資格。","laws":[]},{"id":"s5-mc-37","type":"single","question":"下列招標方式何者正確？","options":["未達公告金額之採購不公開取得報價單，通案以議價或比價方式辦理。","公開招標可單就資格標辦理招標。","機關依採購法第22條第1項第9款辦理之採購，屬限制性招標，其公開評選後應辦理議價。","分段開標，得依價格、資格、規格之順序開標。"],"answer":"機關依採購法第22條第1項第9款辦理之採購，屬限制性招標，其公開評選後應辦理議價。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s5-mc-38","type":"single","question":"下列何者非屬政府採購錯誤行為態樣之一？","options":["允許投標廠商查看其他廠商之投標文件。","投標文件審查結果，未通知投標廠商。","廠商未依通知出席開標即視為無效標。","機關於招標文件規定廠商得請求釋疑之期限，大於等標期之四分之一。"],"answer":"機關於招標文件規定廠商得請求釋疑之期限，大於等標期之四分之一。","laws":[]},{"id":"s5-mc-39","type":"single","question":"下列何者非屬政府採購錯誤行為態樣之一？","options":["不考慮廠商單價是否合理而強以機關預算單價調整廠商單價。","不同數量之2項以上標的，以單價和決標。","私下洽投標廠商協助審查其他廠商之投標文件。","已決標之採購案，未得標廠商要求發還投標文件者，機關得保留其中一份，其餘發還，或僅保留影本。"],"answer":"已決標之採購案，未得標廠商要求發還投標文件者，機關得保留其中一份，其餘發還，或僅保留影本。","laws":[]},{"id":"s5-mc-40","type":"single","question":"下列何者為非？","options":["訂定投標廠商資格及規格均不得不當限制競爭。","招標文件得不記載終止或解除契約之條件。","履約期限過短違反公平合理原則。","評選委員不得由他人代理出席。"],"answer":"招標文件得不記載終止或解除契約之條件。","laws":[]},{"id":"s5-mc-41","type":"single","question":"下列何者非屬政府採購錯誤行為態樣之一？","options":["未將國內員工總人數逾100人之得標廠商資料彙送至主管機關決標資料庫。","刁難廠商使用同等品。","未規定主要部分卻刁難廠商分包。","遇有犯採購法第87條至第92條罪之嫌者，通知檢警調單位。"],"answer":"遇有犯採購法第87條至第92條罪之嫌者，通知檢警調單位。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s5-mc-42","type":"single","question":"下列何者不正確？","options":["招標公告之增購條件及上限寫「詳招標文件」即可。","招標公告之採購金額，應為預算金額加計後續擴充項目所需金額。","依採購案需要，招標文件得公告底價。","機關依採購法第22條第1項第9款辦理之採購，雖屬限制性招標，仍應刊登政府採購公報。"],"answer":"招標公告之增購條件及上限寫「詳招標文件」即可。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s5-mc-43","type":"single","question":"依投標廠商資格與特殊或巨額採購認定標準規定，不得訂定下列何種資格證明？","options":["營業稅或所得稅之納稅證明。","協會會員證。","招標文件規定之樣品。","會計師簽證之財務報表。"],"answer":"協會會員證。","laws":[{"name":"投標廠商資格與特殊或巨額採購認定標準","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030099"}]},{"id":"s5-mc-44","type":"single","question":"下列關於準備招標文件之敘述，何者正確？","options":["採購法已規定之事項，均不必再於招標文件規定。","規定廠商對於機關之決定不得異議。","規定廠商之投標文件應以書面密封。","規定投標文件標封應於封口蓋騎縫章，否則無效。"],"answer":"規定廠商之投標文件應以書面密封。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s5-mc-45","type":"single","question":"未達公告金額之採購，得免收押標金、保證金之情形為何？","options":["僅押標金。","僅保證金。","押標金或保證金。","均不得免收。"],"answer":"押標金或保證金。","laws":[]},{"id":"s5-mc-46","type":"single","question":"下列關於押標金之規定，何者係屬採購錯誤行為？","options":["以金融機構定期存款單繳納者，其申請設定質權時，應由質權人會同辦理。","以金融機構支票繳納者，應為即期。","應以投標廠商名義繳納。","得以主管機關核定之電子化方式繳納。"],"answer":"以金融機構定期存款單繳納者，其申請設定質權時，應由質權人會同辦理。","laws":[]},{"id":"s5-mc-47","type":"single","question":"下列敘述何者正確？","options":["投標廠商繳納之押標金如有不予發還之情形者，全部不予發還，包含其依招標文件規定額度溢繳之部分。","甲廠商之子公司經機關依採購法規定列為拒絕往來廠商，其效力不及於甲廠商。","採購法第22條第1項第6款所稱「必須追加契約以外之工程」之情形，不含原契約項目規格之變更。","機關辦理招標文件公開閱覽，對於閱覽廠商或民眾意見之處理，應以密件方式辦理。"],"answer":"甲廠商之子公司經機關依採購法規定列為拒絕往來廠商，其效力不及於甲廠商。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s5-mc-48","type":"single","question":"下列採購法第58條執行情形，何者正確？","options":["最低標廠商報價偏低，顯不合理、有影響履約品質之虞，機關得未通知廠商說明即不決標予該廠商，改決標予次低標。","訂有底價之採購，機關如發現底價偏高造成最低標標價偏低者，不適用採購法第58條之規定。","機關通知最低標廠商限期繳納差額保證金時，應一併告知底價，以利廠商核計差額保證金額度是否正確。","最低標廠商報價偏低，顯不合理、有影響履約品質之虞，如其願意繳納差額保證金，機關即應決標予該廠商。"],"answer":"訂有底價之採購，機關如發現底價偏高造成最低標標價偏低者，不適用採購法第58條之規定。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s5-mc-49","type":"single","question":"下列何者為是？","options":["開價格標即為開標。","廠商未依通知出席即視為無效標。","審標時對投標文件疑問，個別洽詢。","允許投標廠商查看其他廠商投標文件。"],"answer":"審標時對投標文件疑問，個別洽詢。","laws":[]},{"id":"s5-mc-50","type":"single","question":"下列招標文件規定何者為非？","options":["限制投標廠商出席公開開標會議之人數。","廠商未附具投標廠商聲明書者，不得於開標後補正。","廠商出席開標人員應攜帶廠商大小章。","廠商不及提出最近一期營業稅納稅證明者，得以前一期之納稅證明代之。"],"answer":"廠商出席開標人員應攜帶廠商大小章。","laws":[]},{"id":"s5-mc-51","type":"single","question":"下列敘述何者正確？","options":["機關辦理財物採購，尚非一定須要求投標廠商投標文件應檢附採購標的之型錄供審查。","招標文件不得免費提供廠商領取。","採購法第22條第1項第6款所稱「必須追加契約以外之工程」之情形，不包括原契約項目規格之變更。","機關依科學技術基本法第6條第4項規定辦理之採購，不適用採購法，惟為促進競爭，仍可利用政府電子採購網辦理公告事宜。"],"answer":"機關辦理財物採購，尚非一定須要求投標廠商投標文件應檢附採購標的之型錄供審查。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s5-mc-52","type":"single","question":"機關採最低標決標，一開價格標就有2家廠商標價相同且低於底價，其後續處理程序何者正確？","options":["由該2家廠商比減1次，以低價者決標。","由該2家廠商比減2次，以低價者決標。","由該2家廠商比減3次，以低價者決標。","逕行抽籤決定之。"],"answer":"由該2家廠商比減1次，以低價者決標。","laws":[]},{"id":"s5-mc-53","type":"single","question":"下列何者非屬政府採購錯誤行為態樣？","options":["限定投標廠商之所在地。","營業稅之繳納證明限當期者。","押標金繳納額度為標價百分之三。","決定最有利標，再洽廠商減價。"],"answer":"押標金繳納額度為標價百分之三。","laws":[]},{"id":"s5-mc-54","type":"single","question":"下列何者非屬政府採購錯誤行為態樣？","options":["抄襲特定廠商之規格資料。","廠商實績限公部門或國內實績。","型錄須為正本。","因有特殊情形必須延長驗收期限，簽報有權人員核准。"],"answer":"因有特殊情形必須延長驗收期限，簽報有權人員核准。","laws":[]},{"id":"s5-mc-55","type":"single","question":"下列敘述何者為是？","options":["決標之單價金額為新臺幣5,000元，於辦理決標公告時決標金額填列為新臺幣5,000元，尚屬適法。","複數決標案件，決標公告時決標金額應合併計算填列。","有一採購案，原契約金額為新臺幣200萬元，機關因業務需要而追加新臺幣8萬元，依規定仍應辦理定期彙送。","減價收受金額之計算得預先於契約中約定。"],"answer":"減價收受金額之計算得預先於契約中約定。","laws":[]},{"id":"s5-mc-56","type":"single","question":"下列何者非屬政府採購錯誤行為態樣之一？","options":["查驗或驗收時依廠商建議之區域鑽心取樣。","訂有底價之採購，廠商報價與底價相同，機關未予決標，而要求廠商減價。","未更改招標文件內容而重行訂定之底價，除有正當理由外，較廢標前合格廠商之最低標價為高。","公告底價。"],"answer":"公告底價。","laws":[]},{"id":"s5-mc-57","type":"single","question":"下列關於投標廠商特定資格之規定，何者係屬正確？","options":["所得稅或營業稅之納稅證明。","公會會員證。","曾完成與招標標的類似之製造、供應或承做之文件。","財力及實績證明。"],"answer":"財力及實績證明。","laws":[]},{"id":"s5-mc-58","type":"single","question":"機關依「投標廠商資格與特殊或巨額採購認定標準」訂定「具有相當財力」之特定資格證明，下列何項規定不得訂定？","options":["流動負債不低於流動資產。","權益不低於招標標的預算金額十二分之一。","實收資本額不低於招標標的預算金額之十分之一。","總負債金額不超過權益4倍。"],"answer":"流動負債不低於流動資產。","laws":[{"name":"投標廠商資格與特殊或巨額採購認定標準","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030099"}]},{"id":"s5-mc-59","type":"single","question":"公開招標廢標後大幅修改招標文件後再行辦理招標必須多少家以上廠商投標始得開標？","options":["3家。","1家。","由機關決定。","視招標文件之規定。"],"answer":"3家。","laws":[]},{"id":"s5-mc-60","type":"single","question":"下列何種採購不允許採統包方式辦理？","options":["工程採購。","勞務採購。","財物採購。","設計加施工案。"],"answer":"勞務採購。","laws":[]},{"id":"s5-mc-61","type":"single","question":"機關內之監辦人員對採購不符合採購法規定程序而提出意見，下列作法何者為正確之行為？","options":["辦理採購之主持人或主驗人如不接受，應納入紀錄，報機關首長或其授權人員決定之。","辦理採購之主持人或主驗人得不接受，但應納入紀錄，陳報機關首長或其授權人員備查。","由辦理採購之主持人或主驗人決定是否接受，如不接受，應納入紀錄。","辦理採購之主持人或主驗人決定是否接受，如不接受，並得納入紀錄。"],"answer":"辦理採購之主持人或主驗人如不接受，應納入紀錄，報機關首長或其授權人員決定之。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s5-mc-62","type":"single","question":"最低標廠商報價低於底價百分之八十，但在底價百分之七十以上時，下列敘述何者正確？","options":["要決標給最低標時，該商一定須繳交差額保證金。","若決標給次低標時，則一定不須繳交差額保證金。","縱使最低標廠商說明合理要決標給該商亦須繳交差額保證金。","最低標廠商之說明機關如認為合理，則不須繳交差額保證金。"],"answer":"最低標廠商之說明機關如認為合理，則不須繳交差額保證金。","laws":[]},{"id":"s5-mc-63","type":"single","question":"下列何者錯誤？","options":["未達公告金額之工程或財物採購，得由機關視需要決定是否填具結算驗收證明書。","結算驗收證明書或其他類似文件，機關應於驗收完畢後15日內填具。","機關辦理採購，有部分先行使用之必要或已履約之部分有減損滅失之虞者，應先就該部分辦理驗收或分段查驗供驗收之用，並得就該部分支付價金。但保固應自全部驗收起算。","驗收人對工程或財物隱蔽部分拆驗或化驗者，其拆除、修復或化驗費用之負擔，依契約約定。"],"answer":"機關辦理採購，有部分先行使用之必要或已履約之部分有減損滅失之虞者，應先就該部分辦理驗收或分段查驗供驗收之用，並得就該部分支付價金。但保固應自全部驗收起算。","laws":[]},{"id":"s5-mc-64","type":"single","question":"採購法就機關處理未得標廠商之已開標文件的方式何者為非？","options":["保留其中一份。","僅保留影本。","經廠商要求全部予以退還。","採分段開標者尚未開標之部分應予發還。"],"answer":"經廠商要求全部予以退還。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s5-mc-65","type":"single","question":"有關投標廠商資格規定之敘述，下列何者不正確？","options":["訂定特定資格應先評估廠商家數，及檢討有無不當限制競爭。","訂定廠商實績時，宜限國內政府部門（政府機關、公營事業、公立學校），較易查證。","非特殊或巨額採購，不得訂特定資格。","投標廠商之設立地或所在地，除其他法令另有規定者，不應予以限制。"],"answer":"訂定廠商實績時，宜限國內政府部門（政府機關、公營事業、公立學校），較易查證。","laws":[]},{"id":"s5-mc-66","type":"single","question":"下列敘述何者為是？","options":["履約保證金以不逾契約價金百分之十為原則。","保固保證金以不逾預算百分之十為原則。","差額保證金額度係最低標標價與底價之差額。","押標金不得逾新臺幣1,000萬元。"],"answer":"履約保證金以不逾契約價金百分之十為原則。","laws":[]},{"id":"s5-mc-67","type":"single","question":"機關依採購法第26條第3項規定，於招標文件要求或提及之參考廠牌應符合之情形，下列敘述何者錯誤？","options":["所列廠牌目前均有製造、供應，容易取得，價格合理，能確保採購品質，且無代理商、經銷商有公平交易法所稱之獨占或聯合行為之情事。","所列廠牌之價格、功能、效益、標準及特性，均屬相當。","所列廠牌係供廠商就所列廠牌擇一履約，廠商不得拒絕採用。","所列廠牌數量不以3家為限。"],"answer":"所列廠牌係供廠商就所列廠牌擇一履約，廠商不得拒絕採用。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s5-mc-68","type":"single","question":"機關辦理公告金額以上醫療器材採購其有關採購標的規格之訂定，下列敘述何者錯誤？","options":["依功能或效益。","所標示特性不得限制競爭。","有國際標準或國家標準者從其規定。","指定進口品。"],"answer":"指定進口品。","laws":[]},{"id":"s5-mc-69","type":"single","question":"下列敘述何者錯誤？","options":["廠商領標，目前多為利用政府電子採購網採電子領標。","公開招標之等標期，自機關傳輸招標資訊至主管機關資料庫當日起算。","廠商領標時不得登記領標廠商名稱。","平底價亦應決標。"],"answer":"公開招標之等標期，自機關傳輸招標資訊至主管機關資料庫當日起算。","laws":[]},{"id":"s5-mc-70","type":"single","question":"機關辦理採購，下列敘述何者正確？","options":["公告日108.4.8至截止投標日108.4.30，投標須知規定：「廠商對招標文件內容有疑義者，得於公告之次日起4日內以書面向本機關請求釋疑」。","經評定為最有利標之廠商，因故未於規定期限內完成訂約者，依規定沒收其押標金，機關得依評比序位，依序洽請其他廠商完成簽約。","以單價決標者，應於招標文件載明預估數量或採購金額上限。","流標或廢標後大幅修改招標文件重行招標，而依採購法第48條第2項規定以第2次招標處理。"],"answer":"以單價決標者，應於招標文件載明預估數量或採購金額上限。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s5-mc-71","type":"single","question":"下列何者錯誤？","options":["公開取得企劃書之招標方式得搭配參考最有利標精神擇最優者議價。","機關依採購法第22條第1項第9款辦理公開評選，機關得評選2家以上優勝廠商辦理比價。","機關驗收完畢後填具結算驗收證明書或其他類似文件予廠商者，其開立之對象應為該採購契約之當事人。","押標金得以未載明受款人之金融機構支票繳納。"],"answer":"機關依採購法第22條第1項第9款辦理公開評選，機關得評選2家以上優勝廠商辦理比價。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s5-mc-72","type":"single","question":"下列有關投標廠商資格條件之敘述，何者正確？","options":["如屬特殊或巨額採購，得限定投標廠商須具有曾完成公部門（政府機關、公營事業、公立學校）之相當經驗或實績。","投標廠商提出之資格證明文件影本未加蓋廠商印章或未載明與正本相符者，無效。","限定國內廠商投標時須檢附與國外廠商技術合作之證明。","採購兼有工程、財物或勞務2種以上性質，而以其中之一認定其歸屬者，其他性質符合特殊採購情形者，得以該其他性質於該採購所占比例或相關部分訂定特定資格。"],"answer":"採購兼有工程、財物或勞務2種以上性質，而以其中之一認定其歸屬者，其他性質符合特殊採購情形者，得以該其他性質於該採購所占比例或相關部分訂定特定資格。","laws":[]},{"id":"s5-mc-73","type":"single","question":"採購金額新臺幣50萬元之案件以公開招標方式辦理，若無電子領標投標，其等標期最少應有幾天？","options":["5天。","7天。","14天。","3天。"],"answer":"7天。","laws":[]},{"id":"s5-mc-74","type":"single","question":"下列有關規格條件之敘述，何者正確？","options":["如機關經檢討以正字標記為規格標示符合所需之功能或效益者，得指定使用「正字標記」產品，無須於招標文件註明「或同等品」字樣。","機關所擬定之技術規格，其在目的或效果上有無限制競爭，得以符合該規格之廠商家數多寡作為判斷依據，如逾3家，即無限制競爭之情形。","廠商得標後提出之同等品，其價格如較契約所載原要求或提及者為低，應自契約價金中扣除。","須檢附本地代理商保證書。"],"answer":"廠商得標後提出之同等品，其價格如較契約所載原要求或提及者為低，應自契約價金中扣除。","laws":[]},{"id":"s5-mc-75","type":"single","question":"依採購法規定，下列敘述何者正確？","options":["評定最有利標，如係採固定費率或公布決標價格者，不得再要求廠商詳列組成該價格之內容或納入評選。","機關辦理公開招標，其採分段開標者，依採購法規定，開第1段標當日必須審標完畢。","機關辦理公開招標，於招標公告所定開標時間未到即先開啟廠商標封審標，並不符合採購法之規定，不得採行。","機關辦理設計競賽設計成果之製作費用，以採單價計算法為原則。"],"answer":"機關辦理公開招標，於招標公告所定開標時間未到即先開啟廠商標封審標，並不符合採購法之規定，不得採行。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s5-mc-76","type":"single","question":"機關辦理採購，下列敘述何者錯誤？","options":["廠商將投標文件置於不透明之信封，以膠帶封裝者，符合採購法第33條第1項所稱書面密封。","機關得於招標文件中規定允許廠商於開規格標前補正非契約必要之點之文件。","同一投標廠商就同一採購之投標，以一標為限；其有違反而於開標前發現者，所投之標應不予開標。","廠商以自身公司簽發之支票繳納押標金，不符合採購法之規定。"],"answer":"機關得於招標文件中規定允許廠商於開規格標前補正非契約必要之點之文件。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s5-mc-77","type":"single","question":"依採購法規定，機關得於招標文件規定之事項，下列何者正確？","options":["限廠商代表於開標當時必須攜帶與投標文件所用相同之印鑑，否則無權參與減價或比減價。","廠商投標當時即必須於指定地區設有分公司或維護站。","投標時須檢附原廠製造證明及原廠品質保證書。","小額採購仍可以訂定底價方式辦理採購。"],"answer":"小額採購仍可以訂定底價方式辦理採購。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s5-mc-78","type":"single","question":"機關辦理評分及格最低標採購，下列敘述何者錯誤？","options":["採分段開標。","公開招標於開標後參考審查合格廠商之標價訂定底價。","不得於招標文件規定，已達及格分數之廠商尚須過半數審查委員會委員評定方開啟其價格標。","雖採評分審查方式，本質上仍屬最低標。"],"answer":"公開招標於開標後參考審查合格廠商之標價訂定底價。","laws":[]},{"id":"s5-mc-79","type":"single","question":"機關辦理小額採購，下列敘述何者正確？","options":["其驗收，仍適用採購法之監辦規定。","不得未經公告程序，逕洽廠商辦理採購。","均無須簽訂契約。","不得採公開招標辦理。"],"answer":"其驗收，仍適用採購法之監辦規定。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s5-mc-80","type":"single","question":"下列何者非屬政府採購錯誤行為態樣之一？","options":["規定決標後樣品檢驗不合格不發還押標金。","議價案於議價前參考廠商之報價或估價單訂底價。","使用主管機關之招標投標簽約三用格式，廠商決標後須至機關簽約。","決定最有利標後再洽廠商減價。"],"answer":"議價案於議價前參考廠商之報價或估價單訂底價。","laws":[]},{"id":"s5-mc-81","type":"single","question":"下列敘述何者為是？","options":["財物採購之招標文件，不得比照工程採購案件辦理公開閱覽。","招標文件之售價逾新臺幣1,000元者，即有違反法令規定之虞。","機關提供標封供廠商使用，但不限定廠商未使用即為不合格標或無效標，尚非不可。","總價承攬契約，不論數量不符或漏項均應由廠商吸收。"],"answer":"機關提供標封供廠商使用，但不限定廠商未使用即為不合格標或無效標，尚非不可。","laws":[]},{"id":"s5-mc-82","type":"single","question":"依採購法規定，下列敘述何者正確？","options":["廠商以未載明受款人之銀行支票繳納押標金者，機關得拒絕接受。","開標後發現廠商繳納之押標金額度不足者，得允許補繳差額。","採公開招標辦理者，得於招標文件規定廠商1次投標，但就資格、規格、價格分段開標。","工程驗收時，為考量驗收效率，可由廠商自行點選取樣。"],"answer":"採公開招標辦理者，得於招標文件規定廠商1次投標，但就資格、規格、價格分段開標。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s5-mc-83","type":"single","question":"機關辦理公開招標，公告金額以上未達查核金額之採購，其等標期（未提供電子領投標及公開閱覽）不得少於幾日？","options":["5日。","7日。","14日。","21日。"],"answer":"14日。","laws":[]},{"id":"s5-mc-84","type":"single","question":"採購金額新臺幣80萬元之案件以公開取得3家以上報價單，擇符合需要者方式辦理，若無電子領標投標，其等標期最少應有幾天？","options":["5天。","7天。","14天。","3天。"],"answer":"5天。","laws":[]},{"id":"s5-mc-85","type":"single","question":"依採購法令規定，下列敘述何者正確？","options":["訂定廠商特定資格時，得規定具有相當設備者。","訂定廠商資格時，得規定廠商投標當時即必須於指定地區設有分公司或維護站。","對於任何產品，機關均得於招標文件規定廠商都要檢附型錄。","廠商出席開標人員應攜帶廠商大小章。"],"answer":"訂定廠商特定資格時，得規定具有相當設備者。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s5-mc-86","type":"single","question":"公開招標有關規格訂定，下列何者正確？","options":["廠商所提供之型錄，應逐頁加蓋廠商及負責人章。","公告金額以上採購，得指定進口品。","未達公告金額之採購，不適用採購法第26條規定。","不得在招標文件註明「同等品」字樣。"],"answer":"未達公告金額之採購，不適用採購法第26條規定。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s5-mc-87","type":"single","question":"下列關於規格之敘述，何者不正確？","options":["若規定正字標記，應允許同等品競標。","美國之標準為大多數廠商所遵循，故不必規定允許同等品。","型錄係佐證廠商所報規格，不一定須為正本。","公告金額以上之採購，不得指定須為進口品。"],"answer":"美國之標準為大多數廠商所遵循，故不必規定允許同等品。","laws":[]},{"id":"s5-mc-88","type":"single","question":"下列關於技術規格之規定，何者係屬採購錯誤行為？","options":["機關辦理公告金額以上之採購，應依功能或效益訂定招標文件。其有國際標準或國家標準者，應從其規定。","招標文件允許投標廠商提出同等品者，機關於招標文件中規定廠商應於投標文件內預先提出以供審查，並無違反採購法規定。","機關於招標文件要求特定之商名，並註明「或同等品」字樣者，即不違採購法。","採購法第26條第3項所稱同等品，指經機關審查認定，其功能、效益、標準或特性不低於招標文件所要求或提及者。"],"answer":"機關於招標文件要求特定之商名，並註明「或同等品」字樣者，即不違採購法。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s5-mc-89","type":"single","question":"下列何者非屬規格限制競爭的情形？","options":["型錄須為正本。","以ISO9001驗證證書作為產品規範。","型錄須蓋代理廠商之章。","公告金額以上之採購無法精確說明招標要求而列出特定廠牌，同時允許提出同等品供審查。"],"answer":"公告金額以上之採購無法精確說明招標要求而列出特定廠牌，同時允許提出同等品供審查。","laws":[]},{"id":"s5-mc-90","type":"single","question":"某國立大學採統包方式辦理校門口意象及綠美化工程採購，採購金額為新臺幣98萬元，下列何者不是得採行之招標方式？","options":["公開取得企劃書。","依採購法第22條第1項第9款辦理公開評選。","公開招標。","依中央機關未達公告金額採購招標辦法第2條第1項第2款辦理限制性招標。"],"answer":"依採購法第22條第1項第9款辦理公開評選。","laws":[{"name":"中央機關未達公告金額採購招標辦法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030067"},{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s5-mc-91","type":"single","question":"選擇性招標之開標，下列何者不是選擇性招標之資格審查，供建立合格廠商名單後續邀標得採行的方式？","options":["個別邀請所有符合資格之廠商投標。","公告邀請所有符合資格之廠商投標。","由使用單位自符合資格之廠商名單中自行擇定邀請廠商投標。","以抽籤方式擇定邀請符合資格之廠商投標。"],"answer":"由使用單位自符合資格之廠商名單中自行擇定邀請廠商投標。","laws":[]},{"id":"s5-mc-92","type":"single","question":"機關為特定個案辦理選擇性招標，有關邀請符合資格廠商投標之邀請方式，下列敘述何者正確？","options":["依辦理廠商資格審查文件所標示之邀請順序，依序邀請符合資格之廠商投標。","以抽籤方式擇定邀請符合資格之廠商投標。","於辦理廠商資格審查後，邀請所有符合資格之廠商投標。","以上皆非。"],"answer":"於辦理廠商資格審查後，邀請所有符合資格之廠商投標。","laws":[]},{"id":"s5-mc-93","type":"single","question":"依採購法規定，下列敘述何者正確？","options":["機關辦理公告金額以上之限制性招標須報上級機關核准。","招標文件中公告底價須報上級機關核准。","未達公告金額以取最有利標精神擇符合需要廠商辦理議價者須報上級機關核准。","預算案尚未經立法程序，得附條件先行辦理招標。"],"answer":"預算案尚未經立法程序，得附條件先行辦理招標。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s5-mc-94","type":"single","question":"依採購法規定，下列何者須報上級機關核准？","options":["機關辦理公告金額以上之選擇性招標。","招標文件中公告底價。","工程案採最有利標決標。","機關辦理公告金額以上之限制性招標公開評選優勝廠商。"],"answer":"工程案採最有利標決標。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s5-mc-95","type":"single","question":"未達公告金額而逾公告金額十分之一案件，不能以下列哪一種方式辦理？","options":["公開招標。","公開取得3家以上廠商之書面報價。","簽經機關首長核准後，採限制性招標。","不經公告程序逕洽廠商採購。"],"answer":"不經公告程序逕洽廠商採購。","laws":[]},{"id":"s5-mc-96","type":"single","question":"下列何者非採購法之監辦時機？","options":["開標。","比價。","查驗。","驗收。"],"answer":"查驗。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s5-mc-97","type":"single","question":"下列何者不會有違反採購法第6條第1項規定之虞？","options":["預算新臺幣50萬元之採購，以公開徵求廠商提供報價單及指定廠牌方式辦理決標。","不適用我國締結之條約、協定之採購，僅允許我國廠商投標。","規定投標廠商須為製造廠之代理商。","規定投標廠商須於招標機關之所在地轄區有實際工作經驗。"],"answer":"不適用我國締結之條約、協定之採購，僅允許我國廠商投標。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s5-mc-98","type":"single","question":"下列何者正確？","options":["標價偏低，未經分析逕行決標。","標價偏低，未通知廠商說明即逕通知繳納差額保證金。","標價偏低，未繳納差額保證金前即決標而於決標後通知繳納差額保證金。","機關經檢討標價偏低之最低標廠商標價後，認無顯不合理，無降低品質、不能誠信履約之虞或其他特殊情形，擬照價決標予該最低標。最低標如不接受決標或拒不簽約，不發還押標金。"],"answer":"機關經檢討標價偏低之最低標廠商標價後，認無顯不合理，無降低品質、不能誠信履約之虞或其他特殊情形，擬照價決標予該最低標。最低標如不接受決標或拒不簽約，不發還押標金。","laws":[]},{"id":"s5-mc-99","type":"single","question":"投標廠商之標價超過底價時，下列何者為正確？","options":["議價之減價次數不得逾3次。","比減價格之次數為不得逾3次，不包括洽最低標減價1次。","比減價格之次數由機關限制次數，但應事先通知各比減廠商。","依招標文件規定。"],"answer":"比減價格之次數為不得逾3次，不包括洽最低標減價1次。","laws":[]},{"id":"s5-mc-100","type":"single","question":"下列何種屬「投標廠商資格與特殊或巨額採購認定標準」第5條第1項第5款所稱國際或國家品質管理之驗證文件？","options":["公共工程金質獎證書。","CNS 15013（醫療器材品質管理系統）。","食品GMP認證。","CAS（台灣優良農產品）驗證證書。"],"answer":"CNS 15013（醫療器材品質管理系統）。","laws":[{"name":"投標廠商資格與特殊或巨額採購認定標準","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030099"}]},{"id":"s5-mc-101","type":"single","question":"機關以公開招標搭配採購法第56條規定之最有利標決標方式辦理採購，下列敘述何者錯誤？","options":["不論採購金額大小，均應先報經上級機關核准。","採購標的包括工程、財物或勞務。","議價程序不得免除。","應成立採購評選委員會。"],"answer":"議價程序不得免除。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s5-mc-102","type":"single","question":"下列何者非屬巨額財物採購之應辦事項？","options":["招標前簽准預期使用情形。","成立採購工作及審查小組。","報上級機關派員監辦。","訂定投標廠商之特定資格前，評估可能符合特定資格之廠商家數。"],"answer":"成立採購工作及審查小組。","laws":[]},{"id":"s5-mc-103","type":"single","question":"下列何者可能有圍標之嫌，於開標時宜注意之？","options":["同一人代表2家公司出席開標。","不同投標廠商之領標網路位址（IP）相同。","不同投標廠商所繳納之押標金，疑似由同一人出具。","以上皆是。"],"answer":"以上皆是。","laws":[]},{"id":"s5-mc-104","type":"single","question":"下列有關採購實務之規定，何者為非？","options":["廠商如因市場發生缺貨或停產之情形，擬以等級高於原契約型錄之產品交貨，尚無不可。","廠商因查驗或驗收不合格，遭機關部分解除或部分終止契約，情節非重大者，仍有採購法第101條第1項第8款之適用。","自然人得標後，不得以該個人獨資之工作室變更簽約主體。","投標文件內容於投標前經塗改，並由廠商代表人於塗改處蓋章或簽名者，仍屬有效。"],"answer":"廠商因查驗或驗收不合格，遭機關部分解除或部分終止契約，情節非重大者，仍有採購法第101條第1項第8款之適用。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s5-mc-105","type":"single","question":"機關依採購法第22條第1項第11款辦理經公開徵求之限制性招標，下列敘述何者錯誤？","options":["不得以正進行建造中，且尚未取得使用執照及權利書狀之房地，為採購徵選之標的。","辦理採購前應先編擬計畫依規定層報核定。","簽辦文件應敘明採購房地產及指定地區採購之理由及其必要性。","無須將公開徵求房地產之公告刊登於政府採購公報並公開於資訊網路。"],"answer":"無須將公開徵求房地產之公告刊登於政府採購公報並公開於資訊網路。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s5-mc-106","type":"single","question":"採購法第22條第1項第4款所稱「原供應廠商」，下列何者非屬「原供應廠商」之範圍？","options":["原訂約廠商之關係企業。","原製造廠商。","原訂約廠商之分包廠商。","原訂約廠商。"],"answer":"原訂約廠商之關係企業。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s5-mc-107","type":"single","question":"有關技術規格之敘述，何者為正確？","options":["機關所擬定、採用或適用之技術規格，其在目的或效果上有無限制競爭，應以符合該規格之廠商家數多寡作為判斷依據。","機關已於招標文件精確描述技術規格，可一併列出參考廠牌，以方便投標廠商詢價。","採購法第26條第1項至第3項規定技術規格之訂定順序，即機關應優先依同條第1項規定，訂定符合機關需求之技術規格；無法依第1項規定訂定技術規格時，再依序依第2項、第3項規定辦理。","機關依採購法第11條之1規定成立採購工作及審查小組，其任務不包括確認招標文件所訂技術規格是否為「機關所必須」之需求。"],"answer":"採購法第26條第1項至第3項規定技術規格之訂定順序，即機關應優先依同條第1項規定，訂定符合機關需求之技術規格；無法依第1項規定訂定技術規格時，再依序依第2項、第3項規定辦理。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s5-mc-108","type":"single","question":"機關採選擇性招標建立合格廠商名單方式辦理採購，其預先辦理廠商資格審查，名單有效期為2年，每年預估採購總額為新臺幣(下同)200萬元。今利用該名單邀請符合資格廠商參加80萬元投標，本次採購之採購金額應認定為？","options":["80萬元。","200萬元。","400萬元。","480萬元。"],"answer":"80萬元。","laws":[]},{"id":"s5-mc-109","type":"single","question":"下列何者屬巨額工程採購之應辦事項？","options":["應採行統包方式辦理。","成立採購工作及審查小組。","訂定投標廠商之特定資格。","允許共同投標。"],"answer":"成立採購工作及審查小組。","laws":[]}]},{"id":"s6","title":"投標須知及招標文件製作","questions":[{"id":"s6-mc-1","type":"single","question":"有關招標文件對於優良廠商應繳納之押標金及保證金規定，下列何者為非？","options":["繳納履約保證金後方為優良廠商者，不溯及適用減收規定。","對列為政府電子採購網優良廠商資料庫之廠商，機關均得據以減收押標金及保證金，不以招標文件載明者為限。","減收保證金後獎勵期間屆滿者，免補繳減收之金額。","減收保證金後發生不發還該保證金情形者，廠商應就不發還金額中屬減收之金額補繳之。"],"answer":"對列為政府電子採購網優良廠商資料庫之廠商，機關均得據以減收押標金及保證金，不以招標文件載明者為限。","laws":[]},{"id":"s6-mc-2","type":"single","question":"依採購法規定，下列敘述何者正確？","options":["採購案是否達查核金額或公告金額係以預算金額認定之。","採議價方式辦理之採購，得免訂定底價，但須於招標文件敘明理由及決標原則。","招標文件未規定廠商報價須包含5%營業稅者，表示廠商之報價應包含5%營業稅。","招標文件規定採電子投標之廠商，其押標金得予減收押標金金額之5%"],"answer":"招標文件規定採電子投標之廠商，其押標金得予減收押標金金額之5%","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s6-mc-3","type":"single","question":"依採購法規定，下列敘述何者正確？","options":["招標文件規定最低標廠商如經機關通知有採購法第58條情形，應於開標當場出具願意繳納差額保證金之切結書，尚屬適法 。","一次投標分段開標之採購，招標文件規定投標廠商之內外標封須書名廠商名稱、地址，尚屬適法。","招標文件規定廠商投標文件份數與招標文件規定不符者為無效標，尚屬適法。","招標文件規定開標時廠商須攜帶資格文件正本供查驗，尚屬適法。"],"answer":"一次投標分段開標之採購，招標文件規定投標廠商之內外標封須書名廠商名稱、地址，尚屬適法。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s6-mc-4","type":"single","question":"依採購法規定，下列敘述何者正確？","options":["投標須知應載明受理廠商異議、申訴、履約爭議調解之機關名稱，且三者須一致。","未達公告金額之採購，招標文件及公告得規定領標方式限以專人領取。","招標文件規定押標金以現金繳納者，應繳納至指定之收受處所或帳號，否則為不合格標，尚屬適法。","廠商得以現金作為押標金附於投標文件內遞送。"],"answer":"招標文件規定押標金以現金繳納者，應繳納至指定之收受處所或帳號，否則為不合格標，尚屬適法。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s6-mc-5","type":"single","question":"機關允許廠商以電子方式領標者應於以下何者中訂明？","options":["招標公告及招標文件。","招標公告。","招標文件。","招標公告及機關之網站公告。"],"answer":"招標公告及招標文件。","laws":[]},{"id":"s6-mc-6","type":"single","question":"有關共同投標之採購案件，下列敘述何者正確？","options":["招標文件中未載明允許廠商共同投標者，廠商採共同投標方式投標，機關仍得接受。","共同投標廠商之家數上限，得免於招標文件中載明。","允許廠商共同投標之案件，廠商單獨投標並無不可。","以聯合技師事務所投標者，亦屬共同投標。"],"answer":"允許廠商共同投標之案件，廠商單獨投標並無不可。","laws":[]},{"id":"s6-mc-7","type":"single","question":"機關於招標文件規定廠商之投標文件為不合格標之情形，下列何者非屬無效之規定？","options":["未檢附願繳納差額保證金之切結書。","投標文件之編排、字體大小、裝訂方式或份數與招標文件規定不符。","不分段開標之投標文件未依招標文件規定分置資格、規格或價格標封。","未依招標文件規定檢附廠商切結書。"],"answer":"未依招標文件規定檢附廠商切結書。","laws":[]},{"id":"s6-mc-8","type":"single","question":"下列敘述，何者錯誤？","options":["機關辦理評選，得於招標文件規定過半數出席評選委員評定總分未達若干分者，為不合格廠商。","機關得於招標文件載明預算未完成立法程序前，得先辦理保留決標，俟預算通過後始決標生效。","機關得於招標文件要求電子領標廠商，應檢附工程會指定資訊系統之領標電子憑據。","機關辦理公開客觀評選優勝廠商，招標文件如未訂明固定費用或費率，應於議價時提供空白標單供廠商重行報價。"],"answer":"機關辦理公開客觀評選優勝廠商，招標文件如未訂明固定費用或費率，應於議價時提供空白標單供廠商重行報價。","laws":[]},{"id":"s6-mc-9","type":"single","question":"機關辦理財物採購，依採購法第49條及第93條之1規定公開取得電子報價單，下列敘述何者錯誤？","options":["招標文件規定只允許廠商電子領標、電子報價，不提供現場領標、現場投標。","招標文件規定不允許廠商於開標前補正非契約必要之點之文件。","廠商電子報價後，如發現標價錯誤，得允許廠商撤回更正。","廠商之電子化資料，視同正式文件，免另備書面文件。"],"answer":"廠商電子報價後，如發現標價錯誤，得允許廠商撤回更正。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s6-mc-10","type":"single","question":"下列何者非屬機關應依採購法第31條第2項第7款規定，就廠商所繳納之押標金不予發還之情形？","options":["廠商有採購法第50條第1項第5款情形。","廠商或其代表人、代理人、受雇人或其他從業人員與機關人員，共同違反採購法第26條、第34條或第37條第1項規定。","廠商或其代表人、代理人、受雇人或其他從業人員與受機關委託提供採購規劃、設計、專案管理或代辦採購廠商之人員，共同實施採購法第89條規定構成要件事實。","廠商有採購法第48條第1項第2款「足以影響採購公正之違法行為者」情形。"],"answer":"廠商有採購法第48條第1項第2款「足以影響採購公正之違法行為者」情形。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s6-mc-11","type":"single","question":"機關於招標文件規定廠商之投標文件為不合格標之情形，下列何者屬有效之規定？","options":["標封封口未蓋騎縫章。","投標文件未逐頁蓋章。","廠商電子領標，投標文件無需檢附電子領標憑據。","分段開標之投標文件，未依規定分置資格、規格或價格標封。"],"answer":"分段開標之投標文件，未依規定分置資格、規格或價格標封。","laws":[]},{"id":"s6-mc-12","type":"single","question":"機關辦理採購，應依政府採購法及相關法令製作招標文件，下列敘述何者正確？","options":["未達公告金額採購仍適用採購法第26條規定。","適用WTO政府採購協定(GPA)之採購案，仍得於招標文件規定優先採購我國產品。","機關辦理公告招標，於招標文件就招標文件提及之特定來源地註明「或同等品」。","機關於招標文件規定優先採購正字標記規格產品。"],"answer":"機關辦理公告招標，於招標文件就招標文件提及之特定來源地註明「或同等品」。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s6-mc-13","type":"single","question":"招標文件對於優先採購環保產品之敘述，下列何為是？","options":["招標標的僅部分屬環保產品者，仍得於招標文件載明優先採購環保產品。","招標文件明定提供環保標章產品之廠商，始可投標。","適用條約或協定之採購案，仍得優先採購環保產品。","不限定採購具環保標章之產品，但允許於價差8%內優先決標予環保產品廠商。"],"answer":"不限定採購具環保標章之產品，但允許於價差8%內優先決標予環保產品廠商。","laws":[]},{"id":"s6-mc-14","type":"single","question":"關於共同供應契約採購，下列敘述何者錯誤？","options":["訂約機關於共同供應契約約定，各適用機關可自行決定是否利用共同供應契約辦理採購。","機關於招標文件載明共同供應契約每次最高採購量，不另訂定大量訂購金額可洽廠商提供優惠條件之條款。","機關於招標文件載明之共同供應契約預算金額係屬預估，於該契約有效期間內，各機關總訂購金額仍得逾預算數額。","利用共同供應契約訂購前，先查察其他供應來源有無較便宜且符合需要之標的。"],"answer":"機關於招標文件載明之共同供應契約預算金額係屬預估，於該契約有效期間內，各機關總訂購金額仍得逾預算數額。","laws":[]},{"id":"s6-mc-15","type":"single","question":"依採購法規定，下列招標文件規定，何者適法？","options":["同一廠商同時做為各機關採購契約之連帶保證廠商者，以不超過3契約為原則。","機關以統包辦理招標，允許4家以內之廠商共同投標。","優良廠商減收押標金金額，其繳納金額為原定應繳總額之百分之三十。","允許4家以內之廠商投標，應載明不得單獨投標。"],"answer":"機關以統包辦理招標，允許4家以內之廠商共同投標。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s6-mc-16","type":"single","question":"下列招標文件之規定，何者為是？","options":["開標後發現投標廠商聲明書未加蓋廠商及其負責人印章者，不允許廠商補正。","招標文件規定廠商須使用機關指定之封套投標，否則視為無效標。","投標廠商未攜帶與投標廠商聲明書相符之廠商及負責人印章者，視為放棄減價權利。","得標廠商之押標金於完成簽約並正常履約二個月後退還。"],"answer":"開標後發現投標廠商聲明書未加蓋廠商及其負責人印章者，不允許廠商補正。","laws":[]},{"id":"s6-mc-17","type":"single","question":"以下何者非屬機關得於招標文件中規定允許廠商於開標前補正之非契約必要之點之文件？","options":["原招標文件已標示得更改之項目。","參考性質之事項。","列入標價評比之選購項目。","其他於契約成立無影響之事項。"],"answer":"列入標價評比之選購項目。","laws":[]},{"id":"s6-mc-18","type":"single","question":"下列招標文件之規定，何者尚屬適法？","options":["廠商出席人員不得遲到、早退，開標20分鐘以後不得進場。","投標廠商聲明書未加蓋廠商章者，視為不合格。","投標文件內容有前後不一致或書寫錯誤之情形者，視為不合格。","招標文件規定優良廠商應繳納之押標金、保證金得予減收55%。"],"answer":"投標廠商聲明書未加蓋廠商章者，視為不合格。","laws":[]},{"id":"s6-mc-19","type":"single","question":"下列何者須於招標文件明定?","options":["被刊登於政府採購公報之廠商，不得參加投標或作為決標對象或分包廠商之期間。","廠商標價超過底價時，比減價格之次數。","採協商措施者，得納入協商之項目。","政黨及與其具關係企業關係之廠商，不得參與投標。"],"answer":"採協商措施者，得納入協商之項目。","laws":[]},{"id":"s6-mc-20","type":"single","question":"下列何者須於招標文件載明，否則機關不能據以辦理？","options":["逾期違約金之計罰。","辦理部分驗收。","驗收不符時，改正期限之訂定。","減價收受之減價計算方式。"],"answer":"逾期違約金之計罰。","laws":[]},{"id":"s6-mc-21","type":"single","question":"下列敘述何者正確？","options":["機關辦理採購之標的，如法令已有允許輸入臺灣地區之大陸地區產品，機關尚不得拒絕廠商以之作為投標標的。","臺商於大陸地區投資設立之公司，仍視為我國廠商，得參與我國機關辦理之採購。","依現行相關法令規定，大陸地區廠商不得參與我機關採購。","機關辦理涉及大陸地區財物或勞務之採購，為免爭議，宜於招標文件載明是否允許廠商提供原產地為大陸地區之財物或勞務參與其採購。"],"answer":"機關辦理涉及大陸地區財物或勞務之採購，為免爭議，宜於招標文件載明是否允許廠商提供原產地為大陸地區之財物或勞務參與其採購。","laws":[]},{"id":"s6-mc-22","type":"single","question":"依採購法規定，下列何者為非？","options":["除我國締結之條約或協定另有規定外，機關得視個案性質與實際需要決定是否允許外國廠商參與投標。","機關招標文件規定不允許外國廠商投標，我國廠商供應之財物或勞務原產地非屬我國者，不影響其投標資格。","跨國企業在我國經目的事業主管機關認許在臺營業之分公司，其如參與投標，應視為外國廠商。","大陸地區產品之原產地認定，依進口貨物原產地認定標準。"],"answer":"機關招標文件規定不允許外國廠商投標，我國廠商供應之財物或勞務原產地非屬我國者，不影響其投標資格。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s6-mc-23","type":"single","question":"下列投標須知之規定，何者無違反採購法之虞？","options":["以現金繳納押標金之憑據應附於投標文件，否則視為未繳納而為無效標。","廠商「投標標價清單」如經塗改，應加蓋印章，否則視為無效標。","投標文件未使用機關提供之封套，視為無效標。","投標文件之頁數或紙張大小與投標文件規定不符者，視為無效標。"],"answer":"廠商「投標標價清單」如經塗改，應加蓋印章，否則視為無效標。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s6-mc-24","type":"single","question":"有關採購法所稱招標文件，下列敘述何者錯誤？","options":["決標後納為契約文件之一。","機關應據以為審標之依據。","採購法規未明定須於招標文件載明者，均毋需於招標文件中載明。","採購法規定應載明於招標文件者，均須於招標文件中載明。"],"answer":"採購法規未明定須於招標文件載明者，均毋需於招標文件中載明。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s6-mc-25","type":"single","question":"依採購法規定，下列何者正確？","options":["預算金額必須於招標文件及招標公告公開。","未達查核金額之工程採購，仍得於公告招標前辦理招標文件之公開閱覽。","擬依採購法第22條第1項第7款辦理後續增購，為避免相關規定不一致，得將該增購之情形於招標公告載明為詳投標須知第xx點規定。","預計金額必須於招標文件及招標公告公開。"],"answer":"未達查核金額之工程採購，仍得於公告招標前辦理招標文件之公開閱覽。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s6-mc-26","type":"single","question":"下列何者非屬未達公告金額採購之特性？","options":["得免收押標金及保證金。","決標結果得免以書面通知廠商。","得免訂定底價。","免通知上級機關監辦。"],"answer":"得免訂定底價。","laws":[]},{"id":"s6-mc-27","type":"single","question":"依採購法規定，下列敘述何者正確？","options":["即使無政府採購條約或協定，外國廠商均可參與我國之政府採購 。","招標文件載明投標廠商須檢附票據交換機構於截止投標日之前一個月內所出具之非拒絕往來戶或最近3年內無銀行退票紀錄證明文件，尚屬適法。","器材採購之招標文件規定得標廠商交貨時應檢附保固證明書，尚屬適法。","招標文件不得規定外國廠商依該國情形提出資格文件有困難者，得敘明其情形或以其所具有之相當資格代之。"],"answer":"器材採購之招標文件規定得標廠商交貨時應檢附保固證明書，尚屬適法。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s6-mc-28","type":"single","question":"依採購法規定，下列何者正確？","options":["機關辦理非特殊或巨額採購，其招標文件訂定投標廠商須檢附實績證明，尚屬適法。","機關辦理採購，於招標文件允許廠商共同投標，其共同投標之廠商家數上限為3家，尚不違反採購法。","機關辦理一採購金額為新臺幣50萬元之勞務採購，不得採選擇性招標。","以上皆非。"],"answer":"機關辦理採購，於招標文件允許廠商共同投標，其共同投標之廠商家數上限為3家，尚不違反採購法。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s6-mc-29","type":"single","question":"機關辦理採購，應於招標文件中規定廠商對招標文件內容有疑義者，應以書面向招標機關請求釋疑之期限，以下敘述何者正確？","options":["自公告日或邀標日起等標期之二分之一。","自公告日或邀標日起等標期之三分之一。","自公告日或邀標日起等標期之四分之一，且不得少於十日。","自公告日或邀標日起等標期之四分之一，其尾數不足一日者，以一日計。"],"answer":"自公告日或邀標日起等標期之四分之一，其尾數不足一日者，以一日計。","laws":[]},{"id":"s6-mc-30","type":"single","question":"依採購法規定，下列招標文件規定何者適法？","options":["差額保證金須於機關通知後3日內繳納 。","投標廠商應符合之資格之一部分，得以分包廠商就其分包部分所具有者代之。","查核金額以上採購，得標廠商須於簽訂契約後10天內繳納履約保證金。","押標金及保證金應由廠商以現金及金融機構簽發之本票或支票為之，其餘概不受理。"],"answer":"投標廠商應符合之資格之一部分，得以分包廠商就其分包部分所具有者代之。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s6-mc-31","type":"single","question":"依採購法規定，下列敘述何者適法？","options":["廠商繳納押標金後未參加投標，所繳納之押標金應予發還。","機關辦理巨額採購，應於招標文件規定廠商之特定資格。","未達公告金額之採購，招標文件得明定原住民廠商免繳納押標金。","招標文件應明定廠商投標文件應書面密封並於騎縫處加蓋大小印章。"],"answer":"廠商繳納押標金後未參加投標，所繳納之押標金應予發還。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s6-mc-32","type":"single","question":"以下何者雖未於招標文件或契約預為載明，仍得辦理？","options":["因有先行使用之必要者，經機關首長或其授權人員核准，辦理部分驗收。","允許一定家數內之廠商共同投標。","因歸責於廠商之事由致解除契約，機關不予發還該廠商履約保證金。","因歸責於廠商之事由造成履約延遲，機關處罰廠商每日契約總價千分之一之逾期違約金。"],"answer":"因有先行使用之必要者，經機關首長或其授權人員核准，辦理部分驗收。","laws":[]},{"id":"s6-mc-33","type":"single","question":"機關辦理採購，有關招標文件對於陸資廠商之資格規定，下列何者為非？","options":["機關可依個案需要，明定允許大陸地區廠商或其產品或勞務參與。","非適用條約或協定之採購，可於招標文件規定不允許第三地區含陸資成分之廠商參與。","依我國法律設立登記之公司或事業，其含陸資成分達1/2以上之廠商，視為大陸地區廠商。","倘以公告方式辦理者，除有法規或條約協定之依據，並於招標文件訂定限制條件外，不得限制在臺陸資廠商參與。"],"answer":"依我國法律設立登記之公司或事業，其含陸資成分達1/2以上之廠商，視為大陸地區廠商。","laws":[]},{"id":"s6-mc-34","type":"single","question":"依採購法規定，下列敘述何者適法？","options":["招標文件得明定廠商於「投標前三年承辦各機關之工程曾發生重大職業災害」者不得參與投標。","招標文件應明定允許廠商於開標前補正契約非必要之點之文件。","招標文件得明定廠商應於截止投標期限前將投標文件送達招標機關指定之郵政信箱。","機關辦理藝文採購，招標文件規定免收押標金、保證金。"],"answer":"機關辦理藝文採購，招標文件規定免收押標金、保證金。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s6-mc-35","type":"single","question":"機關允許外國廠商投標之採購，下列敘述何者為是？","options":["如招標文件未訂明投標廠商之標價幣別得為美元，因美元為國際流通貨幣，廠商仍得以美元報價。","投標廠商標價幣別在二種以上者，其總價之折算，依決標前一辦公日臺灣銀行外匯交易收盤即期賣出匯率折算之。","外國廠商以等值外幣繳納押標金及保證金者，以繳納日前一辦公日臺灣銀行外匯交易收盤即期賣出匯率折算之。","機關不得於招標文件載明外國廠商免附具加入工業或商業團體之證明。"],"answer":"投標廠商標價幣別在二種以上者，其總價之折算，依決標前一辦公日臺灣銀行外匯交易收盤即期賣出匯率折算之。","laws":[]}]},{"id":"s7","title":"採購契約","questions":[{"id":"s7-mc-1","type":"single","question":"機關辦理資訊服務採購，下列何者錯誤？","options":["辦理重大新興資訊業務，以整體委外服務方式，不可包括硬體設備等財物採購。","符合經濟部投資審議司公告「具敏感性或國安（含資安）疑慮之業務範疇」者，得禁止以陸資資訊服務業為分包廠商。","得要求廠商駐點服務人員簽具保密切結書。","可採行最有利標決標。"],"answer":"辦理重大新興資訊業務，以整體委外服務方式，不可包括硬體設備等財物採購。","laws":[]},{"id":"s7-mc-2","type":"single","question":"依採購法主管機關之「採購契約範本附記條款特別聲明」，廠商於履約過程使用資通訊產品履約時，下列何者不得使用？","options":["中國大陸廠牌之資通訊產品。","日本國廠牌之資通訊產品。","韓國廠牌之資通訊產品。","美國廠牌之資通訊產品。"],"answer":"中國大陸廠牌之資通訊產品。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s7-mc-3","type":"single","question":"有關採購法主管機關所定「採購契約範本附記條款特別聲明」載明履約禁用中國大陸廠牌資通訊產品、不得提供公務機密予AI及使用AI履約須報機關同意等規定，下列何者錯誤？","options":["履約過程及履約標的禁止使用及採購中國大陸廠牌資通訊產品〔含軟體、硬體及服務（含生成式AI程式如：Deepseek等）〕。","廠商履約過程及成果需透過使用及採購生成式AI以產出履約標的內容或相關文件者，應先徵得機關同意始得為之。","廠商不得向生成式AI提供採購案涉及公務應保密、個人及未經機關（構）同意公開之資訊，亦不得向生成式AI詢問可能涉及採購案機敏或個人資料之事項。","契約本文之效力優於本特別聲明附記條款。"],"answer":"契約本文之效力優於本特別聲明附記條款。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s7-mc-4","type":"single","question":"下列何者錯誤？","options":["機關通知廠商變更契約，廠商於機關接受其所提出須變更之相關文件前，不得自行變更契約。","機關於接受廠商所提出須變更之事項前即請求廠商先行施作，其後如未依原通知辦理契約變更者，應補償廠商所增加之必要費用。","契約所定事項如有違反法令或無法執行之部分，該部分無效。該無效之部分，機關及廠商必要時得依契約原定目的更正之。","機關以正式公文通知廠商變更契約，縱廠商表示反對，契約變更仍生效力。"],"answer":"機關以正式公文通知廠商變更契約，縱廠商表示反對，契約變更仍生效力。","laws":[]},{"id":"s7-mc-5","type":"single","question":"契約訂有分段進度及最後履約期限，且均訂有逾期違約金者，屬全部完工後使用或移交之情形，其逾期違約金之計算下列何者為是？","options":["逾分段進度但未逾最後履約期限，計算逾分段進度之違約金。","逾分段進度且逾最後履約期限，應就逾分段進度及最後履約期限部分，分別計罰違約金。","分段完工期限與其他採購契約之進行有關者，逾分段進度但未逾最後履約期限，其有逾分段進度已收取之違約金者，於未逾最後履約期限後發還。","最後履約期限與其他採購契約之進行有關者，未逾分段進度但逾最後履約期限者，計算逾最後履約期限之違約金。"],"answer":"最後履約期限與其他採購契約之進行有關者，未逾分段進度但逾最後履約期限者，計算逾最後履約期限之違約金。","laws":[]},{"id":"s7-mc-6","type":"single","question":"下列何者錯誤？","options":["機關對於廠商、分包廠商及其人員因履約所致之人體傷亡或財物損失，不負賠償責任。","因可歸責於廠商之事由，致機關遭受損害者，廠商應負賠償責任，機關得於招標文件預先載明廠商無需對「所失利益」負賠償責任。","契約之一方未請求他方依契約履約者，得視為或構成一方放棄請求他方依契約履約之權利。","契約所定技術規格違反採購法第26條規定，廠商得敘明理由，檢附規格、功能、效益及價格比較表，徵得機關書面同意後，以其他規格、功能及效益相同或較優者代之。"],"answer":"契約之一方未請求他方依契約履約者，得視為或構成一方放棄請求他方依契約履約之權利。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s7-mc-7","type":"single","question":"招標文件未另定契約生效條件者，下列何者為契約生效日？","options":["決標日。","決標日之次一上班日。","雙方完成契約簽署之日。","依機關指定之日期。"],"answer":"決標日。","laws":[]},{"id":"s7-mc-8","type":"single","question":"下列敘述何者正確？","options":["分包廠商不得將分包契約再行分包。","轉包廠商如有再轉包者，其中間轉包之廠商雖未與機關訂有契約，亦未實際履行契約者，仍應與得標廠商及最後轉包廠商對機關負連帶履行及賠償責任。","機關要求廠商報備其分包契約時，廠商應一併將分包部分設定權利質權予分包廠商。","廠商就分包部分設定權利質權予分包廠商，則該分包廠商所負契約連帶瑕疵擔保責任，與得標廠商相同。"],"answer":"轉包廠商如有再轉包者，其中間轉包之廠商雖未與機關訂有契約，亦未實際履行契約者，仍應與得標廠商及最後轉包廠商對機關負連帶履行及賠償責任。","laws":[]},{"id":"s7-mc-9","type":"single","question":"下列就採購法主管機關訂定之採購契約範本之敘述何者正確？","options":["屬必要條件。","以採用為原則。","範本內容均不可修改。","只要預先聲明即可不必採用。"],"answer":"以採用為原則。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s7-mc-10","type":"single","question":"機關視個案性質，於工程採購招標文件中要求廠商履約期間辦理營造綜合保險，下列敘述何者有誤？","options":["工程有延期或遲延履約，保險期間順延。","將機關及其技術服務廠商、施工廠商及全部分包廠商列為共同被保險人。","附加第三人建築物龜裂倒塌責任險或鄰近財物附加條款。","載明每一事故之廠商自負額下限。"],"answer":"載明每一事故之廠商自負額下限。","laws":[]},{"id":"s7-mc-11","type":"single","question":"下列何者情形，致廠商履約費用增加或減少者，契約價金得予調整？","options":["匯率變動。","汽油價格上漲。","政府縮短工時政策。","員工罷工。"],"answer":"政府縮短工時政策。","laws":[]},{"id":"s7-mc-12","type":"single","question":"依採購法主管機關訂定之工程採購契約範本，契約價金係以總價決標，且以契約總價給付，工程標的中某項之實作數量較契約所定數量增加達百分之十八，以下何者正確？","options":["以契約變更增加該項契約價金百分之十五。其他百分之三，由廠商自行負擔。","應完全由廠商自行負擔。","應以契約變更增加該項契約價金百分之十八。","由機關與廠商各負擔一半。"],"answer":"以契約變更增加該項契約價金百分之十五。其他百分之三，由廠商自行負擔。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s7-mc-13","type":"single","question":"以下簽訂契約之方式，何者為非？","options":["採購個案，招標文件預先載明分訂2個契約，而與廠商訂定2個契約。","採購個案，因採複數決標，得標後，分別與廠商就其得標項目訂定契約。","採購個案，因採共同投標，得標後與各該成員就其主辦項目，分別訂定契約。","機關利用共同供應契約採購，下訂後無須再與廠商簽訂契約。"],"answer":"採購個案，因採共同投標，得標後與各該成員就其主辦項目，分別訂定契約。","laws":[]},{"id":"s7-mc-14","type":"single","question":"下列敘述何者正確？","options":["得標廠商其於國內員工總人數逾100人，履約期間僱用身心障礙者及原住民人數各應達國內員工總人數1%之規定，須於契約明定始生效力。","政府採購契約約定履約期限以日曆天計算者，如該履約期間之末日適逢星期假日、國定假日或其他休息日，而契約未有特別約定者，適用民法第122條所定「以其休息日之次日代之」。","契約應訂明得標廠商其於國內員工總人數逾100人，履約期間僱用身心障礙者及原住民人數不足者，應分別依規定繳納代金，並將繳納證明文件影本送機關查核。","得標廠商擬分包之項目及分包廠商，屬得標廠商之權責，機關不得予以審查。"],"answer":"政府採購契約約定履約期限以日曆天計算者，如該履約期間之末日適逢星期假日、國定假日或其他休息日，而契約未有特別約定者，適用民法第122條所定「以其休息日之次日代之」。","laws":[{"name":"民法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=B0000001"}]},{"id":"s7-mc-15","type":"single","question":"下列敘述何者正確？","options":["契約文件不包括招標文件。","對於分包廠商履約之部分，得標廠商仍應負完全責任。但分包契約報備於機關者不在此限。","分包契約報備於採購機關，並經得標廠商就分包部分設定權利質權予分包廠商者，其分包部分之瑕疵擔保責任，由分包廠商承擔，得標廠商得免除其責任。","契約條款預先置於招標文件。"],"answer":"契約條款預先置於招標文件。","laws":[]},{"id":"s7-mc-16","type":"single","question":"下列何者非機關得辦理採購契約價金調整之情形？","options":["因國內政府法令之變更。","因國外稅捐變更。","總價結算工程契約之單項履約數量因契約變更須增減。","依契約約定辦理物價指數調整。"],"answer":"因國外稅捐變更。","laws":[]},{"id":"s7-mc-17","type":"single","question":"依採購契約要項，逾期違約金，以契約價金總額之多少比率為上限？","options":["10%。","20%。","30%。","40%。"],"answer":"20%。","laws":[]},{"id":"s7-mc-18","type":"single","question":"得標廠商，在何種情形下，得請求契約變更？","options":["所交之財物不符契約約定。","機關之需求變更。","契約原標示之廠牌型號停產。","所使用之材料不符契約約定，要求減價收受。"],"answer":"契約原標示之廠牌型號停產。","laws":[]},{"id":"s7-mc-19","type":"single","question":"下列何者非屬契約文件？","options":["契約本文。","投標文件。","招標文件。","拒絕往來廠商名單。"],"answer":"拒絕往來廠商名單。","laws":[]},{"id":"s7-mc-20","type":"single","question":"逾期違約金，為損害賠償預定違約金，以日為單位，請問下列情形何者不宜？","options":["違約金之上限定為契約總價之百分之五十。","每逾1日以契約總價之一定比率處罰。","違約金之上限定為契約總價之百分之二十。","每逾1日以定額處罰。"],"answer":"違約金之上限定為契約總價之百分之五十。","laws":[]},{"id":"s7-mc-21","type":"single","question":"契約約定所有應檢驗或測試之費用應由廠商負擔。在何種情況下應由機關負擔？","options":["檢驗結果合格。","測試結果不合格。","檢測契約約定以外之項目結果合格。","檢測契約約定以外之項目結果不合格。"],"answer":"檢測契約約定以外之項目結果合格。","laws":[]},{"id":"s7-mc-22","type":"single","question":"機關與廠商於契約之相互通知，除得於契約中約定外，不宜以下列何種方式為之？","options":["書面文件。","信函。","傳真。","口頭。"],"answer":"口頭。","laws":[]},{"id":"s7-mc-23","type":"single","question":"下列敘述何者正確？","options":["契約變更以機關公文通知即為有效。","廠商履約結果涉及智慧財產權者，機關應取得全部權利。","機關對於廠商及其人員因履約所致之人體傷亡或財物損失，不負賠償責任。","機關應就廠商向保險人索賠所費時間給予延長履約期限。"],"answer":"機關對於廠商及其人員因履約所致之人體傷亡或財物損失，不負賠償責任。","laws":[]},{"id":"s7-mc-24","type":"single","question":"下列敘述何者錯誤？","options":["機關得於契約約定，廠商擬分包之項目及分包廠商，機關得予審查。","機關應對廠商工地作業及施工方法之適當性、可靠性及安全性負完全責任。","機關得於契約約定履約爭議經契約雙方同意並訂立仲裁協議書後，依契約約定及仲裁法規定提付仲裁。","採購標的之送達地點及履約處所，應於契約內訂明。"],"answer":"機關應對廠商工地作業及施工方法之適當性、可靠性及安全性負完全責任。","laws":[]},{"id":"s7-mc-25","type":"single","question":"下列何種情形，廠商尚不得敘明理由，檢附規格、功能、效益及價格比較表，徵得機關書面同意後，以其他規格、功能及效益相同或較優者代之？","options":["契約原標示之廠牌或型號不再製造或供應。","契約原標示之分包廠商不再營業或拒絕供應。","較契約原標示者更優或對機關更有利。","契約原標示之廠牌價格高，契約價格無法容納。"],"answer":"契約原標示之廠牌價格高，契約價格無法容納。","laws":[]},{"id":"s7-mc-26","type":"single","question":"下列敘述何者錯誤？","options":["契約文件包括招標文件及其變更或補充。","廠商之投標文件非屬契約文件。","契約文件得包括以書面、錄音、錄影、照相、微縮、電子數位資料或樣品等方式呈現之原件或複製品。","契約所包括之各種文件，應明定其效力及優先順序。"],"answer":"廠商之投標文件非屬契約文件。","laws":[]},{"id":"s7-mc-27","type":"single","question":"下列敘述何者錯誤？","options":["採購契約要項內容，由機關依採購之特性及實際需要擇訂於契約。","契約文字應以中文書寫，其與外文文意不符者，除契約另有約定者外，以中文為準。","契約變更，除採購法另有規定外，非經機關及廠商雙方之合意，作成書面紀錄，並簽名或蓋章者，無效。","任何契約均應記載固定金額之總價。"],"answer":"任何契約均應記載固定金額之總價。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s7-mc-28","type":"single","question":"契約訂有分段進度及最後履約期限，且均訂有逾期違約金，屬分段完工使用或移交者，除分段完工期限與其他採購契約之進行有關者外，逾分段進度且逾最後履約期限者，其逾期違約金之計算下列何者為是？","options":["扣除已分段完工使用或移交部分之金額，計算逾最後履約期限之違約金。","計算逾分段進度之違約金。","分別計算違約金。但逾最後履約期限之違約金，應扣除已分段完工使用或移交部分之金額計算之。","個別計算違約金。"],"answer":"分別計算違約金。但逾最後履約期限之違約金，應扣除已分段完工使用或移交部分之金額計算之。","laws":[]},{"id":"s7-mc-29","type":"single","question":"某工程採購在開標前，機關發現招標文件之「工程規範說明書」漏印兩頁重要圖說。此時機關最適當的處置為何？","options":["已有廠商投標，為保護投標廠商權益，應照常開標決標，事後再辦理變更。","重要圖說屬「變更或補充招標文件內容」之情形，應不予開標。","繼續開標，但要求投標廠商現場簽名表示不計較漏印部分。","只要投標廠商超過3家，即可視為不影響公正，繼續辦理決標。"],"answer":"重要圖說屬「變更或補充招標文件內容」之情形，應不予開標。","laws":[]},{"id":"s7-mc-30","type":"single","question":"機關辦理工程採購之估驗計價付款期限，下列敘述何者正確？","options":["依行政院主計總處之「公款支付時限及處理應行注意事項」辦理。","依個案契約約定辦理；契約未約定者，依採購法第73條之1規定辦理。","契約不得約定機關應於15工作天內完成審核並付款予廠商。","依採購法規定，不論是否涉及向上級機關申請核撥補助款者，期限均相同。"],"answer":"依個案契約約定辦理；契約未約定者，依採購法第73條之1規定辦理。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s7-mc-31","type":"single","question":"統包工程採購，契約價金係以總價決標，且以契約總價給付。某項目實作數量較核定詳細表所定數量增加8％時，就契約價金之結算，下列何者正確？","options":["以契約變更增加該項目契約價金3％。","以契約變更增加該項目契約價金8％。","不予增加契約價金。","視經費情況協議之。"],"answer":"不予增加契約價金。","laws":[]},{"id":"s7-mc-32","type":"single","question":"廠商於履約過程使用中國大陸廠牌資通訊產品（含中國大陸生成式AI程式 Deepseek），下列何者錯誤？","options":["機關得以書面通知廠商終止或解除全部或部分契約。","廠商於得標後只要不簽署「使用資通訊產品禁制事項同意書/切結書」就可以使用中國大陸廠牌資通訊產品。","致第三人權利受有損害者，廠商應負責任。","廠商違反契約禁制事項，適用契約本文關於權利及責任條款之違約責任，就機關所受損害負賠償之責。"],"answer":"廠商於得標後只要不簽署「使用資通訊產品禁制事項同意書/切結書」就可以使用中國大陸廠牌資通訊產品。","laws":[]},{"id":"s7-mc-33","type":"single","question":"機關辦理勞動派駐採購，下列何者為是？","options":["機關不得指揮監督管理派駐勞工。","可採行最有利標決標。","機關得於要派契約中訂明派駐勞工年齡不得逾60歲。","機關得於招標文件訂明得標廠商應僱用原派駐勞工。"],"answer":"可採行最有利標決標。","laws":[]}]},{"id":"s8","title":"底價及價格分析","questions":[{"id":"s8-mc-1","type":"single","question":"機關辦理採購，下列何者正確？","options":["公告金額以上未達查核金額之財物採購，因緊急情事需決標時，經原底價核定人或其授權人員核准可超底價5％以內決標。","開標結果之最低報價廠商未進入底價，優先減價時填列「不再減價」時，不得再予最低報價廠商第1次比減價之機會。","比減價過程，比減價廠商有2家分別填列「願按底價承製」、「願按底價減新臺幣100元承製」，應宣布以「願按底價減新臺幣100元承製」之廠商決標。","以上皆非。"],"answer":"公告金額以上未達查核金額之財物採購，因緊急情事需決標時，經原底價核定人或其授權人員核准可超底價5％以內決標。","laws":[]},{"id":"s8-mc-2","type":"single","question":"機關辦理採購，招標文件規定廠商之標價依規定之計算方式，有依投標標的之性能、耐用年限、保固期、能源使用效能或維修費用等之差異，就標價予以加價或減價以定標價之高低序位者，以加價或減價後之標價決定最低標者，係屬下列何種決標原則？","options":["最有利標。","參考最有利標精神。","最低標。","準用最有利標。"],"answer":"最低標。","laws":[]},{"id":"s8-mc-3","type":"single","question":"有關底價單之保管，下列何者為非？","options":["開標前訂有底價者，主持開標人員及監辦開標人員應查察底價有無密封。","審標結果有廠商符合招標文件規定，而需進行比較廠商標價是否在底價以內之程序時，方開啟底價封。","開啟底價封後，查察實際核定之底價金額。","開啟底價封後未能當場決標者，會議主持人將底價單重行置入底價封即可，無需密封。"],"answer":"開啟底價封後未能當場決標者，會議主持人將底價單重行置入底價封即可，無需密封。","laws":[]},{"id":"s8-mc-4","type":"single","question":"機關以公開招標及最有利標方式辦理訂有底價之採購，最有利標廠商報價超過底價而須洽減時，以下何者敘述最正確？","options":["議價時洽減。","評選時洽減。","協商時洽減。","以上皆非。"],"answer":"協商時洽減。","laws":[]},{"id":"s8-mc-5","type":"single","question":"依採購法，下列何者有誤？","options":["依採購法第22條第1項第9款評選2家以上優勝廠商，其與各該廠商議價之底價不一樣。","依採購法第49條採公開取得3家以上廠商之書面報價者，其底價應於開標前定之。","依採購法第22條第1項第9款與優勝廠商議價，訂定底價前應先參考該廠商之報價。","依採購法辦理公開招標，其採第56條評選最有利標者，得不訂定底價。"],"answer":"依採購法第49條採公開取得3家以上廠商之書面報價者，其底價應於開標前定之。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s8-mc-6","type":"single","question":"依採購法，下列何者有誤？","options":["部分標價有對應之底價項目可供比較，該部分標價低於相同部分項目底價之80%者，得認定為部分標價偏低。","廠商之部分標價低於其他機關最近辦理相同採購決標價之70%者，得認定為部分標價偏低。","廠商之部分標價經評審或評選委員會認為偏低者，得認定為部分標價偏低。","廠商之部分標價低於可供參考之一般價格之70%者，得認定為部分標價偏低。"],"answer":"部分標價有對應之底價項目可供比較，該部分標價低於相同部分項目底價之80%者，得認定為部分標價偏低。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s8-mc-7","type":"single","question":"機關辦理訂有底價之採購，關於底價之訂定，下列何者有誤？","options":["應參考圖說、規範、契約，並考量成本、市場行情及政府機關決標資料。","規劃、設計、需求或使用單位提出預估金額及其分析後由承辦採購單位簽報。","機關首長或其授權人員核定。","開標後可參考廠商標價更改底價。"],"answer":"開標後可參考廠商標價更改底價。","laws":[]},{"id":"s8-mc-8","type":"single","question":"底價及價格分析中，下列何者正確？","options":["採最有利標之招標文件未訂明固定費用或費率，而由廠商於投標文件載明標價者，應規定廠商於投標文件內詳列報價內容，並納入評選。","未訂定底價之採購，除小額採購外，應成立評審委員會。","標價合理者，評審委員會得不提出建議之金額。","以上皆是。"],"answer":"以上皆是。","laws":[]},{"id":"s8-mc-9","type":"single","question":"不訂底價之採購，其審查投標廠商之標價？","options":["不分金額均應成立評審委員會。","應成立評選委員會。","應成立稽核委員會。","除小額採購外，應成立評審委員會。"],"answer":"除小額採購外，應成立評審委員會。","laws":[]},{"id":"s8-mc-10","type":"single","question":"依採購法，除採最高標決標者外，下列何者有誤？","options":["底價得高於預算金額。","決標紀錄載明底價金額。","機關訂定底價，基於履約地差異，訂定不同之底價。","機關訂定底價，基於評分差異，訂定不同之底價。"],"answer":"底價得高於預算金額。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s8-mc-11","type":"single","question":"依政府採購法，下列何者有誤？","options":["機關訂定底價，由需求單位提出預估金額及其分析後，由承辦採購單位簽報機關首長或其授權人員核定。","機關訂定底價，未達公告金額之採購，由承辦採購單位逕行簽報核定。","機關訂定底價，公告金額以上之重複性採購，由承辦採購單位逕行簽報核定。","機關訂定底價，一律由承辦採購單位簽報機關首長或其授權人員核定。"],"answer":"機關訂定底價，一律由承辦採購單位簽報機關首長或其授權人員核定。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s8-mc-12","type":"single","question":"選擇性招標底價之訂定應於何時定之？","options":["資格審查之開標前定之。","議價前定之。","資格審查後之下一階段開標前定之。","於比價前定之。"],"answer":"資格審查後之下一階段開標前定之。","laws":[]},{"id":"s8-mc-13","type":"single","question":"以最有利標決標者，得將價格納入評選項目，下列何項次非屬評選價格之子項？","options":["品質。","價格組成之完整性。","折讓。","履約成本控制方式。"],"answer":"品質。","laws":[]},{"id":"s8-mc-14","type":"single","question":"適用最有利標標價之決定，得於評選時就廠商之報價內容，進行何程序？","options":["分析評分及比價。","分析評分及議價。","分析評分或評比。","議價或比價。"],"answer":"分析評分或評比。","laws":[]},{"id":"s8-mc-15","type":"single","question":"總標價偏低之情形，何者錯誤？","options":["訂有底價之採購，廠商之總標價低於底價之85％者。","未訂底價之採購，廠商之總標價經評審或評選委員會認為偏低者。","未訂底價且未設置評審委員會或評選委員會之採購，廠商之總標價低於預算金額或預估需用金額之70％者。","訂有底價之採購，廠商之總標價低於底價之80％者。"],"answer":"訂有底價之採購，廠商之總標價低於底價之85％者。","laws":[]},{"id":"s8-mc-16","type":"single","question":"下列何者錯誤？","options":["評審委員會，機關得以採購法第94條成立之評選委員會代之。","最有利標決標者，以不訂底價為原則；其訂有底價，而廠商報價逾底價須減價者，於採行協商措施時洽減之。","查核金額以上之採購，最低標標價超過底價4％且未逾預算金額者，應先報經上級機關核准後決標。","評審委員會，其成員由機關首長或其授權人員就對於採購標的之「規格」具有專門知識之機關職員或公正人士派兼或聘兼之。"],"answer":"評審委員會，其成員由機關首長或其授權人員就對於採購標的之「規格」具有專門知識之機關職員或公正人士派兼或聘兼之。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s8-mc-17","type":"single","question":"下列何者正確？","options":["採總標價決標者，決標前僅就總標價之高低認定是否接受，不及於其所組成之單價。","機關訂定底價，不得訂定不同之底價。","招標文件得預先載明契約金額或相關費率作為決標條件。","超底價廢標後，重新招標時不得調整底價。"],"answer":"招標文件得預先載明契約金額或相關費率作為決標條件。","laws":[]},{"id":"s8-mc-18","type":"single","question":"下列何者錯誤？","options":["機關辦理減價或比減價格結果在底價以內時，除有採購法第58條總標價或部分標價偏低之情形者外，應即宣布決標。","最低合格標報價超過底價時，洽最低標廠商減價1次；減價結果仍超過底價時，由所有合於招標文件規定之投標廠商重新比減價格，比減價格不得逾3次。","最低標價仍超過底價8%者，報上級機關同意始可宣布決標。","機關訂定底價，得基於技術、品質、功能、履約地、商業條款、評分或使用效益等差異，訂定不同之底價。"],"answer":"最低標價仍超過底價8%者，報上級機關同意始可宣布決標。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s8-mc-19","type":"single","question":"限制性招標之議價，訂定底價前？","options":["自行依據經驗辦理。","得先參考廠商之報價或估價單。","應先參考廠商之報價或估價單。","應先試洽廠商減價。"],"answer":"應先參考廠商之報價或估價單。","laws":[]},{"id":"s8-mc-20","type":"single","question":"限制性招標比價，底價之訂定時機為？","options":["辦理比價之開標前。","辦理比價前。","訂底價前應先參考廠商之報價或估價單。","以上皆是。"],"answer":"辦理比價之開標前。","laws":[]},{"id":"s8-mc-21","type":"single","question":"依採購法，下列何者有誤？","options":["未能減至機關所宣布之最低標優先減價結果者，機關不通知其參加下一次之比減價格。","未能減至機關所宣布之第1次比減價格之最低標價者，機關不通知其參加第2次之比減價格。","超底價決標者，決標紀錄記載超底價之金額、比率及必須決標之緊急情事。","查核金額以上之採購，上級機關派員監辦人員不得當場予以核准超底價決標。"],"answer":"查核金額以上之採購，上級機關派員監辦人員不得當場予以核准超底價決標。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s8-mc-22","type":"single","question":"依採購法，下列何者有誤？","options":["機關辦理減價或比減價格結果在底價以內時，除有採購法第58條總標價或部分標價偏低之情形者外，應即宣布決標。","廠商減價或比減價格結果在底價以內之情形，包括平底價之情形。","廠商標價與底價相同時仍應洽減價。","洽廠商減價時不得公開底價。"],"answer":"廠商標價與底價相同時仍應洽減價。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s8-mc-23","type":"single","question":"依採購法，下列何者有誤？","options":["訂有底價之採購，廠商之總標價低於底價80%者，得認定為總標價偏低。","未訂底價之採購，廠商之總標價經評審委員會認為偏低者，得認定為總標價偏低。","未訂底價且未設置評審委員會或評選委員會之採購，廠商之總標價低於預算金額之80%者，得認定為總標價偏低。","未訂底價且未設置評審委員會或評選委員會之採購，預算案尚未經立法程序者，廠商之總標價低於預估需用金額之70%者，得認定為總標價偏低。"],"answer":"未訂底價且未設置評審委員會或評選委員會之採購，廠商之總標價低於預算金額之80%者，得認定為總標價偏低。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s8-mc-24","type":"single","question":"依採購法，下列何者有誤？","options":["訂定底價確有困難之特殊或複雜案件得不訂底價。","以最有利標決標之採購得不訂底價。","小額採購得不訂底價。","不訂底價應報上級機關核准。"],"answer":"不訂底價應報上級機關核准。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s8-mc-25","type":"single","question":"依採購法，下列何者有誤？","options":["選擇性招標之底價應於資格審查後之下一階段開標前定之。","公開招標採分段開標者，其底價至遲應於第2階段價格標開標前定之。","限制性招標之比價，其底價應於辦理比價之開標前定之。","限制性招標之議價，訂定底價前應先參考廠商之報價或估價單。"],"ans
