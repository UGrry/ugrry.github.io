,"type":"single","question":"機關依採購法第56條第1項及第57條採行協商措施，經洽請重行遞送投標文件者，重行遞送之投標文件，有與協商無關或不受影響之項目者，該項目？","options":["優於原投標文件者納入評選，低於原投標文件內容者，不納入評選。","無論是否優於或低於原投標文件應不予評選，並以重行遞送前之內容為準。","無論是否優於或低於原投標文件應納入評選，並以重行遞送之內容為準。","優於原投標文件者不納入評選，低於原投標文件內容者，納入評選。"],"answer":"無論是否優於或低於原投標文件應不予評選，並以重行遞送前之內容為準。","laws":[{"name":"政府採購法 第56條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=56"}]},{"id":"s12-mc-164","type":"single","question":"依最有利標評選辦法規定，下列敘述何者錯誤？","options":["機關訂定評選項目、子項及其評審標準，不得以有利或不利於特定廠商為目的。","序位，指評選委員會依招標文件所列評比項目之重要性或權重，評審廠商投標文件後所核給之序位。","招標文件如已訂明固定費用或費率者，不得規定廠商須於投標文件內詳列組成該費用或費率之內容。","總評分法中之總滿分，指招標文件所列各評選項目滿分之合計總分數。"],"answer":"招標文件如已訂明固定費用或費率者，不得規定廠商須於投標文件內詳列組成該費用或費率之內容。","laws":[{"name":"政府採購法 第56條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=56"},{"name":"最有利標評選辦法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030080"}]},{"id":"s12-mc-165","type":"single","question":"機關評選最有利標，下列何者為錯誤？","options":["機關得輔以廠商簡報及現場詢答，其列為評選項目者，所占配分或權重不得逾百分之二十。","採分階段辦理評選及淘汰不合格廠商者，得就分數或權重較低之階段先行評選；並以二階段為原則。","價格納入評分者，其所占總滿分之比率，不得低於百分之二十，且不得逾百分之五十。","選擇性招標以資格為評選項目之一者，與資格有關部分之配分或權重，應載明於資格審查文件。"],"answer":"採分階段辦理評選及淘汰不合格廠商者，得就分數或權重較低之階段先行評選；並以二階段為原則。","laws":[{"name":"政府採購法 第56條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=56"}]},{"id":"s12-mc-166","type":"single","question":"機關評定最有利標後，對於合於招標文件規定但未得標之廠商，應通知之事項，何者最完整正確？","options":["最有利標之標價與總評分或序位評比結果及該未得標廠商之總評分或序位評比結果。","最有利標之標價與總評分或序位評比結果及各未得標廠商之總評分或序位評比結果。","最有利標之標價與總評分或序位評比結果。","該未得標廠商之總評分或序位評比結果。"],"answer":"最有利標之標價與總評分或序位評比結果及該未得標廠商之總評分或序位評比結果。","laws":[{"name":"政府採購法 第56條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=56"}]},{"id":"s12-mc-167","type":"single","question":"下列敘述何者錯誤？","options":["機關評選最有利標之過程中，除評定最有利標之當次會議應作成紀錄外，其他會議是否作成紀錄得由評選委員會決議之。","機關採最有利標決標，以不訂底價為原則。","機關評定最有利標後，應於決標公告公布最有利標之標價及總評分或序位評比結果。","評選委員會評選最有利標，應依招標文件載明之評選項目、子項及其配分或權重辦理，不得變更。"],"answer":"機關評選最有利標之過程中，除評定最有利標之當次會議應作成紀錄外，其他會議是否作成紀錄得由評選委員會決議之。","laws":[{"name":"政府採購法 第56條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=56"}]},{"id":"s12-mc-168","type":"single","question":"下列敘述何者錯誤？","options":["評定最有利標涉及序位評比者，招標文件應載明各評比項目之權重。","機關採最有利標決標，其訂有底價，而廠商報價逾底價須減價者，於採行協商措施時洽減之，不得有超底價決標情形。","評定最有利標涉及序位評比者，應於招標文件載明序位評比結果不合格者，不得作為協商對象或最有利標。","依最有利標評選辦法規定，招標文件未訂明固定費用或費率，而由廠商於投標文件載明標價者，應規定廠商於投標文件內詳列報價內容，並納入評選。"],"answer":"機關採最有利標決標，其訂有底價，而廠商報價逾底價須減價者，於採行協商措施時洽減之，不得有超底價決標情形。","laws":[{"name":"政府採購法 第56條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=56"},{"name":"最有利標評選辦法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030080"}]},{"id":"s12-mc-169","type":"single","question":"機關依「最有利標評選辦法」辦理最有利標評選，下列何者為錯誤？","options":["招標文件未訂明固定費用或費率，而由廠商於投標文件載明標價者，應規定廠商於投標文件內詳列報價內容，並納入評選。","招標文件已訂明固定費用或費率者，得規定廠商於投標文件內詳列組成該費用或費率之內容，並納入評選。","招標文件已訂明固定費用或費率者，仍應規定廠商於投標文件內詳列組成該費用或費率之內容，並納入評選。","招標文件已訂明固定費用或費率者，得不規定廠商於投標文件內詳列組成該費用或費率之內容。"],"answer":"招標文件已訂明固定費用或費率者，仍應規定廠商於投標文件內詳列組成該費用或費率之內容，並納入評選。","laws":[{"name":"政府採購法 第56條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=56"},{"name":"最有利標評選辦法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030080"}]},{"id":"s12-mc-170","type":"single","question":"依最有利標評選辦法規定，價格納入評分者，其所占總滿分之比率不得低於？","options":["百分之二十。","百分之三十。","百分之五十。","百分之六十。"],"answer":"百分之二十。","laws":[{"name":"政府採購法 第56條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=56"},{"name":"最有利標評選辦法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030080"}]},{"id":"s12-mc-171","type":"single","question":"評選最有利標，下列敘述何者正確？","options":["投標廠商未出席簡報及現場詢答者，該廠商不得參與評選，並不得作為最有利標。","廠商簡報不得更改其投標文件之內容。惟如廠商另外提出補充資料者，是否納入評選由評選委員決議之。","廠商簡報及現場詢答，應與評選項目有關；其列為評選項目者，所占配分或權重不得逾百分之十。","為利評選委員對廠商於各評選項目之表現為更深入之瞭解，得輔以廠商簡報及現場詢答。"],"answer":"為利評選委員對廠商於各評選項目之表現為更深入之瞭解，得輔以廠商簡報及現場詢答。","laws":[{"name":"政府採購法 第56條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=56"}]},{"id":"s12-mc-172","type":"single","question":"機關辦理採購，有關協商規定，下列敘述何者錯誤？","options":["依採購法第55條規定採行協商措施者，其採行協商措施前之開標至審標作業，依採購法規定應予保密。","不得將協商廠商投標文件內容、優缺點及評分，透露予其他廠商。","採行協商措施應執行保密措施。","原招標文件已標示得更改項目之內容，始得納入協商。"],"answer":"依採購法第55條規定採行協商措施者，其採行協商措施前之開標至審標作業，依採購法規定應予保密。","laws":[{"name":"政府採購法 第57條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=57"}]},{"id":"s12-mc-173","type":"single","question":"依採購法規定，招標文件規定得就特定項目採行協商措施時，下列何者為正確？","options":["以評選最優廠商為協商對象。","審標程序公開進行。","參與協商之廠商得依據協商結果修改投標文件。","開標程序應公開。"],"answer":"參與協商之廠商得依據協商結果修改投標文件。","laws":[{"name":"政府採購法 第57條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=57"}]},{"id":"s12-mc-174","type":"single","question":"機關辦理採購採最低標決標，依採購法第58條規定限期通知最低標廠商提出說明後，廠商未於期限內提出合理之說明者，下列處置何者適法？","options":["不決標予最低標廠商，並以次低標廠商為最低標廠商。","不決標予最低標廠商，並逕予廢標。","不決標予最低標廠商，並不發還押標金。","自次低標起，依序洽廠商是否願意減至最低標價後決標。"],"answer":"不決標予最低標廠商，並以次低標廠商為最低標廠商。","laws":[{"name":"政府採購法 第58條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=58"}]},{"id":"s12-mc-175","type":"single","question":"下列何種情況屬採購法第58條所稱總標價或部分標價偏低之情形？","options":["廠商之部分標價低於其他機關最近辦理相同採購決標價之百分之八十者。","廠商之部分標價有對應之底價項目可供比較，該部分標價低於相同部分項目底價之百分之八十者。","訂有底價之採購，廠商之總標價低於底價百分之八十者。","廠商之部分標價低於可供參考之一般價格之百分之八十者。"],"answer":"訂有底價之採購，廠商之總標價低於底價百分之八十者。","laws":[{"name":"政府採購法 第58條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=58"}]},{"id":"s12-mc-176","type":"single","question":"機關辦理採購採最低標決標，最低標廠商標價低於底價百分之七十，依採購法第58條規定，下列何者為非？","options":["洽最低標廠商說明，如機關評估該說明合理，逕決標予該最低標廠商。","免洽最低標廠商說明，不決標予該最低標廠商。","洽最低標廠商說明，如機關評估該說明不合理，不決標予該最低標廠商，並以次低標為最低標廠商。","經機關評估該標價並無降低品質、不能誠信履約之虞，不洽最低標說明，逕決標予該最低標廠商。"],"answer":"免洽最低標廠商說明，不決標予該最低標廠商。","laws":[{"name":"政府採購法 第58條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=58"}]},{"id":"s12-mc-177","type":"single","question":"機關辦理採購，下列敘述何者正確？","options":["機關得於招標文件中規定廠商之標價有採購法第58條所稱標價偏低之情形時，即應繳納差額保證金。","最低標廠商總標價在底價以內，但未低於底價之百分之八十，該最低標主動表示標價錯誤，要求不決標予該廠商，機關得予接受。","最低標廠商總標價有採購法第58條所稱標價偏低之情形，得逕請廠商於5日內提出差額保證金，未提出者，不退還押標金。","總標價未偏低但部分標價偏低者，仍適用採購法第58條規定。"],"answer":"總標價未偏低但部分標價偏低者，仍適用採購法第58條規定。","laws":[{"name":"政府採購法 第58條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=58"}]},{"id":"s12-mc-178","type":"single","question":"機關辦理採購，下列敘述何者正確？","options":["機關辦理採購依採購法第51條規定通知廠商說明，廠商未依通知期限辦理者，視同放棄，不得以該廠商為決標對象。","機關辦理公告金額以上採購之招標，應於決標日起20日內，將決標結果之公告刊登於政府採購公報，並以書面通知各投標廠商。","機關依招標文件規定審查廠商投標文件，其審查結果之通知，經廠商請求者，得以書面為之。","機關辦理採購，其因契約變更致原決標金額增加新臺幣150萬元，如未另訂新契約者，免辦理決標公告。"],"answer":"機關依招標文件規定審查廠商投標文件，其審查結果之通知，經廠商請求者，得以書面為之。","laws":[{"name":"政府採購法 第60條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=60"}]},{"id":"s12-mc-179","type":"single","question":"某公立高中辦理94學年度畢業紀念冊編製之採購案，於94年6月15日決標，依採購法規定，最遲應於何日前刊登決標公告？","options":["94年7月15日。","94年8月15日。","94年7月4日。","94年7月14日。"],"answer":"94年7月14日。","laws":[{"name":"政府採購法 第61條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=61"}]},{"id":"s12-mc-180","type":"single","question":"採購法第61條所稱決標後一定期間為？","options":["自開標日起20日。","自開標日起30日。","自決標日起20日。","自決標日起30日。"],"answer":"自決標日起30日。","laws":[{"name":"政府採購法 第61條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=61"}]},{"id":"s12-mc-181","type":"single","question":"依採購法第61條規定辦理無法決標之公告，應於廢標後、重行招標前刊登，並不得超過廢標後多久？","options":["一星期。","二星期。","三星期。","一個月。"],"answer":"二星期。","laws":[{"name":"政府採購法 第61條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=61"}]},{"id":"s12-mc-182","type":"single","question":"某機關擬委外採購研習訓練，預定委外1年新臺幣(以下同)250萬元，並擬於招標公告及招標文件敘明履約情形良好者，將依採購法第22條第1項第7款續約2次每次1年。上網公告辦理招標，其上網填報？","options":["採購金額為750萬元；預算金額為1,000萬元。","採購金額為250萬元；預算金額為250萬元。","採購金額為250萬元；預算金額為1,000萬元。","採購金額為750萬元；預算金額為250萬元。"],"answer":"採購金額為750萬元；預算金額為250萬元。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s12-mc-183","type":"single","question":"下列何者敘述錯誤？","options":["機關委託法人或團體代辦採購，代辦採購之法人、團體與其受雇人及關係企業，不得為該採購之投標廠商，但得為分包廠商。","承辦專案管理之廠商與規劃、設計、施工或供應廠商，不得同時為關係企業或同一其他廠商之關係企業。","機關承辦、監辦採購人員離職後3年內不得為本人或代理廠商向原任職機關接洽處理離職前5年內與職務有關之事務。","機關辦理採購，應於招標文件規定，廠商因履行機關契約而知悉其他廠商無法知悉或應秘密之資訊之廠商，於使用該等資訊有利於得標之採購，不得參加投標、作為決標對象或分包廠商。"],"answer":"機關委託法人或團體代辦採購，代辦採購之法人、團體與其受雇人及關係企業，不得為該採購之投標廠商，但得為分包廠商。","laws":[]},{"id":"s12-mc-184","type":"single","question":"機關得於招標文件中規定，廠商有下列何種情形者，其所繳納之履約保證金(含其孳息)應全部不發還？","options":["違反採購法第65條規定轉包者。","須返還已支領之契約價金而未返還者。","查驗或驗收不合格，且未於通知期限內依規定辦理。","擅自減省工料。"],"answer":"違反採購法第65條規定轉包者。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s12-mc-185","type":"single","question":"機關辦理採購，下列敘述何者正確？","options":["依採購法第51條規定通知廠商說明，廠商未依通知期限辦理者，視同放棄，不得以該廠商為決標對象。","公告金額以上之招標，應於決標日起20日內，將決標結果之公告刊登於政府採購公報，並以書面通知各投標廠商。","依招標文件規定審標，其審標結果之通知，應於審查結果完成後儘速通知，最遲不得逾決標或廢標日10日。","未達公告金額採購之招標，其依採購法第49條規定採公開取得書面報價方式辦理因屬詢價性質，得依採購法第34條第1項但書規定辦理。"],"answer":"依招標文件規定審標，其審標結果之通知，應於審查結果完成後儘速通知，最遲不得逾決標或廢標日10日。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s12-mc-186","type":"single","question":"依採購法對廠商之通知，下列何者應為書面？","options":["公告金額以上之審標結果。","公告金額以上之無法決標通知。","未達公告金額之決標結果。","未達公告金額之無法決標通知。"],"answer":"公告金額以上之無法決標通知。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s12-mc-187","type":"single","question":"下列何者錯誤？","options":["預算新臺幣50萬元之採購以公開招標方式辦理。","預算新臺幣170萬元之採購，詢價結果只需145萬元，以公開取得書面報價方式辦理。","預算新臺幣20萬元之採購得以公開評選方式辦理。","預算新臺幣9萬元小額採購以公開取得書面報價方式辦理。"],"answer":"預算新臺幣170萬元之採購，詢價結果只需145萬元，以公開取得書面報價方式辦理。","laws":[]},{"id":"s12-mc-188","type":"single","question":"下列敘述何者錯誤？","options":["未達公告金額採購之監辦，依其屬地方，由直轄市或縣(市)政府另定之。未另定者，比照中央規定辦理。","未達公告金額之招標方式，在地方由直轄市或縣(市)政府定之。地方未定者，比照中央規定辦理。","直轄市、縣(市)政府未設採購申訴審議委員會者，得依採購法第76條規定委請主管機關申訴會辦理前項業務。","直轄市、縣(市)政府應成立採購稽核小組。"],"answer":"未達公告金額採購之監辦，依其屬地方，由直轄市或縣(市)政府另定之。未另定者，比照中央規定辦理。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s12-mc-189","type":"single","question":"機關辦理查核金額以上之採購，下列何者屬無須報上級機關核准之事項？","options":["最有利標。","減價收受。","超過底價百分之四決標。","統包方式辦理工程採購。"],"answer":"統包方式辦理工程採購。","laws":[]},{"id":"s12-mc-190","type":"single","question":"下列敘述何者符合採購法規定？","options":["投標廠商應提出之資格證明文件，除招標文件另有規定者外，以影本為原則，但應加蓋廠商印章。","機關採最有利標者，得將廠商過去的履約績效擇定為評選項目。","機關允許外國廠商參與非條約協定採購者，得於招標文件中規定外國廠商不適用採購法第六章爭議處理。","機關採複數決標，其個別項目之預算金額未達巨額，但總金額為巨額者，適用巨額採購有關廠商資格之規定。"],"answer":"機關採最有利標者，得將廠商過去的履約績效擇定為評選項目。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s12-mc-191","type":"single","question":"依採購法規定，下列何者錯誤？","options":["追加契約金額新臺幣170萬元，無須上級機關核准。","勞務契約同時辦理追加金額新臺幣600萬元、追減金額新臺幣500萬元之議價會議，須通知上級機關監辦。","財物採購預算金額新臺幣140萬元，決標金額新臺幣110萬元，廠商不履約，機關通知該廠商將其名稱及相關情形刊登政府採購公報，廠商只能提出異議不能提出申訴。","勞務契約金額新臺幣1,250萬元，僅追加新臺幣5萬元，該追加採購可適用採購法第23條之規定。"],"answer":"財物採購預算金額新臺幣140萬元，決標金額新臺幣110萬元，廠商不履約，機關通知該廠商將其名稱及相關情形刊登政府採購公報，廠商只能提出異議不能提出申訴。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s12-mc-192","type":"single","question":"機關辦理採購，依採購法施行細則第64條之2採評分及格最低標決標，下列敘述何者正確？","options":["涉及競圖之技術服務，先審查及格分數以上之廠商後辦理比價。","不必成立審查委員會。","招標文件明定採不分段開標。","辦理招標前無需先報上級機關核准。"],"answer":"辦理招標前無需先報上級機關核准。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s12-mc-193","type":"single","question":"機關辦理位於原住民地區未達公告金額之採購，下列何者錯誤？","options":["應由原住民個人、機構、法人或團體承包；但渠等無法承包者，不在此限。","於招標文件敘明開放原住民及非原住民廠商投標，且將優先決標予原住民廠商者，須有3家以上原住民廠商投標方可開標。","新臺幣15萬元以下之採購，得不經公告程序，逕洽原住民機構、團體或個人辦理採購。","依採購法第22條第1項第9款規定，以公開評選優勝廠商方式辦理者，得不優先決標予原住民廠商。"],"answer":"於招標文件敘明開放原住民及非原住民廠商投標，且將優先決標予原住民廠商者，須有3家以上原住民廠商投標方可開標。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s12-mc-194","type":"single","question":"依政府採購法規定，下列招標文件規定何者適法？","options":["廠商之投標文件未使用機關提供之封套者，視為不合格標。","允許廠商於開標後補正非契約必要之點之文件。","廠商標價超過招標公告公開之預算者為不合格標，不予減價機會。","採電子投標之廠商得減收押標金，但減收額度以不逾百分之十五為限。"],"answer":"廠商標價超過招標公告公開之預算者為不合格標，不予減價機會。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s12-mc-195","type":"single","question":"下列何者正確？","options":["依法令得輸入或進入臺灣地區之大陸地區財物或勞務，招標文件應允許我國廠商得提供該等財物或勞務參與投標。","機關辦理採購，如符合「臺灣地區與大陸地區人民關係條例」之相關規定，得允許大陸地區廠商為投標廠商。","對於適用條約或協定之採購，應限定非屬條約或協定之國家廠商不得參與。","我國廠商所供應財物或勞務之原產地非屬我國者，視同國內廠商。"],"answer":"機關辦理採購，如符合「臺灣地區與大陸地區人民關係條例」之相關規定，得允許大陸地區廠商為投標廠商。","laws":[]},{"id":"s12-mc-196","type":"single","question":"下列敘述何者正確？","options":["臨時人力之僱用不適用採購法。","村（里）非採購法所稱之機關，故不宜辦理相關工程發包、採購業務。","被機關補助經費之法人或團體辦理查核金額以上之採購，於開標時應報請補助機關之上級機關監督。","機關首長擔任投標廠商不支薪理事，該廠商如參與該機關之採購，機關首長無須迴避。"],"answer":"村（里）非採購法所稱之機關，故不宜辦理相關工程發包、採購業務。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s12-mc-197","type":"single","question":"下列敘述何者正確？","options":["投標廠商依招標文件及「投標廠商資格與特殊或巨額採購認定標準」第4條第1項第5款規定所提之「最近三年內無退票紀錄證明」，如已辦妥清償註記者，視同為「無退票紀錄」情形。","機關擬委託廠商辦理專案管理，屬技術服務，不得以選擇性招標方式辦理。","機關辦理委託技術服務廠商評選，於採購評選委員會評選階段，仍應通知主會計及有關單位派員監辦。","機關辦理工程採購，其招標文件所定工程保險費用之報價方式，應規定由廠商採單獨一項報價。"],"answer":"投標廠商依招標文件及「投標廠商資格與特殊或巨額採購認定標準」第4條第1項第5款規定所提之「最近三年內無退票紀錄證明」，如已辦妥清償註記者，視同為「無退票紀錄」情形。","laws":[{"name":"投標廠商資格與特殊或巨額採購認定標準","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030099"}]},{"id":"s12-mc-198","type":"single","question":"下列敘述何者正確？","options":["B公司百分之百持有C公司之股份，該2公司參與某一標案之投標，即屬重大異常關聯之情形。","不同投標廠商參與投標，由同一廠商之人員代表出席開標會議，屬影響採購公正之違反法令行為。","機關辦理採購，擬分4區複數決標，依採購法規定，不得限制投標廠商僅可得標1區。","機關承辦採購單位之主管不得為所辦採購之主驗人或樣品及材料之檢驗人。"],"answer":"不同投標廠商參與投標，由同一廠商之人員代表出席開標會議，屬影響採購公正之違反法令行為。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s12-mc-199","type":"single","question":"下列敘述何者錯誤？","options":["政黨及與其具關係企業關係之廠商，不得參與投標。","代擬招標文件之廠商，機關於依該招標文件辦理之採購，該廠商不得作為決標對象。但得作為分包廠商。","承辦專案管理之廠商與規劃、設計、施工或供應廠商，不得同時為關係企業。","提供規劃、設計服務之廠商，於依該規劃、設計結果辦理之採購應予迴避。但於無利益衝突或無不公平競爭之虞，經機關同意者，得不適用之。"],"answer":"代擬招標文件之廠商，機關於依該招標文件辦理之採購，該廠商不得作為決標對象。但得作為分包廠商。","laws":[]},{"id":"s12-mc-200","type":"single","question":"下列何者非屬採購法規定應製作紀錄之事項？","options":["請託或關說。","流標。","廢標。","評選會議。"],"answer":"請託或關說。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]}]},{"id":"s13","title":"政府採購法之履約管理及驗收","questions":[{"id":"s13-mc-1","type":"single","question":"採購契約得訂明因政策變更，廠商依契約繼續履行反而不符公共利益者，得終止或解除部分或全部契約，但應報經核准之權責為？","options":["經機關首長或授權人員核准。","經上級機關核准。","經主管機關核准。","經審計單位核准。"],"answer":"經上級機關核准。","laws":[{"name":"政府採購法 第64條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=64"}]},{"id":"s13-mc-2","type":"single","question":"機關得於招標文件中規定，違反採購法第65條規定轉包者，廠商所繳納之何種比率履約保證金（含其孳息）不予發還？","options":["全部。","轉包部分。","已完成履約部分。","致部分終止或解除契約者，依該部分所占契約金額比率計算之。"],"answer":"全部。","laws":[{"name":"政府採購法 第65條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=65"}]},{"id":"s13-mc-3","type":"single","question":"下列何者錯誤？","options":["採購法規定，得標廠商不得轉包之主要部分，指招標文件標示為主要部分；或招標文件標示或依其他法規規定應由得標廠商自行履行之部分。","機關得視需要於招標文件中訂明得標廠商應將專業部分或達一定數量或金額之分包情形送機關備查。","得標廠商違反規定轉包者，機關得解除契約、終止契約或沒收保證金，並得要求損害賠償。","得標廠商不得將採購分包予外國廠商。"],"answer":"得標廠商不得將採購分包予外國廠商。","laws":[{"name":"政府採購法 第65條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=65"}]},{"id":"s13-mc-4","type":"single","question":"以下何種廠商得為採購之分包廠商？","options":["被刊登政府採購公報之不良廠商。","提供該採購專案管理服務之廠商。","提供該採購審標服務之廠商。","以上皆非。"],"answer":"以上皆非。","laws":[{"name":"政府採購法 第67條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=67"}]},{"id":"s13-mc-5","type":"single","question":"廠商不得以不具備履行契約分包事項能力或未依法登記或設立之廠商為分包廠商。對於分包廠商履約之部分，得標廠商應負之責任，下列何者正確？","options":["仍應負催告責任。","仍應負部分責任。","就報備於機關情形負責。","仍應負完全責任。"],"answer":"仍應負完全責任。","laws":[{"name":"政府採購法 第67條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=67"}]},{"id":"s13-mc-6","type":"single","question":"分包廠商及於得標廠商對於機關之價金或報酬請求權之條件？","options":["分包契約報備於採購機關，並經得標廠商就分包部分設定權利質權予分包廠商者。","分包契約報備於採購機關，或經得標廠商就分包部分設定權利質權予分包廠商者。","載明分包廠商者。","分包契約報備於採購機關，並經機關同意者。"],"answer":"分包契約報備於採購機關，並經得標廠商就分包部分設定權利質權予分包廠商者。","laws":[{"name":"政府採購法 第67條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=67"}]},{"id":"s13-mc-7","type":"single","question":"工程施工查核小組依採購法第70條規定進行查核時，以下何者敘述為錯誤？","options":["得通知工程主辦機關就指定之工程項目進行檢驗、拆驗或鑑定。","查核小組查核紀錄應於7個工作天內送工程主辦機關。","查核小組定期辦理查核，應預先通知赴工地進行查核，主動出示查核小組之書面通知及相關證明文件。","查核委員辦理查核時之迴避，準用採購法第15條第2項及第3項之規定。"],"answer":"查核小組定期辦理查核，應預先通知赴工地進行查核，主動出示查核小組之書面通知及相關證明文件。","laws":[{"name":"政府採購法 第70條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=70"}]},{"id":"s13-mc-8","type":"single","question":"下列何者不得為所辦採購之主驗人或樣品及材料之檢驗人？","options":["機關總務人員。","該採購案件最基層之承辦人員。","需求單位人員。","承辦採購單位之主管。"],"answer":"該採購案件最基層之承辦人員。","laws":[{"name":"政府採購法 第71條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=71"}]},{"id":"s13-mc-9","type":"single","question":"機關依採購法第71條第1項規定辦理財物採購驗收，下列何者不是得採書面驗收，免辦理現場查驗之情形？","options":["即買即用。","分批驗收，其驗收金額不逾公告金額。","經政府機關或公正第三人查驗，並有相關品質或數量之證明文書者。","小額採購。"],"answer":"分批驗收，其驗收金額不逾公告金額。","laws":[{"name":"政府採購法 第71條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=71"}]},{"id":"s13-mc-10","type":"single","question":"採購之驗收，無初驗程序者，除契約另有規定者外，機關應於接獲廠商通知備驗或可得驗收之程序完成後幾日內辦理驗收，並作成驗收紀錄？","options":["30日。","20日。","15日。","10日。"],"answer":"30日。","laws":[{"name":"政府採購法 第71條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=71"}]},{"id":"s13-mc-11","type":"single","question":"機關辦理驗收，得委託專業人員或機構人員擔任何種工作？","options":["主驗。","會驗。","協驗。","監驗。"],"answer":"協驗。","laws":[{"name":"政府採購法 第71條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=71"}]},{"id":"s13-mc-12","type":"single","question":"下列何者錯誤？","options":["機關依採購法第72條第1項辦理部分驗收，其所支付之部分價金，以支付該部分驗收項目者為限，並得視不符部分之情形酌予保留。","機關辦理採購，有部分先行使用之必要或已履約之部分有減損滅失之虞者，應先就該部分辦理驗收或分段查驗供驗收之用。","機關依採購法第72條第1項通知廠商限期改善、拆除、重作或換貨之限期，應於契約預先規定。","結算驗收證明書或其他類似文件，除有特殊情形經核准者外，機關應於驗收完畢後15日內填具。"],"answer":"機關依採購法第72條第1項通知廠商限期改善、拆除、重作或換貨之限期，應於契約預先規定。","laws":[{"name":"政府採購法 第72條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=72"}]},{"id":"s13-mc-13","type":"single","question":"依採購法規定，機關辦理工程採購之付款及審核程序，下列何者有誤？","options":["驗收付款者，機關應於接到廠商請款單據後，15日內付款。","機關應在廠商提出相關文件及付款單據後，如發現有文件不符、不足或有疑義者，通知廠商澄清或補正之次數不得超過1次。","機關不得於契約另為約定。","定期估驗或分階段付款者，機關應於廠商提出估驗或階段完成之證明文件後，15日內完成審核程序。"],"answer":"機關不得於契約另為約定。","laws":[{"name":"政府採購法 第73條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=73"}]},{"id":"s13-mc-14","type":"single","question":"以下何者敘述錯誤？","options":["機關驗收人對工程或財物隱蔽部分拆驗或化驗者，其拆除、修復或化驗費用之負擔，契約未規定者，應由機關負擔。","機關允許保證金得以連帶保證代之或減收者，機關應於招標文件中規定，同一廠商同時作為各機關採購契約之連帶保證廠商者，以2契約為限。","採購申訴審議委員會之審議判斷，視同訴願決定。","押標金得以郵政匯票繳納。"],"answer":"機關驗收人對工程或財物隱蔽部分拆驗或化驗者，其拆除、修復或化驗費用之負擔，契約未規定者，應由機關負擔。","laws":[]}]},{"id":"s14","title":"政府採購法之罰則及附則","questions":[{"id":"s14-mc-1","type":"single","question":"依採購法第93條簽訂之共同供應契約應公開於何處供適用機關利用？","options":["訂約機關之資訊網站。","主管機關指定之資訊網站。","各適用機關之資訊網站。","政府採購公報。"],"answer":"主管機關指定之資訊網站。","laws":[{"name":"政府採購法 第93條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=93"}]},{"id":"s14-mc-2","type":"single","question":"機關依採購法第93條辦理共同供應契約採購，下列何者敘述為錯誤？","options":["招標文件應標明本契約係共同供應契約。","由經濟部指定機關訂約者，其適用機關為中央機關。","適用機關之採購需求在本契約所載可供訂購之數量或金額範圍內，得利用本契約辦理採購。","適用機關利用本契約採購之期間，包含後續擴充，最長以2年為限。"],"answer":"由經濟部指定機關訂約者，其適用機關為中央機關。","laws":[{"name":"政府採購法 第93條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=93"}]},{"id":"s14-mc-3","type":"single","question":"各機關得就具有共通需求特性之何種採購與廠商簽訂共同供應契約？","options":["財物或勞務。","財物或工程。","勞務或工程。","財物、勞務或工程。"],"answer":"財物或勞務。","laws":[{"name":"政府採購法 第93條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=93"}]},{"id":"s14-mc-4","type":"single","question":"機關辦理評選，應成立評選委員會，其委員會之組成，以下何者為是？","options":["至少3人，專家學者人數不得少於三分之一。","至少5人，專家學者人數不得少於三分之一。","至少5人，專家學者人數不得少於二分之一。","至少10人，專家學者人數不得少於二分之一。"],"answer":"至少5人，專家學者人數不得少於三分之一。","laws":[{"name":"政府採購法 第94條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=94"}]},{"id":"s14-mc-5","type":"single","question":"下列何者不是機關評選最有利標之過程中，各次會議紀錄應載明之事項？","options":["評選委員會之組成、協助評選之人員及其工作事項。","評選方式。","個別委員要求納入紀錄之意見。","監辦人員及其工作事項。"],"answer":"監辦人員及其工作事項。","laws":[{"name":"政府採購法 第94條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=94"}]},{"id":"s14-mc-6","type":"single","question":"採購評選委員會議，出席委員中之專家學者人數應至少幾人且不得少於出席人數之三分之一？","options":["1人。","2人。","3人。","無限制。"],"answer":"2人。","laws":[{"name":"政府採購法 第94條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=94"}]},{"id":"s14-mc-7","type":"single","question":"採購評選委員會會議，應有委員總額多少以上人員出席，其決議應經出席委員過半數之同意行之？","options":["二分之一。","三分之二。","四分之三。","三分之一。"],"answer":"二分之一。","laws":[{"name":"政府採購法 第94條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=94"}]},{"id":"s14-mc-8","type":"single","question":"最後一次採購評選委員會會議紀錄應於何時作成並予確認？","options":["當次會議結束前。","當次會議結束後1日內。","當次會議結束後3日內。","當次會議結束後7日內。"],"answer":"當次會議結束前。","laws":[{"name":"政府採購法 第94條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=94"}]},{"id":"s14-mc-9","type":"single","question":"採購評選委員會中之專家學者人數不得少於委員總人數之幾分之幾？","options":["二分之一。","三分之一。","四分之一。","五分之一。"],"answer":"三分之一。","laws":[{"name":"政府採購法 第94條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=94"}]},{"id":"s14-mc-10","type":"single","question":"採購評選委員會應置委員人數最多為幾人？","options":["25人。","16人。","17人。","無人數上限之規定。"],"answer":"無人數上限之規定。","laws":[{"name":"政府採購法 第94條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=94"}]},{"id":"s14-mc-11","type":"single","question":"採購評選委員會應置委員人數最少為幾人？","options":["5人。","6人。","7人。","17人。"],"answer":"5人。","laws":[{"name":"政府採購法 第94條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=94"}]},{"id":"s14-mc-12","type":"single","question":"採購評選委員會會議紀錄，除最後一次會議紀錄外，至遲應於何時分送各出席委員，並予確認。如有遺漏或錯誤，得於紀錄宣讀後，提請主席裁定更正？","options":["當次開會時。","下次開會時。","當次與下次開會之間。","下次開會前。"],"answer":"下次開會時。","laws":[{"name":"政府採購法 第94條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=94"}]},{"id":"s14-mc-13","type":"single","question":"以下何者正確？","options":["委員辦理評選及出席會議，均應親自為之。","委員辦理評選及出席會議，均可請他人代表為之。","委員辦理評選應親自為之，出席會議可請他人代表為之。","委員辦理評選可請他人代表為之，出席會議應親自為之。"],"answer":"委員辦理評選及出席會議，均應親自為之。","laws":[{"name":"政府採購法 第94條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=94"}]},{"id":"s14-mc-14","type":"single","question":"劉先生原任職於某市公所，於93年3月取得採購專業人員基本資格，因有至民間公司任職的生涯規劃，於93年12月30日離職，數年後，劉先生想回公務機關任職，依採購專業人員資格考試訓練發證及管理辦法規定，請問劉先生於何時回任仍具採購專業人員資格？","options":["98年12月31日。","97年6月5日。","103年12月31日。","108年12月30日。"],"answer":"97年6月5日。","laws":[{"name":"政府採購法 第95條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=95"}]},{"id":"s14-mc-15","type":"single","question":"依採購專業人員資格考試訓練發證及管理辦法規定，下列敘述何者為非？","options":["缺課時數逾全部課程十分之一者，不得參加考試。","考試成績以總滿分得分百分之七十以上為及格，但依課程分別辦理考試者，個別課程不得有零分之情形。","考試成績不及格者，得於收受成績通知次日起1年內申請補考1次。","採購專業人員因職務異動不辦理採購，其採購專業人員資格得予保留。"],"answer":"考試成績不及格者，得於收受成績通知次日起1年內申請補考1次。","laws":[{"name":"政府採購法 第95條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=95"}]},{"id":"s14-mc-16","type":"single","question":"依採購專業人員資格考試訓練發證及管理辦法規定，下列敘述何者為非？","options":["缺課時數逾全部課程十分之一者，不得參加考試。","考試成績以總滿分得分百分之七十以上為及格。但依課程分別辦理考試者，個別課程不得有零分之情形。","考試成績不及格者，得申請補考，無次數限制。","訓練課程結束後1年內未完成考試者，仍適用補考無次數限制之規定。"],"answer":"訓練課程結束後1年內未完成考試者，仍適用補考無次數限制之規定。","laws":[{"name":"政府採購法 第95條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=95"}]},{"id":"s14-mc-17","type":"single","question":"依採購專業人員資格考試訓練發證及管理辦法規定，採購專業人員辭職後，於下列何期間內回任機關採購職務者，仍具採購專業人員資格？","options":["5年。","3年。","4年。","1年。"],"answer":"5年。","laws":[{"name":"政府採購法 第95條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=95"}]},{"id":"s14-mc-18","type":"single","question":"依採購專業人員資格考試訓練發證及管理辦法規定，採購單位主管人員，宜於就(到)職之日起多久期間內取得採購專業人員進階資格？","options":["1年內。","6個月內。","3個月內。","2年內。"],"answer":"2年內。","laws":[{"name":"政府採購法 第95條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=95"}]},{"id":"s14-mc-19","type":"single","question":"機關依採購法第96條第1項優先採購環保產品，且於招標文件載明依「機關優先採購環境保護產品辦法」第12條第1項第2款規定於價差優惠10%以內優先決標予環保產品廠商。現最低標A廠商為非環保產品廠商報價170萬元已進入底價200萬元，次低標B廠商報價180萬元為第3類環保產品廠商，第3低標C廠商報價185萬元為第2類環保產品廠商，第4低標D廠商報價188萬元第1類環保產品廠商，則機關應優先決標予何廠商？","options":["A廠商。","B廠商。","C廠商。","D廠商。"],"answer":"C廠商。","laws":[{"name":"政府採購法 第96條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=96"},{"name":"機關優先採購環境保護產品辦法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030084"}]},{"id":"s14-mc-20","type":"single","question":"機關依採購法第96條規定優先採購環保產品，並允許價差優惠者，其優惠比率由機關視個別採購之特性及預算金額訂定之，並載明於招標文件。但不得逾？","options":["百分之五。","百分之十。","百分之十五。","百分之二十。"],"answer":"百分之十。","laws":[{"name":"政府採購法 第96條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=96"}]},{"id":"s14-mc-21","type":"single","question":"下列採購何者得適用採購法第96條規定？","options":["依我國締結之條約或協定所辦理之採購。","招標標的僅部分屬環保產品者。","招標標的之百分之五十屬環保產品者。","招標標的為政府認可之環保標章使用許可之產品。"],"answer":"招標標的為政府認可之環保標章使用許可之產品。","laws":[{"name":"政府採購法 第96條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=96"}]},{"id":"s14-mc-22","type":"single","question":"採購法第96條第2項所稱增加社會利益或減少社會成本之產品，指該產品經下列何機關認定符合此等條件，並發給證明文件者？","options":["採購法主管機關。","環境部。","相關目的事業主管機關。","經濟部。"],"answer":"相關目的事業主管機關。","laws":[{"name":"政府採購法 第96條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=96"}]},{"id":"s14-mc-23","type":"single","question":"機關依採購法第96條第1項優先採購環保產品，應於招標文件規定以環保產品得標之廠商，應於履約期間向機關提出與該產品有關之證明文件，以供查核。並應於招標文件規定以環保產品得標之廠商，其於履約期間未依契約規定提供該產品時，機關得採行之措施，下列何者為非？","options":["終止契約。","追償價差優惠損失。","依採購法第101條規定辦理。","押標金不予發還。"],"answer":"押標金不予發還。","laws":[{"name":"政府採購法 第96條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=96"}]},{"id":"s14-mc-24","type":"single","question":"機關依採購法第96條第1項優先採購環保產品，且於招標文件載明價差優惠8%以內優先決標予環保產品廠商。現最低標A廠商為非環保產品廠商標價90萬元已進入底價100萬元，次低標B廠商為環保產品廠商，其標價最高不逾下列何者時，得優先決標予環保產品廠商？","options":["95萬元。","96萬元。","97萬元。","98萬元。"],"answer":"97萬元。","laws":[{"name":"政府採購法 第96條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=96"}]},{"id":"s14-mc-25","type":"single","question":"機關依採購法第96條第1項優先採購環保產品，並允許價差優惠者，招標文件所定價差優惠比率以內之環保產品廠商家數在2家以上者，優先決標對象為？","options":["第1類及第2類產品廠商。","第3類產品廠商。","不論第幾類產品，以標價低者優先決標。","不論第幾類產品，抽籤決定之。"],"answer":"第1類及第2類產品廠商。","laws":[{"name":"政府採購法 第96條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=96"}]},{"id":"s14-mc-26","type":"single","question":"下列何種產品不適用採購法第96條規定？","options":["主要原料取得政府認可之環境保護標章使用許可，而其效能相同或相似之產品。","產品或其原料之製造、使用過程及廢棄物處理，符合再生材質、可回收、低污染或省能源者。","增加社會利益或減少社會成本，而效能相同或相似之產品。","取得政府認可之環境保護標章使用許可，而其效能相同或相似之產品。"],"answer":"主要原料取得政府認可之環境保護標章使用許可，而其效能相同或相似之產品。","laws":[{"name":"政府採購法 第96條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=96"}]},{"id":"s14-mc-27","type":"single","question":"機關依採購法第96條第1項優先採購環保產品，且於招標文件載明依「機關優先採購環境保護產品辦法」第12條第1項第1款優先決標予環保產品廠商。現最低標A廠商為非環保產品廠商報價已進入底價，次低標B廠商為第3類環保產品廠商，第3低標C廠商為第2類環保產品廠商，第4低標D廠商第1類環保產品廠商，則機關應優先洽減之環保廠商為？","options":["B廠商。","C廠商。","D廠商。","無需洽減，逕決標予A廠商。"],"answer":"C廠商。","laws":[{"name":"政府採購法 第96條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=96"},{"name":"機關優先採購環境保護產品辦法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030084"}]},{"id":"s14-mc-28","type":"single","question":"機關辦理採購，下列何者不是採購法第101條規定得刊登政府採購公報之情形？","options":["擅自減省工料，情節重大者。","以虛偽不實之文件投標、訂約或履約，情節重大者。","重整程序中之廠商。","得標後無正當理由而不訂約者。"],"answer":"重整程序中之廠商。","laws":[{"name":"政府採購法 第101條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=101"}]},{"id":"s14-mc-29","type":"single","question":"機關發現廠商有採購法第101條第1項情形，應將事實、理由及依第103條第1項所定期間通知廠商，下列敘述何者正確？","options":["如廠商未提出異議，機關應通知主管機關執行刊登政府採購公報事宜。","如廠商未提出異議，機關應即執行刊登政府採購公報事宜。","如廠商提出異議、申訴及行政訴訟，機關應俟行政法院判決確定再行刊登公報。","機關通知廠商函不必附記廠商救濟之教示規定。"],"answer":"如廠商未提出異議，機關應即執行刊登政府採購公報事宜。","laws":[{"name":"政府採購法 第101條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=101"}]},{"id":"s14-mc-30","type":"single","question":"機關依採購法第102條 document.getElementById('dateTag').textContent = new Date().toLocaleDateString('zh-TW', {year:'numeric',month:'2-digit',day:'2-digit'});

let picked = null; // single selected section id, or null
let state = null; // reset fully on every startQuiz()

function totalCount(sec){ return sec.questions.length; }

function renderSectionList(){
  const list = document.getElementById('sectionList');
  list.innerHTML = '';
  SECTIONS.forEach((sec, i)=>{
    const row = document.createElement('label');
    row.className = 'section-item';
    row.innerHTML =
      '<span class="idx">'+String(i+1).padStart(2,'0')+'</span>'+
      '<span class="box" aria-hidden="true"></span>'+
      '<span class="name">'+sec.title+'</span>'+
      '<span class="cnt">'+totalCount(sec)+' 題</span>'+
      '<input type="radio" name="sectionPick" value="'+sec.id+'">';
    const input = row.querySelector('input');
    input.addEventListener('change', ()=>{
      picked = sec.id;
      syncSectionUI();
    });
    row.addEventListener('click', (e)=>{
      if(e.target.tagName === 'INPUT') return;
      picked = sec.id;
      syncSectionUI();
    });
    list.appendChild(row);
  });
}

function syncSectionUI(){
  const list = document.getElementById('sectionList');
  [...list.children].forEach((row, i)=>{
    const sec = SECTIONS[i];
    const on = picked === sec.id;
    row.classList.toggle('checked', on);
    row.querySelector('.box').textContent = on ? '✓' : '';
    row.querySelector('input').checked = on;
  });
  const nameEl = document.getElementById('selectedSectionName');
  const startBtn = document.getElementById('startBtn');
  const hint = document.getElementById('hintMsg');
  if(picked){
    const sec = SECTIONS.find(s=>s.id===picked);
    nameEl.textContent = sec.title + '（' + totalCount(sec) + ' 題）';
    startBtn.disabled = false;
    hint.textContent = '';
  } else {
    nameEl.textContent = '尚未選擇';
    startBtn.disabled = true;
    hint.textContent = '請先選擇一個單元';
  }
}

renderSectionList();
syncSectionUI();

// ---- mode / shuffle toggles ----
let mode = 'instant';
let shuffleOn = false;
document.getElementById('modeInstant').addEventListener('click', ()=>{
  mode='instant';
  document.getElementById('modeInstant').classList.add('selected');
  document.getElementById('modeEnd').classList.remove('selected');
});
document.getElementById('modeEnd').addEventListener('click', ()=>{
  mode='end';
  document.getElementById('modeEnd').classList.add('selected');
  document.getElementById('modeInstant').classList.remove('selected');
});
document.getElementById('shuffleOff').addEventListener('click', ()=>{
  shuffleOn=false;
  document.getElementById('shuffleOff').classList.add('selected');
  document.getElementById('shuffleOn').classList.remove('selected');
});
document.getElementById('shuffleOn').addEventListener('click', ()=>{
  shuffleOn=true;
  document.getElementById('shuffleOn').classList.add('selected');
  document.getElementById('shuffleOff').classList.remove('selected');
});

function shuffleArr(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

document.getElementById('startBtn').addEventListener('click', startQuiz);
document.getElementById('quitBtn').addEventListener('click', ()=>{
  showScreen('pickerScreen');
});
document.getElementById('retakeBtn').addEventListener('click', ()=>{
  showScreen('pickerScreen');
});

function startQuiz(){
  // full reset -- clears any previous quiz's answers/progress every time
  if(!picked) return;
  const sec = SECTIONS.find(s=>s.id===picked);
  let pool = sec.questions.map(q=> Object.assign({sectionId:sec.id, sectionTitle:sec.title}, q));
  let idxs = pool.map((_,i)=>i);
  if(shuffleOn) idxs = shuffleArr(idxs);

  state = {
    pool: pool,
    order: idxs,
    answers: {},
    mode: mode,
    current: 0,
    sectionTitles: [sec.title]
  };

  document.getElementById('headerSub').textContent = '測驗範圍：'+sec.title;

  buildJumpGrid();
  renderQuestion();
  showScreen('quizScreen');
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo({top:0, behavior:'smooth'});
}

function buildJumpGrid(){
  const grid = document.getElementById('jumpGrid');
  grid.innerHTML = '';
  state.order.forEach((qIdx, pos)=>{
    const btn = document.createElement('button');
    btn.className = 'jump-btn';
    btn.textContent = pos+1;
    btn.setAttribute('aria-label', '跳至第 '+(pos+1)+' 題');
    btn.addEventListener('click', ()=>{ state.current = pos; renderQuestion(); });
    grid.appendChild(btn);
  });
}

function refreshJumpGrid(){
  const grid = document.getElementById('jumpGrid');
  [...grid.children].forEach((btn, pos)=>{
    const q = state.pool[state.order[pos]];
    const ans = state.answers[q.id];
    btn.classList.toggle('current', pos===state.current);
    btn.classList.remove('answered','right','wrong');
    if(ans !== undefined){
      btn.classList.add('answered');
      if(state.mode==='instant'){
        btn.classList.add(ans===q.answer ? 'right' : 'wrong');
      }
    }
  });
}

function renderQuestion(){
  const qIdx = state.order[state.current];
  const q = state.pool[qIdx];
  document.getElementById('qMeta').textContent = (q.type==='single' ? '選擇題' : '是非題') + '　｜　' + q.sectionTitle;
  document.getElementById('qText').textContent = q.question;

  const lawRefsDiv = document.getElementById('lawRefs');
  if(q.laws && q.laws.length){
    lawRefsDiv.innerHTML = q.laws.map(l=>
      '<a class="law-chip" href="'+l.url+'" target="_blank" rel="noopener noreferrer">'+
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v18M5 8l-3 6a4 4 0 0 0 6 0zM19 8l-3 6a4 4 0 0 0 6 0zM5 8h4M15 8h4M9 8l3-5 3 5"/></svg>'+
      l.name+'<span class="src">全國法規資料庫</span></a>'
    ).join('');
  } else {
    lawRefsDiv.innerHTML = '';
  }

  const optList = document.getElementById('optList');
  optList.innerHTML = '';
  const marks = ['A','B','C','D'];
  const selected = state.answers[q.id];
  const revealed = selected !== undefined && state.mode==='instant';

  q.options.forEach((opt, i)=>{
    const div = document.createElement('div');
    div.className = 'opt';
    div.setAttribute('role','button');
    div.setAttribute('tabindex','0');
    div.innerHTML = '<span class="mark">'+marks[i]+'</span><span>'+opt+'</span>';

    if(selected !== undefined){
      div.classList.add('disabled');
      if(opt === selected) div.classList.add('chosen');
      if(revealed){
        if(opt === q.answer) div.classList.add('correct');
        else if(opt === selected) div.classList.add('wrong');
      }
    }

    const choose = ()=>{
      if(state.answers[q.id] !== undefined) return;
      state.answers[q.id] = opt;
      renderQuestion();
      refreshJumpGrid();
    };
    div.addEventListener('click', choose);
    div.addEventListener('keydown', (e)=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); choose(); }});
    optList.appendChild(div);
  });

  const fb = document.getElementById('feedbackTag');
  if(revealed){
    const isRight = selected === q.answer;
    fb.innerHTML = '<span class="feedback-tag '+(isRight?'right':'wrong')+'">'+(isRight?'✓ 答對了':'✕ 答錯了，正確答案：'+q.answer)+'</span>';
  } else {
    fb.innerHTML = '';
  }

  document.getElementById('progText').textContent = '第 '+(state.current+1)+' / '+state.pool.length+' 題';
  document.getElementById('progAnswered').textContent = '已作答 '+Object.keys(state.answers).length+' 題';
  document.getElementById('progFill').style.width = ((state.current+1)/state.pool.length*100)+'%';

  document.getElementById('prevBtn').disabled = state.current===0;
  const isLast = state.current === state.pool.length-1;
  document.getElementById('nextBtn').textContent = isLast ? '交卷' : '下一題 →';

  refreshJumpGrid();
}

document.getElementById('prevBtn').addEventListener('click', ()=>{
  if(state.current>0){ state.current--; renderQuestion(); }
});
document.getElementById('nextBtn').addEventListener('click', ()=>{
  const isLast = state.current === state.pool.length-1;
  if(isLast){
    showResults();
  } else {
    state.current++;
    renderQuestion();
  }
});

function showResults(){
  let mcRight=0, mcTotal=0, tfRight=0, tfTotal=0;
  const wrongList = [];

  state.pool.forEach(q=>{
    const ans = state.answers[q.id];
    const right = ans === q.answer;
    if(q.type==='single'){ mcTotal++; if(right) mcRight++; }
    else { tfTotal++; if(right) tfRight++; }
    if(!right) wrongList.push({q, ans});
  });

  const total = mcTotal+tfTotal;
  const rightTotal = mcRight+tfRight;
  const pct = total ? Math.round(rightTotal/total*100) : 0;

  document.getElementById('resultPct').textContent = pct+'%';
  document.getElementById('resultHeadline').textContent =
    pct>=80 ? '表現優異' : pct>=60 ? '及格通過' : '尚待加強';
  document.getElementById('resultSub').textContent =
    '共 '+total+' 題，答對 '+rightTotal+' 題，答錯 '+(total-rightTotal)+' 題';
  document.getElementById('resultScope').textContent = '測驗範圍：'+state.sectionTitles.join('、');
  document.getElementById('brMcRight').textContent = rightTotal+'/'+total;

  const reviewArea = document.getElementById('reviewArea');
  if(wrongList.length===0){
    reviewArea.innerHTML = '<div class="review-title">詳解回顧</div><div class="all-correct">全數答對，恭喜完成本次測驗。</div>';
  } else {
    let html = '<div class="review-title">錯題回顧（'+wrongList.length+' 題）</div>';
    wrongList.forEach(({q,ans})=>{
      const lawsHtml = (q.laws && q.laws.length) ?
        '<div class="law-refs" style="margin:8px 0 0;">'+q.laws.map(l=>
          '<a class="law-chip" href="'+l.url+'" target="_blank" rel="noopener noreferrer">'+l.name+'<span class="src">全國法規資料庫</span></a>'
        ).join('')+'</div>' : '';
      html += '<div class="review-item"><div class="rq">'+q.question+'</div>'+lawsHtml+
        '<div class="ra" style="margin-top:10px;">你的答案：<span class="you">'+(ans===undefined?'未作答':ans)+'</span><br>'+
        '正確答案：<span class="ok">'+q.answer+'</span></div></div>';
    });
    reviewArea.innerHTML = html;
  }

  showScreen('resultScreen');
}
</script>

</html>
