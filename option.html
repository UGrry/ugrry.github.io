<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>政府採購題庫・選擇題單元測驗</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&family=Noto+Sans+TC:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F6F2E9;
    --paper-line:#E2D9C4;
    --navy:#1B3350;
    --navy-deep:#12233A;
    --seal:#A63A2E;
    --seal-deep:#7E2A21;
    --gold:#B8934C;
    --ink:#2B2A26;
    --ink-soft:#6B6459;
    --good:#2F6B4F;
    --bad:#A63A2E;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    background-image:linear-gradient(var(--paper-line) 1px, transparent 1px);
    background-size:100% 2.1em;
    color:var(--ink);
    font-family:'Noto Sans TC', sans-serif;
    min-height:100vh;
    padding:32px 16px 80px;
    -webkit-font-smoothing:antialiased;
  }
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.01ms !important; transition-duration:0.01ms !important;}
  }
  .wrap{max-width:760px;margin:0 auto;}

  /* Letterhead */
  .letterhead{
    border:1px solid var(--navy);
    border-top:6px solid var(--navy);
    background:#FDFBF5;
    padding:22px 26px 18px;
    position:relative;
    margin-bottom:22px;
  }
  .letterhead .file-no{
    font-family:'Space Mono', monospace;
    font-size:11px;letter-spacing:0.08em;color:var(--ink-soft);
    display:flex;justify-content:space-between;
  }
  .letterhead h1{
    font-family:'Noto Serif TC', serif;
    font-weight:900;font-size:clamp(20px,5vw,28px);
    color:var(--navy-deep);margin:10px 0 6px;letter-spacing:0.02em;
  }
  .letterhead .sub{font-size:12.5px;color:var(--ink-soft);}
  .stamp{
    position:absolute;top:16px;right:20px;width:60px;height:60px;
    border:2.5px solid var(--seal);border-radius:50%;color:var(--seal);
    display:flex;align-items:center;justify-content:center;
    font-family:'Noto Serif TC',serif;font-weight:900;font-size:12px;line-height:1.15;
    text-align:center;transform:rotate(-8deg);opacity:0.85;
    writing-mode:vertical-rl;letter-spacing:2px;
  }

  .screen{display:none;}
  .screen.active{display:block;}

  /* Section select screen */
  .picker-card{
    background:#FDFBF5;border:1px solid var(--paper-line);padding:20px 22px;
  }
  .picker-card > p{line-height:1.85;font-size:14px;color:var(--ink-soft);margin-top:0;}
  .quick-actions{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
  .quick-btn{
    border:1px solid var(--navy);background:transparent;color:var(--navy);
    padding:7px 14px;font-size:12.5px;font-weight:700;cursor:pointer;
    font-family:'Noto Sans TC',sans-serif;
  }
  .quick-btn:hover{background:var(--navy);color:#fff;}
  .quick-btn:focus-visible{outline:3px solid var(--gold);outline-offset:2px;}

  .section-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
  .section-item{
    display:flex;align-items:center;gap:12px;
    border:1px solid #D8CFB8;background:#fff;
    padding:12px 14px;cursor:pointer;
    transition:border-color 0.15s, background 0.15s;
  }
  .section-item:hover{border-color:var(--navy);}
  .section-item.checked{border-color:var(--navy);background:#EFF3F8;}
  .section-item .box{
    flex-shrink:0;width:20px;height:20px;border:1.5px solid var(--ink-soft);
    display:flex;align-items:center;justify-content:center;
    font-size:12px;color:#fff;font-weight:700;
  }
  .section-item.checked .box{background:var(--navy);border-color:var(--navy);}
  .section-item .idx{
    font-family:'Space Mono',monospace;font-size:11px;color:var(--gold);
    font-weight:700;flex-shrink:0;width:26px;
  }
  .section-item .name{flex:1;font-size:14px;font-weight:500;}
  .section-item .cnt{
    font-family:'Space Mono',monospace;font-size:11.5px;color:var(--ink-soft);
    flex-shrink:0;
  }
  .section-item input{position:absolute;opacity:0;width:0;height:0;}

  .selected-summary{
    display:flex;justify-content:space-between;align-items:center;
    background:var(--navy);color:#fff;padding:12px 16px;margin-bottom:16px;
    font-size:13.5px;
  }
  .selected-summary b{font-family:'Space Mono',monospace;font-size:18px;}

  .option-toggle{display:flex;gap:10px;margin:14px 0;flex-wrap:wrap;}
  .toggle-btn{
    flex:1;min-width:140px;border:1px solid var(--navy);background:transparent;
    color:var(--navy);padding:10px 12px;font-family:'Noto Sans TC',sans-serif;
    font-size:13px;font-weight:700;cursor:pointer;text-align:left;
    transition:background 0.15s, color 0.15s;
  }
  .toggle-btn small{display:block;font-weight:400;color:var(--ink-soft);margin-top:3px;font-size:11px;}
  .toggle-btn.selected{background:var(--navy);color:#fff;}
  .toggle-btn.selected small{color:#cdd7e4;}
  .toggle-btn:focus-visible{outline:3px solid var(--gold);outline-offset:2px;}

  .btn-primary{
    display:block;width:100%;background:var(--seal);color:#fff;border:none;
    padding:15px;font-size:16px;font-weight:700;font-family:'Noto Serif TC',serif;
    letter-spacing:0.05em;cursor:pointer;margin-top:6px;transition:background 0.15s;
  }
  .btn-primary:hover:not(:disabled){background:var(--seal-deep);}
  .btn-primary:focus-visible{outline:3px solid var(--gold);outline-offset:2px;}
  .btn-primary:disabled{background:#B9AF9C;cursor:not-allowed;}
  .hint-msg{font-size:12.5px;color:var(--bad);margin-top:8px;min-height:16px;}

  /* Quiz screen */
  .progress-bar{height:5px;background:var(--paper-line);margin-bottom:4px;overflow:hidden;}
  .progress-fill{height:100%;background:var(--navy);transition:width 0.3s ease;}
  .progress-text{
    font-family:'Space Mono',monospace;font-size:11px;color:var(--ink-soft);
    display:flex;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:4px;
  }

  .q-card{
    background:#FDFBF5;border:1px solid var(--paper-line);border-left:4px solid var(--navy);
    padding:22px 24px;min-height:260px;
  }
  .q-meta{
    font-family:'Space Mono',monospace;font-size:11px;color:var(--gold);
    font-weight:700;letter-spacing:0.05em;margin-bottom:10px;
  }
  .law-refs{
    display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;
  }
  .law-chip{
    display:inline-flex;align-items:center;gap:5px;
    border:1px solid var(--gold);background:#FBF6E9;color:#8A6A1F;
    padding:4px 10px;font-size:12px;font-weight:700;
    text-decoration:none;transition:background 0.15s, color 0.15s;
  }
  .law-chip:hover{background:var(--gold);color:#fff;}
  .law-chip svg{width:11px;height:11px;flex-shrink:0;}
  .law-chip .src{
    font-weight:400;font-size:10.5px;color:#A5895A;margin-left:2px;
  }
  .law-chip:hover .src{color:#fff2d6;}
  .q-text{font-size:16.5px;line-height:1.75;color:var(--ink);margin-bottom:20px;font-weight:500;}
  .opt-list{display:flex;flex-direction:column;gap:10px;}
  .opt{
    border:1px solid #D8CFB8;background:#fff;padding:12px 14px;font-size:14.5px;
    line-height:1.6;cursor:pointer;display:flex;gap:10px;align-items:flex-start;
    transition:border-color 0.15s, background 0.15s;
  }
  .opt:hover{border-color:var(--navy);}
  .opt:focus-visible{outline:3px solid var(--gold);outline-offset:1px;}
  .opt .mark{
    flex-shrink:0;width:20px;height:20px;border:1.5px solid var(--ink-soft);
    border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:11px;font-weight:700;color:var(--ink-soft);margin-top:1px;
  }
  .opt.chosen{border-color:var(--navy);background:#EFF3F8;}
  .opt.chosen .mark{background:var(--navy);color:#fff;border-color:var(--navy);}
  .opt.correct{border-color:var(--good);background:#EAF5EF;}
  .opt.correct .mark{background:var(--good);border-color:var(--good);color:#fff;}
  .opt.wrong{border-color:var(--bad);background:#FBEEEC;}
  .opt.wrong .mark{background:var(--bad);border-color:var(--bad);color:#fff;}
  .opt.disabled{cursor:default;}

  .feedback-tag{display:inline-block;margin-top:14px;padding:5px 12px;font-size:12.5px;font-weight:700;letter-spacing:0.05em;}
  .feedback-tag.right{background:#EAF5EF;color:var(--good);border:1px solid var(--good);}
  .feedback-tag.wrong{background:#FBEEEC;color:var(--bad);border:1px solid var(--bad);}

  .nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:18px;gap:10px;}
  .nav-btn{
    border:1px solid var(--navy);background:transparent;color:var(--navy);
    padding:10px 18px;font-size:13.5px;font-weight:700;font-family:'Noto Sans TC',sans-serif;cursor:pointer;
  }
  .nav-btn:disabled{opacity:0.35;cursor:not-allowed;}
  .nav-btn:hover:not(:disabled){background:var(--navy);color:#fff;}
  .nav-btn.next{background:var(--navy);color:#fff;}
  .nav-btn.next:hover:not(:disabled){background:var(--navy-deep);}
  .nav-btn.quit{border-color:var(--bad);color:var(--bad);}
  .nav-btn.quit:hover{background:var(--bad);color:#fff;}
  .nav-btn:focus-visible{outline:3px solid var(--gold);outline-offset:2px;}

  .jump-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;margin-top:18px;}
  @media (max-width:480px){.jump-grid{grid-template-columns:repeat(7,1fr);}}
  .jump-btn{
    aspect-ratio:1;border:1px solid var(--paper-line);background:#fff;
    font-family:'Space Mono',monospace;font-size:11px;color:var(--ink-soft);cursor:pointer;
    display:flex;align-items:center;justify-content:center;
  }
  .jump-btn.answered{border-color:var(--navy);color:var(--navy);font-weight:700;}
  .jump-btn.current{background:var(--navy);color:#fff;border-color:var(--navy);}
  .jump-btn.right{background:#EAF5EF;border-color:var(--good);color:var(--good);}
  .jump-btn.wrong{background:#FBEEEC;border-color:var(--bad);color:var(--bad);}

  /* Result screen */
  .result-seal{
    width:110px;height:110px;border:4px solid var(--seal);border-radius:50%;
    margin:10px auto 20px;display:flex;flex-direction:column;align-items:center;justify-content:center;
    color:var(--seal);transform:rotate(-6deg);
  }
  .result-seal .pct{font-family:'Noto Serif TC',serif;font-weight:900;font-size:30px;}
  .result-seal .lbl{font-family:'Noto Sans TC',sans-serif;font-size:10.5px;letter-spacing:0.1em;}
  .result-summary{text-align:center;margin-bottom:20px;}
  .result-summary h2{font-family:'Noto Serif TC',serif;font-size:19px;color:var(--navy-deep);margin:0 0 6px;}
  .result-summary p{color:var(--ink-soft);font-size:13.5px;margin:0;}
  .result-scope{font-size:12px;color:var(--ink-soft);text-align:center;margin-bottom:16px;}
  .breakdown{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--paper-line);border:1px solid var(--paper-line);margin-bottom:14px;}
  .breakdown div{background:#FDFBF5;padding:12px;text-align:center;}
  .breakdown .n{font-family:'Space Mono',monospace;font-weight:700;font-size:20px;color:var(--navy);}
  .breakdown .l{font-size:11.5px;color:var(--ink-soft);}

  .section-breakdown{margin-bottom:20px;}
  .sb-row{
    display:flex;justify-content:space-between;align-items:center;
    padding:8px 12px;border-bottom:1px solid var(--paper-line);font-size:12.5px;
  }
  .sb-row .sb-name{color:var(--ink);}
  .sb-row .sb-score{font-family:'Space Mono',monospace;color:var(--navy);font-weight:700;}

  .review-item{
    border:1px solid var(--paper-line);border-left:4px solid var(--bad);
    background:#FDFBF5;padding:16px 18px;margin-bottom:12px;
  }
  .review-item .rmeta{font-family:'Space Mono',monospace;font-size:10.5px;color:var(--gold);margin-bottom:6px;}
  .review-item .rq{font-size:14px;line-height:1.7;margin-bottom:10px;color:var(--ink);}
  .review-item .ra{font-size:13px;line-height:1.7;}
  .review-item .ra .you{color:var(--bad);}
  .review-item .ra .ok{color:var(--good);font-weight:700;}
  .review-title{
    font-family:'Noto Serif TC',serif;font-size:16px;color:var(--navy-deep);
    margin:26px 0 12px;padding-bottom:6px;border-bottom:2px solid var(--navy);
  }
  .all-correct{text-align:center;padding:24px;color:var(--good);font-family:'Noto Serif TC',serif;font-size:15px;}
  .footer-actions{display:flex;gap:10px;margin-top:24px;}
  .footer-actions .nav-btn{flex:1;text-align:center;justify-content:center;}
</style>
</head>
<body>
<div class="wrap">

  <div class="letterhead">
    <div class="stamp">測驗用</div>
    <div class="file-no"><span>檔號：PROC-QBANK-ALL</span><span id="dateTag"></span></div>
    <h1>政府採購題庫・單元測驗</h1>
    <div class="sub" id="headerSub">共 14 個單元・僅選擇題・每次測驗僅能選擇一個單元</div>
  </div>

  <!-- SECTION PICKER SCREEN -->
  <section class="screen active" id="pickerScreen">
    <div class="picker-card">
      <p>本測驗僅收錄選擇題（不含是非題）。請選擇一個欲測驗的單元，每次僅能單選一個單元進行專項練習。每次開始測驗都會清除前一次的作答紀錄。</p>
      <div class="section-list" id="sectionList"></div>

      <div class="selected-summary">
        <span>已選單元</span>
        <span id="selectedSectionName">尚未選擇</span>
      </div>

      <div class="option-toggle" role="group" aria-label="作答回饋模式">
        <button class="toggle-btn selected" data-mode="instant" id="modeInstant">
          即時回饋<small>作答後立刻顯示對錯</small>
        </button>
        <button class="toggle-btn" data-mode="end" id="modeEnd">
          交卷後回饋<small>全部作答完才顯示結果</small>
        </button>
      </div>
      <div class="option-toggle" role="group" aria-label="題目順序">
        <button class="toggle-btn selected" data-shuffle="off" id="shuffleOff">
          原始順序<small>依題庫原始編排作答</small>
        </button>
        <button class="toggle-btn" data-shuffle="on" id="shuffleOn">
          隨機出題<small>每次測驗題序不同</small>
        </button>
      </div>

      <button class="btn-primary" id="startBtn" disabled>開始測驗</button>
      <div class="hint-msg" id="hintMsg">請先選擇一個單元</div>
    </div>
  </section>

  <!-- QUIZ SCREEN -->
  <section class="screen" id="quizScreen">
    <div class="progress-bar"><div class="progress-fill" id="progFill"></div></div>
    <div class="progress-text"><span id="progText">第 1 / 1 題</span><span id="progAnswered">已作答 0 題</span></div>

    <div class="q-card">
      <div class="q-meta" id="qMeta">選擇題</div>
      <div class="law-refs" id="lawRefs"></div>
      <div class="q-text" id="qText"></div>
      <div class="opt-list" id="optList"></div>
      <div id="feedbackTag"></div>
    </div>

    <div class="nav-row">
      <button class="nav-btn" id="prevBtn">← 上一題</button>
      <button class="nav-btn next" id="nextBtn">下一題 →</button>
    </div>
    <div class="nav-row" style="margin-top:10px;">
      <button class="nav-btn quit" id="quitBtn">結束測驗，回到單元選擇</button>
    </div>

    <div class="jump-grid" id="jumpGrid" aria-label="題號跳轉"></div>
  </section>

  <!-- RESULT SCREEN -->
  <section class="screen" id="resultScreen">
    <div class="result-seal"><div class="pct" id="resultPct">0%</div><div class="lbl">正確率</div></div>
    <div class="result-summary">
      <h2 id="resultHeadline">測驗結果</h2>
      <p id="resultSub"></p>
    </div>
    <div class="result-scope" id="resultScope"></div>
    <div class="breakdown" style="grid-template-columns:1fr;">
      <div><div class="n" id="brMcRight">0/0</div><div class="l">答對題數</div></div>
    </div>

    <div id="reviewArea"></div>

    <div class="footer-actions">
      <button class="nav-btn" id="retakeBtn">重新選擇單元測驗</button>
    </div>
  </section>

</div>

<script>
const SECTIONS = [{"id":"s1","title":"工程及技術服務採購作業","questions":[{"id":"s1-mc-1","type":"single","question":"下列何項費用，不得納入建造費用計算技術服務費用？","options":["承包商的利潤。","承包商之棄土費。","物價指數調整工程款。","承包商於工地開挖出有價料之減項金額。"],"answer":"物價指數調整工程款。","laws":[]},{"id":"s1-mc-2","type":"single","question":"委託辦理室內隔間設計服務，其最適宜訂定之廠商資格得為何？","options":["建築師事務所或室內裝修業。","營造業或室內裝修業。","景觀、室內設計業或室內裝修業。","以上皆是。"],"answer":"建築師事務所或室內裝修業。","laws":[]},{"id":"s1-mc-3","type":"single","question":"某工程係限期完工，驗收時發現不符合契約約定而通知廠商限期改善，廠商逾期未改善，其中有2天因颱風不上班不上課，於計算逾期違約金時，除契約另有特別約定外，該颱風日如何處理為是？","options":["廠商可要求減免。","逾契約原訂期限者，仍應核計逾期違約金。","履約期限以工作天計者免計。","未逾契約原訂期限之部分免計。"],"answer":"逾契約原訂期限者，仍應核計逾期違約金。","laws":[]},{"id":"s1-mc-4","type":"single","question":"機關委託廠商辦理專案管理技術服務之工作內容，下列敘述何者錯誤？","options":["設計工作成果之審查。","施工督導與履約管理之諮詢及審查。","委託可行性評估。","發包預算之審查。"],"answer":"委託可行性評估。","laws":[]},{"id":"s1-mc-5","type":"single","question":"機關委託廠商辦理技術服務，下列敘述何者錯誤？","options":["設計應符合節省能源、減少溫室氣體排放、保護環境、節約資源、經濟耐用等目的。","監造建築師、技師或其他專門職業及技術人員執行監造業務或監造簽證事項，其屬法令規定或契約約定應親自赴現場查驗、勘驗、初驗、驗收、會勘或出席會議者，應配合到場辦理、說明、會辦。","機關因專業人力或能力不足，需委託廠商辦理專案管理者，循預算程序編列核定後辦理即可，無須擬具委託專案管理計畫。","受機關委託提供採購規劃、設計或專案管理或代辦採購之廠商及其人員，如有犯採購法第88條、第92條之罪之嫌者，應送檢調單位查處。"],"answer":"機關因專業人力或能力不足，需委託廠商辦理專案管理者，循預算程序編列核定後辦理即可，無須擬具委託專案管理計畫。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s1-mc-6","type":"single","question":"機關委託廠商辦理技術服務，下列敘述何者錯誤？","options":["採購包含工程及技術服務者，如技術服務部分預算金額高於工程部分預算金額，即得以勞務採購辦理統包。","公開技術服務之預算金額及其所對應之工程標之預算金額，並載明超預算為不合格標，不予減價機會。","招標前依「機關委託技術服務廠商評選及計費辦法」訂定服務費預算書。","採購契約以採用採購法主管機關訂定之範本為原則。"],"answer":"採購包含工程及技術服務者，如技術服務部分預算金額高於工程部分預算金額，即得以勞務採購辦理統包。","laws":[{"name":"機關委託技術服務廠商評選及計費辦法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030077"},{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s1-mc-7","type":"single","question":"機關委託廠商辦理技術服務，下列敘述何者正確？","options":["「機關委託技術服務廠商評選及計費辦法」之規定，僅能用於服務費用在公告金額以上之技術服務採購。","機關辦理設計技術服務，得由學術單位承攬。","機關辦理規劃、設計技術服務，得由技師公會或建築師公會承攬。","委託設計及委託監造得由不同廠商承作。"],"answer":"委託設計及委託監造得由不同廠商承作。","laws":[{"name":"機關委託技術服務廠商評選及計費辦法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030077"}]},{"id":"s1-mc-8","type":"single","question":"機關委託廠商辦理技術服務，服務費用採建造費用百分比法計費者，下列敘述何者正確？","options":["建造費用不得包括廠商之工程管理費用及利潤。","建造費用應包括物價指數調整工程款。","建造費用應包括工程保險費。","機關考量個案工程內容、服務項目及難易度，可訂定超過附表所載之費率。"],"answer":"機關考量個案工程內容、服務項目及難易度，可訂定超過附表所載之費率。","laws":[]},{"id":"s1-mc-9","type":"single","question":"某公立大學採統包方式辦理校門口意象及綠美化工程採購，預算總金額為新臺幣80萬元，下列何種招標方式既符合採購法規定，又較能兼顧採購效率及品質？","options":["公開取得報價單或企劃書參考最有利標精神，擇最符合需要者進行議價。","依採購法第22條第1項第9款辦理公開評選，再邀請優勝廠商進行議價。","以公開招標最有利標決標方式辦理。","以公開招標最低標決標方式辦理。"],"answer":"公開取得報價單或企劃書參考最有利標精神，擇最符合需要者進行議價。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s1-mc-10","type":"single","question":"關於採購法施行細則第22條第4項所稱「追加累計金額占原主契約金額之比率」，下列敘述何者正確？","options":["加帳部分之累計金額占原主契約金額之比率。","加帳部分及減帳部分累計後，占原主契約金額之比率。","加帳部分及減帳部分絕對值之累計金額占原主契約金額之比率。","單次追加金額占原主契約金額之比率。"],"answer":"加帳部分之累計金額占原主契約金額之比率。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s1-mc-11","type":"single","question":"機關辦理查核金額以上之工程採購，應於公告招標前辦理招標文件之公開閱覽。但下列何種情形，不在此限？","options":["依採購法第22條第1項第3款或第105條第1項第1款、第2款辦理之採購。","依招標期限標準第4條之1或第10條縮短或合理訂定等標期之採購。","重複性採購。","以上皆是。"],"answer":"以上皆是。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s1-mc-12","type":"single","question":"依主管機關訂定之工程採購契約範本之內容，契約價金採「總價結算」之給付方式辦理，機關提供之設計圖說規定油漆某辦公室內側四面牆壁，契約價格詳細表標示之油漆面積為1,000平方公尺。嗣後機關辦理契約變更增加油漆天花板面積200平方公尺。廠商按圖施作後實際丈量結果牆壁油漆面積為970平方公尺、天花板油漆面積為200平方公尺。機關應給付多少油漆面積之價金？","options":["970平方公尺。","1,170平方公尺。","1,200平方公尺。","以上皆非。"],"answer":"1,200平方公尺。","laws":[]},{"id":"s1-mc-13","type":"single","question":"依主管機關訂定之工程採購契約範本之內容，契約價金採「總價結算」之給付方式辦理，機關提供之設計圖說規定油漆某辦公室內側四面牆壁，契約價格詳細表標示之油漆面積為1,000平方公尺。廠商按圖施作後實際丈量結果油漆面積為1,200平方公尺。機關應給付多少油漆面積之價金？","options":["1,000平方公尺。","1,150平方公尺。","1,170平方公尺。","1,200平方公尺。"],"answer":"1,170平方公尺。","laws":[]},{"id":"s1-mc-14","type":"single","question":"下列敘述何者為正確？","options":["機關評選技術服務廠商作業，適用採購法有關最有利標之所有評選規定。","招標文件已訂明固定服務費用或費率者，依該服務費用或費率決標。","廠商之服務費用，得於訂約後全部一次預付廠商，以利廠商資金週轉。","機關得規定於訂約後，預付廠商之服務費用為契約總額之百分之四十。"],"answer":"招標文件已訂明固定服務費用或費率者，依該服務費用或費率決標。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s1-mc-15","type":"single","question":"下列何者正確？","options":["廠商承辦專案管理技術服務，不得承攬受其管理之標案。","設計、監造等技術服務採購案，得委由公立專科以上技專校院相關科系所之專任教師辦理並簽證之。","委託監造服務案亦得同時委由承辦統包案之細部設計廠商辦理，以提升效率。","委託技術服務採服務成本加公費法計費者，廠商應記錄各項費用並提出憑證，且應為正本。"],"answer":"廠商承辦專案管理技術服務，不得承攬受其管理之標案。","laws":[]},{"id":"s1-mc-16","type":"single","question":"機關委託廠商承辦技術服務得載明之契約條款，下列何者錯誤？","options":["稅負事前約定，並依我國法律所定納稅義務人為納稅人。","工程具機電設備者，監造計畫應增設功能運轉測試等抽驗程序及標準。","有付款期限者，到期付款時所應達到之工作進度。","監造單位之現場人員於進駐工地前1年或執行業務期間，有因業務上相關之犯罪行為，經判決確定之情事，機關未必須限期更換該人員。"],"answer":"監造單位之現場人員於進駐工地前1年或執行業務期間，有因業務上相關之犯罪行為，經判決確定之情事，機關未必須限期更換該人員。","laws":[]},{"id":"s1-mc-17","type":"single","question":"委託技術服務廠商之服務費用，得於契約約定於訂約後預付一部分，以不逾契約價金總額或契約價金上限之百分之幾為原則？","options":["百分之十。","百分之二十。","百分之三十。","百分之五十。"],"answer":"百分之三十。","laws":[]},{"id":"s1-mc-18","type":"single","question":"廠商承辦之技術服務為「專案管理」者，其專案管理人員中應有多少比例以上為該廠商之專任職員？","options":["1/3。","1/2。","2/3。","3/4。"],"answer":"1/2。","laws":[]},{"id":"s1-mc-19","type":"single","question":"機關委託廠商辦理技術服務，其採成本加公費法計費者，其中「公費」部分應為定額，且應以直接薪資扣除非經常性給與之獎金後與管理費用合計金額多少範圍內為限？","options":["20%。","25%。","30%。","40%。"],"answer":"25%。","laws":[]},{"id":"s1-mc-20","type":"single","question":"下列何種採購不允許採統包方式辦理？","options":["建築工程。","勞務採購。","財物採購。","橋梁工程。"],"answer":"勞務採購。","laws":[]},{"id":"s1-mc-21","type":"single","question":"機關以統包辦理招標，並規定廠商於投標時提出設計圖者，得就審查達一定分數或名次之未得標廠商，於招標文件規定何種內容？","options":["發給獎勵金。","列為優良廠商。","列為下次邀標廠商。","發給廠商支出之一切費用。"],"answer":"發給獎勵金。","laws":[]},{"id":"s1-mc-22","type":"single","question":"依「水管、電氣與建築工程合併或分開招標原則」，採預鑄工法之工程，其規定為何？","options":["應分開辦理招標。","應允許共同投標。","得合併辦理招標。","以上皆非。"],"answer":"得合併辦理招標。","laws":[]},{"id":"s1-mc-23","type":"single","question":"機關辦理招標文件公開閱覽，未採網路電子化閱覽者，應於上班時間內為之，並不得少於幾日？","options":["5日。","7日。","10日。","14日。"],"answer":"5日。","laws":[]},{"id":"s1-mc-24","type":"single","question":"機關辦理公告金額以上採購，於招標文件中規定得標廠商提出連帶保證廠商者，其履約保證金得予減收，試問其減收額度以不逾履約保證金額度之若干比例為限？","options":["5%。","20%。","50%。","100%。"],"answer":"50%。","laws":[]},{"id":"s1-mc-25","type":"single","question":"機關辦理工程採購，於招標文件中規定優良廠商得予減收押標金等之減收額度以不逾原定應繳總額之若干比例為限？","options":["5%。","20%。","50%。","100%。"],"answer":"50%。","laws":[]},{"id":"s1-mc-26","type":"single","question":"機關辦理工程採購，得於招標文件規定優良廠商得予減收金額之項目，不包括下列何者？","options":["押標金。","履約保證金。","預付款扣回款。","保固保證金。"],"answer":"預付款扣回款。","laws":[]},{"id":"s1-mc-27","type":"single","question":"保固期內發現瑕疵者，由機關通知廠商改正。一般工程所稱上述瑕疵，通常不包括下列何項目？","options":["損裂。","保養。","坍塌。","漏水。"],"answer":"保養。","laws":[]},{"id":"s1-mc-28","type":"single","question":"以下若干新臺幣（下同）金額之政府採購，得不經公告程序，逕洽廠商採購，免提供報價或企劃書？","options":["60萬元之工程採購。","15萬元之設計服務採購。","30萬元之監造服務採購。","以上皆非。"],"answer":"15萬元之設計服務採購。","laws":[]},{"id":"s1-mc-29","type":"single","question":"契約以工作天計算之工程，廠商提前9日完工，機關於履約期限最末日辦理驗收，經驗收有瑕疵，機關要求廠商於驗收次日起5日內改善完成，無任何不可抗力因素，廠商逾機關規定改善期限4天（中間包含2天國定假日）方改善完成，並經複驗合格，下列敘述何者正確？","options":["提前完工日數大於逾期改善日數，故未有逾期情況。","改善完成日已逾履約期限，逾期日數2日。","改善完成日已逾履約期限，逾期日數9日。","改善完成日已逾履約期限，逾期日數4日。"],"answer":"改善完成日已逾履約期限，逾期日數4日。","laws":[]},{"id":"s1-mc-30","type":"single","question":"機關以統包方式辦理採購，下列敘述何者正確？","options":["工程、財物及勞務採購均得以統包方式辦理。","統包工程採購之內容至少包含細部設計及施工。","統包工程之廠商資格得通案規定為施工廠商。","統包工程已訂有設計準則與施工規範、明確的工作項目與技術工法者，應採最低標方式決標。"],"answer":"統包工程採購之內容至少包含細部設計及施工。","laws":[]},{"id":"s1-mc-31","type":"single","question":"機關辦理工程採購，有部分先行使用之必要或已履約之部分有減損滅失之虞者，下列處理方式何者錯誤？","options":["就該部分辦理驗收。","就該部分先辦理驗收者，未來仍應針對該部分再辦理驗收。","就該部分辦理分段查驗供未來驗收之用。","不論就該部分辦理驗收或分段查驗供驗收之用，均得就該部分支付價金及起算保固期間。"],"answer":"就該部分先辦理驗收者，未來仍應針對該部分再辦理驗收。","laws":[]},{"id":"s1-mc-32","type":"single","question":"機關辦理下列何種採購，於公告招標前無須辦理招標文件之公開閱覽？","options":["未達查核金額之特殊工程採購。","查核金額以上重複性之工程採購。","適用政府採購條約或協定之巨額工程採購。","以上皆是。"],"answer":"以上皆是。","laws":[]},{"id":"s1-mc-33","type":"single","question":"下列敘述何者正確？","options":["機關以統包併採最有利標決標方式辦理者，無須報經上級機關核准。","統包採購不得依採購法第22條第1項第9款規定辦理。","共同投標廠商應於簽約時檢附共同投標協議書。","所稱統包，指將工程或財物採購中之設計、監造與施工、供應、安裝或一定期間之維修等併於同一採購契約辦理招標。"],"answer":"統包採購不得依採購法第22條第1項第9款規定辦理。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s1-mc-34","type":"single","question":"機關依採購法第22條第1項第9款辦理未達公告金額而逾公告金額十分之一之技術服務採購，下列何者為誤？","options":["依採購法第94條規定應成立採購評選委員會。","依原住民族工作權保障法施行細則第9條規定，即符合其母法第11條但書規定所稱「無法承包」，得免優先決標予原住民個人、機構、法人或團體承包。","第1次公告結果，僅1家廠商投標時，仍得開標。","準用「機關委託技術服務廠商評選及計費辦法」。"],"answer":"準用「機關委託技術服務廠商評選及計費辦法」。","laws":[{"name":"機關委託技術服務廠商評選及計費辦法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030077"},{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s1-mc-35","type":"single","question":"機關以統包辦理招標，下列敘述何者正確？","options":["為提升採購效率，細部設計未經機關審查核定，亦可先行施工。","應事先評估確認統包可提升採購效率、確保品質、可縮減工期且無增加經費之虞。","統包案完成後如需維護管理者，其設計應包含未來維護管理計畫。","招標文件就主要材料之特殊規範，無需載明，以免限制廠商發揮創意。"],"answer":"統包案完成後如需維護管理者，其設計應包含未來維護管理計畫。","laws":[]},{"id":"s1-mc-36","type":"single","question":"機關辦理採購金額新臺幣9,000萬元之工程採購，下列何者正確？","options":["規定廠商須於得標後10天內繳納履約保證金。","規定履約保證金依進度分2期平均發還。","規定廠商必須提出連帶保證廠商。","規定履約保證金為契約金額之5%。"],"answer":"規定履約保證金為契約金額之5%。","laws":[]},{"id":"s1-mc-37","type":"single","question":"下列何者非為採購法第36條所稱之特殊採購？","options":["開挖深度在15公尺以上之工程。","在地面下施工之工程。","古蹟構造物之修建。","工期緊迫且經機關首長核定之工程。"],"answer":"工期緊迫且經機關首長核定之工程。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s1-mc-38","type":"single","question":"下列何者不是廠商得作為連帶保證廠商之規定？","options":["依法得為保證。","未參與投標。","無採購法第103條第1項不得參加投標或作為決標對象或分包廠商之情形者。","經主管機關核准。"],"answer":"經主管機關核准。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s1-mc-39","type":"single","question":"下列何者計費方式不適用於單獨規劃服務之採購？","options":["建造費用百分比法。","總包價法。","服務成本加公費法。","按日計酬法。"],"answer":"建造費用百分比法。","laws":[]},{"id":"s1-mc-40","type":"single","question":"有關押標金保證金規定，下列敘述何者錯誤？","options":["技術服務採購，招標文件不得明訂收押標金及保證金。","廠商以郵政匯票繳納押標金，並無不可。","以議價方式辦理之工程採購，招標文件明定免收押標金，並無不可。","機關不發還得標廠商所繳納之保證金時，其孳息亦不發還之。"],"answer":"技術服務採購，招標文件不得明訂收押標金及保證金。","laws":[]},{"id":"s1-mc-41","type":"single","question":"機關委託廠商承辦技術服務，其採成本加公費法計費者，其中「管理費用」之上限，不得超過「直接薪資扣除非經常性給與之獎金後」之下列何者比率？","options":["30%。","50%。","80%。","100%。"],"answer":"100%。","laws":[]},{"id":"s1-mc-42","type":"single","question":"機關委託廠商承辦新建建築物之技術服務，其服務費用之採購金額在新臺幣多少元以上且服務項目包括規劃、設計者，應要求廠商提出服務建議書及規劃、設計構想圖說（配置圖、平面圖、立面圖、剖面圖、透視圖等），並應辦理競圖？","options":["100萬元。","500萬元。","1,000萬元。","2,000萬元。"],"answer":"500萬元。","laws":[]},{"id":"s1-mc-43","type":"single","question":"機關依採購法第22條第1項第9款辦理評選技術服務廠商，其投標廠商須有幾家方可開標？","options":["須達3家以上。","須達1家以上。","須達6家以上。","須達4家以上。"],"answer":"須達1家以上。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s1-mc-44","type":"single","question":"機關於招標文件中規定允許一定家數內之廠商共同投標者，採購法規定以不超過幾家為原則？","options":["5家。","3家。","6家。","無家數規定，係由機關決定。"],"answer":"5家。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s1-mc-45","type":"single","question":"機關應如何判斷工程採購是否屬特殊採購，下列何者正確？","options":["報經上級機關核准。","視其是否屬「投標廠商資格與特殊或巨額採購認定標準」第6條各款情形之一。","依工程慣例及普遍性自行判斷。","依工程困難程度自行判斷。"],"answer":"視其是否屬「投標廠商資格與特殊或巨額採購認定標準」第6條各款情形之一。","laws":[{"name":"投標廠商資格與特殊或巨額採購認定標準","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030099"}]},{"id":"s1-mc-46","type":"single","question":"依主管機關訂定工程採購契約範本之內容，機關辦理若干金額以上之營建工程，履約保證金應依工程進度分4期以上平均發還？","options":["公告金額。","查核金額。","巨額。","無論金額大小均須有。"],"answer":"查核金額。","laws":[]},{"id":"s1-mc-47","type":"single","question":"保固期內發現瑕疵，應由廠商於機關指定之期限內負責免費無條件改正。逾期不為改正者，按主管機關訂定工程採購契約範本之內容，機關採行下列措施，何者最不適當？","options":["逕為處理，所需費用由廠商負擔。","動用保固保證金逕為處理，不足時，向廠商追償。","依採購法第101條規定通知廠商。","終止契約。"],"answer":"終止契約。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s1-mc-48","type":"single","question":"下列有關技術服務採購之敘述，何者錯誤？","options":["不得規定收押標金及保證金。","得允許共同投標。","共通性之需求得簽訂共同供應契約。","得允許外國廠商參與投標。"],"answer":"不得規定收押標金及保證金。","laws":[]},{"id":"s1-mc-49","type":"single","question":"下列何者係屬投標廠商之特定資格？","options":["具有相當經驗或實績者。","實收資本額之規定。","投標廠商現有與承包招標標的有關之專業或一般人力證明。","以上皆是。"],"answer":"以上皆是。","laws":[]},{"id":"s1-mc-50","type":"single","question":"有關技術服務採購之驗收規定，下列何者正確？","options":["不得辦理分段查驗供驗收之用。","不得以書面審查方式。","得以召開審查會方式。","設計成果之驗收，於施工標驗收時方得一併辦理。"],"answer":"得以召開審查會方式。","laws":[]},{"id":"s1-mc-51","type":"single","question":"服務成本加公費法所稱「憑證」，包括各項費用之下列何種單據？","options":["發票。","收據。","紀錄或報表。","以上皆是。"],"answer":"以上皆是。","laws":[]},{"id":"s1-mc-52","type":"single","question":"下列敘述何者為非？","options":["機關公開評選廠商承辦技術服務之審查，其招標文件訂有廠商資格者，應先審查資格文件。","機關評選結果應通知廠商，對未獲選者並應敘明其原因。","機關依採購法第22條第1項第9款辦理評選技術服務廠商，其投標廠商應有3家方可開標。","採購評選委員會評選優勝廠商，得不以1家為限。"],"answer":"機關依採購法第22條第1項第9款辦理評選技術服務廠商，其投標廠商應有3家方可開標。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s1-mc-53","type":"single","question":"機關委託廠商辦理技術服務，下列敘述何者錯誤？","options":["未達公告金額之技術服務採購，其依中央機關未達公告金額採購招標辦法公開取得3家以上廠商之書面報價或企劃書，擇符合需要者辦理比價或議價者，得準用「機關委託技術服務廠商評選及計費辦法」之規定。","屬未達公告金額之案件，得採參考最有利標精神之決標方式辦理。","同類或同區域中，小型工程之技術服務案件，其採購件數較多者，不得採複數決標方式，避免集中由少數廠商承攬。","得依採購法第20條規定採選擇性招標方式辦理，預先辦理廠商資格審查，建立合格之技術服務廠商名單。"],"answer":"同類或同區域中，小型工程之技術服務案件，其採購件數較多者，不得採複數決標方式，避免集中由少數廠商承攬。","laws":[{"name":"機關委託技術服務廠商評選及計費辦法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030077"},{"name":"中央機關未達公告金額採購招標辦法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030067"},{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s1-mc-54","type":"single","question":"機關委託廠商辦理技術服務，服務費用採建造費用百分比法計費者，下列敘述何者正確？","options":["各階段環境影響評估及相關說明書、報告書之編製及送審之服務費用，屬百分比計費之範疇，不得另行估算編列。","水土保持計畫之辦理及送審之服務費用，仍須受附表所列參考百分比之限制，不得另行估算編列。","申請公有建築物候選綠建築證書或綠建築標章之服務費用，仍須受附表所列參考百分比之限制，不得另行估算編列。","招標文件可載明建造費用不包括拆除工程之有價回收料之減項金額。"],"answer":"招標文件可載明建造費用不包括拆除工程之有價回收料之減項金額。","laws":[]},{"id":"s1-mc-55","type":"single","question":"建築物工程技術服務建造費用百分比參考表所列服務費用參考值，於包括規劃、設計及監造3項時，原則上各占多少百分比？","options":["規劃占5%，設計占50%，監造占45%。","規劃占15%，設計占45%，監造占40%。","規劃占10%，設計占45%，監造占45%。","規劃占10%，設計占50%，監造占40%。"],"answer":"規劃占10%，設計占45%，監造占45%。","laws":[]},{"id":"s1-mc-56","type":"single","question":"受機關委託提供採購規劃、設計、監造或專案管理之工程技術服務廠商如有綁標情事致機關遭受損害，機關應追究廠商之責任；承辦之技師或建築師有應付懲戒之情事，且交付懲戒符合行政程序法第7條所訂「比例原則」時，則依技師法第42條或建築師法第50條之規定，詳述事實並檢具違規事證移送懲戒。其為執業技師部分，應送下列何者機關辦理？","options":["電機技師送經濟部。","內政部。","技師法之中央主管機關。","直轄市、縣（市）主管機關。"],"answer":"技師法之中央主管機關。","laws":[]},{"id":"s1-mc-57","type":"single","question":"按主管機關訂定工程採購契約範本之物價指數調整內容，以下何者錯誤？","options":["機關依行政院主計總處發布之總指數、中分類項目指數及個別項目指數，可自行訂定漲跌幅逾一定比率部分，計算物價調整款。","可歸責於廠商原因致逾履約期限施作之部分，以施作當月指數與契約約定履約期限當月指數二者較低者，作為調整依據。","機關招標時未載明中分類項目及個別項目時，不可依中分類項目指數及個別項目指數調整工程款。","契約雙方得就施工時間間隔較久之項目，於訂料前約定，以訂料時或施工前一定月份之指數，計算物價調整款。"],"answer":"機關招標時未載明中分類項目及個別項目時，不可依中分類項目指數及個別項目指數調整工程款。","laws":[]},{"id":"s1-mc-58","type":"single","question":"機關委託廠商辦理技術服務，下列敘述何者錯誤？","options":["機關辦理公告金額以上之技術服務者，以不訂底價之最有利標為原則。","機關採公開招標不訂底價之最有利標辦理公告金額以上之技術服務採購，於評選出最有利標廠商後，議價程序仍不得免除。","機關於招標文件預先載明決標金額或費率作為決標條件，此時得不將廠商報價納為評選項目。","機關辦理公告金額以上之技術服務者，依採購法第22條第1項第9款及「機關委託技術服務廠商評選及計費辦法」規定，參考優勝廠商報價訂定底價後辦理議價程序。"],"answer":"機關採公開招標不訂底價之最有利標辦理公告金額以上之技術服務採購，於評選出最有利標廠商後，議價程序仍不得免除。","laws":[{"name":"機關委託技術服務廠商評選及計費辦法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030077"},{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s1-mc-59","type":"single","question":"機關辦理技術服務採購，採服務成本加公費法計費者，下列何者錯誤？","options":["直接薪資包括非經常性給與之獎金。","實際薪資得包括經常性給與之獎金。","工作人員不扣薪假與特別休假之薪資費用，得由機關依實際需要於招標文件明定為實際薪資之一定比率及給付條件，但須檢據核銷。","非經常性給與之獎金，得由機關依實際需要於招標文件明定為實際薪資之一定比率及給付條件，檢據核銷。但不得超過實際薪資之百分之三十。"],"answer":"工作人員不扣薪假與特別休假之薪資費用，得由機關依實際需要於招標文件明定為實際薪資之一定比率及給付條件，但須檢據核銷。","laws":[]},{"id":"s1-mc-60","type":"single","question":"機關辦理履約地點位於原住民地區未達公告金額之技術服務採購，其採公開取得3家以上廠商之書面報價或企劃書，擇符合需要者辦理比價或議價者，招標機關於第1次公告開放原住民及非原住民廠商投標，並於招標公告敘明開標後依2階段辦理，其下列作業方式何者錯誤？","options":["第1階段先就原住民廠商所投之標進行審標、決標。","第1階段無法決標予原住民廠商，則作成紀錄後，第2階段改就全部投標廠商辦理審標。","第1階段原住民廠商之標價經洽減價仍超底價而不逾預算數額，可經原底價核定人或其授權人核准，直接決標予原住民廠商。","因提供技術服務之原住民廠商極為有限，招標機關為避免單一原住民廠商承接過多案件致影響履約品質，可於招標文件規定投標廠商須提出「具有如期履約能力之證明」。"],"answer":"第1階段原住民廠商之標價經洽減價仍超底價而不逾預算數額，可經原底價核定人或其授權人核准，直接決標予原住民廠商。","laws":[]},{"id":"s1-mc-61","type":"single","question":"下列何者適合列入工程採購物價調整之項目？","options":["工程廠商之營業稅。","管理費及利潤。","依河川疏濬砂石採售分離計畫優先提供河川砂石供公共工程施工廠商使用之砂石。","鋼構橋之鋼筋。"],"answer":"鋼構橋之鋼筋。","laws":[]},{"id":"s1-mc-62","type":"single","question":"機關依採購法第22條第1項第9款辦理採購金額新臺幣50萬元之技術服務，應將招標資訊公開於下列何途徑？","options":["工程會之政府採購資訊網路及政府採購公報。","工程會之政府採購資訊網路公開取得書面企劃書。","工程會之政府採購資訊網路及機關網站。","工程會之政府採購資訊網路，得免刊登政府採購公報。"],"answer":"工程會之政府採購資訊網路及政府採購公報。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s1-mc-63","type":"single","question":"機關辦理技術服務採購，採建造費用百分比法計費，下列何者正確？","options":["建築物裝修及整修工程不得比照建築物工程技術服務建造費用百分比參考表計費。","技術服務契約有關之各項工程，不得合併計算建造費用。","技術服務契約有關之各項工程，如屬分期或分區施作，且契約已明訂依分期或分區給付服務費用者，可分別計算建造費用，但不包括同一工程之分標採購案。","若後續施作工程未發包，則機關得免付費用予技術服務廠商。"],"answer":"技術服務契約有關之各項工程，如屬分期或分區施作，且契約已明訂依分期或分區給付服務費用者，可分別計算建造費用，但不包括同一工程之分標採購案。","laws":[]},{"id":"s1-mc-64","type":"single","question":"機關委託廠商辦理技術服務，服務費用採建造費用百分比法計費者，下列敘述何者錯誤？","options":["建造費用，指工程採購底價金額或評審委員會建議金額，若無前2者，以工程預算代之。但應依規定不包括若干事項之費用。","建造費用不包括工程保險費。","其服務費率應按工程內容、服務項目及難易度，參考附表1至附表4，訂定建造費用之費率級距及各級費率，簽報機關首長或其授權人員核定，無須於招標文件中載明。","工程於履約期間有契約變更、終止或解除契約之情形者，技術服務費用得視實際情形協議增減之。"],"answer":"其服務費率應按工程內容、服務項目及難易度，參考附表1至附表4，訂定建造費用之費率級距及各級費率，簽報機關首長或其授權人員核定，無須於招標文件中載明。","laws":[]},{"id":"s1-mc-65","type":"single","question":"機關委託廠商辦理技術服務，下列敘述何者錯誤？","options":["採總包價法計費者，其委託內容如有增減者，仍須辦理變更契約。","技術服務廠商投保專業責任保險所需保險費用，包含於服務費用項目之內。","服務範圍包括代辦訓練操作或維護人員者，機關受訓人員之旅費及生活費，應由機關自行支給，不包括在服務費用項目之內。","機關委託技術服務，屬私契約性質，廠商人員利用履約方便所為之不當審查行為，僅能透過契約約定求償，不涉及刑責。"],"answer":"機關委託技術服務，屬私契約性質，廠商人員利用履約方便所為之不當審查行為，僅能透過契約約定求償，不涉及刑責。","laws":[]},{"id":"s1-mc-66","type":"single","question":"採總價結算之工程，廠商依契約約定投保，惟實際支付之保險費用低於契約所列該項目之金額，機關應如何處理？","options":["機關應洽廠商追回該部分價差。","機關仍應依契約所列金額支付廠商。","機關應於契約中預先明訂，廠商實際支付金額較契約金額少時，應退還價差予機關，實際支付金額較契約金額多時，機關不予追加等較利於機關之條件。","機關應洽廠商協商支付合理保險費。"],"answer":"機關仍應依契約所列金額支付廠商。","laws":[]},{"id":"s1-mc-67","type":"single","question":"某工程採購之採購金額為新臺幣(下同)6,000萬元，預算為4,950萬元，底價為4,700萬元，經洽廠商減價結果，最低標價為以下情形時，何者敘述正確？","options":["標價為5,000萬元，可報上級機關核准後決標。","標價為4,900萬元，經原底價核定人或其授權人員核准後決標。","標價為4,800萬元，應報上級機關核准後始得決標。","以上皆非。"],"answer":"以上皆非。","laws":[]},{"id":"s1-mc-68","type":"single","question":"按主管機關訂定工程採購契約範本之物價指數調整約定內容，以下何者錯誤？","options":["給付之物價調整款併於結算總價內。","承商保險費可予調整。","採三層級物調機制，已辦理物調項目，不得再以其他物價指數辦理調整。","可記載不予調整之項目或情形。"],"answer":"承商保險費可予調整。","laws":[]},{"id":"s1-mc-69","type":"single","question":"某機關辦理垃圾棄置場處置設計監造案，機關採用限制性招標公開評選，機關若已將規劃報告公開，並列為招標文件一部分，參與規劃廠商去函招標機關表示欲投標，機關應如何處理？","options":["依法不得允許其投標。","檢討如無不公平競爭之虞，可同意其投標。","雖檢討無不公平競爭，仍應報請上級機關同意後始得同意其投標。","報主管機關決定。"],"answer":"檢討如無不公平競爭之虞，可同意其投標。","laws":[]},{"id":"s1-mc-70","type":"single","question":"機關委託廠商辦理技術服務，下列敘述何者錯誤？","options":["採總包價法計費者，無論委託內容有無增減，均不得變更契約價金。","建築師依法律規定須交由技術辦理設計監造所需費用，包含於服務費用項目之內。","以建造費用百分比法計得之服務費不包含辦理可行性研究之服務費。","履約期間在1年以上者，機關得於契約內訂明自第2年起得隨臺灣地區專業、科學及技術服務業受雇員工平均經常性薪資指數逐月計算調整契約價金。"],"answer":"採總包價法計費者，無論委託內容有無增減，均不得變更契約價金。","laws":[]},{"id":"s1-mc-71","type":"single","question":"機關辦理工程，因專業人力或能力不足，可委託專案管理廠商協助辦理之工作，下列何者正確？","options":["委託規劃、設計。","都市計畫、區域計畫或水土保持計畫等規劃之諮詢及審查。","委託可行性研究。","以上皆是。"],"answer":"都市計畫、區域計畫或水土保持計畫等規劃之諮詢及審查。","laws":[]}]},{"id":"s2","title":"財物及勞務採購作業","questions":[{"id":"s2-mc-1","type":"single","question":"機關辦理評選，下列敘述何者錯誤？","options":["評選委員會依招標文件規定評選出優勝廠商，即代表該廠商投標文件內容已被接受，不應再強制要求廠商修正。","機關於評選後彙總製作之總表，屬投標廠商得申請閱覽、抄寫、複印或攝影之範圍，不得併於決標結果之通知事項，主動通知各投標廠商。","機關對於評選委員會違反政府採購法之決議，不得接受。","招標文件如已訂定由評選委員會過半數之決定評定最有利標或優勝廠商者，除有發現違反法令之情事外，機關首長不得變更該評選結果。"],"answer":"機關於評選後彙總製作之總表，屬投標廠商得申請閱覽、抄寫、複印或攝影之範圍，不得併於決標結果之通知事項，主動通知各投標廠商。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s2-mc-2","type":"single","question":"機關辦理80萬元勞務採購，其履約地點在原住民地區，下列何者錯誤？","options":["得免收履約保證金。","依原住民族工作權保障法第11條規定應優先由原住民廠商承包。","招標文件可規定投標廠商如為原住民廠商者免繳押標金，如為非原住民廠商者應繳押標金，以促進原住民就業。","第一次公告，即開放原住民及非原住民廠商投標。"],"answer":"招標文件可規定投標廠商如為原住民廠商者免繳押標金，如為非原住民廠商者應繳押標金，以促進原住民就業。","laws":[]},{"id":"s2-mc-3","type":"single","question":"下列敘述何者正確？","options":["機關不得於招標文件內載明「廠商於得標後應儘量僱用當地住民以增加就業機會」。","我國簽署WTO政府採購協定後，所有採購案不得再限定採用國產品。","旅遊服務屬政府採購法第22條第1項第9款規定所稱之「專業服務」。","機關辦理財物採購，現階段得規定僅允許「正字標記」之產品參與投標。"],"answer":"旅遊服務屬政府採購法第22條第1項第9款規定所稱之「專業服務」。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s2-mc-4","type":"single","question":"有關保證金之規定，下列何者正確？","options":["機關辦理簽約，得不以廠商先繳納履約保證金為條件。","得標廠商之履約保證金如有溢繳情形，尚無違反採購法。","廠商以設定質權之金融機構定期存單繳納履約保證金，於向金融機構設定質權時，無須質權人(機關)會同辦理。","以上皆是。"],"answer":"以上皆是。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s2-mc-5","type":"single","question":"未達公告金額之採購，以公開取得廠商之書面報價或企劃書方式辦理者，下列何者正確？","options":["以採購法第34條公開徵求廠商提供參考資料之方式刊登公告。","第1次公告結果，未能取得3家以上廠商之書面報價或企劃書者，得經機關首長或其授權人員核准，改採限制性招標。","廠商不得提出異議及申訴。","應刊登政府採購公報。"],"answer":"第1次公告結果，未能取得3家以上廠商之書面報價或企劃書者，得經機關首長或其授權人員核准，改採限制性招標。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s2-mc-6","type":"single","question":"保固保證金以不逾契約金額百分之多少為原則？","options":["百分之二十。","百分之十。","百分之五。","百分之三。"],"answer":"百分之三。","laws":[]},{"id":"s2-mc-7","type":"single","question":"以下何者正確？","options":["主會計人員不得為採購案之承辦人員。","採購案之承辦人員不得為所辦採購案之監辦人員。","採購案之承辦單位主管不得為該採購案之監辦人員。","以上皆非。"],"answer":"採購案之承辦人員不得為所辦採購案之監辦人員。","laws":[]},{"id":"s2-mc-8","type":"single","question":"下列何者不符合採購法第33條之規定？","options":["機關不得指定以郵政信箱為唯一之投標送達場所。","投標信封上或容器外應標示廠商名稱及地址。","廠商將投標文件置於不透明之信封，並以釘書針封裝，機關得予拒絕。","機關得於招標文件中規定允許廠商於開標前補正非契約必要之點之文件。"],"answer":"廠商將投標文件置於不透明之信封，並以釘書針封裝，機關得予拒絕。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s2-mc-9","type":"single","question":"有關公營事業徵求經銷商之行為，下列何者為非？","options":["有償委任之委託經銷契約，具一定事務之委託處理，且約定其對價者，應適用採購法。","如以賣斷方式銷售予經銷商，由經銷商自負盈虧，而不具有償委任之約定條款者，無採購法之適用。","如契約載明經銷價格、經銷範圍或獨家經銷權之授與、責任購貨額、銷售獎勵金等，未具有償委任性質者，無採購法之適用。","如係勞務採購性質者，非屬採購法第22條第1項第15款所定「提供服務以供轉售目的所為之採購」。"],"answer":"如係勞務採購性質者，非屬採購法第22條第1項第15款所定「提供服務以供轉售目的所為之採購」。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s2-mc-10","type":"single","question":"機關依採購法第42條第1項辦理分段開標，下列何者錯誤？","options":["僅就資格投標者，以選擇性招標為限。","辦理1次投標分段開標，其已投標未開標之部分，不得發還。","未通過前一階段審標之投標廠商，不得參加後續階段之投標。","採1次投標分段開標者，廠商應將各段開標用之投標文件分別密封。"],"answer":"辦理1次投標分段開標，其已投標未開標之部分，不得發還。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s2-mc-11","type":"single","question":"下列敘述何者正確？","options":["逾履約期限後遇颱風來襲致無法交貨，颱風來襲天數不計逾期違約金。","機關人力不敷分派時，得指派技工、工友或臨時人員擔任主驗人員。","勞務採購於驗收完畢後15日內應填具結算驗收證明書。","採召開審查會方式辦理勞務採購之驗收者，主持人得視同主驗人。"],"answer":"採召開審查會方式辦理勞務採購之驗收者，主持人得視同主驗人。","laws":[]},{"id":"s2-mc-12","type":"single","question":"某機關辦理保全勞務採購，年預算為新臺幣(以下同)120萬元，其依採購法第22條第1項第9款辦理公開評選，並於招標文件及招標公告中載明訂約二年，履約期間評鑑優良者，機關保留後續依同條項第7款議價權利二次每次一年，下列敘述何者為正確？","options":["採購金額為480萬元，預算金額為120萬元。","採購金額為480萬元，預算金額為240萬元。","採購金額為240萬元，預算金額為120萬元。","採購金額為240萬元，預算金額為240萬元。"],"answer":"採購金額為480萬元，預算金額為240萬元。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s2-mc-13","type":"single","question":"依採購法第22條第1項第9款所辦理專業服務性質之採購，其以服務成本加公費法計費時，全部公費應為定額，且不得超過直接薪資扣除非經常性給與之獎金後與管理費用合計金額之比率為何？","options":["6%。","25%。","10%。","15 %。"],"answer":"25%。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s2-mc-14","type":"single","question":"各機關得就以下何種具有共通需求特性之採購，與廠商簽訂共同供應契約？","options":["財物或勞務。","財物或工程。","勞務或工程。","財物、勞務或工程。"],"answer":"財物或勞務。","laws":[]},{"id":"s2-mc-15","type":"single","question":"機關辦理未達公告金額之專業服務採購，下列何者有誤？","options":["公告金額十分之一以下採購之招標，得不經公告程序，逕洽廠商採購，免提供報價或企劃書。","機關辦理位於原住民地區未達公告金額之採購，應符合原住民族工作權保障法第11條之規定。","公開取得3家以上廠商之書面報價或企劃書，擇最符合需要者，可於截止收件日前先簽請機關首長或其授權人員核准，敘明屆時如公告結果，未能取得3家以上廠商之書面報價或企劃書者，將改採限制性招標。","不得依「機關委託專業服務廠商評選及計費辦法」辦理。"],"answer":"不得依「機關委託專業服務廠商評選及計費辦法」辦理。","laws":[{"name":"機關委託專業服務廠商評選及計費辦法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030076"}]},{"id":"s2-mc-16","type":"single","question":"機關辦理經常性採購，其依採購法第49條規定，將公開徵求廠商提供書面報價或企劃書之公告，公開於主管機關之資訊網路或刊登於政府採購公報，第1次應取得幾家以上廠商之書面報價或企劃書，擇符合需要者辦理比價或議價？","options":["1家。","2家。","3家。","6家。"],"answer":"3家。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s2-mc-17","type":"single","question":"在服務成本加公費法中，所稱之公費係指下列何者？","options":["直接薪資。","直接成本。","合理成本。","廠商提供服務所得之報酬。"],"answer":"廠商提供服務所得之報酬。","laws":[]},{"id":"s2-mc-18","type":"single","question":"決標依採購法第52條第1項第2款規定辦理者，下列敘述何者正確？","options":["不論採購金額為何皆應成立評審委員會。","評審委員會之成立時機，準用採購法第46條第2項有關底價之訂定時機。","評審委員會之成員適用採購評選委員會組織準則之規定。","不論最低標價是否合理，評審委員會悉應提出建議之金額。"],"answer":"評審委員會之成立時機，準用採購法第46條第2項有關底價之訂定時機。","laws":[{"name":"採購評選委員會組織準則","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030103"},{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s2-mc-19","type":"single","question":"依政府採購法規定，機關辦理查核金額以上之採購，經減價結果最低標價超過底價百分之五而不逾預算數額，機關確有緊急情事需決標時，應經下列何者核准？","options":["上級機關。","審計機關。","主計機關。","採購法主管機關。"],"answer":"上級機關。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s2-mc-20","type":"single","question":"機關以選擇性招標辦理屬經常性採購建立合格廠商名單之「材料試驗服務」，其辦理廠商資格審查之公告應有幾家廠商投標始得審查？","options":["3家。","4家。","5家。","6家。"],"answer":"6家。","laws":[]},{"id":"s2-mc-21","type":"single","question":"機關辦理清潔外包之巨額勞務採購案，預算金額6,000萬元（無後續擴充），經檢討有必要訂定實收資本額之資格，履約期限為3年，每年均為2,000萬元，除有特殊情形者外，機關得訂定之實收資本額上限為何？","options":["800萬元。","600萬元。","200萬元。","2,000萬元。"],"answer":"200萬元。","laws":[]},{"id":"s2-mc-22","type":"single","question":"下列敘述何者錯誤？","options":["招標公告後，有採購計畫變更擬取銷採購之情形者，機關得不依招標文件所定時間開標、決標。","採購之開標得限制投標廠商出席人數。","採購之開標得視個案情形，規定投標廠商之負責人應親自出席，且不得授權代表出席。","機關辦理公開招標採購，因投標廠商家數未滿3家而流標者，得發還投標文件。廠商要求發還者，機關不得拒絕。"],"answer":"採購之開標得視個案情形，規定投標廠商之負責人應親自出席，且不得授權代表出席。","laws":[]},{"id":"s2-mc-23","type":"single","question":"機關辦理設計競賽之評選，下列敘述何者為非？","options":["招標文件訂有廠商資格者，資格文件與設計建議書得合併審查。","機關評選結果應通知廠商，對未獲選者並應敘明其理由。","評選優勝廠商，得不以1家為限。","評選作業準用最有利標之評選規定。"],"answer":"招標文件訂有廠商資格者，資格文件與設計建議書得合併審查。","laws":[]},{"id":"s2-mc-24","type":"single","question":"第1次招標於1家廠商參加時即得開標決標，屬下列何種招標方式？","options":["經常性採購採建立合格廠商名單之選擇性招標。","未達公告金額採公開招標。","依採購法第22條第1項第9款辦理公開評選。","公開招標搭配最有利標決標者。"],"answer":"依採購法第22條第1項第9款辦理公開評選。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s2-mc-25","type":"single","question":"依採購法第22條第1項第9款規定辦理公開客觀評選為優勝者採限制性招標，其底價訂定時機為何？","options":["評選前定之。","開標前定之。","與優勝廠商議價前定之。","資格審查後定之。"],"answer":"與優勝廠商議價前定之。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s2-mc-26","type":"single","question":"下列公營事業機構之金融服務態樣，何者適用採購法？","options":["資金借貸。","財務調度之理財行為。","委託金融機構代收款並支付手續費。","買賣或發行債券。"],"answer":"委託金融機構代收款並支付手續費。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s2-mc-27","type":"single","question":"公務機關間依政府採購法第105條取得勞務者，下列敘述何者錯誤？","options":["公立學校或公營事業得向政府機關採購。","須經雙方分別隸屬之上級機關核准。","不適用政府採購法第2章及第3章之所有條文。","仍適用監辦規定。"],"answer":"不適用政府採購法第2章及第3章之所有條文。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s2-mc-28","type":"single","question":"有關規格之訂定，下列何者正確？","options":["得訂明「正字標記」產品，但須於招標文件註明「或同等品」字樣。","公告金額以上採購，應至少指定3家以上廠牌。","未達公告金額之採購，得指定進口品。","廠商所提供之型錄，應逐頁加蓋廠商及負責人章。"],"answer":"得訂明「正字標記」產品，但須於招標文件註明「或同等品」字樣。","laws":[]},{"id":"s2-mc-29","type":"single","question":"機關採選擇性招標建立合格廠商名單方式辦理清潔勞務採購，其預先辦理廠商資格審查，名單有效期為2年，年預算為200萬元。該機關於名單有效期內利用該名單邀請符合資格廠商參加100萬元投標，本次採購之採購金額應認定為？","options":["50萬元。","100萬元。","200萬元。","400萬元。"],"answer":"100萬元。","laws":[]},{"id":"s2-mc-30","type":"single","question":"分項複數決標之敘述，下列何者錯誤？","options":["招標文件訂明得由廠商分項報價之項目。","底價得依項目分別訂定。","押標金應依招標文件規定之全部項目計算繳納。","得分項簽約及驗收。"],"answer":"押標金應依招標文件規定之全部項目計算繳納。","laws":[]},{"id":"s2-mc-31","type":"single","question":"下列何者非採購法規定之押標金繳納種類？","options":["金融機構之書面連帶保證。","信用合作社簽發之支票。","保險公司之連帶保證保險單。","郵政匯票。"],"answer":"金融機構之書面連帶保證。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s2-mc-32","type":"single","question":"下列何者情形，機關得免於招標文件或招標公告公開預算金額？","options":["巨額採購規定廠商具有相當實績之特定資格者。","巨額採購規定廠商實收資本額之特定資格者。","查核金額以上之勞務採購。","未達公告金額之工程採購。"],"answer":"未達公告金額之工程採購。","laws":[]},{"id":"s2-mc-33","type":"single","question":"機關採服務成本加公費法計費之勞務採購，下列何者為非？","options":["契約規定成本上限及逾上限時之處理。","廠商應記錄各項費用並提出憑證。","憑證應包括各項費用之發票、收據、紀錄或報表且僅得為正本。","機關得至廠商處所辦理查核憑證。"],"answer":"憑證應包括各項費用之發票、收據、紀錄或報表且僅得為正本。","laws":[]},{"id":"s2-mc-34","type":"single","question":"機關委託廠商辦理專業服務，因涉及不同性質之專門技術，廠商資格規定投標廠商須具有各項專業能力之履約資格，為利工作介面管理或促進競爭，得於招標文件規定允許共同投標，惟家數以不超過幾家為原則？","options":["3家。","5家。","10家。","15家。"],"answer":"5家。","laws":[]},{"id":"s2-mc-35","type":"single","question":"機關允許共同投標時，應於招標文件中規定共同投標廠商之成員，不得對同一採購另行提出投標文件或為另一共同投標廠商之成員。但有下列何種情形不在此限：","options":["採最有利標決標者。","該採購涉及特殊工法，得為不同廠商共同投標，增加競爭者。","其他經上級機關認定者。","該採購涉及統包，以增加廠商競爭者。"],"answer":"該採購涉及特殊工法，得為不同廠商共同投標，增加競爭者。","laws":[]},{"id":"s2-mc-36","type":"single","question":"機關委託廠商承辦專業服務，其履約期限達多少時間以上，得於契約內訂明自該期間屆滿之次年起得隨物價指數調整契約價金？","options":["1年。","2年。","3年。","5年。"],"answer":"1年。","laws":[]},{"id":"s2-mc-37","type":"single","question":"機關辦理藝文採購採公告審查程序，下列敘述何者錯誤？","options":["審查委員會應由5人以上組成。","會議之決議應有委員總額二分之一以上出席，出席委員過半數之同意行之。","招標文件應訂明審查項目、審查標準及評定優勝者之方式。","審查委員會之成員應自主管機關網站公布之評選委員名單中遴聘，且不得少於三分之一。"],"answer":"審查委員會之成員應自主管機關網站公布之評選委員名單中遴聘，且不得少於三分之一。","laws":[]},{"id":"s2-mc-38","type":"single","question":"機關採購兼有工程、財物、勞務2種以上性質，難以認定其歸屬者，係按其性質所占何項金額比率最高者歸屬之？","options":["採購金額。","預估金額。","預計金額。","預算金額。"],"answer":"預算金額。","laws":[]},{"id":"s2-mc-39","type":"single","question":"機關以個案選擇性招標方式辦理採購者，第1次開標應至少有幾家以上之合格廠商始可開標？","options":["3家。","1家。","6家。","2家。"],"answer":"1家。","laws":[]},{"id":"s2-mc-40","type":"single","question":"勞務採購可訂定投標廠商特定資格之情形，以下何者為非？","options":["標的需要特殊專業或技術人才始能完成者。","標的需要特殊技術始能完成者。","服務費用達新臺幣2000萬元以上者。","廠商或其受雇人需具政府機關核發之專業技術證明始能完成者。"],"answer":"廠商或其受雇人需具政府機關核發之專業技術證明始能完成者。","laws":[]},{"id":"s2-mc-41","type":"single","question":"機關辦理巨額勞務採購，訂定廠商特定資格，規定投標廠商需於截止投標日前5年內，曾完成與招標標的同性質勞務契約，其屬單次契約金額之規定者，最高以招標標的預算金額之多少為限？","options":["五分之一。","五分之二。","二分之一。","五分之三。"],"answer":"五分之二。","laws":[]},{"id":"s2-mc-42","type":"single","question":"下列敘述何者正確？","options":["機關採複數決標辦理採購，其允許依不同數量報價者，可依標價及可決標之數量依序決標，但不得有不同之決標價。","機關採分項報價分項決標辦理者，廠商不得依其所投標之項目分別繳納押標金。","機關辦理減價或比減價格結果在底價以內時，除有採購法第58條總標價或部分標價偏低之情形者外，應即宣布決標。","複數決標不適用於採最有利標決標原則者。"],"answer":"機關辦理減價或比減價格結果在底價以內時，除有採購法第58條總標價或部分標價偏低之情形者外，應即宣布決標。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s2-mc-43","type":"single","question":"投標廠商標價幣別為外幣者，應以決標前一辦公日台灣銀行外匯交易收盤之何種匯率折算總價？","options":["現鈔賣出匯率。","現鈔買入匯率。","即期賣出匯率。","即期買入匯率。"],"answer":"即期賣出匯率。","laws":[]},{"id":"s2-mc-44","type":"single","question":"履約保證金以不逾契約金額百分之多少為原則？","options":["百分之五 。","百分之十 。","百分之十五。","百分之二十。"],"answer":"百分之十 。","laws":[]},{"id":"s2-mc-45","type":"single","question":"押標金之額度以不逾廠商標價百分之多少為原則？","options":["百分之一 。","百分之五 。","百分之十。","百分之十五。"],"answer":"百分之五 。","laws":[]},{"id":"s2-mc-46","type":"single","question":"廠商應遞送投標文件份數為何？","options":["機關於投標須知敘明。","廠商自行決定份數。","1式3份。","1式2份。"],"answer":"機關於投標須知敘明。","laws":[]},{"id":"s2-mc-47","type":"single","question":"營建機具綜合保險之採購性質係屬？","options":["勞務採購。","財物採購。","工程採購。","兼有工程、財物採購之性質。"],"answer":"勞務採購。","laws":[]},{"id":"s2-mc-48","type":"single","question":"查核金額以上採購案件，其應報請上級機關派員監辦之情形，何者正確？","options":["3,000萬元財物採購之驗收。","4,000萬元工程採購之議價。","1,000萬元勞務採購之開標。","2,000萬元工程採購之查核。"],"answer":"1,000萬元勞務採購之開標。","laws":[]},{"id":"s2-mc-49","type":"single","question":"依採購法第65條規定，得標廠商應自行履行勞務契約，下列何者正確？","options":["不得轉包、不得分包。","不得轉包、得分包。","得轉包、不得分包。","得轉包、得分包。"],"answer":"不得轉包、得分包。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s2-mc-50","type":"single","question":"機關承租辦公廳舍，係屬於何種採購？","options":["委任之勞務採購。","租賃之勞務採購。","委任之財物採購。","租賃之財物採購。"],"answer":"租賃之財物採購。","laws":[]},{"id":"s2-mc-51","type":"single","question":"下列何者非屬勞務採購？","options":["印製機關之年刊。","辦理公務車輛保險。","採購軟體之使用權利。","辦理公有財產之營運管理。"],"answer":"採購軟體之使用權利。","laws":[]},{"id":"s2-mc-52","type":"single","question":"下列有關勞務採購之敘述，何者錯誤？","options":["得採統包方式辦理招標。","得允許共同投標。","具共通需求特性得簽訂共同供應契約。","得允許外國廠商參與投標。"],"answer":"得採統包方式辦理招標。","laws":[]},{"id":"s2-mc-53","type":"single","question":"有關勞務採購之驗收規定，下列何者錯誤？","options":["得辦理分段查驗供驗收之用。","得以書面審查方式。","得召開審查會方式。","免辦理驗收。"],"answer":"免辦理驗收。","laws":[]},{"id":"s2-mc-54","type":"single","question":"採最低標決標，最低標廠商報價總標價(540萬元)低於底價（700萬元），機關得通知廠商繳納差額保證金之額度？","options":["260萬元 。","120萬元 。","160萬元 。","20萬元。"],"answer":"20萬元。","laws":[]},{"id":"s2-mc-55","type":"single","question":"勞務採購案之招標文件標示得標廠商應自行履行契約之部分工作項目，就該部分之履約，下列敘述何者正確？","options":["不得轉包。","得分包。","得轉包、不得分包。","得轉包、得分包。"],"answer":"不得轉包。","laws":[]},{"id":"s2-mc-56","type":"single","question":"關於招標文件規定就得標廠商實際績效提高時給予獎勵性報酬，該獎勵性報酬以契約價金總額或契約價金上限之多少比率為限？","options":["5%。","10%。","15%。","20%。"],"answer":"10%。","laws":[]},{"id":"s2-mc-57","type":"single","question":"機關依採購法第22條第1項第9款公開評選辦理委外訓練之勞務採購3年，1年預算為新臺幣(以下同)1,500萬元，其上網公告時，應填列之採購及預算金額各為多少元？","options":["採購金額為1500萬元，預算金額為1500萬元。","採購金額為4500萬元，預算金額為4500萬元。","採購金額為1500萬元，預算金額為4500萬元。","採購金額為4500萬元，預算金額為1500萬元。"],"answer":"採購金額為4500萬元，預算金額為4500萬元。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s2-mc-58","type":"single","question":"有關投標廠商家數之規定，下列何者錯誤？","options":["以公開招標方式辦理第2次開標，招標機關得規定有2家以上合格廠商投標，始得開標。","依採購法第22條第1項第9款辦理之公開客觀評選者，無投標廠商須3家之規定。","以選擇性招標方式為特定個案辦理之資格標，無投標廠商家數須6家之規定。","依採購法第20條第1款規定辦理選擇性招標，為建立合格廠商名單辦理資格審查者，投標廠商家數下限為3家。"],"answer":"依採購法第20條第1款規定辦理選擇性招標，為建立合格廠商名單辦理資格審查者，投標廠商家數下限為3家。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s2-mc-59","type":"single","question":"下列有關共同投標之敘述，何者錯誤？","options":["共同投標廠商之資格，已得互為補充，故機關不得於招標文件中再規定允許其應符合資格之一部分，得以分包廠商就其分包部分所具有者代之。","機關於招標文件規定，契約價金由代表廠商統一請(受)領，並非指發票全由代表廠商統一開立。","共同投標協議書所載各成員所占契約金額比率，得經機關同意後變更。","共同投標廠商成員有破產致無法繼續共同履約，關於另覓之廠商資格應與該成員原資格條件相當之廠商繼受。"],"answer":"共同投標廠商之資格，已得互為補充，故機關不得於招標文件中再規定允許其應符合資格之一部分，得以分包廠商就其分包部分所具有者代之。","laws":[]},{"id":"s2-mc-60","type":"single","question":"有關投標廠商資格之規定，下列何者應於招標文件中預為載明？","options":["投標廠商應符合資格之一部分，得由分包廠商就其分包部分所具有者代之。","投標廠商之財力資格，得以保險公司連帶保證保險單代之。","外國廠商應提出之資格文件依該國情形提出有困難者，得於投標文件內敘明其情形或以其所具有之相當資格代之。","對於資格條件提出異議之規定。"],"answer":"投標廠商應符合資格之一部分，得由分包廠商就其分包部分所具有者代之。","laws":[]},{"id":"s2-mc-61","type":"single","question":"有關分項複數決標之採購，下列敘述何者錯誤？","options":["開標結果無廠商投標之項目，如符合採購法第22條第1項第1款適用情形者，得由招標機關簽報機關首長或其授權人員核准後採限制性招標。","依標價及可決標之數量依序決標，得允許相同項目有不同之決標價。","機關得於招標文件中規定各項目得標廠商正取及備取之家數上限。","廠商得依其參與投標之項目或數量分別繳納押標金。"],"answer":"機關得於招標文件中規定各項目得標廠商正取及備取之家數上限。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s2-mc-62","type":"single","question":"廠商得書寫照底價承製之情形，下列何者錯誤？","options":["議價案。","合於招標文件規定之投標廠商僅有1家。","比減價格時僅餘1家廠商。","屬優先減價廠商之權利。"],"answer":"屬優先減價廠商之權利。","laws":[]},{"id":"s2-mc-63","type":"single","question":"投標廠商之標價超過底價時，下列何者正確？","options":["議價之減價次數不得逾3次。","比減價格之次數為不得逾3次，不包括洽最低標減價1次。","比減價格之次數由機關限制次數，但應事先通知各比減廠商。","依招標文件規定。"],"answer":"比減價格之次數為不得逾3次，不包括洽最低標減價1次。","laws":[]},{"id":"s2-mc-64","type":"single","question":"下列何者正確？","options":["機關將審查廠商投標文件之結果通知各該廠商者，最遲不得逾決標或廢標日30日。","機關採最有利標決標者，2家以上廠商標價相同，且均得為決標對象時，應由該等廠商再行比減價格1次，以低價者決標。","機關採最低標決標，其招標標的在2項以上而未採分項決標者，得以各項單價加總計算，決定最低標。","機關辦理公告金額以上之專業服務、技術服務、資訊服務、社會福利服務或文化創意服務者，以不訂底價之最有利標為原則。"],"answer":"機關辦理公告金額以上之專業服務、技術服務、資訊服務、社會福利服務或文化創意服務者，以不訂底價之最有利標為原則。","laws":[]},{"id":"s2-mc-65","type":"single","question":"機關利用共同供應契約辦理採購，如發現契約價格高於市場行情，下列處理方式何者為非？","options":["不利用共同供應契約辦理採購。","利用政府電子採購網「商品市價通報機制」通報訂約機關辦理查價。","仍可利用該契約下訂。","自行依採購法辦理採購。"],"answer":"仍可利用該契約下訂。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s2-mc-66","type":"single","question":"機關委託廠商辦理節能路燈換裝暨維護，由廠商先行自籌資金汰換為節能燈具並負責維護，惟其費用將由機關逐年支應，廠商未負擔盈虧，下列何者為是？","options":["屬採購法第99條之態樣，其甄選投資廠商之程序，適用採購。","屬採購法第2條所稱採購，適用採購法。","適用促進民間參與公共建設法。","由機關就採購法或促進民間參與公共建設法擇一辦理。"],"answer":"屬採購法第2條所稱採購，適用採購法。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s2-mc-67","type":"single","question":"機關委託廠商辦理屬具國安(含資安)疑慮之資訊開發系統，下列何者為非？","options":["機關得於招標文件載明不允許經濟部投資審議委員會公告之陸資資訊服務業參與。","機關得於招標文件載明分包廠商不得為經濟部投資審議委員會公告之陸資資訊服務業。","投標廠商應於投標廠商聲明書聲明是否為陸資資訊服務業。","招標文件不允許經濟部投資審議委員會公告之陸資資訊服務業參與，屬不當限制投標廠商資格情形。"],"answer":"招標文件不允許經濟部投資審議委員會公告之陸資資訊服務業參與，屬不當限制投標廠商資格情形。","laws":[]},{"id":"s2-mc-68","type":"single","question":"機關依政府採購法第22條第1項第13款委外辦理研究發展，採經公告審查優勝之學術或非營利機構，下列何者正確？","options":["經國家發展委員會評鑑為優等之研究機構。","機關依內部作業規定組成審查委員會，就國家發展委員會評鑑名單之研究機構評比為優勝者。","利用主管機關之資訊網路公告徵求，經審查委員會審查為優勝者。","經主管機關審查通過者。"],"answer":"利用主管機關之資訊網路公告徵求，經審查委員會審查為優勝者。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s2-mc-69","type":"single","question":"某機關辦理印刷勞務採購，每年預算為250萬元，採建立合格廠商名單之選擇性招標，名單有效期為3年，其資格審查的公告等標期(無公開閱覽及電子領投標)應不少於幾日？","options":["5。","7。","10。","14。"],"answer":"10。","laws":[]},{"id":"s2-mc-70","type":"single","question":"下列何種採購不允許採統包方式辦理？","options":["工程採購。","勞務採購。","財物採購。","以上皆非。"],"answer":"勞務採購。","laws":[]},{"id":"s2-mc-71","type":"single","question":"投標廠商資格規定廠商需出具權益證明（特定資格），機關係規定該項權益之最低額度，但該額度應以招標標的預算金額多少為限？","options":["十二分之一。","十分之一。","八分之一。","五分之一。"],"answer":"十二分之一。","laws":[]},{"id":"s2-mc-72","type":"single","question":"廠商提供專業服務所得之報酬為服務成本加公費法中之何種服務費用？","options":["直接薪資。","管理費用。","公費。","其他直接費用。"],"answer":"公費。","laws":[]},{"id":"s2-mc-73","type":"single","question":"依採購契約要項，機關於採購契約規定逾期違約金，以契約價金總額之多少比率為上限？","options":["10%。","20%。","50%。","無上限，契約載明即可。"],"answer":"20%。","laws":[]},{"id":"s2-mc-74","type":"single","question":"機關採公開招標辦理50萬元之採購，第1次開標須有幾家合格廠商投標始可開標？","options":["3家。","2家且簽准。","1家且事先簽准。","6家。"],"answer":"3家。","laws":[]},{"id":"s2-mc-75","type":"single","question":"未達公告金額之財物採購，得免收押標金、保證金之情形為何？","options":["僅押標金得免收。","僅保證金得免收。","押標金及保證金均得免收。","押標金及保證金均不得免收。"],"answer":"押標金及保證金均得免收。","laws":[]},{"id":"s2-mc-76","type":"single","question":"有關以數量為組合之複數決標之敘述，下列何者錯誤？","options":["招標文件得訂明廠商報價數量之上、下限。","得依不同數量報價者，依標價及可決標之數量依序決標。","依不同數量報價者，決標價應相同。","依不同數量決標者，得分別簽約及驗收。"],"answer":"依不同數量報價者，決標價應相同。","laws":[]},{"id":"s2-mc-77","type":"single","question":"機關依政府採購法第22條第1項第9款辦理50萬元之專業服務採購，應將招標資訊公開於何處？","options":["主管機關資訊網路及政府採購公報。","主管機關資訊網路及機關門首公告。","主管機關資訊網路及任一報紙。","主管機關資訊網路，得免刊登政府採購公報。"],"answer":"主管機關資訊網路及政府採購公報。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s2-mc-78","type":"single","question":"廠商未於投標文件外標封標示名稱及地址之情形，下列何者正確？","options":["得於開標前補正。","得於開標後補正。","無效標，但得列入家數計算。","無效標，並不得列入家數計算。"],"answer":"無效標，並不得列入家數計算。","laws":[]},{"id":"s2-mc-79","type":"single","question":"台北市政府依政府採購法第105條第1項第3款向經濟部工業局承租房地產，下列敘述何者錯誤？","options":["須經雙方直屬上級機關核准。","得不適用政府採購法規定之招標方式。","仍應依規定辦理監辦。","決標後得不刊登決標公告或傳輸決標資料。"],"answer":"決標後得不刊登決標公告或傳輸決標資料。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s2-mc-80","type":"single","question":"下列何者係屬投標廠商之特定資格？","options":["廠商信用證明。","實收資本額之規定。","曾完成與招標標的類似之製造、供應或承做之文件。","政府機關核發之專業(技)證照。"],"answer":"實收資本額之規定。","laws":[]},{"id":"s2-mc-81","type":"single","question":"機關辦理採購，下列何者正確？","options":["超底價廢標，第2次招標重訂底價時，底價不得調高。","公開招標採分段開標者，其底價應於開價格標前定之。","查核金額之採購，底價應一併檢送請上級機關派員監辦。","底價得委由代辦採購機關訂定。"],"answer":"底價得委由代辦採購機關訂定。","laws":[]},{"id":"s2-mc-82","type":"single","question":"機關辦理公開招標，採不分段開標者，其招標文件所標示之開標時間，下列何者正確？","options":["與等標期間無關，得視個案情形決定之。","不得於等標期屆滿當日。","僅限等標期屆滿之次一上班日。","為等標期屆滿當日或次一上班日。"],"answer":"為等標期屆滿當日或次一上班日。","laws":[]},{"id":"s2-mc-83","type":"single","question":"投標廠商應提出之資格證明文件，下列何者正確？","options":["其影本未加蓋廠商印章者，機關應予拒絕。","以影本為原則，但機關得通知投標廠商提出正本供查驗。","不得以目的事業主管機關核准之電子資料替代。","投標廠商聲明書如有誤繕，得洽投標廠商更正。"],"answer":"以影本為原則，但機關得通知投標廠商提出正本供查驗。","laws":[]},{"id":"s2-mc-84","type":"single","question":"下列何者非機關辦理採購，得擇定之基本資格？","options":["具有相當財力之證明。","廠商具有維修、維護或售後服務能力之證明。","廠商具有製造、供應或承做能力之證明。","廠商之受雇人具有專門技能之證明。"],"answer":"具有相當財力之證明。","laws":[]},{"id":"s2-mc-85","type":"single","question":"機關依採購法辦理採購，下列何者正確？","options":["開標後，除有特殊情形外，底價應予公開。","廠商之企劃書，決標後得免予保密。","招標文件於公告前應予保密。","機關得於招標文件中公告底價，但應報經上級機關核准。"],"answer":"招標文件於公告前應予保密。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s2-mc-86","type":"single","question":"有關押標金保證金規定，下列何者錯誤？","options":["查核金額以上之勞務採購，招標文件明定免收押標金。","廠商以郵政匯票繳納押標金，並無不可。","以議價方式辦理之財物採購，招標文件明定免收押標金，並無不可。","機關不發還得標廠商所繳納之保證金時，其孳息應發還之。"],"answer":"機關不發還得標廠商所繳納之保證金時，其孳息應發還之。","laws":[]},{"id":"s2-mc-87","type":"single","question":"未達公告金額之採購，依採購法第22條第1項第9款（公開評選優勝廠商）辦理者，下列何者正確？","options":["應刊登政府採購公報及成立採購評選委員會。","免依採購法第94條成立採購評選委員會。","第1次招標，必須有3家以上合格廠商始可開標。","得選擇免刊登政府採購公報。"],"answer":"應刊登政府採購公報及成立採購評選委員會。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s2-mc-88","type":"single","question":"下列何者錯誤？","options":["機關辦理採購，應以維護公共利益及公平合理為原則。","採購人員得基於公共利益、採購效益或專業判斷之考量，為適當之採購決定。但僅限於不違反採購法規定之範圍內。","公營事業之採購適用採購法。","自然人不得為簽約對象。"],"answer":"自然人不得為簽約對象。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s2-mc-89","type":"single","question":"下列何者正確？","options":["公告金額以上採購之開標，應檢送相關文件報請上級機關派員監辦。","開標主持人不接受上級機關監辦人員對採購不符合採購法規定程序而提出之意見者，宜納入紀錄並報機關首長或其授權人員核准。","採購法所稱上級機關，指辦理採購機關直屬之上一級機關。","以上皆非。"],"answer":"採購法所稱上級機關，指辦理採購機關直屬之上一級機關。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s2-mc-90","type":"single","question":"下列何者非採購法所稱採購？","options":["影印機之租用。","呆料之變賣。","權利之買受。","契約工之僱傭。"],"answer":"呆料之變賣。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s2-mc-91","type":"single","question":"下列何事項屬採購法所稱「監辦」之範疇？","options":["廠商規格之審查。","商業條款之審查。","是否依規定報經上級機關核准之情形。","底價訂定之審查。"],"answer":"是否依規定報經上級機關核准之情形。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s2-mc-92","type":"single","question":"下列何者屬採購法並未明定須報請主會計及有關單位監辦之情形？","options":["開標。","驗收。","估驗。","議價。"],"answer":"估驗。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s2-mc-93","type":"single","question":"下列何者正確？","options":["機關辦理減價或比減價格結果與底價相同時，仍得洽該商再減價1次。","採議價方式辦理採購，依採購法令規定減價次數不得逾3次。","選擇性招標之經常性採購，應建立3家以上之合格廠商名單。","機關辦理限制性招標，邀請3家廠商比價，如有2家廠商投標，即得進行比價。"],"answer":"機關辦理限制性招標，邀請3家廠商比價，如有2家廠商投標，即得進行比價。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s2-mc-94","type":"single","question":"機關辦理採購採最低標決標時，如最低標廠商之總標價或部分標價偏低，其優先處理方式下列何者正確？","options":["限期請其提出擔保。","審查其是否有顯不合理，有降低品質、不能誠信履約之虞或其他特殊情形。","不決標予該廠商，並以次低標廠商為最低標廠商。","限期通知該廠商提出說明或擔保。"],"answer":"審查其是否有顯不合理，有降低品質、不能誠信履約之虞或其他特殊情形。","laws":[]},{"id":"s2-mc-95","type":"single","question":"有關審標事宜，下列何者正確？","options":["廠商任何投標文件內明顯打字或書寫錯誤，機關得允許廠商更正。","投標廠商依招標文件規定檢附之型錄得於交貨時始予審查。","審標應公開為之。","審查結果應通知投標廠商，對不合格之廠商，並應敘明其原因。"],"answer":"審查結果應通知投標廠商，對不合格之廠商，並應敘明其原因。","laws":[]},{"id":"s2-mc-96","type":"single","question":"下列敘述何者錯誤？","options":["投標廠商應提出之資格證明文件，除招標文件另有規定者外，以影本為原則。","廠商資格證明文件影本之尺寸與正本不一致，機關得予拒絕。","查核金額以上之採購，履約保證金之繳納期限，應訂定14天以上之合理期限。","廠商履行契約所必須具備之財務、商業或技術資格條件，應不以其為政府機關、公立學校或公營事業所完成者為限。"],"answer":"廠商資格證明文件影本之尺寸與正本不一致，機關得予拒絕。","laws":[]},{"id":"s2-mc-97","type":"single","question":"機關委託廠商辦理資訊整體委外服務，其委外時程及契約期間不得逾幾年？","options":["10年。","8年。","5年。","1年。"],"answer":"10年。","laws":[]},{"id":"s2-mc-98","type":"single","question":"機關委託廠商承辦專業服務，其採服務成本加公費法計費者，其中「管理費用」之上限，不得超過「直接薪資扣除非經常性給與之獎金後」之比率為何？","options":["30%。","50%。","80%。","100%。"],"answer":"100%。","laws":[]},{"id":"s2-mc-99","type":"single","question":"機關委託廠商辦理專業服務，得於契約規定於訂約後預付一部分，但以契約總額或預估給付總額之比率上限為何？","options":["10%。","20%。","30%。","40%。"],"answer":"30%。","laws":[]},{"id":"s2-mc-100","type":"single","question":"機關辦理設計競賽廠商評選，得標廠商進行設計成果製作，其成果製作費用以何種方式計費為原則？","options":["建造費用百分比法。","總包價法。","按日計酬法。","服務成本加公費法。"],"answer":"總包價法。","laws":[]},{"id":"s2-mc-101","type":"single","question":"機關辦理藝文採購，其採公告審查方式辦理者，應成立審查委員會辦理審查，審查委員會應有委員總額多少比例以上出席始得作成決議？","options":["1/3。","2/3。","1/2。","3/4。"],"answer":"1/2。","laws":[]},{"id":"s2-mc-102","type":"single","question":"機關依採購法第22條第1項第9款評選廠商委託專業服務，下列評選與決標作業，何者有誤？","options":["先審查廠商資格，資格不合者，其他部分不予審查。","評選結果通知廠商，對未獲選者並敘明其原因。","評選優勝廠商不以1家為限。","招標文件已訂明固定服務費用，評選優勝廠商後，再擬訂底價與優勝廠商辦理議價。"],"answer":"招標文件已訂明固定服務費用，評選優勝廠商後，再擬訂底價與優勝廠商辦理議價。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s2-mc-103","type":"single","question":"機關辦理3年期清潔外包勞務採購，預算金額合計3000萬元，具有相當經驗或實績者。其範圍得包括於截止投標日前5年內，完成與招標標的同性質或相當之勞務契約，其單次契約金額或數量不低於招標標的預算金額或數量之五分之二，所稱「預算金額」，除有特殊情形者外，應以下列何者訂定資格條件？","options":["第1年預算金額。","3年預算金額之平均。","採購金額。","3年預算總額。"],"answer":"第1年預算金額。","laws":[]},{"id":"s2-mc-104","type":"single","question":"委託專業服務採服務成本加公費法計費者，其中直接薪資部分，除契約所載直接從事專業服務工作人員之實際薪資外，下列何者為另加之費用？","options":["實際薪資之一定比率作為工作人員不扣薪假與特別休假之薪資費用。","非經常性給與之獎金。","依法應由雇主負擔之勞工保險費、積欠工資墊償基金提繳費、全民健康保險費、勞工退休金。","以上皆是。"],"answer":"以上皆是。","laws":[]},{"id":"s2-mc-105","type":"single","question":"下列何者計費方式不適用於專業服務採購？","options":["建造費用百分比法。","總包價法。","服務成本加公費法。","按日計酬法。"],"answer":"建造費用百分比法。","laws":[]},{"id":"s2-mc-106","type":"single","question":"機關辦理複數決標，應合於最有利標或最低價格之競標精神，若其不同性質之數項財物併案招標，其各項財物係可分別使用且屬不同行業廠商供應者，應如何辦理？","options":["仍以總標單最低者。","允許分項報價及分項複數決標。","以分項報價中最低價。","其允許依不同數量報價者，可依標價及可決標之數量依序決標，但不得有不同之決標價。"],"answer":"允許分項報價及分項複數決標。","laws":[]},{"id":"s2-mc-107","type":"single","question":"機關辦理藝文採購，其採公告審查程序者，應成立審查委員會辦理審查；審查委員會並應由委員幾人組成？","options":["5人以上。","3人以上 。","5-17人。","7-25人。"],"answer":"5人以上。","laws":[]},{"id":"s2-mc-108","type":"single","question":"下列敘述何者正確？","options":["參加比減價格之廠商，其未能減至機關所宣布之前1次減價或比減價格之最低標價，得不通知其參加下1次之比減價格。","查核金額以上之採購，其超底價決標，應先報經上級機關核准。","機關辦理比減價格，應以3次為限，不得限制次數為1次或2次。","依採購法規定，超底價決標之上限為底價的百分之四。"],"answer":"參加比減價格之廠商，其未能減至機關所宣布之前1次減價或比減價格之最低標價，得不通知其參加下1次之比減價格。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s2-mc-109","type":"single","question":"投標廠商之標價超過底價時，下列何者錯誤？","options":["機關得通知議價之減價次數不得逾5次。","招標文件得規定比減價格之次數為不得逾2次。","機關採最低標決標者，2家以上廠商標價相同，且均得為決標對象時，其比減價格次數雖已達採購法第53條或第54條規定之3次限制者，仍應由該等廠商再行比減價格1次，以低價者決標。比減後之標價仍相同者，抽籤決定之。","機關辦理決標，合於決標原則之廠商無需減價或已完成減價或綜合評選程序者，得不通知投標廠商到場。"],"answer":"機關採最低標決標者，2家以上廠商標價相同，且均得為決標對象時，其比減價格次數雖已達採購法第53條或第54條規定之3次限制者，仍應由該等廠商再行比減價格1次，以低價者決標。比減後之標價仍相同者，抽籤決定之。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s2-mc-110","type":"single","question":"機關採用複數決標方式辦理採購者，下列何者不符採購法規定？","options":["訂有底價之採購，其底價依項目或數量分別訂定。","得依不同數量報價者，依標價及可決標之數量依序決標，並得有不同之決標價。","分項標的不同，決標數量無法精確預估者，得以單價和計算。","項目之標的不同者，得依個別項目之預算金額認定採購金額。"],"answer":"分項標的不同，決標數量無法精確預估者，得以單價和計算。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s2-mc-111","type":"single","question":"下列何者正確？","options":["機關於簽約後發現得標廠商於決標後有採購法第103條第1項不得參加投標或作為決標對象之情形者，應撤銷決標。","機關依採購法第50條第2項規定撤銷決標後，其原係採最有利標為決標原則者，得洽次優廠商議價。","機關於廠商得標後將其終止契約，其原係採最低標為決標原則者，得以原決標價依決標前各投標廠商標價之順序，自標價低者起，依序洽其他合於招標文件規定之未得標廠商減至該決標價後決標。","以上皆非。"],"answer":"以上皆非。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s2-mc-112","type":"single","question":"採購法第50條第1項第5款所稱「不同投標廠商間之投標文件內容有重大異常關聯者」不包括下列何種情形？","options":["分包廠商為同一廠商者。","押標金由同一人繳納或申請退還者。","電子郵件網址相同者。","投標文件內容由同一人繕寫或備具者。"],"answer":"分包廠商為同一廠商者。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s2-mc-113","type":"single","question":"機關於簽約後發現得標廠商於決標前有採購法第50條第1項情形者，下列何者不符合採購法規定？","options":["終止契約或解除契約。","追償損失。","因終止契約或解除契約反不符公共利益，並經機關首長核准者繼續履約。","於解除契約後依採購法施行細則第58條辦理。"],"answer":"因終止契約或解除契約反不符公共利益，並經機關首長核准者繼續履約。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s2-mc-114","type":"single","question":"機關辦理未達公告金額之採購，依公開取得書面報價刊登招標公告資訊網路，其第1次之等標期(提供有電子領投標)不得少於幾日？","options":["3日。","5日。","7日。","4日。"],"answer":"5日。","laws":[]},{"id":"s2-mc-115","type":"single","question":"機關辦理採購，下列何者正確？","options":["公開招標第1次開標，因未滿3家而流標者，第2次招標之等標期間得予縮短，並得不受3家以上合格廠商之限制。","機關辦理公開招標，因投標廠商家數未滿3家而流標者，得發還投標文件。但招標文件規定不予發還者，機關得予拒絕。","機關為特定個案辦理選擇性招標之採購，應有3家以上合格廠商投標，始得開標。","未達公告金額之公開招標，第1次招標之等標期(未提供電子領投標及辦理公開閱覽)，應至少為5日。"],"answer":"公開招標第1次開標，因未滿3家而流標者，第2次招標之等標期間得予縮短，並得不受3家以上合格廠商之限制。","laws":[]},{"id":"s2-mc-116","type":"single","question":"依採購法第48條第1項規定，公開招標之第1次開標須達幾家合格廠商投標始可開標？","options":["3家。","2家。","1家。","6家。"],"answer":"3家。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s2-mc-117","type":"single","question":"機關訂定底價時，以下何種採購得由承辦採購單位逕行簽報核定，免經規劃設計或使用單位提出預估金額及其分析？","options":["未達查核金額採購。","特殊採購。","商業性轉售之採購。","重複性採購。"],"answer":"重複性採購。","laws":[]},{"id":"s2-mc-118","type":"single","question":"機關辦理公告金額以上未訂底價採最低標決標之採購，最低合格標之標價是否合理，由下列何者審定之？","options":["機關首長或其授權人員。","底價審議委員會。","開標主持人。","評審委員會。"],"answer":"評審委員會。","laws":[]},{"id":"s2-mc-119","type":"single","question":"機關辦理公開招標採不分段開標之採購，其招標文件所標示之開標時間，不得為何？","options":["送樣審查合格後。","等標期屆滿當日。","等標期屆滿之次一上班日。","與招標公告所標示之開標時間一致。"],"answer":"送樣審查合格後。","laws":[]},{"id":"s2-mc-120","type":"single","question":"機關委託廠商承辦資訊服務於招標文件訂明固定服務費用者，如何決標？","options":["參考最優勝廠商報價訂定底價，與優勝廠商辦理議價，低於底價時決標。","依招標文件所載服務費用決標。","依招標文件所載服務費用之八成決標。","依招標文件所載服務費用為底價，與優勝廠商辦理議價，低於底價決標。"],"answer":"依招標文件所載服務費用決標。","laws":[]},{"id":"s2-mc-121","type":"single","question":"依採購法第105條規定，公務機關間財物或勞務之取得，經雙方直屬上級機關核准者，得不適用該法招標、決標之規定。所稱公務機關係指何機關？","options":["公立學校。","公營事業。","政府機關。","以上皆是。"],"answer":"政府機關。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s2-mc-122","type":"single","question":"公務機關間財物或勞務之取得，經雙方直屬上級機關核准者，得不適用採購法招標、決標之規定。但不包括採購法下列哪些條文之規定？","options":["第62條。","第27條。","第53條。","第26條。"],"answer":"第62條。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s2-mc-123","type":"single","question":"關於資訊服務採購，下列何者有誤？","options":["指提供與電腦軟體或硬體有關之服務。","不包括與硬體有關之服務。","機關辦理重大新興資訊業務或重大設備汰舊換新，得以整體委外服務方式，委託廠商提供電腦軟硬體、通信設施、人力及技術等之整體性資訊服務。","整體委外時程及契約期間，最長不得逾10年。"],"answer":"不包括與硬體有關之服務。","laws":[]},{"id":"s2-mc-124","type":"single","question":"下列敘述何者正確？","options":["機關評選專業服務廠商作業，適用採購法有關最有利標之所有評選規定。","招標文件已訂明固定服務費用或費率者，依該服務費用或費率決標。","廠商之服務費用，得於訂約後全部一次預付廠商，以利廠商資金週轉。","機關得規定於訂約後，預付廠商之服務費用為契約總額之百分之四十。"],"answer":"招標文件已訂明固定服務費用或費率者，依該服務費用或費率決標。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s2-mc-125","type":"single","question":"機關依採購法第22條第1項第9款辦理委託專業服務，下列有關招標文件或契約規定，何者有誤？","options":["得標廠商提高績效者，依契約價金總額之百分之五發給獎勵報酬。","採成本加公費法計費，訂定成本上限及逾上限之處理方式。","訂約後預付契約總額百分之四十之預付款。","履約期限3年，自第2年起得隨物價指數調整契約價金。"],"answer":"訂約後預付契約總額百分之四十之預付款。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s2-mc-126","type":"single","question":"機關辦理委託印刷裝訂勞務採購，因屬經常性採購，採選擇性招標方式辦理建立合格廠商名單，其於辦理廠商資格審查之文件中預先載明之後續邀標方式，下列何者錯誤？","options":["個別邀請所有符合資格之廠商投標。","依辦理廠商資格審查文件所標示之邀請順序，依序邀請符合資格之廠商投標。","以抽籤方式擇定邀請符合資格之廠商投標。","以廠商之資本額多寡決定邀請之次數。"],"answer":"以廠商之資本額多寡決定邀請之次數。","laws":[]},{"id":"s2-mc-127","type":"single","question":"下列何種情形適用政府採購法？","options":["農會以自有財源辦理勞務採購。","機關辦理冷凍肉品採購。","國立台灣大學向其實驗林管理處茶園採購茶葉。","以上皆非。"],"answer":"機關辦理冷凍肉品採購。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s2-mc-128","type":"single","question":"機關依採購法第22條第1項第11款及機關指定地區採購房地產作業辦法辦理房地產之勘選，下列何者為非？","options":["不論採購金額大小，無須於招標前報上級機關核准。","如招標文件已訂明決標之固定金額者，則以該金額決標，並得免除議價程序。","如欲採行協商措施，應預先於招標文件標示得更改之項目。","投標廠商家數無限制，縱僅1家廠商投標亦可開標。"],"answer":"如招標文件已訂明決標之固定金額者，則以該金額決標，並得免除議價程序。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s2-mc-129","type":"single","question":"某機關擬委託廠商提供清潔服務，預算編列1年為80萬元，並於招標公告及招標文件敘明履約情形良好者，將依採購法第22條第1項第7款續約1年。經向廠商詢價1年約需70萬元。請問採購金額為何？","options":["80萬元。","70萬元。","140萬元。","160萬元。"],"answer":"160萬元。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s2-mc-130","type":"single","question":"機關採選擇性招標建立合格廠商名單方式辦理清潔勞務採購，其預先辦理廠商資格審查，名單有效期為2年，每年預算為200萬元。本次資格標審查之採購金額應認定為何？","options":["50萬元。","100萬元。","200萬元。","400萬元。"],"answer":"400萬元。","laws":[]},{"id":"s2-mc-131","type":"single","question":"公務機關依政府採購法第105條第1項第3款提供財物或勞務予其他機關之年度總額達巨額採購金額，且占該公務機關年收入之多少比例以上者，其上級機關應檢討該公務機關年度內提供財物或勞務予其他機關之成本效益？","options":["10%。","20%。","30%。","50%。"],"answer":"50%。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s2-mc-132","type":"single","question":"依政府採購法規定，下列何種情形未明定須報經機關首長或其授權人員核准（定）？","options":["未達查核金額採購之減價收受。","底價之訂定。","公開招標第一次流標，第二次招標得不受三家合格廠商家數之限制。","原訂驗收日期之延期。"],"answer":"公開招標第一次流標，第二次招標得不受三家合格廠商家數之限制。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s2-mc-133","type":"single","question":"機關利用共同供應契約訂購電腦主機20台，契約載明可附加訂購相關配備，以下何者非屬可附加訂購之採購標的(15萬元以下)？","options":["20個電腦滑鼠。","10個電腦鍵盤。","15個桌上型擴音設備。","25個照明燈具。"],"answer":"25個照明燈具。","laws":[]},{"id":"s2-mc-134","type":"single","question":"訂約機關辦理共同供應契約，其採分項複數決標者，以下何者為非？","options":["就不同項次標的分別訂定單筆訂購金額或數量之合理上限。不另訂定大量訂購優惠條款。","限制得標廠商家數，以促進價格競爭。","招標文件得訂明如投標廠商同意跟進最低決標價格時，均得併列為得標廠商。","應符合採購法第52條第1項第4款規定之競標精神。"],"answer":"招標文件得訂明如投標廠商同意跟進最低決標價格時，均得併列為得標廠商。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s2-mc-135","type":"single","question":"機關利用共同供應契約辦理採購，其單筆訂購金額或數量如已逾契約所定訂購金額或數量之上限，機關應如何處理？","options":["由機關自行依採購法規定辦理採購。","可採分次訂購，以免逾契約之訂購上限。","於徵得廠商同意後，仍得訂購高於契約採購上限之金額或數量。","於徵得訂約機關同意後，仍得訂購高於契約採購上限之金額或數量。"],"answer":"由機關自行依採購法規定辦理採購。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s2-mc-136","type":"single","question":"政府採購法主管機關指定行政院人事行政總處辦理英語線上訓練共同供應契約，該處再洽臺灣銀行採購部代辦採購，其簽訂共同供應契約之適用機關範圍為？","options":["全國機關 。","中央機關。","公共工程委員會及其所屬機關 。","人事行政總處及其所屬機關。"],"answer":"中央機關。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s2-mc-137","type":"single","question":"機關辦理採購，下列敘述何者正確？","options":["採購法第45條所稱開標，指開啟廠商投標文件之價格標封。","招標文件規定開標時投標廠商之負責人未出席者，投標無效。","機關辦理第1次公開招標，有3家以上廠商投標即可開標。","機關於招標文件規定投標廠商出席開標之人數不逾2人。"],"answer":"機關於招標文件規定投標廠商出席開標之人數不逾2人。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s2-mc-138","type":"single","question":"勞務性質採購，下列敘述何者正確？","options":["不得依「共同投標辦法」規定辦理採購。","得依「統包實施辦法」規定辦理採購。","得依「替代方案實施辦法」規定辦理採購。","不得依「最有利標評選辦法」規定辦理採購。"],"answer":"得依「替代方案實施辦法」規定辦理採購。","laws":[{"name":"最有利標評選辦法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030080"}]},{"id":"s2-mc-139","type":"single","question":"機關依政府採購法第22條第1項第13款委外辦理學術研究發展，下列敘述何者錯誤？","options":["得逕邀在專業領域具領先地位之自然人，並以該自然人為計畫主持人。","得委託經公告審查優勝之學術或非營利機構。","成立審查委員會辦理審查，適用採購評選委員會組織準則及審議規則之規定。","計畫書經審查通過後，再辦理議價。"],"answer":"成立審查委員會辦理審查，適用採購評選委員會組織準則及審議規則之規定。","laws":[{"name":"採購評選委員會組織準則","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030103"},{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s2-mc-140","type":"single","question":"下列招標方式之開標，何者無廠商家數之限制？","options":["第1次公開招標。","選擇性招標建立經常性採購合格廠商名單。","公開取得書面報價或企劃書。","限制性招標經公開評選。"],"answer":"限制性招標經公開評選。","laws":[]},{"id":"s2-mc-141","type":"single","question":"機關採公開招標不分段開標最低標得標，應於開標現場宣布之事項，下列何者為非？","options":["投標廠商之名稱或代號。","投標廠商之家數。","投標廠商之標價。","投標廠商之出席代表姓名。"],"answer":"投標廠商之出席代表姓名。","laws":[]},{"id":"s2-mc-142","type":"single","question":"國營銀行為利執行存款業務之現金運送需要，辦理保全（警衛勤務）勞務採購案，下列何者為非？","options":["為利個案需要，契約載明保全人員之年齡、身高及體重條件，尚無不可。","履約期間3年，得以第1年預算金額訂定資格條件。","招標文件得允許免收押標金或保證金，惟如認有需要亦可收取。","應符合勞動法令合理編列預算，以保障勞工權益。"],"answer":"為利個案需要，契約載明保全人員之年齡、身高及體重條件，尚無不可。","laws":[]}]},{"id":"s3","title":"最有利標及評選優勝廠商","questions":[{"id":"s3-mc-1","type":"single","question":"機關依採購法第56條第1項及第57條採行協商措施者，下列敘述何者錯誤？","options":["應就所有合於招標文件規定之投標廠商分別協商。","評選委員會辦理第2次綜合評選時，其未參與第1次綜合評選之委員，不得參與。","不論廠商投標文件內容是否因協商而更改，評選委員會辦理第2次綜合評選，應就全部評選項目重行評分（比），以評定最有利標。","原招標文件已標示得更改項目之內容，始得納入協商。"],"answer":"不論廠商投標文件內容是否因協商而更改，評選委員會辦理第2次綜合評選，應就全部評選項目重行評分（比），以評定最有利標。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s3-mc-2","type":"single","question":"採購評選委員有下列何種情形，應即辭職或予以解聘？","options":["委員之配偶與受評選之廠商3年內曾有委任關係。","機關認為委員不能公正執行職務。","採購案件涉及共同生活家屬之利益。","以上皆是。"],"answer":"以上皆是。","laws":[]},{"id":"s3-mc-3","type":"single","question":"下列關於協商措施之敘述，何者錯誤？","options":["評選結果無法評定最有利標，如原招標文件未標示得協商更改之項目者，不得採行協商措施，應予廢標。","評選委員會辦理第2次綜合評選時，其未參與第1次綜合評選之委員，不得參與。","協商程序應以召開會議方式為之，不得僅以書面方式辦理。","採行協商措施時，應平等對待所有合於招標文件規定之投標廠商。"],"answer":"協商程序應以召開會議方式為之，不得僅以書面方式辦理。","laws":[]},{"id":"s3-mc-4","type":"single","question":"未達公告金額之採購案，依採購法第22條第1項第9款及第10款辦理者，下列何者正確？","options":["應報上級機關核准。","等標期設定為5天。","第1次招標，必須有3家以上合格廠商始可開標。","應刊登政府採購公報及成立採購評選委員會。"],"answer":"應刊登政府採購公報及成立採購評選委員會。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s3-mc-5","type":"single","question":"機關於評選後，應彙整製作總表，由參與評選全體委員簽名/蓋章，載明下列事項，何者不正確？","options":["採購案。","各受評廠商名稱及標價。","本委員會全部委員姓名、職業、評選優勝廠商及出席委員姓名。","各出席委員對於各受評廠商之評分或序位評比結果，應標示各出席委員姓名，不得以代號代之。"],"answer":"各出席委員對於各受評廠商之評分或序位評比結果，應標示各出席委員姓名，不得以代號代之。","laws":[]},{"id":"s3-mc-6","type":"single","question":"機關依採購法第22條第1項第9款規定以經公開評選之限制性招標辦理專業服務之評選優勝者，下列敘述何者正確？","options":["應先報經上級機關核准。","須與優勝廠商辦理（依序）議價後決標，惟如已於招標文件訂明決標之固定金額或費率者，則以該金額或費率決標，免議價程序。","應成立採購評選委員會。","不適用於未達公告金額之採購。"],"answer":"應成立採購評選委員會。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s3-mc-7","type":"single","question":"採購評選委員會之任務，何者不正確？","options":["訂定或審定招標文件之評選項目、評審標準及評定方式。","辦理廠商評選。","協助機關解釋與評審標準、評選過程或評選結果有關之事項。","協助機關辦理廠商資格審查。"],"answer":"協助機關辦理廠商資格審查。","laws":[]},{"id":"s3-mc-8","type":"single","question":"下列採行協商措施之行為，何者有誤？","options":["與廠商個別進行協商，不合併處理。","執行保密措施。","將協商廠商投標文件優缺點及評分，告知其他廠商。","作成協商紀錄。"],"answer":"將協商廠商投標文件優缺點及評分，告知其他廠商。","laws":[]},{"id":"s3-mc-9","type":"single","question":"下列何者非屬機關採最有利標決標之必要事項？","options":["綜合評選。","訂定底價。","成立採購評選委員會。","採購評選委員會委員自接獲評選有關資料之時起，不得就該採購案參加投標、作為投標廠商之分包廠商或擔任工作成員。其有違反者，機關應不決標予該廠商。"],"answer":"訂定底價。","laws":[]},{"id":"s3-mc-10","type":"single","question":"機關採最有利標決標，對於受評廠商之資料，下列何者有誤？","options":["評選後仍應保守秘密。","得標廠商受評選之樣品或模型，得於決標後公開。","未得標廠商之樣品或模型，得於決標後發還。","所有受評選廠商之樣品或模型，應於決標後公開。"],"answer":"所有受評選廠商之樣品或模型，應於決標後公開。","laws":[]},{"id":"s3-mc-11","type":"single","question":"機關採最有利標決標，訂有底價，而廠商報價逾底價須減價者，其洽減時機，下列何者正確？","options":["辦理評選前。","評定最有利標後議價前。","採行協商措施時。","評定最有利標後決標前。"],"answer":"採行協商措施時。","laws":[]},{"id":"s3-mc-12","type":"single","question":"下列何者非屬採最有利標決標之用詞？","options":["協商。","評審委員會。","評審標準。","計數之綜合評選。"],"answer":"評審委員會。","laws":[]},{"id":"s3-mc-13","type":"single","question":"採最有利標決標者，下列何者有誤？","options":["廠商簡報及現場詢答，應與評選項目有關。","廠商簡報不得更改廠商投標文件內容。","投標廠商未出席簡報及現場詢答者，其投標文件無效。","廠商於簡報時另外提出變更或補充資料者，該資料應不納入評選。"],"answer":"投標廠商未出席簡報及現場詢答者，其投標文件無效。","laws":[]},{"id":"s3-mc-14","type":"single","question":"採總評分法評定最有利標者，下列何者有誤？","options":["價格納入評分，以總評分最高，且經機關首長或評選委員會過半數之決定者為最有利標。","價格不納入評分，考量廠商之總評分，以經機關首長或評選委員會過半數決定最優者為最有利標。","招標文件載明之固定價格給付，以總評分最高，且經機關首長或評選委員會過半數之決定者為最有利標。","價格不納入評分，綜合考量廠商之總評分及價格，以整體表現經機關首長或評選委員會過半數決定最優者為最有利標。"],"answer":"價格不納入評分，考量廠商之總評分，以經機關首長或評選委員會過半數決定最優者為最有利標。","laws":[]},{"id":"s3-mc-15","type":"single","question":"採購評選委員會委員自何時起，不得就該採購案參加投標、作為投標廠商之分包廠商或擔任工作成員？","options":["接獲評選有關資料之時起。","截止投標之時起。","開標之時起。","召開評選會議之時起。"],"answer":"接獲評選有關資料之時起。","laws":[]},{"id":"s3-mc-16","type":"single","question":"評定最有利標涉及評分者，下列何者有誤？","options":["招標文件應載明各評選項目之配分。","個別子項不合格即不得作為協商對象者，個別子項不合格之情形，招標文件應載明。","招標文件應載明總滿分及其合格分數，或各評選項目之合格分數。","招標文件應載明總滿分及其合格分數，及各評選項目之合格分數。"],"answer":"招標文件應載明總滿分及其合格分數，及各評選項目之合格分數。","laws":[]},{"id":"s3-mc-17","type":"single","question":"評選最有利標，下列何者正確？","options":["投標廠商未出席簡報及現場詢答者，其投標文件無效。","將廠商簡報及現場詢答列為評選項目，所占配分為25%。","廠商得利用簡報機會更改廠商投標文件內容。","廠商利用簡報另外提出補充資料者，該資料應不納入評選。"],"answer":"廠商利用簡報另外提出補充資料者，該資料應不納入評選。","laws":[]},{"id":"s3-mc-18","type":"single","question":"辦理最有利標，將廠商簡報及現場詢答列為評選項目者，所占配分或權重不得逾何比率？","options":["百分之十。","百分之二十。","百分之五十。","無強制規定。"],"answer":"百分之二十。","laws":[]},{"id":"s3-mc-19","type":"single","question":"機關依採購法第22條第1項第10款規定辦理招標，下列何者正確？","options":["應依採購法第94條成立採購評選委員會。","限工程採購。","招標文件不得訂明固定金額或費率。","由廠商自行報價者，價格不應納入評選範圍。"],"answer":"應依採購法第94條成立採購評選委員會。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s3-mc-20","type":"single","question":"機關採最有利標決標者，下列敘述何者不是採購法之規定？","options":["招標前應先報經上級機關核准。","比減價格。","招標文件規定評審標準。","依機關首長或評選委員會過半數之決定評定最有利標。"],"answer":"比減價格。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s3-mc-21","type":"single","question":"機關依採購法第22條規定，以「準用最有利標決標方式」辦理招標，第1次開標幾家以上合格廠商投標，方可開標？","options":["2家。","3家。","4家。","1家。"],"answer":"1家。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s3-mc-22","type":"single","question":"採購評選委員會委員對於會議之決議有不同意見者，如要求將不同意見載入會議紀錄或將意見書附於會議紀錄，以備查考時，採購評選委員會應如何處理？","options":["可以拒絕。","應提付評選委員會議決定是否拒絕。","不得拒絕。","由主席決定是否拒絕。"],"answer":"不得拒絕。","laws":[]},{"id":"s3-mc-23","type":"single","question":"評選最有利標，如招標文件規定廠商須簡報及現場詢答而有廠商未出席者，下列敘述何者正確？","options":["該廠商所投之標不予開標，列為無效標。","該廠商所投之標不予評選，列為不合格標。","不影響該廠商投標文件之有效性。","以上皆非。"],"answer":"不影響該廠商投標文件之有效性。","laws":[]},{"id":"s3-mc-24","type":"single","question":"依採購法規定，下列有關採購評選委員會之敘述，何者錯誤？","options":["召集人、副召集人均為委員。","召集人應由機關首長或其授權人員指定機關內部人員擔任。","委員會會議，由召集人召集之，並為主席。","召集人未能出席或因故出缺時，由副召集人代理之。"],"answer":"召集人應由機關首長或其授權人員指定機關內部人員擔任。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s3-mc-25","type":"single","question":"下列何者屬最有利標錯誤行為態樣？","options":["出席之評選委員遲到早退，未全程參與，或由他人代理。","評選時允許廠商於簡報時更改投標文件內容。","評選委員會於評選時，任意變更招標文件之評選規定。","以上皆是。"],"answer":"以上皆是。","laws":[]},{"id":"s3-mc-26","type":"single","question":"依採購法規定，下列有關廠商簡報及現場詢答之敘述，何者錯誤？","options":["係為利評選委員對廠商於各評選項目之表現為更深入之瞭解。","其列為評選項目者，所占配分或權重不得逾百分之二十。","投標廠商未出席簡報及現場詢答者，即不得作為協商或決標對象。","簡報不得更改廠商投標文件內容。"],"answer":"投標廠商未出席簡報及現場詢答者，即不得作為協商或決標對象。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s3-mc-27","type":"single","question":"依採購法規定，下列有關採總評分法評定最有利標之敘述，何者錯誤？","options":["應於招標文件載明各評選項目之配分。其子項有配分者，亦應載明。","得於招標文件載明個別子項不合格即不得作為協商對象。","如有分階段辦理評選及淘汰不合格廠商之評定方式者，以2階段為原則。","如已於招標文件訂明固定費用者，仍得規定廠商於投標文件內詳列組成該費用之內容，惟不得納入評選。"],"answer":"如已於招標文件訂明固定費用者，仍得規定廠商於投標文件內詳列組成該費用之內容，惟不得納入評選。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s3-mc-28","type":"single","question":"下列何種採購不適用採購法第22條第1項第9款及第10款評選優勝廠商之評選規定？","options":["專業服務。","統包工程。","設計競賽。","資訊服務。"],"answer":"統包工程。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s3-mc-29","type":"single","question":"機關為辦理下列事項，何者免成立採購評選委員會？","options":["採購法第22條第1項第9款規定之評選優勝者。","採購法第22條第1項第10款規定之評選優勝者。","採購法第22條第1項第11款規定辦理房地產之勘選認定適合需要者。","採購法第56條規定之評定最有利標。"],"answer":"採購法第22條第1項第11款規定辦理房地產之勘選認定適合需要者。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s3-mc-30","type":"single","question":"機關依「中央機關未達公告金額採購招標辦法」第2條第1項第3款規定，公開取得書面報價或企劃書，採用最有利標之精神，擇最符合需要者議價。下列何者不正確？","options":["應依採購法第94條成立採購評選委員會。","限採購金額未達新臺幣150萬元之採購。","招標文件得訂明固定金額或費率。","第1次公告，其等標期至少應有5日，必要時應延長之。"],"answer":"應依採購法第94條成立採購評選委員會。","laws":[{"name":"中央機關未達公告金額採購招標辦法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030067"},{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s3-mc-31","type":"single","question":"下列何者有誤？","options":["協商係針對原招標文件已標示得更改項目之內容。","協商係針對評選第1名之廠商。","協商結束後，應予廠商依據協商結果，於一定期間內修改投標文件重行遞送之機會。","招標文件未標示得採協商措施者，不得採行。"],"answer":"協商係針對評選第1名之廠商。","laws":[]},{"id":"s3-mc-32","type":"single","question":"採購評選委員會辦理評選，下列何者有誤？","options":["委員無法親自辦理評選及出席會議，得覓代理出席。","機關於委員評選後，應彙整製作總表，載明採購案名稱、參與評選委員姓名、受評廠商名稱、各出席委員對於各受評廠商之評選結果及總評選結果，由參與評選全體委員簽名或蓋章。","最後1次會議紀錄應於當次會議結束前作成並予確認。","委員認有調查或實地勘驗之必要時，得經委員會決議後實施調查或勘驗。"],"answer":"委員無法親自辦理評選及出席會議，得覓代理出席。","laws":[]},{"id":"s3-mc-33","type":"single","question":"評定最有利標涉及評分者，下列何者不是招標文件應載明事項？","options":["總滿分及其合格分數，或各評選項目之合格分數。","總評分合格者之第1名即為最有利標。","總評分不合格者，不得作為協商對象或最有利標。","各評選項目之配分。其子項有配分者，亦應載明。"],"answer":"總評分合格者之第1名即為最有利標。","laws":[]},{"id":"s3-mc-34","type":"single","question":"機關依採購法第22條第1
