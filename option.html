wer":"公開招標採分段開標者，其底價至遲應於第2階段價格標開標前定之。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s8-mc-26","type":"single","question":"機關採準用最有利標辦理評選優勝廠商，下列何者為非？","options":["如採訂定底價者，底價得於開標前由採購評選委員會訂定之。","廠商標價合理者，可考慮照價訂底價，照價決標。","廠商之報價應納入評選考量。","如採訂定底價者，對於不同優勝序位之廠商，應訂定不同之底價。"],"answer":"如採訂定底價者，底價得於開標前由採購評選委員會訂定之。","laws":[]},{"id":"s8-mc-27","type":"single","question":"廢標後重行招標，有關底價之訂定，下列何者不適法？","options":["如原訂底價尚在保密之中，是否重訂底價，由機關首長或其授權人員決定。","如原訂底價尚在保密之中，是否重訂底價，由開標主持人決定。","如招標之圖說、規範、契約、成本、市場行情等有所改變，應重行訂定底價。","以上皆非。"],"answer":"如原訂底價尚在保密之中，是否重訂底價，由開標主持人決定。","laws":[]},{"id":"s8-mc-28","type":"single","question":"機關辦理公開客觀評選優勝廠商，採不分段開標方式，有關廠商價格標之開啟時機，下列敘述何者正確？","options":["議價時開啟。","評選後議價前開啟。","召開評選會議時開啟。","依招標文件所定開標時間開啟。"],"answer":"依招標文件所定開標時間開啟。","laws":[]},{"id":"s8-mc-29","type":"single","question":"一般採購案（即無特殊情形者），其底價應於何時公開？","options":["開標後。","決標後。","廢標後。","流標後。"],"answer":"決標後。","laws":[]},{"id":"s8-mc-30","type":"single","question":"以下何者訂定底價前應參考廠商報價（新臺幣，下同）？","options":["300萬元工程採購之第2次公開招標。","500萬元工程採購之第1次公開招標。","200萬元財物採購之限制性招標洽原得標廠商後續擴充採購。","300萬元財物採購之第1次選擇性招標。"],"answer":"200萬元財物採購之限制性招標洽原得標廠商後續擴充採購。","laws":[]},{"id":"s8-mc-31","type":"single","question":"下述有關底價之敘述，何者正確？","options":["公開招標採分段開標者，底價應於價格標開標前定之。","開標後發現底價訂定有誤，得重訂底價。","標價偏低情形，廠商表示願繳納差額保證金時，機關得告知廠商底價金額。","預先於招標文件公告底價。"],"answer":"預先於招標文件公告底價。","laws":[]},{"id":"s8-mc-32","type":"single","question":"下列敘述何者正確？","options":["機關採未訂底價之最低標辦理採購且設有評審委員會者，應先審查合於招標文件規定之最低標價後，對標價合理者，評審委員會得不提出建議金額。","第1次公開招標未達3家流標後重新招標，底價不得重訂。","第1次公開招標超底價廢標後重新招標，重訂底價時不得調高。","查核金額以上之底價報上級機關核准。"],"answer":"機關採未訂底價之最低標辦理採購且設有評審委員會者，應先審查合於招標文件規定之最低標價後，對標價合理者，評審委員會得不提出建議金額。","laws":[]},{"id":"s8-mc-33","type":"single","question":"機關依「中央機關未達公告金額採購招標辦法」第2條第3項規定，於公告或招標文件中訂明開標時間地點，並於開標後當場審查，逕行辦理決標，下列敘述何者錯誤？","options":["第1次開標前，訂定底價時應先參考廠商之報價或估價單。","如已先簽准改採限制性招標之議價者，訂定底價時應先參考廠商之報價。","機關得選擇不刊登政府採購公報。","履約地點位於原住民族地區者，應符合原住民族工作權保障法之規定。"],"answer":"第1次開標前，訂定底價時應先參考廠商之報價或估價單。","laws":[{"name":"中央機關未達公告金額採購招標辦法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030067"}]},{"id":"s8-mc-34","type":"single","question":"機關辦理最低標決標案件，開標後最低標廠商之標價未進入底價，最低標廠商當場表示放棄優先減價，則該廠商得否參與後續比減價？","options":["不得。","得。","經其他廠商同意後仍得。","視為放棄。"],"answer":"得。","laws":[]},{"id":"s8-mc-35","type":"single","question":"依採購法，下列何者有誤？","options":["訂定底價確有困難之特殊或複雜案件，得不訂底價。但應於招標文件內敘明理由及決標條件與原則。","最有利標決標之案件，可將履約期程之長短訂為評選項目。","適用最有利標決標之案件，評分最高之廠商有優先減價之權利。","不訂底價以最有利標決標之採購，得規定廠商於投標文件內詳列報價內容。"],"answer":"適用最有利標決標之案件，評分最高之廠商有優先減價之權利。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s8-mc-36","type":"single","question":"下列敘述何者錯誤？","options":["採單價決標者，依預估採購所需金額認定採購金額。","預計金額小於或等於預算金額。","預計金額為該採購之預估決標金額，其性質類似底價，應由機關首長或其授權人員核定後公告。","預算案尚未經立法程序，亦得附條件先行辦理招標。"],"answer":"預計金額為該採購之預估決標金額，其性質類似底價，應由機關首長或其授權人員核定後公告。","laws":[]},{"id":"s8-mc-37","type":"single","question":"未訂底價之採購，評審委員會所提出建議之金額，下列敘述何者正確？","options":["屬開標前訂定建議之金額。","標價合理者，評審委員會得不提出建議之金額。","審查資格後由評審委員會提出建議之金額。","機關有緊急需求時，得超建議之金額決標。"],"answer":"標價合理者，評審委員會得不提出建議之金額。","laws":[]},{"id":"s8-mc-38","type":"single","question":"依採購法，下列何者有誤？","options":["不是所有工程都須於決標日起30日內依規定格式傳輸至工程價格資料庫。","採購法第11條第2項所稱一定金額，為新臺幣1,000萬元。","工程價格資料庫係供各機關採購預算編列及底價訂定之參考。","工程價格資料庫，除應秘密之部分外，得有償提供廠商。"],"answer":"工程價格資料庫，除應秘密之部分外，得有償提供廠商。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s8-mc-39","type":"single","question":"機關依採購法第11條第2項規定傳輸之資料，下列何者有誤？","options":["其屬統包者，為得標廠商完成細部設計後，經機關核定之單價。","其內容包括得標廠商之契約單價及經機關核定之預算單價。","機關應於決標日起20日內，將資料製作成公共工程電腦估價系統格式電子檔，並透過政府電子採購網站傳輸至工程價格資料庫。","傳輸資料應依主管機關訂定之「公共工程施工綱要規範細目碼編訂原則」編訂。"],"answer":"機關應於決標日起20日內，將資料製作成公共工程電腦估價系統格式電子檔，並透過政府電子採購網站傳輸至工程價格資料庫。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s8-mc-40","type":"single","question":"下列何者錯誤？","options":["除限制性招標議價外，底價係未見廠商報價前預估成本及競爭等情形所訂定決標之底限。","最有利標於評選時參考廠商提出之報價內容進行分析評分或評比。","底價應依圖說、規範、契約並考量成本、市場行情及政府機關決標資料逐項編列。","為提升議價效率，機關得於廠商議價過程中建議廠商減至底價。"],"answer":"為提升議價效率，機關得於廠商議價過程中建議廠商減至底價。","laws":[]},{"id":"s8-mc-41","type":"single","question":"招標機關辦理採購，以最有利標決標，故不訂底價，下列何種敘述為不正確？","options":["未違反採購法第47條之規定。","規定廠商於投標文件中詳列報價內容。","招標文件無需載明評選項目。","得依招標文件規定採行協商措施以便洽廠商更改投標文件內容。"],"answer":"招標文件無需載明評選項目。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s8-mc-42","type":"single","question":"採固定價格評選優勝廠商，為避免廠商產生超額利潤並維護招標機關權益，下列何者應納入評分項目？","options":["價格。","標的之功能、效益。","品質的可靠度。","廠商提出與採購標的相關之創意事項。"],"answer":"廠商提出與採購標的相關之創意事項。","laws":[]},{"id":"s8-mc-43","type":"single","question":"依採購法，下列何者有誤？","options":["機關於第1次比減價格前，應宣布最低標廠商減價結果。","最低標廠商優先減價時得書面表示減至底價。","第2次以後比減價格前，應宣布前一次比減價格之最低標價。","機關得限制廠商比減價格之次數為2次。"],"answer":"最低標廠商優先減價時得書面表示減至底價。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s8-mc-44","type":"single","question":"機關辦公傢俱招標案，依採購法規定採最低標決標，最低標廠商標價為新臺幣（下同）410萬元，低於底價600萬元，機關認為廠商提出之說明尚非完全合理，關於差額保證金之通知，下列何者正確？","options":["不通知該廠商提出。","通知該廠商繳納10萬元。","通知該廠商繳納70萬元。","通知該廠商繳納190萬元。"],"answer":"不通知該廠商提出。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]}]},{"id":"s9","title":"政府採購法之爭議處理","questions":[{"id":"s9-mc-1","type":"single","question":"依政府採購法，下列何者有誤：","options":["申訴審議判斷指明原採購行為違反法令者，招標機關應自收受審議判斷書之次日起20日內另為適法之處置。","申訴審議判斷指明原採購行為違反法令者，廠商得向招標機關請求償付其準備投標、異議及申訴所支出之必要費用。","申訴提出後，廠商得於審議判斷送達前撤回之。","申訴經撤回後，得再行提出同一之申訴。"],"answer":"申訴經撤回後，得再行提出同一之申訴。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s9-mc-2","type":"single","question":"廠商對於採購之過程、結果提出異議者，為接獲機關通知或機關公告之次日起：","options":["15日。","20日。","7日。","10日。"],"answer":"10日。","laws":[]},{"id":"s9-mc-3","type":"single","question":"申訴廠商於第1次預審會議期日前撤回採購申訴者，所繳審議費？","options":["不予退還。","無息退還二分之一。","無息退還三分之一。","無息退還全部。"],"answer":"無息退還二分之一。","laws":[]},{"id":"s9-mc-4","type":"single","question":"就採購履約爭議調解，下列何者為正確？","options":["調解程序以不公開為原則。","調解過程中，採購程序應暫停。","機關得拒絕廠商申請之調解。","機關申請調解，無需經廠商同意。"],"answer":"調解程序以不公開為原則。","laws":[]},{"id":"s9-mc-5","type":"single","question":"下列何者非採購調解事件應不予受理之事由：","options":["當事人不適格。","已提起仲裁、申請調解或民事訴訟。","他造當事人拒絕繳納調解費。","非屬政府採購事件。"],"answer":"他造當事人拒絕繳納調解費。","laws":[]},{"id":"s9-mc-6","type":"single","question":"廠商與臺北市政府工務局自辦之採購案件產生採購履約爭議時，得向：","options":["臺北市政府採購申訴審議委員會申請調解。","行政院公共工程委員會採購申訴審議委員會申訴。","臺北市政府採購申訴審議委員會申訴。","行政院公共工程委員會採購申訴審議委員會申請調解。"],"answer":"臺北市政府採購申訴審議委員會申請調解。","laws":[]},{"id":"s9-mc-7","type":"single","question":"機關辦理採購，下列何者為非？","options":["申訴事件，在為實體審查前，應先繳納審議費用。","關於招標文件之申訴事件，未投標之廠商亦得提出。","申訴事件，應先為實體審查，其無不受理之情形者，再為程序審查。","廠商誤向非管轄之機關申訴者，以該機關收受之日，視為提起申訴之日。"],"answer":"申訴事件，應先為實體審查，其無不受理之情形者，再為程序審查。","laws":[]},{"id":"s9-mc-8","type":"single","question":"採購申訴事件之代理人就其受委任事件，有為一切申訴行為之權。但下列何事項，非受特別委任，不得為之：","options":["撰寫申訴書。","撤回申訴。","出席預審會議。","代收審議判斷書。"],"answer":"撤回申訴。","laws":[]},{"id":"s9-mc-9","type":"single","question":"廠商或機關向採購申訴審議委員會申請履約爭議調解時，其調解標的金額為新臺幣（下同）5億元以上者，應繳納調解費：","options":["10萬元。","20萬元。","35萬元。","100萬元。"],"answer":"100萬元。","laws":[]},{"id":"s9-mc-10","type":"single","question":"目前臺東縣政府未設採購申訴審議委員會，對於臺東縣政府所屬之機關、學校自辦之採購如發生爭議，臺東縣政府得如何處理？","options":["委請臺北市政府採購申訴審議委員會處理。","委請政府採購法主管機關所設之採購申訴審議委員會處理。","委請高雄市政府採購申訴審議委員會處理。","由臺東縣議會處理。"],"answer":"委請政府採購法主管機關所設之採購申訴審議委員會處理。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s9-mc-11","type":"single","question":"機關申請調解，廠商不同意調解時，採購申訴審議委員會應如何處理？","options":["不受理。","駁回。","視同未提出申請。","請其撤回。"],"answer":"不受理。","laws":[]},{"id":"s9-mc-12","type":"single","question":"申訴審議委員會就調解事件進行程序審查時，如發現申請人委託律師提出調解而未檢具委任狀時，應：","options":["逕不予受理。","駁回。","命其補正。","退件。"],"answer":"命其補正。","laws":[]},{"id":"s9-mc-13","type":"single","question":"採購申訴審議委員會之決議，應有多少以上委員出席，出席委員過半數同意行之？","options":["四分之一。","三分之一。","二分之一。","三分之二。"],"answer":"二分之一。","laws":[]},{"id":"s9-mc-14","type":"single","question":"政府採購之調解應自收受調解申請書之次日起多久期間內完成調解程序。但經雙方同意延長者，得延長之？","options":["4個月。","3個月。","2個月。","6個月。"],"answer":"4個月。","laws":[]},{"id":"s9-mc-15","type":"single","question":"對於政府採購，下列何者敘述為不正確？","options":["採購申訴得僅就書面審議。","申訴提出後，廠商得於審議判斷送達前撤回。","調解屬廠商申請者，機關不得拒絕。","廠商對於驗收爭議得提出異議、申訴。"],"answer":"廠商對於驗收爭議得提出異議、申訴。","laws":[]},{"id":"s9-mc-16","type":"single","question":"依政府採購法調解成立，其調解成立書性質：","options":["視同訴願決定。","與確定判決有同一效力。","不具強制執行名義。","視同法院判決。"],"answer":"與確定判決有同一效力。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s9-mc-17","type":"single","question":"機關與廠商因採購履約爭議未能達成協議者，得向採購申訴審議委員會申請：","options":["申訴。","仲裁。","調解。","訴訟。"],"answer":"調解。","laws":[]},{"id":"s9-mc-18","type":"single","question":"有關政府採購法第101條之申訴案，廠商不服申訴審議判斷之結果者，得於審議判斷書送達之次日起2個月內，向：","options":["行政法院提起行政訴訟。","所轄之地方法院提起民事訴訟。","所轄之高等法院提起民事訴訟。","招標機關之上級機關提起訴願。"],"answer":"行政法院提起行政訴訟。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s9-mc-19","type":"single","question":"廠商對於招標文件異議之處理結果不服，或招標機關逾規定期限不為處理者，得向採購申訴審議委員會申訴之門檻為：","options":["公告金額以上。","查核金額以上。","不論金額大小。","公告金額十分之一以上。"],"answer":"公告金額以上。","laws":[]},{"id":"s9-mc-20","type":"single","question":"政府採購申訴案件經審議判斷指明原採購行為違反法令者，廠商得向招標機關請求償付？","options":["準備投標、異議及申訴所支出之必要費用。","所失利益。","押標金。","另行訴訟之費用。"],"answer":"準備投標、異議及申訴所支出之必要費用。","laws":[]},{"id":"s9-mc-21","type":"single","question":"採購申訴審議委員會委員之人數依法為？","options":["5人至17人。","7人至35人。","沒有明文規定。","以上皆是。"],"answer":"7人至35人。","laws":[]},{"id":"s9-mc-22","type":"single","question":"依法不得設立採購申訴審議委員會之機關為：","options":["政府採購法之主管機關。","直轄市政府。","縣（市）政府。","鄉公所。"],"answer":"鄉公所。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s9-mc-23","type":"single","question":"政府採購申訴案件每一案件之收費（新臺幣）為？","options":["5萬元。","3萬元。","依個案認定。","不用收費。"],"answer":"3萬元。","laws":[]},{"id":"s9-mc-24","type":"single","question":"廠商於等標期內向招標機關提出異議，如仍不服該異議處理結果，應於接獲招標機關異議處理結果幾日內，向採購申訴審議委員會提出申訴：","options":["15天。","20天。","10天。","沒有限制。"],"answer":"15天。","laws":[]},{"id":"s9-mc-25","type":"single","question":"有關政府採購之申訴，下列何者為非？","options":["自收受異議處理結果之次日起15日內提出。","應具申訴書，並由申訴廠商簽名或蓋章。","申訴審議判斷，視同訴願決定。","申訴之提起，以申訴廠商寄出申訴書之日為準。"],"answer":"申訴之提起，以申訴廠商寄出申訴書之日為準。","laws":[]},{"id":"s9-mc-26","type":"single","question":"政府採購之異議，招標機關應自收受廠商異議之次日起幾日內為適當之處理？","options":["10日。","15日。","20日。","1個月。"],"answer":"15日。","laws":[]},{"id":"s9-mc-27","type":"single","question":"政府採購法第75條及76條規定之異議、申訴程序，係在處理何種爭議：","options":["招標、審標、決標。","履約。","驗收。","保固 。"],"answer":"招標、審標、決標。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s9-mc-28","type":"single","question":"政府採購履約爭議調解程序，不適用廠商與機關何種爭議（下列何者為非）：","options":["招標、審標、決標。","履約。","驗收。","保固。"],"answer":"招標、審標、決標。","laws":[]},{"id":"s9-mc-29","type":"single","question":"廠商與機關之間因採購履約產生爭議，得選用下列何種方式解決爭議？","options":["訴訟。","仲裁。","向採購申訴審議委員會申請調解。","以上皆是。"],"answer":"以上皆是。","laws":[]},{"id":"s9-mc-30","type":"single","question":"採購申訴審議判斷之效力？","options":["視同確定判決。","視同訴願決定。","視同仲裁判斷。","視同調解成立書。"],"answer":"視同訴願決定。","laws":[]},{"id":"s9-mc-31","type":"single","question":"廠商誤向該管採購申訴審議委員會以外之機關申訴者，收受申訴書之機關應於收受之次日起幾日內將申訴書移送於該管採購申訴審議委員會，並通知申訴廠商？","options":["5日。","7日。","3日。","10日。"],"answer":"3日。","laws":[]},{"id":"s9-mc-32","type":"single","question":"依政府採購法，下列何者有誤：","options":["調解事件應自收受調解申請書之次日起4個月內完成調解程序。但經雙方同意延長者，得延長之。","對於政府採購法第102條規定之異議處理結果不服者，應申請調解。","已提起仲裁且在進行中之爭議不得向採購申訴審議委員會申請調解。","已提起訴訟且在進行中之爭議不得向採購申訴審議委員會申請調解。"],"answer":"對於政府採購法第102條規定之異議處理結果不服者，應申請調解。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s9-mc-33","type":"single","question":"依政府採購法，下列何者有誤？","options":["調解案之他造當事人應自收受調解申請書副本之次日起15日內，以書面向採購申訴審議委員會陳述意見，並副知申請人。","調解，以公開為原則。","就調解事件有法律上利害關係之第三人，調解委員得依職權審酌通知其參加調解程序。","申訴會於調解時，得囑託具專門知識經驗之機關、學校、團體或人員鑑定，並得邀請學者或專家諮詢。"],"answer":"調解，以公開為原則。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s9-mc-34","type":"single","question":"依政府採購法，下列何者正確：","options":["異議逾越法定期間者，應不予受理，並以書面通知提出異議之廠商。","異議逾越法定期間者，仍得予受理。","廠商誤向非管轄之機關提出異議者，該收文機關亦得就廠商之異議加以處理。","機關處理異議，不應給予異議廠商陳述意見之機會。"],"answer":"異議逾越法定期間者，應不予受理，並以書面通知提出異議之廠商。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s9-mc-35","type":"single","question":"依政府採購法，下列何者有誤：","options":["廠商提出申訴時，應繳納審議費，每一申訴事件為新臺幣3萬元。","招標機關自行依申訴廠商之請求，撤銷或變更其處理結果者，採購申訴審議委員會應作成申訴不受理之決議。","廠商提出申訴但拒繳納審議費，採購申訴審議委員會仍得受理。","申訴事件經審查無不受理之情形者，由採購申訴審議委員會主任委員指定委員1人至3人為預審委員，進行實體審查。"],"answer":"廠商提出申訴但拒繳納審議費，採購申訴審議委員會仍得受理。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s9-mc-36","type":"single","question":"廠商申請調解，已繳納調解費新臺幣（下同）10萬元，於通知調解期日後始發現有當事人不適格之情事，應退還調解費多少元？","options":["0元。","5萬元。","9萬5,000元。","10萬元。"],"answer":"9萬5,000元。","laws":[]},{"id":"s9-mc-37","type":"single","question":"高雄市某漁會接受內政部補助辦理採購(非藝文採購)，補助金額為新臺幣（下同）150萬元，採購金額為200萬元，投標廠商不服決標結果，可向下列哪一個採購申訴審議委員會申訴？","options":["高雄市政府採購申訴審議委員會。","行政院農業委員會設置之採購申訴審議委員會。","行政院公共工程委員會採購申訴審議委員會。","以上皆非。"],"answer":"行政院公共工程委員會採購申訴審議委員會。","laws":[]},{"id":"s9-mc-38","type":"single","question":"依政府採購法，下列何者有誤：","options":["招標機關處理異議為不受理之決定時，仍得評估其事由，於認其異議有理由時，自行撤銷或變更原處理結果或暫停採購程序之進行。","政府採購法第75條第1項第3款所定期限之計算，其經機關通知及公告者，廠商接獲通知之日與機關公告之日不同時，以公告之日起算。","異議不合規定，但其情形可補正者，應定期間命其補正；逾期不補正者，不予受理。","機關依政府採購法第102條規定將異議處理結果以書面通知提出異議之廠商時，應附記廠商如對該處理結果不服，得於收受異議處理結果之次日起15日內，以書面向採購申訴審議委員會提出申訴。"],"answer":"政府採購法第75條第1項第3款所定期限之計算，其經機關通知及公告者，廠商接獲通知之日與機關公告之日不同時，以公告之日起算。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s9-mc-39","type":"single","question":"廠商或機關向採購申訴審議委員會申請履約爭議調解時，其調解費為新臺幣（下同）100萬，於第1次調解期日之次日起10日內撤回調解，應退還調解費為：","options":["20萬元。","30萬元。","50萬元。","80萬元。"],"answer":"80萬元。","laws":[]},{"id":"s9-mc-40","type":"single","question":"政府採購申訴案件經審議判斷指明原採購行為違反法令者，招標機關應自收受審議判斷書之次日起幾日內另為適法之處置：","options":["10日。","15日。","20日。","30日。"],"answer":"20日。","laws":[]},{"id":"s9-mc-41","type":"single","question":"廠商對於招標機關依政府採購法第31條規定不予發還或追繳押標金爭議，得向採購申訴審議委員會申訴之門檻為：","options":["公告金額以上。","查核金額以上。","不論金額大小。","公告金額十分之一以上。"],"answer":"不論金額大小。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s9-mc-42","type":"single","question":"「廠商請求機關展延工期不成故申請調解，並繳納調解費新臺幣（下同）10萬元，嗣於第1次調解期日之次日起10日內以書面撤回調解，則應退還調解費多少元？","options":["0元。","5萬元。","9萬5,000元。","10萬元。"],"answer":"5萬元。","laws":[]},{"id":"s9-mc-43","type":"single","question":"某法人接受補助辦理採購(非藝文採購)，採購金額為新臺幣（下同）200萬元，臺中市政府補助50萬元，內政部補助100萬元，且由臺中市政府及內政部共同辦理監督，廠商就此採購案申訴時，應向下列哪一個採購申訴審議委員會申訴？","options":["行政院公共工程委員會採購申訴審議委員會。","臺中市政府採購申訴審議委員會。","臺北市政府採購申訴審議委員會。","以上皆是。"],"answer":"行政院公共工程委員會採購申訴審議委員會。","laws":[]},{"id":"s9-mc-44","type":"single","question":"廠商對於機關辦理之採購提出異議逾法定期限時，機關對於異議之處置，何者為是？","options":["應不予受理。","應為實體審查。","移受理申訴之機關。","移上級機關。"],"answer":"應不予受理。","laws":[]},{"id":"s9-mc-45","type":"single","question":"主管機關及直轄市、縣（市）政府為處理中央及地方機關採購之廠商申訴及機關與廠商間之履約爭議調解，分別設採購申訴審議委員會；置委員至多：","options":["20人。","25人。","30人。","35人。"],"answer":"35人。","laws":[]}]},{"id":"s10","title":"道德規範及違法處置","questions":[{"id":"s10-mc-1","type":"single","question":"機關辦理公開程序之採購，如於「投標廠商聲明書」要求廠商聲明其是否屬公職人員利益衝突迴避法第2條所稱公職人員及第3條所規範之關係人，機關於履約過程始發現廠商之聲明與事實不符，機關下列處理方式何者正確？","options":["依採購法第31條規定追繳該廠商押標金。","依採購法第101條第1項規定通知該廠商將刊登政府採購公報。","通知公職人員利益衝突迴避法主管機關法務部。","減價收受。"],"answer":"通知公職人員利益衝突迴避法主管機關法務部。","laws":[{"name":"公職人員利益衝突迴避法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=I0070008"},{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s10-mc-2","type":"single","question":"下列何者為採購人員得為之行為？","options":["於機關任職期間同時為廠商所僱用。","要求廠商提供與採購無關之服務。","主動參與公開舉行且邀請一般人參加之餐會。","為免有礙業務執行，於交通不便地區使用廠商提供之交通工具。"],"answer":"為免有礙業務執行，於交通不便地區使用廠商提供之交通工具。","laws":[]},{"id":"s10-mc-3","type":"single","question":"依採購人員倫理準則規定，採購人員接受價值逾新台幣500元，退還有困難時，於獲贈或知悉起7日內作何處理？","options":["付費收受。","歸公。","轉贈慈善機構。","以上皆是。"],"answer":"以上皆是。","laws":[]},{"id":"s10-mc-4","type":"single","question":"下列何者非採購人員應遵循者？","options":["努力發現真實，對機關及廠商之權利均應注意維護。","基於公共利益、採購效益或專業判斷之考量，為適當之採購決定。","依據法令，本於良知，公正執行職務，必要時，得接受請託或關說。","不接受與職務或利益有關廠商之餽贈或招待。"],"answer":"依據法令，本於良知，公正執行職務，必要時，得接受請託或關說。","laws":[]},{"id":"s10-mc-5","type":"single","question":"機關採購專業人員於下列何種情形，喪失其採購專業人員資格？","options":["辭職後5年內回任機關採購職務。","調任其他機關辦理採購。","辦理採購業務違反法令情節重大而受申誡懲戒處分者。","以上皆非。"],"answer":"以上皆非。","laws":[]},{"id":"s10-mc-6","type":"single","question":"下列有關採購評選委員會委員之規定，下列何者為非？","options":["委員對於所知悉之招標資訊，應予保密。","委員應公正執行職務，不為及不受任何請託或關說。","委員如因不可抗力因素無法出席評選會議，得在機關同意下委由代理人出席。","委員不得有採購人員倫理準則第7條規定之行為。"],"answer":"委員如因不可抗力因素無法出席評選會議，得在機關同意下委由代理人出席。","laws":[]},{"id":"s10-mc-7","type":"single","question":"下列何者屬採購人員倫理準則第2條所稱採購人員？","options":["辦理開標之人員。","訂定招標文件之人員。","處理履約爭議之人員。","以上皆是。"],"answer":"以上皆是。","laws":[]},{"id":"s10-mc-8","type":"single","question":"以下何者有誤？","options":["發現採購人員有違反法令之情形，其主管知情不予處置者，應視情節輕重，依法懲處。","驗收時，因交通不便，而使用廠商提供之交通工具及便當，但付費予廠商。","辦理新臺幣15萬元以下之採購，未通知主（會）計及有關單位人員辦理監辦。","為符合社會禮儀或習俗，不依法令規定辦理採購。"],"answer":"為符合社會禮儀或習俗，不依法令規定辦理採購。","laws":[]},{"id":"s10-mc-9","type":"single","question":"下列敘述何者正確？","options":["採購人員只要接受新臺幣500元以下之饋贈或招待，尚屬合宜。","機關首長非依法規兼任某財團法人之董事，如係依政府採購法以公告程序辦理之採購，該財團法人可以參與該機關首長所任職機關之採購。","機關首長尚非採購人員倫理準則所稱採購人員。","採購人員如有違反法令情形，依採購法第7章罰則論處。"],"answer":"機關首長非依法規兼任某財團法人之董事，如係依政府採購法以公告程序辦理之採購，該財團法人可以參與該機關首長所任職機關之採購。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s10-mc-10","type":"single","question":"下列敘述何者正確？","options":["機關預算遭挪用致無款項及時支付廠商之情形，非屬採購人員倫理準則適用範圍。","接受機關委託之專案管理廠商之人員，辦理契約所定事項，因其非屬機關人員，爰非屬採購人員倫理準則規範範圍。",")負責政府採購案驗收人員與主辦人員如係夫妻關係，應予迴避。","以上皆非。"],"answer":")負責政府採購案驗收人員與主辦人員如係夫妻關係，應予迴避。","laws":[]},{"id":"s10-mc-11","type":"single","question":"下列採購人員之行為，何者無違反採購人員倫理準則之虞？","options":["於機關場所張貼旅行社廣告海報。","為提昇採購品質，對於未得標廠商之企劃書內容，提供予得標廠商參考。","因政策變更，於等標期間取消採購。","公開招標採分段開標，於開價格標前訂定底價。"],"answer":"因政策變更，於等標期間取消採購。","laws":[]},{"id":"s10-mc-12","type":"single","question":"採購人員接受與職務或利益有關廠商之廣告物價值逾500元，退還有困難者，得於幾日內付費收受、歸公或轉贈慈善機構？","options":["3日。","5日。","7日。","10日。"],"answer":"7日。","laws":[]},{"id":"s10-mc-13","type":"single","question":"下列何者正確不違採購法令？","options":["於機關辦公室懸掛廠商廣告物。","採購人員要求得標廠商僱用採購人員親友。","採購人員下班後由得標廠商僱用。","採購人員不得從事足以影響採購人員尊嚴之活動。"],"answer":"採購人員不得從事足以影響採購人員尊嚴之活動。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s10-mc-14","type":"single","question":"在非主動求取且係偶發之情形下，採購人員不接受與職務或利益有關廠商之餽贈或招待，反不符合社會禮儀或習俗者，得予接受。但下列何者為非可接受之範圍?","options":["價值在新臺幣500元以下之饋贈或飲食招待。","利用廠商免費提供場所辦理機關餐會活動。","基於家庭或私人情誼所為者。","公開舉行且邀請一般人參加之餐會。"],"answer":"利用廠商免費提供場所辦理機關餐會活動。","laws":[]},{"id":"s10-mc-15","type":"single","question":"與職務或利益有關廠商餽贈之禮物，其價值在新臺幣多少元以下，如不接受反不符合社會禮儀或習俗者，得予接受？","options":["300元。","500元。","1000元。","2000元。"],"answer":"500元。","laws":[]},{"id":"s10-mc-16","type":"single","question":"依採購人員倫理準則規定，下列何者為採購人員應有之行為？","options":["努力發現真實，對機關及廠商之權利均注意維護。","公開招標之第3次招標仍僅2家投標不予開標。","重視廠商請託或關說。","參與廠商舉行且邀請多人參加之餐會。"],"answer":"努力發現真實，對機關及廠商之權利均注意維護。","laws":[]},{"id":"s10-mc-17","type":"single","question":"A為甲建築師事務所負責人，於99年7月1日自乙市政府建設處（市政府之內部單位）建築工程科離職，嗣後乙市政府於99年12月25日升格為乙直轄市政府，在A離職未滿3年，依採購法第15條第1項規定，甲建築師事務所得參與下列何機關之採購？","options":["原乙市政府建設處改制之乙直轄市政府建設局。","乙直轄市政府所屬公立學校。","升格為直轄市後之乙直轄市政府。","以上皆非。"],"answer":"乙直轄市政府所屬公立學校。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s10-mc-18","type":"single","question":"甲廠商之負責人為A機關首長之表弟，下列敘述何者正確？","options":["甲廠商不得參與A機關採購案之投標。","甲廠商得參與A機關採購案之投標，惟A機關首長應迴避。","甲廠商得參與A機關採購案之投標，且A機關首長無須迴避。","甲廠商不得為A機關採購案之分包廠商。"],"answer":"甲廠商得參與A機關採購案之投標，且A機關首長無須迴避。","laws":[]},{"id":"s10-mc-19","type":"single","question":"某甲於102年1月至107年12月任職於A機關，於108年1月至109年12月任職於B機關，110年1月迄今任職於C民間企業，以下何者為是？","options":["某甲於110年3月得代理廠商向A機關接洽其於105年8月於A機關所任職務有關之事務。","某甲於111年3月皆不得代理廠商向A或B機關接洽任何其於A或B機關所任職務有關之事務。","某甲於111年3月得代理廠商向A機關接洽其於107年8月於A機關所任職務有關之事務。","以上皆非。"],"answer":"某甲於111年3月得代理廠商向A機關接洽其於107年8月於A機關所任職務有關之事務。","laws":[]},{"id":"s10-mc-20","type":"single","question":"原於新任首長就職前已得標廠商之負責人為新任首長胞兄，於其胞弟就職後，以下敘述何者正確？","options":["機關應補具相關文件報主管機關核定免除迴避規定之適用。","撤銷該廠商之得標資格。","機關應補具相關文件報上級機關備查。","機關於後續履約管理及驗收等採購事項執行時，新任首長應予迴避。"],"answer":"機關於後續履約管理及驗收等採購事項執行時，新任首長應予迴避。","laws":[]},{"id":"s10-mc-21","type":"single","question":"機關辦理採購，如於「投標廠商聲明書」要求廠商聲明其是否屬公職人員利益衝突迴避法第2條所稱公職人員及第3條所規範之關係人，遇有公職人員或關係人參與該公職人員服務機關或受其監督機關之採購，且該採購非屬公職人員利益衝突迴避法第14條第1項但書所定情形者，下列處理方式何者為誤？","options":["開標前發現者，依採購法第50條第1項第1款規定，該廠商所投之標不予開標。","開標後發現者，依採購法第50條第1項第1款規定，不決標予該廠商。","決標予該廠商後發現者，依採購法第50條第2項規定撤銷決標解除契約，並得追償損失。","決標予該廠商後發現者，報公職人員利益衝突迴避法之主管機關核定後免撤銷決標。"],"answer":"決標予該廠商後發現者，報公職人員利益衝突迴避法之主管機關核定後免撤銷決標。","laws":[{"name":"公職人員利益衝突迴避法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=I0070008"},{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]}]},{"id":"s11","title":"政府採購全生命週期概論","questions":[{"id":"s11-mc-1","type":"single","question":"依政府公共工程計畫與經費審議作業要點，以下何者不是基本設計階段審議之重點？","options":["經費合理性。","技術可行性。","期程妥適性。","以上皆是。"],"answer":"以上皆是。","laws":[]},{"id":"s11-mc-2","type":"single","question":"下列何者非政府協調改善我國營造工缺工之措施？","options":["合理檢討移工規定。","加強本國勞工訓練媒合。","推動營建自動化。","全面開放移工進駐工地。"],"answer":"全面開放移工進駐工地。","laws":[]},{"id":"s11-mc-3","type":"single","question":"下列因應物價波動之方式，何者非屬妥適？","options":["計畫階段預為編列物調費及預備費。","個案契約依工程會工程採購契約範本採用3層級物調機制。","工程招標時請廠商提出放棄物調聲明書。","招標文件公告前再次訪查市場行情。"],"answer":"工程招標時請廠商提出放棄物調聲明書。","laws":[]},{"id":"s11-mc-4","type":"single","question":"下列何者非工程會推動公共工程生態檢核之措施？","options":["工程會公共工程技術服務契約範本納入生態環境調查。","執行機關使用之生態檢核自評表無須送主管機關審查。","生態檢核列為施工查核及金質獎評審重點項目。","生態檢核資訊應予公開。"],"answer":"執行機關使用之生態檢核自評表無須送主管機關審查。","laws":[]},{"id":"s11-mc-5","type":"single","question":"下列何者非屬「契約書圖條件不合理」之情形？","options":["保固年限過長。","訂定技術規格時，以功能或效益等精確方式說明招標需求，而不提供參考品牌。","未考量現場施工條件。","訂定之主要部分過於空泛。"],"answer":"訂定技術規格時，以功能或效益等精確方式說明招標需求，而不提供參考品牌。","laws":[]},{"id":"s11-mc-6","type":"single","question":"下列何者非政府採購多元化的履約爭議處理機制？","options":["向訴願申請調解。","由機關成立「爭議處理小組」協調爭議。","向法院提起訴訟。","雙方合意仲裁。"],"answer":"向訴願申請調解。","laws":[]},{"id":"s11-mc-7","type":"single","question":"以班班有冷氣計畫冷氣採購為例，為考量特性需求及兼顧採購效率，下列何者非採行之採購策略？","options":["集中採購，以縣市政府為一標。","採最有利標，價格納入評分占比重40%。","考量冷氣機尚有節省能源、低噪音或耐久性等需求，以最有利標決標。","採複數決標予多家廠商，由學校選擇不同冷氣機之供應商。"],"answer":"採最有利標，價格納入評分占比重40%。","laws":[]},{"id":"s11-mc-8","type":"single","question":"工程會為協調改善營造業缺工問題，下列何者非整體性之解決對策？","options":["推動營建自動化。","暫緩公共工程推動。","加強本勞訓練媒合。","合理檢討移工規定。"],"answer":"暫緩公共工程推動。","laws":[]},{"id":"s11-mc-9","type":"single","question":"機關應務實評選規劃設計廠商，評定實務可行之方案，評選委員及工作小組應於評選前瞭解之事項包含？A.計畫需求與預算。B.期程。C.各廠商投標內容。D.契約變更方案。","options":["ABCD。","ABC。","ABD。","BCD。"],"answer":"ABC。","laws":[]},{"id":"s11-mc-10","type":"single","question":"機關辦理採購前應核實編列計畫經費，下列何者非考量之因素？","options":["機關需求。","使用年限。","未來契約可能因廠商違約重行招標之經費。","維護管理。"],"answer":"未來契約可能因廠商違約重行招標之經費。","laws":[]},{"id":"s11-mc-11","type":"single","question":"為避免工程採購因工期不符實際導致流標，下列何者非正確因應對策？","options":["以日曆天訂定工期，應包含預期可工作日及不可工作日或放假日。","檢討工期合理性並於招標文件說明已考量氣候影響之工期天數。","細部設計階段確認分項工程、妥適排定施工順序，並考量特殊施工資源，估算各工項工期。","僅配合計畫執行期限編列工期。"],"answer":"僅配合計畫執行期限編列工期。","laws":[]},{"id":"s11-mc-12","type":"single","question":"機關辦理工程採購遇多次流標，經檢討原因係施工難度高，下列何項非因應對策?","options":["檢討有無其他可行之設計方案。","改採統包方式，由統包廠商於設計階段選定施工方法。","於招標階段，允許廠商提出替代方案。","增加機關工程管理費用。"],"answer":"增加機關工程管理費用。","laws":[]},{"id":"s11-mc-13","type":"single","question":"依政府公共工程計畫與經費審議作業要點基本設計階段之必要圖說之規定，機關當次送審基本設計之工程建造經費達新臺幣多少時，應辦理替選方案評估，並將替選方案評估報告納為必要圖說文件？","options":["10億元。","4億元。","1億元。","5千萬元。"],"answer":"10億元。","laws":[]},{"id":"s11-mc-14","type":"single","question":"依公共建設工程經費估算編列手冊總則篇，以下何者非屬工程建造費之編列架構？","options":["直接工程成本。","間接工程成本。","用地取得及拆遷補償費用。","工程預備費。"],"answer":"用地取得及拆遷補償費用。","laws":[]},{"id":"s11-mc-15","type":"single","question":"機關辦理工程採購估驗計價，除契約另有約定，一般每期估驗款須扣除多少百分比之保留款？","options":["3％。","5%。","6%。","7%。"],"answer":"5%。","laws":[]},{"id":"s11-mc-16","type":"single","question":"下列何者不是工程施工查核重點？","options":["職業安全。","檢驗停留點。","工區管理及人員設置。","履約保證金繳交。"],"answer":"履約保證金繳交。","laws":[]},{"id":"s11-mc-17","type":"single","question":"下列何者非屬工程採購得採行之招標決標策略？","options":["針對巨額工程採購，成立採購工作及審查小組協助審查採購需求與經費。","採購期程緊迫情況下，請熟識的營造廠研擬招標文件，據以採購。","以統包方式辦理之工程，採最有利標或採評分及格最低標方式辦理。","未達公告金額之案件，依採購法第23條、第49條及中央機關未達公告金額採購招標辦法，採公開取得廠商書面報價或企劃書方式辦理。"],"answer":"採購期程緊迫情況下，請熟識的營造廠研擬招標文件，據以採購。","laws":[{"name":"中央機關未達公告金額採購招標辦法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030067"},{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s11-mc-18","type":"single","question":"機關辦理採購，於招標、決標階段可靈活運用採購策略，增加採購效率，惟下列何項屬錯誤之採購策略？","options":["為爭取時效，於招標文件載明「預算未完成立法程序前，得保留決標」之文字，提前辦理招標。","工程採購評估採統包方式辦理，縮短作業期程。","工程可考量公共利益，在合理範圍內縮短工期，於編列預算及訂定底價時，反應所增加之施工費用。","因機關因素採購時程延宕，採限制性招標因應。"],"answer":"因機關因素採購時程延宕，採限制性招標因應。","laws":[]},{"id":"s11-mc-19","type":"single","question":"下列何者為採購法主管機關舉辦之獎項？","options":["金安獎。","金擘獎。","金質獎。","金路獎。"],"answer":"金質獎。","laws":[{"name":"政府採購法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030057"}]},{"id":"s11-mc-20","type":"single","question":"下列何者非公共工程品質計畫章節內容？","options":["品質管理標準。","材料及施工檢驗程序。","自主檢查表。","剩餘土石方標售。"],"answer":"剩餘土石方標售。","laws":[]},{"id":"s11-mc-21","type":"single","question":"依共同性費用編列基準，專案研析後得計列之項目，不包含下列何者？","options":["基地一般性整理。","綠建築。","挑高空間。","智慧建築。"],"answer":"基地一般性整理。","laws":[]},{"id":"s11-mc-22","type":"single","question":"基於促進循環經濟效益，及輔導產業健全發展，工程會依行政院指示，推動部分工程材料可適材、適所、適量運用於公共工程，該等材料不包含下列何者？","options":["焚化再生粒料。","氧化碴。","轉爐石。","廢輪胎。"],"answer":"廢輪胎。","laws":[]},{"id":"s11-mc-23","type":"single","question":"工程會透過公共工程流標專案檢討會議發現流標皆有其個案因素，下列何者為非？","options":["材料短缺。","設計內容與預算編列不相同。","未按實際需要訂定工期。","契約書圖條件不合理。"],"answer":"材料短缺。","laws":[]},{"id":"s11-mc-24","type":"single","question":"以下何者非屬共同性費用編列基準表之一般性或共同性需求適用範圍？","options":["鋼筋混凝土造教室。","鋼骨構造醫院。","鋼骨構造辦公大樓。","鋼筋混凝土造住宅與宿舍。"],"answer":"鋼骨構造醫院。","laws":[]}]},{"id":"s12","title":"政府採購法之總則、招標及決標","questions":[{"id":"s12-mc-1","type":"single","question":"下列何者應依採購法辦理？","options":["機關變賣新臺幣200萬之財物。","公開徵求新臺幣180萬元之房地產。","標售新臺幣150萬元之資源回收物品。","新臺幣200萬元補助對象之選定。"],"answer":"公開徵求新臺幣180萬元之房地產。","laws":[{"name":"政府採購法 第2條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=2"}]},{"id":"s12-mc-2","type":"single","question":"下列何者屬於採購法適用範圍？","options":["購買遠期外匯。","購買冷凍食品(肉品)。","公開標售土石。","出租辦公廳舍。"],"answer":"購買冷凍食品(肉品)。","laws":[{"name":"政府採購法 第2條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=2"}]},{"id":"s12-mc-3","type":"single","question":"下列何者不是採購法所稱採購？","options":["工程之定作。","權利之買受。","土地之出租。","契約工之僱傭。"],"answer":"土地之出租。","laws":[{"name":"政府採購法 第2條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=2"}]},{"id":"s12-mc-4","type":"single","question":"台電公司為敦親睦鄰，補助士林區公所辦理採購，其應適用採購法之採購金額為何？","options":["新臺幣150萬元以上。","新臺幣15萬元以上。","補助金額占採購金額達半數以上且補助金額達公告金額以上。","無論金額大小。"],"answer":"無論金額大小。","laws":[{"name":"政府採購法 第3條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=3"}]},{"id":"s12-mc-5","type":"single","question":"台電公司為敦親睦鄰，補助臺北市士林區公所辦理採購，該公所依採購法規定應報上級機關核准者，所稱上級機關為下列何者？","options":["臺北市政府。","行政院公共工程委員會。","台電公司。","經濟部。"],"answer":"臺北市政府。","laws":[{"name":"政府採購法 第4條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=4"}]},{"id":"s12-mc-6","type":"single","question":"法人或團體接受機關補助辦理採購，其適用採購法者，下列敘述何者有誤？","options":["受補助者於辦理查核金額以上採購之開標，應受補助機關之上級機關監督。","於2以上機關補助同一採購者，其補助金額是否達採購法第4條第1項所定金額，以其補助總金額計算之。","受理申訴之採購申訴審議委員會，為補助機關自行辦理採購之申訴之採購申訴審議委員會。","有2以上機關補助同一採購者，有2以上機關補助同一採購者，受理申訴之採購申訴審議委員會，依指定代表機關或所占補助金額比率最高者認定之。"],"answer":"受補助者於辦理查核金額以上採購之開標，應受補助機關之上級機關監督。","laws":[{"name":"政府採購法 第4條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=4"}]},{"id":"s12-mc-7","type":"single","question":"台電公司為敦親睦鄰，補助財團法人工業技術研究院辦理採購，該研究院依採購法規定應報上級機關核准者，所稱上級機關為下列何者？","options":["新竹市政府。","行政院公共工程委員會。","台電公司。","經濟部。"],"answer":"台電公司。","laws":[{"name":"政府採購法 第4條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=4"}]},{"id":"s12-mc-8","type":"single","question":"下列何者不會有違反採購法第6條第1項規定之虞？","options":["新臺幣50萬元之採購，指定廠牌公開徵求廠商提供報價單辦理決標。","不適用條約協定之採購，限我國廠商投標。","招標文件規定投標廠商須為製造廠之代理商。","規定投標廠商須於招標機關之所在地轄區有實際工作經驗。"],"answer":"不適用條約協定之採購，限我國廠商投標。","laws":[{"name":"政府採購法 第6條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=6"}]},{"id":"s12-mc-9","type":"single","question":"下列何者為錯誤？","options":["機關辦理採購，應以維護公共利益及公平合理為原則。","採購人員得基於公共利益為違反採購法之決定。","公營事業之採購適用採購法。","自然人得為簽約對象。"],"answer":"採購人員得基於公共利益為違反採購法之決定。","laws":[{"name":"政府採購法 第6條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=6"}]},{"id":"s12-mc-10","type":"single","question":"下列何者違反採購法第6條第1項公平合理原則？","options":["廠商履約期間因機關提前使用目的，採部分驗收，並於部分驗收後將相關之履約保證金部分發還。","機關無法順利取得廠商履約所需土地，通知廠商暫停履約，並暫時發還履約保證金。","公開招標案件，履約期間因廠商財務困難，辦理契約變更，增列給付預付款，契約價金不變。","道路工程得標廠商因法定工時縮短，要求延長工期，機關認為部分有理由，同意廠商之部分要求。"],"answer":"公開招標案件，履約期間因廠商財務困難，辦理契約變更，增列給付預付款，契約價金不變。","laws":[{"name":"政府採購法 第6條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=6"}]},{"id":"s12-mc-11","type":"single","question":"權利採購之性質分類，下列何者正確？","options":["工程採購。","勞務採購。","財物採購。","兼具勞務及財物性質之採購。"],"answer":"財物採購。","laws":[{"name":"政府採購法 第7條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=7"}]},{"id":"s12-mc-12","type":"single","question":"機關辦理採購之開標、比價、議價、決標及驗收，應於規定期限內，檢送相關文件報請上級機關派員監辦之門檻金額，下列何者正確？","options":["公告金額以上。","查核金額以上。","小額採購。","巨額。"],"answer":"查核金額以上。","laws":[{"name":"政府採購法 第12條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=12"}]},{"id":"s12-mc-13","type":"single","question":"下列敘述何者正確？","options":["採購法所稱監辦，指監辦人員實地監視機關辦理開標、比價、議價、決標、驗收與付款是否符合採購法規定之程序。","公告金額以上之採購，監辦人員採書面審核監辦者，應經機關首長或其授權人員核准。","辦理採購之主持人或主驗人不接受上級機關監辦人員對採購不符合採購法規定程序而提出之意見，應納入紀錄並報機關首長或其授權人員核准。","監辦人員得依採購法第48條第1項各款特殊情形，經機關首長或其授權人員核准，不派員監辦。"],"answer":"公告金額以上之採購，監辦人員採書面審核監辦者，應經機關首長或其授權人員核准。","laws":[{"name":"政府採購法 第12條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=12"}]},{"id":"s12-mc-14","type":"single","question":"下列何者不是採購法規定上級機關應監辦之事項？","options":["審標。","比價。","決標。","開標。"],"answer":"審標。","laws":[{"name":"政府採購法 第12條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=12"}]},{"id":"s12-mc-15","type":"single","question":"下列採購，何者應報請上級機關派員監辦？","options":["新臺幣3,000萬元財物採購之驗收。","新臺幣2,000萬元工程採購之議價。","新臺幣1,000萬元勞務採購之開標。","新臺幣2,000萬元工程採購之查核。"],"answer":"新臺幣1,000萬元勞務採購之開標。","laws":[{"name":"政府採購法 第12條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=12"}]},{"id":"s12-mc-16","type":"single","question":"某機關擬委外編印月刊，預估1年12期為新臺幣90萬元，並於招標公告及招標文件敘明履約情形良好者，將依採購法第22條第1項第7款續約2年。該採購之採購金額為？","options":["新臺幣90萬元。","新臺幣180萬元。","新臺幣270萬元。","決標金額。"],"answer":"新臺幣270萬元。","laws":[{"name":"政府採購法 第12條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=12"}]},{"id":"s12-mc-17","type":"single","question":"機關辦理查核金額以上採購之招標，應於何時檢送採購預算資料、招標文件及相關文件，報請上級機關派員監辦？","options":["等標期或截止收件日5日前。","開標日5日前。","等標期或截止收件日3日前。","開標日3日前。"],"answer":"等標期或截止收件日5日前。","laws":[{"name":"政府採購法 第12條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=12"}]},{"id":"s12-mc-18","type":"single","question":"採購金額之計算方式，下列何者正確？","options":["採分批辦理採購者，依全部批數之預算總額認定之。","招標文件規定廠商報價金額包括機關支出及收入金額者，以支出及收入金額之絕對值合計認定之。","招標文件含有後續擴充項目者，因不確定是否購買，得暫免計入。","租期不確定者，以每月租金之36倍認定之。"],"answer":"採分批辦理採購者，依全部批數之預算總額認定之。","laws":[{"name":"政府採購法 第12條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=12"}]},{"id":"s12-mc-19","type":"single","question":"機關辦理採購，其採購金額之認定，於租期不確定之財物採購，以幾年租金認定之？","options":["1年。","2年。","3年。","4年。"],"answer":"4年。","laws":[{"name":"政府採購法 第12條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=12"}]},{"id":"s12-mc-20","type":"single","question":"依「機關主會計及有關單位會同監辦採購辦法」第5條規定，經機關首長或其授權人員核准不派員監辦，下列敘述何者為是？","options":["主會計及有關單位人員仍應辦理書面審核監辦，並於紀錄載明「書面審核監辦」字樣。","主會計及有關單位人員未辦理監辦，無須於紀錄簽章。","主會計及有關單位人員仍須以監辦人員身分於紀錄簽章。","以上皆非。"],"answer":"主會計及有關單位人員未辦理監辦，無須於紀錄簽章。","laws":[{"name":"政府採購法 第13條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=13"}]},{"id":"s12-mc-21","type":"single","question":"監辦人員採書面審核監辦之簽名時機，下列何者正確？","options":["得於各相關人員均簽名後為之。","應於各相關人員均簽名後為之。","應於與會人員簽名後及主持(驗)人簽名前。","得免簽名。"],"answer":"應於各相關人員均簽名後為之。","laws":[{"name":"政府採購法 第13條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=13"}]},{"id":"s12-mc-22","type":"single","question":"下列何者不是採購法第13條第1項規定之特殊情形？","options":["另有重要公務需處理，致無人員可供分派者。","經政府機關或公正第三人查驗，並有相關規格、品質、數量之證明文書供驗收者。","查核金額以上之採購，上級機關已派員監辦者。","地區偏遠，無人員可供分派者。"],"answer":"查核金額以上之採購，上級機關已派員監辦者。","laws":[{"name":"政府採購法 第13條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=13"}]},{"id":"s12-mc-23","type":"single","question":"下列何者不得為該採購案之監辦人員？","options":["上級機關人員。","督察單位人員。","採購案之承辦人員。","稽核單位人員。"],"answer":"採購案之承辦人員。","laws":[{"name":"政府採購法 第13條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=13"}]},{"id":"s12-mc-24","type":"single","question":"採購法所稱公告金額，係指新臺幣多少元？","options":["10萬元。","500萬元。","1,000萬元。","150萬元。"],"answer":"150萬元。","laws":[{"name":"政府採購法 第13條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=13"}]},{"id":"s12-mc-25","type":"single","question":"機關辦理公告金額以上採購，除有特殊情形者外，應由其主(會)計及有關單位會同監辦。下列何者非屬監辦事項？","options":["開標。","比價。","查驗。","決標。"],"answer":"查驗。","laws":[{"name":"政府採購法 第13條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=13"}]},{"id":"s12-mc-26","type":"single","question":"公告金額以上採購，機關首長或其授權人員核准不派員監辦之情形下列何者尚屬適法？","options":["廠商提出異議且尚未解決者。","廠商申請調解且尚未解決者。","經工程施工查核小組認定採購有重大異常情形者。","機關內部單位有不同意見者。"],"answer":"機關內部單位有不同意見者。","laws":[{"name":"政府採購法 第13條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=13"}]},{"id":"s12-mc-27","type":"single","question":"下列何者屬「機關主會計及有關單位會同監辦採購辦法」所稱有關單位？","options":["政風單位。","主計單位。","會計單位。","上級單位。"],"answer":"政風單位。","laws":[{"name":"政府採購法 第13條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=13"}]},{"id":"s12-mc-28","type":"single","question":"機關辦理公告金額以上之採購，監辦人員採書面審核監辦，應經下列何者核准？","options":["上級機關。","機關首長或其授權人員。","承辦採購單位。","主（會）計或有關單位。"],"answer":"機關首長或其授權人員。","laws":[{"name":"政府採購法 第13條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=13"}]},{"id":"s12-mc-29","type":"single","question":"採購法第14條所定意圖規避本法適用之分批，不包括依下列各項所分別辦理者？","options":["不同標的 。","不同需求條件 。","不同施工地區 。","以上皆是。"],"answer":"以上皆是。","laws":[{"name":"政府採購法 第14條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=14"}]},{"id":"s12-mc-30","type":"single","question":"機關人員對於與採購有關之事項，下列何者不是應迴避之情形？","options":["涉及本人、配偶利益。","涉及二親等以內親屬利益。","涉及前配偶或三親等以內血親或姻親利益。","涉及共同生活家屬利益。"],"answer":"涉及前配偶或三親等以內血親或姻親利益。","laws":[{"name":"政府採購法 第15條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=15"}]},{"id":"s12-mc-31","type":"single","question":"依採購法規定，機關承辦、監辦採購人員離職後幾年內不得為本人或代理廠商向原任職機關接洽處理離職前5年內與職務有關之事務？","options":["3年。","5年。","1年。","2年。"],"answer":"3年。","laws":[{"name":"政府採購法 第15條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=15"}]},{"id":"s12-mc-32","type":"single","question":"有關請託或關說之敘述，下列何者正確？","options":["請託或關說，宜以書面為之或作成紀錄。","請託或關說，不得作為評選之參考。","不循法定程序於招標前，對預定辦理之採購事項，提出請求亦屬請託或關說。","以上皆是。"],"answer":"以上皆是。","laws":[{"name":"政府採購法 第16條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=16"}]},{"id":"s12-mc-33","type":"single","question":"下列敘述何者正確？","options":["機關辦理適用WTO政府採購協定(GPA)之採購，不得於招標文件限制大陸地區廠商或其產品或勞務參與。","個案採購涉及國家安全，如屬適用GPA之採購，機關不得排除第三地區含陸資成分廠商投標。","機關以公告方式辦理之所有採購個案，皆得限制在臺陸資廠商參與。","以上皆非。"],"answer":"以上皆非。","laws":[{"name":"政府採購法 第17條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=17"}]},{"id":"s12-mc-34","type":"single","question":"機關辦理涉及國家安全之採購，對廠商資格訂定限制條件，得依採購案件之特性及實際需要，就下列何種事項擇定之？","options":["廠商之國籍或其設立登記所依據之法律。","廠商之代表人、董事、監察人、監事、經理人或持有股份總數或資本總額逾百分之十之股東之國籍。","廠商之資金來源及其比率限制。","以上皆是。"],"answer":"以上皆是。","laws":[{"name":"政府採購法 第17條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=17"}]},{"id":"s12-mc-35","type":"single","question":"機關辦理適用世界貿易組織(WTO)政府採購協定(GPA)之採購，下列何者非屬GPA規定應辦理事項？","options":["刊登英文摘要公告。","依GPA規定之等標期。","允許GPA會員廠商投標。","提供英文招標文件。"],"answer":"提供英文招標文件。","laws":[{"name":"政府採購法 第17條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=17"}]},{"id":"s12-mc-36","type":"single","question":"下列敘述何者錯誤？","options":["採購法所稱選擇性招標，指以公告方式預先依一定資格條件辦理廠商資格審查後，再行邀請符合資格之廠商投標。","機關辦理限制性招標，邀請4家廠商比價，有2家廠商投標者，即得比價。","機關辦理選擇性招標，不得規定廠商應將規格與價格合併投標。","機關為特定個案辦理選擇性招標，應於辦理廠商資格審查後，邀請所有符合資格之廠商投標。"],"answer":"機關辦理選擇性招標，不得規定廠商應將規格與價格合併投標。","laws":[{"name":"政府採購法 第18條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=18"}]},{"id":"s12-mc-37","type":"single","question":"下列何者不是採購法規定公告金額以上得選用之招標方式？","options":["公開招標。","比價。","公開評選。","公開取得書面報價。"],"answer":"公開取得書面報價。","laws":[{"name":"政府採購法 第19條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=19"}]},{"id":"s12-mc-38","type":"single","question":"公告金額以上之採購，依採購法規定之招標方式，下列何者為非？","options":["依採購法第22條第1項第12款規定採限制性招標。","依採購法第20條規定採選擇性招標。","依採購法第93條共同供應契約辦理。","依採購法第49條公開取得書面報價或企劃書。"],"answer":"依採購法第49條公開取得書面報價或企劃書。","laws":[{"name":"政府採購法 第19條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=19"}]},{"id":"s12-mc-39","type":"single","question":"下列敘述何者不正確？","options":["經常性採購，應建立6家以上之合格廠商名單。","機關為特定個案辦理選擇性招標，應於辦理廠商資格審查後，邀請所有符合資格之廠商投標。","合格廠商名單有效期逾1年者，應逐年公告辦理資格審查，並檢討修正既有合格廠商名單。","合格廠商名單有效期內發現廠商被刊登政府採購公報，因廠商資格審查符合招標文件規定，機關後續邀標得邀請該廠商投標。"],"answer":"合格廠商名單有效期內發現廠商被刊登政府採購公報，因廠商資格審查符合招標文件規定，機關後續邀標得邀請該廠商投標。","laws":[{"name":"政府採購法 第21條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=21"}]},{"id":"s12-mc-40","type":"single","question":"下列敘述何者錯誤？","options":["機關辦理選擇性招標預先為資格審查建立合格廠商名單後，仍應隨時接受廠商資格審查之請求，並定期檢討修正合格廠商名單。","機關辦理選擇性招標，應予經資格審查合格之廠商平等受邀之機會。","機關依採購法第21條第1項建立合格廠商名單者，應於辦理廠商資格審查之文件中載明後續辦理採購時邀請廠商投標之規則。","未達公告金額之採購，不得採選擇性招標之方式辦理。"],"answer":"未達公告金額之採購，不得採選擇性招標之方式辦理。","laws":[{"name":"政府採購法 第21條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=21"}]},{"id":"s12-mc-41","type":"single","question":"下列何者不是屬採購法第22條第1項第2款因無其他合適替代標的得採限制性招標所稱之專屬權利？","options":["商標專用權。","專利權。","著作權。","電路布局權。"],"answer":"商標專用權。","laws":[{"name":"政府採購法 第22條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=22"}]},{"id":"s12-mc-42","type":"single","question":"機關依採購法第22條第1項第9款辦理評選專業服務廠商，其第1次開標，投標廠商須幾家即可開標？","options":["3家以上。","1家。","6家以上。","2家以上。"],"answer":"1家。","laws":[{"name":"政府採購法 第22條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=22"}]},{"id":"s12-mc-43","type":"single","question":"機關依採購法第22條第1項第9款規定辦理評選資訊服務廠商，其投標廠商有幾家即可開標？","options":["1家。","2家。","3家。","6家。"],"answer":"1家。","laws":[{"name":"政府採購法 第22條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=22"}]},{"id":"s12-mc-44","type":"single","question":"依「機關指定地區採購房地產作業辦法」之規定，機關與認定適合需要者之議價及決標，下列何者為應載明於徵選文件之方式為何？","options":["適合需要者僅1家時，辦理第2次招標開標。","適合需要者為1家者，以議價方式辦理。","適合需要者在2家以上者，以比價方式辦理。","其採固定費用勘選認定適合需要者，得免除議價程序。"],"answer":"適合需要者為1家者，以議價方式辦理。","laws":[{"name":"政府採購法 第22條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=22"}]},{"id":"s12-mc-45","type":"single","question":"機關依採購法第22條第1項第11款規定採購房地產，其訂有底價者，訂定底價之時機：","options":["辦理公告前。","開標前。","比價前。","以上皆非。"],"answer":"以上皆非。","laws":[{"name":"政府採購法 第22條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=22"}]},{"id":"s12-mc-46","type":"single","question":"機關辦理公告金額以上房地產之採購，下列何情況依「機關指定地區採購房地產作業辦法」規定不得免除公開徵求：","options":["毗鄰房地產或畸零地之採購，係與現有房地產合併，以應業務需要者。","符合採購法第22條第1項第2款之情形者。","機關間房地產之取得。","其他經主管機關認定者。"],"answer":"機關間房地產之取得。","laws":[{"name":"政府採購法 第22條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=22"}]},{"id":"s12-mc-47","type":"single","question":"下列敘述何者錯誤？","options":["機關依採購法第22條第1項規定辦理限制性招標，應由需求、使用或承辦採購單位，就個案敘明符合各款之情形，簽報機關首長或其授權人員核准。","機關辦理採購，其屬原有採購之後續擴充，且已於招標文件敘明擴充之期間、金額或數量者，得採限制性招標。","採購法所稱共同投標，指2家以上之廠商共同具名投標，並於得標後共同具名簽約，連帶負履行採購契約之責，以承攬工程或提供財物、勞務之行為。","採購法第22條第1項第2款所稱專屬權利，不包括商標專用權。"],"answer":"機關辦理採購，其屬原有採購之後續擴充，且已於招標文件敘明擴充之期間、金額或數量者，得採限制性招標。","laws":[{"name":"政府採購法 第22條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=22"}]},{"id":"s12-mc-48","type":"single","question":"機關依採購法第22條第1項第6款辦理契約變更，下列何者錯誤？","options":["僅適用於工程採購。","契約金額如包括機關支出及收入金額者，該條款所稱原主契約金額，得以支出部分之金額計算之。","該條款所稱「必須追加契約以外之工程」之情形，係指增加原契約外之工作項目，不包括原契約項目規格之變更或既有標的數量之增加。","機關辦理契約變更致原決標金額增加者，該增加之金額，應依採購法第61條或第62條規定辦理公告、彙送。"],"answer":"該條款所稱「必須追加契約以外之工程」之情形，係指增加原契約外之工作項目，不包括原契約項目規格之變更或既有標的數量之增加。","laws":[{"name":"政府採購法 第22條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=22"}]},{"id":"s12-mc-49","type":"single","question":"依「機關邀請或委託文化藝術專業人士機構團體提供藝文服務作業辦法」之規定，機關辦理藝文服務採購，下列何者正確？","options":["應免收押標金、保證金。","採公告審查程序者，審查委員會應由委員5人以上組成。","巨額藝文服務採購不經公告審查程序辦理者，應由機關邀集機關人員2人及文化、藝術領域之專家學者7人開會審查，經三分之二以上人員出席，出席人員二分之一以上審查通過，簽報機關首長或其授權人員核准。","以上皆是。"],"answer":"採公告審查程序者，審查委員會應由委員5人以上組成。","laws":[{"name":"政府採購法 第22條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=22"}]},{"id":"s12-mc-50","type":"single","question":"機關辦理藝文服務採購，採公告審查程序者，下列何者正確？","options":["招標文件之內容，應考量藝文服務之採購特性及實際需要，必要時得徵詢藝文業者之意見。","審查委員會應由委員5人以上組成；其會議之決議應有委員總額三分之二以上出席，出席委員三分之二同意行之。","公告結果，僅1家藝文業者投標者，不得進行審查。","以上皆是。"],"answer":"招標文件之內容，應考量藝文服務之採購特性及實際需要，必要時得徵詢藝文業者之意見。","laws":[{"name":"政府採購法 第22條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=22"}]},{"id":"s12-mc-51","type":"single","question":"下列敘述何者錯誤？","options":["採購法第22條第1項第2款所稱專屬權利，不包括商標專用權。","採購法第22條第1項第1款所稱無合格標，指審標結果無廠商合於招標文件規定。","採購法第22條第1項第6款所稱百分之五十，指追加當次金額占原主契約金額之比率。","機關依採購法第22條第1項規定辦理限制性招標，其得以比價方式辦理者，優先以比價方式辦理。"],"answer":"採購法第22條第1項第6款所稱百分之五十，指追加當次金額占原主契約金額之比率。","laws":[{"name":"政府採購法 第22條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=22"}]},{"id":"s12-mc-52","type":"single","question":"機關依採購法第22條第1項第10款規定辦理設計競賽廠商公開評選，其投標廠商有幾家即可開標？","options":["1家。","2家。","3家。","6家。"],"answer":"1家。","laws":[{"name":"政府採購法 第22條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=22"}]},{"id":"s12-mc-53","type":"single","question":"某鎮公所依採購法第22條第1項第3款辦理限制性招標採購，以下何者為正確？","options":["因採購案件為排水工程，可簽報機關首長或其授權人員通案核准。","因屬緊急採購，僅逕洽某廠商議價即可，免優先洽2家廠商比價。","不適用「特別採購招標決標處理辦法」。","以上皆非。"],"answer":"不適用「特別採購招標決標處理辦法」。","laws":[{"name":"政府採購法 第22條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=22"}]},{"id":"s12-mc-54","type":"single","question":"機關依採購法第22條第1項第9款辦理委託資訊服務，有關廠商之服務費用，得於契約規定於訂約後預付一部分，但該部分不得超過契約總額上限之百分之幾為原則？","options":["五十。","三十。","二十。","十五。"],"answer":"三十。","laws":[{"name":"政府採購法 第22條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=22"}]},{"id":"s12-mc-55","type":"single","question":"有關機關委託廠商辦理社會福利服務，下列敘述何者不正確？","options":["得於招標文件規定得標廠商實際績效提高時，依其情形給付廠商獎勵金。","採購評選委員會評選優勝廠商，得不以1家為限。","提供服務工作人員之薪資，應於招標文件規定採固定價格決標或不得低於一定金額。","機關提供場地供廠商使用，皆應由廠商負責維修，機關無需另外編列費用給付。"],"answer":"機關提供場地供廠商使用，皆應由廠商負責維修，機關無需另外編列費用給付。","laws":[{"name":"政府採購法 第22條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=22"}]},{"id":"s12-mc-56","type":"single","question":"下列何種情形屬採購法第22條第1項第1款所稱之「重大改變者」？","options":["投標廠商資格放寬。","履約數量明顯變更。","履約期限明顯變更。","以上皆是。"],"answer":"以上皆是。","laws":[{"name":"政府採購法 第22條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=22"}]},{"id":"s12-mc-57","type":"single","question":"機關委託廠商承辦資訊服務採服務成本加公費法者，得於招標文件規定得標廠商服務費用降低或實際績效提高時，得依情形給付廠商獎勵性報酬，其屬服務費用降低者，為所減省之契約價金金額之一定比率，以不逾百分之幾為原則？","options":["五十。","三十。","二十。","十。"],"answer":"五十。","laws":[{"name":"政府採購法 第22條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=22"}]},{"id":"s12-mc-58","type":"single","question":"機關依「機關辦理設計競賽廠商評選及計費辦法」以公告程序辦理設計競賽，設計競賽優勝者須於獲選後提供製作成品服務者，機關得於招標文件規定得標廠商服務費用降低或實際績效提高時，得依其情形給付廠商獎勵性報酬。其報酬之規定為何？","options":["屬服務費用降低者，為所減省之契約價金之一定比率，且以不逾百分之五十為原則。","屬實際績效提高者，為所減省之契約價金之一定比率，且以不逾百分之五十為原則。","屬服務費用降低者，依契約所載計算方式給付，且以不逾百分之三十為原則。","屬實際績效提高者，依契約所載計算方式給付，且以不逾百分之三十為原則。"],"answer":"屬服務費用降低者，為所減省之契約價金之一定比率，且以不逾百分之五十為原則。","laws":[{"name":"政府採購法 第22條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=22"}]},{"id":"s12-mc-59","type":"single","question":"機關辦理設計競賽，其採服務成本加公費法者，得於招標文件規定得標廠商服務費用降低或實際績效提高時，得依情形給付廠商獎勵性報酬，其屬服務費用降低者，為所減省之契約價金金額之一定比率，以不逾百分之五十為原則，其屬實際績效提高者之契約給付金額，以不逾契約價金總額或契約價金上限之百分之幾為原則？","options":["五十。","三十。","二十。","十。"],"answer":"十。","laws":[{"name":"政府採購法 第22條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=22"}]},{"id":"s12-mc-60","type":"single","question":"下列何者屬採購法第22條第1項第6款之適用要件？","options":["非洽原訂約廠商辦理，不能達契約之目的，且未逾原主契約金額百分之五十者。","因未能預見之情形，必須追加契約以外之工程。","如另行招標，確有產生重大不便及技術或經濟上困難之虞。","以上皆是。"],"answer":"以上皆是。","laws":[{"name":"政府採購法 第22條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=22"}]},{"id":"s12-mc-61","type":"single","question":"某國立大學辦理學生活動中心興建工程，施工期間因未能預見之情形，必須追加契約以外之工程，而擬依採購法第22條第1項第6款辦理，下列何者非屬其適用條件？","options":["新增項目。","原契約項目數量之增加。","原契約項目之減少。","原契約項目規格之變更。"],"answer":"原契約項目之減少。","laws":[{"name":"政府採購法 第22條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=22"}]},{"id":"s12-mc-62","type":"single","question":"機關在原招標目的範圍內，因未能預見之情形，必須追加契約以外之工程，如另行招標，確有產生重大不便及技術或經濟上困難之虞，非洽原訂約廠商辦理，不能達契約之目的，且未逾原主契約金額百分之五十者，得採限制性招標。所稱百分之五十，下列何者正確？","options":["該次追加金額占原主契約金額。","該次追加金額占追加後主契約金額。","追加累計金額占追加後主契約金額。","追加累計金額占原主契約金額之比率。"],"answer":"追加累計金額占原主契約金額之比率。","laws":[{"name":"政府採購法 第22條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=22"}]},{"id":"s12-mc-63","type":"single","question":"機關辦理委託資訊服務之公開評選屬計畫性質複雜，服務費用不易確實預估或履約成果不確定之服務案件，服務費用之計算適用何者計算方式？","options":["服務成本加公費法。","費用百分比法。","按月、按日或按時計酬法。","總包價法或單價計算法。"],"answer":"服務成本加公費法。","laws":[{"name":"政府採購法 第22條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=22"}]},{"id":"s12-mc-64","type":"single","question":"機關辦理委託資訊服務，其服務費用未達公告金額者，下列何者不是得適用之採購方式？","options":["公開取得書面報價或企劃書。","公開評選。","公開招標。","統包。"],"answer":"統包。","laws":[{"name":"政府採購法 第22條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=22"}]},{"id":"s12-mc-65","type":"single","question":"機關採購房地產訂有底價者，訂定底價時應考量下列何者因素？","options":["當地近期買賣實例。","政府公定價格、評定價格或標售之價格。","房地漲跌趨勢。","以上皆是。"],"answer":"以上皆是。","laws":[{"name":"政府採購法 第22條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=22"}]},{"id":"s12-mc-66","type":"single","question":"機關指定地區採購房地產，應先編擬計畫依規定層報核定，此計畫內容不包括下列何者？","options":["採購房地產及指定地區採購之理由及其必要性。","政府公定或評定價格。","附近買賣實例或其他徵信資料。","預估底價。"],"answer":"預估底價。","laws":[{"name":"政府採購法 第22條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=22"}]},{"id":"s12-mc-67","type":"single","question":"委託技術服務須縮短時間完成者，得按縮短時間之程度酌增費用，其所增費用：","options":["須採服務成本加公費法計算。","得專案議定。","須採總包價法計算。","須採建造費用百分比法計算。"],"answer":"得專案議定。","laws":[{"name":"政府採購法 第22條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=22"}]},{"id":"s12-mc-68","type":"single","question":"下列何者不是機關依「機關辦理設計競賽廠商評選及計費辦法」以公告程序辦理設計競賽，得採行的方式？","options":["公開徵求廠商提出設計作品供評選。","在相關專業領域著有專書或研究報告，經機關認有特殊表現或貢獻者審查擇定後，再通知廠商提出計畫書供評選。","公開徵求廠商提出設計作品及設計說明書供評選。","公開徵求廠商提出設計建議書，經評選入選者再邀其提出設計作品供評選。"],"answer":"在相關專業領域著有專書或研究報告，經機關認有特殊表現或貢獻者審查擇定後，再通知廠商提出計畫書供評選。","laws":[{"name":"政府採購法 第22條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=22"}]},{"id":"s12-mc-69","type":"single","question":"機關依機關辦理設計競賽廠商評選及計費辦法辦理設計競賽，設計成果之製作費用，下列何者正確？","options":["採服務成本加公費法為原則核實給付。","採總包價法為原則，屬得標廠商代收及代付之費用亦同。","以採總包價法為原則，但屬得標廠商代收及代付之費用，得核實給付。","按月、按日或按時計酬法，但屬得標廠商代收及代付之費用，得核實給付。"],"answer":"以採總包價法為原則，但屬得標廠商代收及代付之費用，得核實給付。","laws":[{"name":"政府採購法 第22條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=22"}]},{"id":"s12-mc-70","type":"single","question":"未達公告金額之採購，以公開取得廠商之書面報價或企劃書方式辦理者下列何者為正確？","options":["以採購法第34條公開徵求廠商提供參考資料之方式刊登公告。","可於公告文件載明截止收件日期，不必載明開標時間及地點。","其決標結果得不通知廠商。","廠商不得提出異議。"],"answer":"可於公告文件載明截止收件日期，不必載明開標時間及地點。","laws":[{"name":"政府採購法 第23條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=23"}]},{"id":"s12-mc-71","type":"single","question":"依採購法第49條之規定，將公開徵求廠商提供書面報價或企劃書之公告，公開於主管機關之資訊網路或刊登於政府採購公報，應取得幾家以上廠商之書面報價或企劃書，擇符合需要者辦理比價或議價？","options":["1家。","2家。","3家。","依招標文件規定家數。"],"answer":"3家。","laws":[{"name":"政府採購法 第23條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=23"}]},{"id":"s12-mc-72","type":"single","question":"未達公告金額採購之招標，其金額逾公告金額十分之一者，依「中央機關未達公告金額採購招標辦法」規定，符合採購法第22條第1項第16款採限制性招標者，應經需求、使用或承辦採購單位就個案敘明邀請指定廠商比價或議價之適當理由，並經下列何程序，得採限制性招標？","options":["簽報機關首長或其授權人員核准。","簽報主管機關認定。","預算書敘明。","報經上級機關核准。"],"answer":"簽報機關首長或其授權人員核准。","laws":[{"name":"政府採購法 第23條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=23"},{"name":"中央機關未達公告金額採購招標辦法","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030067"}]},{"id":"s12-mc-73","type":"single","question":"下列敘述何者正確？","options":["機關以統包併採最有利標決標方式辦理者，無需報經上級機關核准。","統包採購不得依採購法第22條第1項第9款規定辦理。","共同投標廠商應於簽約時檢附共同投標協議書。","所稱統包，指將工程或財物採購中之設計、監造與施工、供應、安裝或一定期間之維修等併於同一採購契約辦理招標。"],"answer":"統包採購不得依採購法第22條第1項第9款規定辦理。","laws":[{"name":"政府採購法 第24條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=24"}]},{"id":"s12-mc-74","type":"single","question":"某國立大學採統包方式辦理步道工程採購，總金額為新臺幣95萬元，下列何者不是得採行的方式？","options":["依採購法第22條第1項第9款辦理公開評選。","公開取得企劃書。","公開招標。","最有利標決標。"],"answer":"依採購法第22條第1項第9款辦理公開評選。","laws":[{"name":"政府採購法 第24條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=24"}]},{"id":"s12-mc-75","type":"single","question":"共同投標廠商有採購法第101條各款所列情形，依採購法第102條第3項應刊登政府採購公報者，應如何刊登方為正確？","options":["視可歸責之事由，對各該應負責任之成員個別刊登。","一律刊登全體成員名稱。","刊登代表廠商名稱。","以上皆非。"],"answer":"視可歸責之事由，對各該應負責任之成員個別刊登。","laws":[{"name":"政府採購法 第25條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=25"}]},{"id":"s12-mc-76","type":"single","question":"共同投標廠商於投標時應檢附之共同投標協議書，下列何者為非？","options":["由各成員之負責人或其代理人共同具名。","投標前應先報請招標機關審核。","經公證或認證。","載明共同投標廠商之代表廠商、代表人及其權責。"],"answer":"投標前應先報請招標機關審核。","laws":[{"name":"政府採購法 第25條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=25"}]},{"id":"s12-mc-77","type":"single","question":"共同投標廠商之共同投標協議書，下列何者為非？","options":["應載明各成員之主辦項目及所占契約金額比率。","協議書內容與契約約定不符者，以協議書內容為準。","應載明各成員於得標後連帶負履行契約責任。","協議書內容，非經機關同意不得變更。"],"answer":"協議書內容與契約約定不符者，以協議書內容為準。","laws":[{"name":"政府採購法 第25條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=25"}]},{"id":"s12-mc-78","type":"single","question":"機關允許共同投標時，應於招標文件中規定共同投標廠商之成員，不得對同一採購另行提出投標文件或為另一共同投標廠商之成員。但有下列何種情形不在此限？","options":["該採購涉及統包，以增加廠商競爭者。","預估合於招標文件規定之投標廠商競爭不足，規定廠商不得為不同共同投標廠商之成員反不利競爭者。","其他經上級機關認定者。","採最有利標決標者。"],"answer":"預估合於招標文件規定之投標廠商競爭不足，規定廠商不得為不同共同投標廠商之成員反不利競爭者。","laws":[{"name":"政府採購法 第25條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=25"}]},{"id":"s12-mc-79","type":"single","question":"採購法第25條第1項允許共同投標之個別採購特性，為下列何種情形：","options":["允許共同投標有利工作界面管理者。","允許共同投標可促進競爭者。","允許共同投標，以符合新工法引進或專利使用之需要者。","以上皆是。"],"answer":"以上皆是。","laws":[{"name":"政府採購法 第25條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=25"}]},{"id":"s12-mc-80","type":"single","question":"機關擬定之技術規格無國際標準或國家標準，且無法以精確之方式說明招標要求，爰於招標文件列舉特定之3家廠牌並註明「或同等品」，其所列廠牌應符合之情形，以下何者為非？","options":["所列廠牌之價格應相當。","所列廠牌僅供廠商參考。","所列廠牌目前市場上均有供應且取得容易。","所列廠牌之尺寸規格應相同。"],"answer":"所列廠牌之尺寸規格應相同。","laws":[{"name":"政府採購法 第26條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=26"}]},{"id":"s12-mc-81","type":"single","question":"下列敘述何者錯誤？","options":["機關辦理公告金額以上之採購，應依功能或效益訂定招標文件。其有國際標準或國家標準者，應從其規定。","招標文件允許投標廠商提出同等品者，機關於招標文件中規定廠商應於投標文件內預先提出以供審查，並無違反採購法規定。","機關於招標文件要求特定之商名，並註明「或同等品」字樣者，即不違採購法。","採購法第26條第3項所稱同等品，指經機關審查認定，其功能、效益、標準或特性不低於招標文件所要求或提及者。"],"answer":"機關於招標文件要求特定之商名，並註明「或同等品」字樣者，即不違採購法。","laws":[{"name":"政府採購法 第26條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=26"}]},{"id":"s12-mc-82","type":"single","question":"採購法第26條第3項所稱同等品，應由下列何者審查認定，其功能、效益、標準或特性不低於招標文件所要求或提及者？","options":["評選委員會。","開標主持人。","招標機關。","主管機關。"],"answer":"招標機關。","laws":[{"name":"政府採購法 第26條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=26"}]},{"id":"s12-mc-83","type":"single","question":"下列採購之招標資訊之公告，何者依規定得免刊登政府採購公報？","options":["採購法第22條第1項第9款規定之公開評選。","依採購法第22條第1項第15款規定之徵求公告。","依採購法第61條規定之決標結果公告。","採購法第102條第3項規定之廠商名稱與相關情形。"],"answer":"依採購法第22條第1項第15款規定之徵求公告。","laws":[{"name":"政府採購法 第27條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=27"}]},{"id":"s12-mc-84","type":"single","question":"機關如欲在開標後辦理廢標，須刊登以下那一個公告？","options":["更正公告。","決標公告。","定期彙送。","無法決標公告。"],"answer":"無法決標公告。","laws":[{"name":"政府採購法 第27條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=27"}]},{"id":"s12-mc-85","type":"single","question":"下列何者為非？","options":["查核金額以上之採購，因涉及轉售，未於招標公告載明預算金額。","公告金額以上特殊採購，其以預算金額訂定特定資格條件者，應於招標公告載明預算金額。","公開招標辦理之招標公告，應載明是否屬公共工程實施技師簽證者。","採用複數決標之方式者，應俟全部項目決標後一次刊登決標公告。"],"answer":"採用複數決標之方式者，應俟全部項目決標後一次刊登決標公告。","laws":[{"name":"政府採購法 第27條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=27"}]},{"id":"s12-mc-86","type":"single","question":"下列何者不是應刊登採購公報1日，並公開於主管機關之政府採購資訊網站之政府採購資訊？","options":["公開招標之變更或補充招標文件內容。","採購法第22條第1項第14款規定之公告審查。","採購法第49條公開取得廠商書面報價。","採購法第61條規定之無法決標。"],"answer":"採購法第49條公開取得廠商書面報價。","laws":[{"name":"政府採購法 第27條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=27"}]},{"id":"s12-mc-87","type":"single","question":"下列政府採購資訊應刊登政府採購公報1日之公告，並公開於主管機關之政府採購資訊網站？","options":["採購法第22條第1項第13款規定之公告審查。","採購法第22條第1項第9款規定之公開評選。","採購法第34條第1項但書規定之公開說明或公開徵求廠商提供參考資料。","採購法第49條公開取得書面報價或企劃書。"],"answer":"採購法第22條第1項第9款規定之公開評選。","laws":[{"name":"政府採購法 第27條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=27"}]},{"id":"s12-mc-88","type":"single","question":"依採購法第27條第1項規定辦理之招標公告，下列何者不是應登載之事項：","options":["履約期限。","收受投標文件之地點及截止期限。","廠商資格條件摘要。","辦理決標之時間及地點。"],"answer":"辦理決標之時間及地點。","laws":[{"name":"政府採購法 第27條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=27"}]},{"id":"s12-mc-89","type":"single","question":"機關辦理採購，除我國締結之條約或協定另有規定者外，下列何種情形，經機關首長或其授權人員核准，其等標期得視案件特性及實際需要合理訂定，不適用招標期限標準規定？","options":["依採購法第22條以預先建立之合格廠商名單，邀請符合資格之廠商投標，於辦理廠商資格審查之文件中另有載明者。","政府機關為商業性轉售或用於製造產品、提供服務以供轉售目的所為之採購、基於採購案件之特性或實際需要，有縮短等標期之必要者。","採購原料、物料或農礦產品，其市場行情穩定者。","採購標的屬廠商於市場普遍銷售且招標文件及投標文件內容簡單者。"],"answer":"採購標的屬廠商於市場普遍銷售且招標文件及投標文件內容簡單者。","laws":[{"name":"政府採購法 第28條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=28"}]},{"id":"s12-mc-90","type":"single","question":"機關於等標期截止前取消或暫停招標，並於取消或暫停後，且招標文件內容未經重大改變者，最多於多久期間內重行招標者，等標期得考量取消或暫停前已公告或邀標之日數，依原定期限酌予縮短？","options":["6個月內。","3個月內。","1年內。","14日內。"],"answer":"6個月內。","laws":[{"name":"政府採購法 第28條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=28"}]},{"id":"s12-mc-91","type":"single","question":"機關辦理採購，於等標期截止前變更或補充招標文件內容者，應視需要延長等標期。前項變更或擴充，其非屬重大改變，且原定截止日前幾日公告或書面通知各廠商者，得免延長等標期？","options":["5日。","7日。","10日。","14日。"],"answer":"5日。","laws":[{"name":"政府採購法 第28條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=28"}]},{"id":"s12-mc-92","type":"single","question":"機關辦理採購，於6個月內重行或續行招標且招標文件內容未經重大改變者，其等標期，未達公告金額之採購不得少於A日，公告金額以上之採購不得少於B日？","options":["A=2日；B=5日。","A=3日；B=5日。","A=3日；B=7日。","A=5日；B=7日。"],"answer":"A=3日；B=7日。","laws":[{"name":"政府採購法 第28條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=28"}]},{"id":"s12-mc-93","type":"single","question":"機關辦理採購，依採購法第93條之1規定辦理電子領標並於招標公告敘明者，等標期得縮短A日。但縮短後不得少於B日？","options":["A=2日；B=5日。","A=3日；B=5日。","A=3日；B=7日。","A=5日；B=10日。"],"answer":"A=3日；B=5日。","laws":[{"name":"政府採購法 第28條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=28"}]},{"id":"s12-mc-94","type":"single","question":"機關辦理非適用WTO政府採購協定之巨額採購公開招標，其等標期（未提供電子領投標及公開閱覽）不得少於幾日？","options":["28日。","30日。","21日。","40日。"],"answer":"28日。","laws":[{"name":"政府採購法 第28條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=28"}]},{"id":"s12-mc-95","type":"single","question":"機關於等標期截止後流標或廢標，並於其後多久期間內重行招標且招標文件內容未經重大改變者，等標期得予縮短，公告金額以上之採購不得少於7日？","options":["6個月內。","3個月內。","1年內。","14日內。"],"answer":"3個月內。","laws":[{"name":"政府採購法 第28條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=28"}]},{"id":"s12-mc-96","type":"single","question":"機關辦理未達公告金額之採購，其採公開招標（未提供電子領投標及公開閱覽）辦理者，訂定等標期時，下列敘述何者最為完整？","options":["不少於5天。","14天以上合理期限。","7天以上合理期限。","5天以上合理期限。"],"answer":"7天以上合理期限。","laws":[{"name":"政府採購法 第28條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=28"}]},{"id":"s12-mc-97","type":"single","question":"機關辦理採購，於招標前將招標文件稿辦理公開閱覽，且招標文件內容未經重大改變者，等標期得縮短A日。但縮短後不得少於B日？","options":["A=2日；B=5日。","A=3日；B=5日。","A=3日；B=7日。","A=5日；B=10日。"],"answer":"A=5日；B=10日。","laws":[{"name":"政府採購法 第28條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=28"}]},{"id":"s12-mc-98","type":"single","question":"機關辦理公開招標，依採購法第42條第2項規定辦理後續階段之邀標，其等標期由「機關」視需要合理訂定之。前開所列「機關」係指下列何者？","options":["招標機關。","上級機關。","主管機關。","行政院。"],"answer":"招標機關。","laws":[{"name":"政府採購法 第28條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=28"}]},{"id":"s12-mc-99","type":"single","question":"機關辦理公開招標（未提供電子領投標及公開閱覽），依採購法第42條第2項規定，辦理後續階段之邀標，由機關視需要合理訂定之，但等標期不得少於幾日？","options":["3日。","5日。","7日。","10日。"],"answer":"7日。","laws":[{"name":"政府採購法 第28條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=28"}]},{"id":"s12-mc-100","type":"single","question":"機關辦理非適用WTO政府採購協定之採購公開招標，查核金額以上未達巨額金額之採購，其等標期（未提供電子領投標及公開閱覽）不得少於幾日？","options":["14日。","21日。","28日。","35日。"],"answer":"21日。","laws":[{"name":"政府採購法 第28條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=28"}]},{"id":"s12-mc-101","type":"single","question":"機關辦理非適用WTO政府採購協定之採購選擇性招標之廠商資格預先審查，公告金額以上未達巨額金額之採購，其等標期（未提供電子領投標及公開閱覽）不得少於幾日？","options":["7日。","10日。","14日。","21日。"],"answer":"10日。","laws":[{"name":"政府採購法 第28條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=28"}]},{"id":"s12-mc-102","type":"single","question":"機關辦理非適用WTO政府採購協定之採購選擇性招標之廠商資格預先審查，未達公告金額之採購，其等標期（未提供電子領投標及公開閱覽）不得少於幾日？","options":["5日。","7日。","10日。","14日。"],"answer":"7日。","laws":[{"name":"政府採購法 第28條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=28"}]},{"id":"s12-mc-103","type":"single","question":"機關依採購法第49條之規定公開徵求廠商之書面報價或企劃書者，其等標期（未提供電子領投標及公開閱覽），應訂定幾日以上之合理期限？","options":["5日。","7日。","10日。","14日。"],"answer":"5日。","laws":[{"name":"政府採購法 第28條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=28"}]},{"id":"s12-mc-104","type":"single","question":"機關辦理非適用WTO政府採購協定之採購選擇性招標之廠商資格預先審查，巨額之採購，其等標期（未提供電子領投標及公開閱覽）不得少於幾日？","options":["7日。","10日。","14日。","21日。"],"answer":"14日。","laws":[{"name":"政府採購法 第28條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=28"}]},{"id":"s12-mc-105","type":"single","question":"機關辦理採購，依採購法第93條之1規定辦理電子投標並於招標公告或招標文件敘明者，等標期得縮短A日。但縮短後不得少於B日？","options":["A=2日；B=5日。","A=3日；B=5日。","A=3日；B=7日。","A=5日；B=10日。"],"answer":"A=2日；B=5日。","laws":[{"name":"政府採購法 第28條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=28"}]},{"id":"s12-mc-106","type":"single","question":"以下敘述何者錯誤？","options":["廠商以設定質權之金融機構定期存單繳納履約保證金者，其存款人(出質人)無須為訂約廠商或其負責人。","投標廠商繳納之押標金得以公司或負責人名義簽發之支票為之。","廠商以漁會信用部簽發之支票繳納押標金，其票面金額得大於機關所訂押標金之額度。","廠商以臺灣銀行簽發，未填寫受款人之支票，繳納臺北市政府辦理之甲標案押標金。"],"answer":"投標廠商繳納之押標金得以公司或負責人名義簽發之支票為之。","laws":[{"name":"政府採購法 第30條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=30"}]},{"id":"s12-mc-107","type":"single","question":"機關辦理採購，關於押標金，下列敘述何者為非？","options":["其額度以不逾預算金額或預估採購總額之百分之五為原則，且不得逾新臺幣5000萬元。","應以投標廠商名義繳納。","應於招標文件中載明廠商應將押標金（含現金）附於投標文件內遞送。","得於招標文件中規定採電子投標之廠商得減收押標金，但減收額度以不逾百分之十為限。"],"answer":"應於招標文件中載明廠商應將押標金（含現金）附於投標文件內遞送。","laws":[{"name":"政府採購法 第30條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=30"}]},{"id":"s12-mc-108","type":"single","question":"押標金之額度，得為一定金額或標價之一定比率，一定比率，以不逾標價之百分之五為原則。但不得逾新臺幣多少元？","options":["500萬元。","1,000萬元。","2,500萬元。","5,000萬元。"],"answer":"5,000萬元。","laws":[{"name":"政府採購法 第30條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=30"}]},{"id":"s12-mc-109","type":"single","question":"機關得視案件性質及實際需要，於招標文件中規定得標廠商得支領預付款，並訂明廠商應先提供同額預付款還款保證，其提供保證之時機為？","options":["支領預付款前。","決標後簽約前。","繳納履約保證金時。","決標前。"],"answer":"支領預付款前。","laws":[{"name":"政府採購法 第30條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=30"}]},{"id":"s12-mc-110","type":"single","question":"廠商繳納押標金不予發還之情形，下列何者為非？","options":["冒用他人名義或證件投標。","得標後拒不簽約。","廠商之標價偏低，有採購法第58條所定情形而未於機關通知期限內提出合理之說明者。","借用他人名義或證件投標。"],"answer":"廠商之標價偏低，有採購法第58條所定情形而未於機關通知期限內提出合理之說明者。","laws":[{"name":"政府採購法 第31條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=31"}]},{"id":"s12-mc-111","type":"single","question":"採購法第31條第2項第7款「其他經主管機關認定有影響採購公正之違反法令行為者」之情形，下列何者為非？","options":["有採購法第50條第1項第5款情形。","有採購法第50條第1項第7款情形。","廠商或其代表人、代理人、受雇人或其他從業人員有採購法第87條、第90條或第91條規定構成要件事實之一。","廠商或其代表人、代理人、受雇人或其他從業人員與受機關委託提供採購規劃、設計、審查、監造、專案管理或代辦採購廠商之人員，共同實施採購法第88條規定構成要件事實。"],"answer":"有採購法第50條第1項第7款情形。","laws":[{"name":"政府採購法 第31條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=31"}]},{"id":"s12-mc-112","type":"single","question":"機關於招標文件規定廠商應繳納之押標金為新臺幣80萬元，有一廠商以存款金額為新臺幣100萬元之設定質權之定期存款單繳納該押標金，今有依招標文件規定不發還該廠商押標金，機關應不發還之押標金額度為新臺幣多少元？","options":["80萬元。","100萬元。","20萬元。","得由機關視個案情形斟酌不發還額度。"],"answer":"80萬元。","laws":[{"name":"政府採購法 第31條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=31"}]},{"id":"s12-mc-113","type":"single","question":"機關得於招標文件中規定，廠商所繳納之履約保證金及其孳息得部分或全部不發還之情形，下列何者錯誤？","options":["違反採購法第65條規定轉包者，全部保證金。","須返還已支領之契約價金而未返還者，與未返還金額相等之保證金。","未依契約約定延長保證金之有效期者，其應延長之保證金。","有破產或其他重大情事，致無法繼續履約而終止契約者，全部保證金。"],"answer":"有破產或其他重大情事，致無法繼續履約而終止契約者，全部保證金。","laws":[{"name":"政府採購法 第32條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=32"}]},{"id":"s12-mc-114","type":"single","question":"機關辦理採購，下列何者得於招標文件中規定為不合格標？","options":["投標文件未檢附願繳納差額保證金之切結書。","投標文件之頁數或紙張大小與招標文件規定不符者。","投標文件外封套未書明投標廠商名稱及地址。","投標文件未使用機關提供之封套。"],"answer":"投標文件外封套未書明投標廠商名稱及地址。","laws":[{"name":"政府採購法 第33條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=33"}]},{"id":"s12-mc-115","type":"single","question":"下列敘述何者不符合採購法第33條之規定？","options":["投標文件置於不透明之信封或容器內，並以漿糊、膠水、膠帶、釘書針、繩索或其他類似材料封裝。","投標信封上或容器外標示廠商名稱及地址。","機關指定以郵政信箱為唯一之投標送達場所。","同一投標廠商就同一採購之投標，以一標為限。"],"answer":"機關指定以郵政信箱為唯一之投標送達場所。","laws":[{"name":"政府採購法 第33條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=33"}]},{"id":"s12-mc-116","type":"single","question":"某學校總務主任主持一開標案，經發現廠商之投標文件有下列何種情形時，應為不合格標？","options":["投標文件置於塑膠透明資料袋內並以膠帶密封者。","投標文件置於不透明標封袋內並以釘書針封裝者。","標封上標示廠商之名稱及地址。","投標文件以不透明紙箱封裝。"],"answer":"投標文件置於塑膠透明資料袋內並以膠帶密封者。","laws":[{"name":"政府採購法 第33條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=33"}]},{"id":"s12-mc-117","type":"single","question":"機關辦理採購，下列敘述何者正確？","options":["廠商之企劃書，決標後得免予保密。","招標文件於公告前應予保密。","開標後，除有特殊情形外，底價應予公開。","機關得於招標文件中公告底價，但應報經上級機關核准。"],"answer":"招標文件於公告前應予保密。","laws":[{"name":"政府採購法 第34條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=34"}]},{"id":"s12-mc-118","type":"single","question":"機關辦理採購，有關替代方案之規定，下列敘述何者正確？","options":["替代方案之適用時機，僅限招標階段。","機關允許廠商於得標後提出替代方案者，機關審查替代方案所需費用，由廠商負擔。","採用替代方案決標者，機關實施替代方案所增加之必要費用，由雙方分攤。","機關得於招標文件中規定允許廠商於得標後提出替代方案且定有獎勵措施者，其獎勵額度，為所減省契約價金之百分之六十。"],"answer":"機關允許廠商於得標後提出替代方案者，機關審查替代方案所需費用，由廠商負擔。","laws":[{"name":"政府採購法 第35條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=35"}]},{"id":"s12-mc-119","type":"single","question":"機關於招標文件中規定允許廠商於得標後提出替代方案且定有獎勵措施者，其獎勵額度為何？","options":["不逾所減省契約價金之百分之五十為限。但不扣除機關為處理替代方案所增加之必要費用。","不逾所減省契約價金之百分之三十為限。但不扣除機關為處理替代方案所增加之必要費用。","不逾所減省契約價金之百分之五十為限，並應扣除機關為處理替代方案所增加之必要費用。","不逾所減省契約價金之百分之三十為限，並應扣除機關為處理替代方案所增加之必要費用。"],"answer":"不逾所減省契約價金之百分之五十為限，並應扣除機關為處理替代方案所增加之必要費用。","laws":[{"name":"政府採購法 第35條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=35"}]},{"id":"s12-mc-120","type":"single","question":"機關辦理採購，有關替代方案之規定，下列敘述何者正確？","options":["機關於招標文件中規定允許投標廠商於截止投標期限前提出替代方案者，替代方案標封應與主方案同時開封及審查，並於招標文件訂明。","廠商依規定於截止投標期限前提出替代方案者，替代方案應單獨密封，標封外標示其為替代方案，且每一項目以提出一個替代方案為限，如未提出主方案，則以替代方案審查之。","替代方案經綜合評估各有利不利情形，其總體效益更有利於機關者，即使延長主方案之工期，替代方案仍得採用。","招標文件中未規定允許提出替代方案，廠商自行提出之替代方案，仍得接受，納為決標標的。"],"answer":"替代方案經綜合評估各有利不利情形，其總體效益更有利於機關者，即使延長主方案之工期，替代方案仍得採用。","laws":[{"name":"政府採購法 第35條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=35"}]},{"id":"s12-mc-121","type":"single","question":"下列何者屬「與提供招標標的有關」之投標廠商基本資格？","options":["具有相當財力證明。","廠商依工業團體法或商業團體法加入工業或商業團體之證明。","具有相當經驗或實績之證明。","實收資本額。"],"answer":"廠商依工業團體法或商業團體法加入工業或商業團體之證明。","laws":[{"name":"政府採購法 第36條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=36"}]},{"id":"s12-mc-122","type":"single","question":"機關辦理預算金額為新臺幣4億元巨額工程採購之公開招標，經評估有訂定特定資格之必要，其單次契約金額之訂定最高得規定廠商提報之單次實績金額不低於新臺幣多少元？","options":["4億元。","4,000萬元。","1億6000萬元。","1,600萬元。"],"answer":"1億6000萬元。","laws":[{"name":"政府採購法 第36條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=36"}]},{"id":"s12-mc-123","type":"single","question":"下列何者非屬投標廠商資格與特殊或巨額採購認定標準第4條第1項第5款所稱「廠商信用之證明」？","options":["票據交換機構於截止投標日之前半年內所出具之非拒絕往來戶。","金融機構出具之信用證明。","會計師簽證之財務報表。","營業稅繳納證明。"],"answer":"營業稅繳納證明。","laws":[{"name":"政府採購法 第36條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=36"},{"name":"投標廠商資格與特殊或巨額採購認定標準","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030099"}]},{"id":"s12-mc-124","type":"single","question":"機關辦理預算金額為新臺幣2億元巨額工程採購之公開招標，經評估有訂定特定資格之必要，其契約累計金額之訂定最高得規定廠商提報之累計實績金額為不低於新臺幣多少金額？","options":["8,000萬元。","2億元。","2,000萬元。","8,400 萬元。"],"answer":"2億元。","laws":[{"name":"政府採購法 第36條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=36"}]},{"id":"s12-mc-125","type":"single","question":"依投標廠商資格與特殊或巨額採購認定標準規定，何者非屬投標廠商特定資格之證明文件？","options":["營業稅或所得稅之納稅證明。","投標廠商現有與承包招標標的有關之專業或一般人力證明。","截止投標日前5年內，完成與招標標的同性質或相當之工程、財物或勞務契約。","具有符合國際或國家品質管理之驗證文件。"],"answer":"營業稅或所得稅之納稅證明。","laws":[{"name":"政府採購法 第36條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=36"},{"name":"投標廠商資格與特殊或巨額採購認定標準","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030099"}]},{"id":"s12-mc-126","type":"single","question":"以下何者為非？","options":["巨額採購，於工程採購，為新臺幣2億元；於財物採購，為新臺幣1億元。","機關辦理採購，得依採購案件之特性及實際需要，訂定與提供招標標的有關或與履約能力有關之基本資格。","招標文件得就外國廠商之投標資格及應提出之資格文件另行規定，並附經公證或認證之中文譯本。","機關訂定招標文件，對於投標廠商之設立地或所在地，應依採購案之性質與實際需要予以限制。"],"answer":"機關訂定招標文件，對於投標廠商之設立地或所在地，應依採購案之性質與實際需要予以限制。","laws":[{"name":"政府採購法 第36條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=36"}]},{"id":"s12-mc-127","type":"single","question":"機關依投標廠商資格與特殊或巨額採購認定標準第5條第1項第3款訂定「具有相當財力」之特定資格證明，下列何項規定不得訂定？","options":["流動負債不低於流動資產。","權益不低於招標標的預算金額十二分之一。","實收資本額不低於招標標的預算金額之十分之一。","總負債金額不超過權益4倍。"],"answer":"流動負債不低於流動資產。","laws":[{"name":"政府採購法 第36條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=36"},{"name":"投標廠商資格與特殊或巨額採購認定標準","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030099"}]},{"id":"s12-mc-128","type":"single","question":"下列採購何者非屬特殊採購？","options":["藝術品或具有歷史文化紀念價值之古物採購。","使用特殊施工方法或技術之工程。","興建構造物，單一跨徑在15公尺以上之工程。","需要特殊機具、設備或技術始能完成之財物或勞務採購。"],"answer":"興建構造物，單一跨徑在15公尺以上之工程。","laws":[{"name":"政府採購法 第36條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=36"}]},{"id":"s12-mc-129","type":"single","question":"財物採購之採購金額在何種金額以上，係為巨額採購？","options":["新臺幣5000萬元。","新臺幣1億元。","新臺幣2億元。","新臺幣2000萬元。"],"answer":"新臺幣1億元。","laws":[{"name":"政府採購法 第36條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=36"}]},{"id":"s12-mc-130","type":"single","question":"下列何者係屬錯誤之敘述？","options":["履約期間逾1年之勞務採購，其以提供勞力為主，且工作內容重複者，以第1年之預算金額訂定資格條件。","投標廠商未符合機關依採購法第36條所定資格者，得以銀行或保險公司之履約及賠償連帶保證責任、連帶保證保險單代之。","機關訂定投標廠商之資格，不得不當限制競爭，並以確認廠商具備履行契約所必須之能力者為限。","投標廠商應符合之資格之一部分，招標文件得訂明允許以分包廠商就其分包部分所具有者代之。"],"answer":"投標廠商未符合機關依採購法第36條所定資格者，得以銀行或保險公司之履約及賠償連帶保證責任、連帶保證保險單代之。","laws":[{"name":"政府採購法 第36條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=36"}]},{"id":"s12-mc-131","type":"single","question":"機關辦理新臺幣1億元之非特殊工程採購，不得訂定下列何種投標廠商資格？","options":["廠商登記或設立之證明。","廠商信用之證明。","具有相當財力之證明。","廠商具有製造、供應或承做能力之證明。"],"answer":"具有相當財力之證明。","laws":[{"name":"政府採購法 第36條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=36"}]},{"id":"s12-mc-132","type":"single","question":"有關投標廠商資格之敘述，何者為正確？","options":["「投標廠商資格與特殊或巨額採購認定標準」有關「經驗或實績」規定所稱「單次契約金額」或「累計金額」，招標機關得本於權責自行決定係擇一訂定或兩者俱訂。","機關辦理特殊或巨額採購，得視案件特性及需要，訂定特定資格者，不得同時訂定基本資格。","票據交換機構於等標期內所出具之非拒絕往來戶或最近3年內無退票紀錄證明，方得為廠商信用之證明。","「工廠登記證明文件」為投標廠商特定資格。"],"answer":"「投標廠商資格與特殊或巨額採購認定標準」有關「經驗或實績」規定所稱「單次契約金額」或「累計金額」，招標機關得本於權責自行決定係擇一訂定或兩者俱訂。","laws":[{"name":"政府採購法 第36條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=36"},{"name":"投標廠商資格與特殊或巨額採購認定標準","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030099"}]},{"id":"s12-mc-133","type":"single","question":"機關訂定招標文件，何者正確？","options":["廠商履行契約所必須具備之財務、商業或技術資格條件，不考慮廠商在外國之商業活動。","為因應採購性質與特性，得就投標廠商之設立地或所在地予以指定。","有關加入工業或商業團體之資格證明，除法令另有規定外，不得限制由特定區域之團體出具。","廠商或其受雇人、從業人員具有專門技能之資格證明，屬特定資格。"],"answer":"有關加入工業或商業團體之資格證明，除法令另有規定外，不得限制由特定區域之團體出具。","laws":[{"name":"政府採購法 第36條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=36"}]},{"id":"s12-mc-134","type":"single","question":"下列何者係屬投標廠商之特定資格？","options":["所得稅或營業稅之納稅證明。","公會會員證。","曾完成與招標標的類似之製造、供應或承做之文件。","具有符合國家品質管理之驗證文件。"],"answer":"具有符合國家品質管理之驗證文件。","laws":[{"name":"政府採購法 第36條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=36"}]},{"id":"s12-mc-135","type":"single","question":"機關訂定投標廠商之特定資格時，以下何者為是？","options":["應先評估可能符合特定資格之廠商家數，並檢討有無不當限制競爭之情形。","得規定投標廠商之實收資本額應不低於招標標的預算金額之八分之一。","得規定投標廠商之權益不低於招標標的預算金額之十分之一。","得規定投標廠商於截止投標日前3年內，曾完成與招標標的同性質之採購契約。"],"answer":"應先評估可能符合特定資格之廠商家數，並檢討有無不當限制競爭之情形。","laws":[{"name":"政府採購法 第36條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=36"}]},{"id":"s12-mc-136","type":"single","question":"有關投標廠商資格之敘述，何者為正確？","options":["機關辦理特殊或巨額採購，得視採購案件之特性及實際需要，訂定投標廠商之基本資格。","機關訂定投標廠商需具有相當財力之資格證明者，其範圍得包括實收資本額不低於招標標的預算金額之五分之二。","機關辦理外國廠商得參與之採購，不得禁止大陸廠商投標。","機關以廠商須有相當經驗或實績為特定資格者，其期間得限3年內者。"],"answer":"機關辦理特殊或巨額採購，得視採購案件之特性及實際需要，訂定投標廠商之基本資格。","laws":[{"name":"政府採購法 第36條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=36"}]},{"id":"s12-mc-137","type":"single","question":"某學校舉辦畢業旅行之勞務採購案，非屬特殊採購，採購金額新臺幣100萬元，所訂之資格條件何者為非？","options":["營業稅繳款書收據聯或主管稽徵機關核章之最近一期營業人銷售額與稅額申報書收執聯。","由政府機關或其授權機構核發該廠商係合法登記或設立之證明文件。","須提出最近3年內曾辦理類似活動400人以上且3次之經驗。","票據交換機構於截止投標日之前半年內所出具之最近3年內無退票紀錄證明。"],"answer":"須提出最近3年內曾辦理類似活動400人以上且3次之經驗。","laws":[{"name":"政府採購法 第36條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=36"}]},{"id":"s12-mc-138","type":"single","question":"下列敘述何者為錯誤？","options":["興建長度在1,000公尺以上之隧道，屬特殊採購。","採購兼有工程、勞務二種性質，而工程認定其歸屬者，於勞務性質符合特殊採購情形者，得以該勞務性質於該採購所占比例訂定特定資格。","投標廠商應提出之資格證明文件，廠商得以目的事業主管機關核准之電子資料替代。","機關訂定與履約能力有關之基本資格時，得依採購案件之特性及實際需要對其受雇人、從業人員具有專門技能之人數，視個案需要，予以限制，並得逾法令規定之人數。"],"answer":"機關訂定與履約能力有關之基本資格時，得依採購案件之特性及實際需要對其受雇人、從業人員具有專門技能之人數，視個案需要，予以限制，並得逾法令規定之人數。","laws":[{"name":"政府採購法 第36條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=36"}]},{"id":"s12-mc-139","type":"single","question":"機關辦理為期2年新臺幣6,000萬元巨額勞務採購之公開評選招標，第1年之預算金額為新臺幣3,000萬元，因該採購案工作內容重複且係以提供勞力為主，經評估有訂定特定資格之必要，其單次契約金額之訂定最高得規定廠商提報之單次契約實績金額，不低於新臺幣多少金額？","options":["3,000萬元。","2,400萬元。","6,000萬元。","1,200 萬元。"],"answer":"1,200 萬元。","laws":[{"name":"政府採購法 第36條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=36"}]},{"id":"s12-mc-140","type":"single","question":"以下何種公司型態非以登記之「資本總額」認定其「實收資本額」？","options":["無限公司。","兩合公司。","有限公司。","股份有限公司。"],"answer":"股份有限公司。","laws":[{"name":"政府採購法 第36條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=36"}]},{"id":"s12-mc-141","type":"single","question":"工程採購之採購金額在何種金額以上，係為巨額採購？","options":["新臺幣2億元。","新臺幣1億元。","新臺幣5,000萬元。","新臺幣2,000萬元。"],"answer":"新臺幣2億元。","laws":[{"name":"政府採購法 第36條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=36"}]},{"id":"s12-mc-142","type":"single","question":"下列敘述何者正確？","options":["新臺幣8,000萬元非特殊之工程採購，得依投標廠商資格與特殊或巨額採購認定標準訂定投標廠商之實收資本額。","投標廠商為外國廠商者，得免附具加入工業或商業團體之證明。","新臺幣1億元之工程採購，機關得訂定投標廠商之基本資格與特定資格。","有關廠商或其受雇人、從業人員具有專門技能之資格證明作為基本資格者，得就一定專門技能人員之人數依採購案之實際需要人數為限制規定。"],"answer":"投標廠商為外國廠商者，得免附具加入工業或商業團體之證明。","laws":[{"name":"政府採購法 第36條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=36"},{"name":"投標廠商資格與特殊或巨額採購認定標準","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030099"}]},{"id":"s12-mc-143","type":"single","question":"以下敘述何者錯誤？","options":["非屬特殊或巨額採購不得訂定與履約能力有關之廠商資格。","國立大學於投標時適用招標文件規定之資格條件。","外國廠商依其國情而難以出具之資格文件，得以自述方式於投標文件敘明。","廠商依工業團體法加入工業團體之證明，屬基本資格。"],"answer":"非屬特殊或巨額採購不得訂定與履約能力有關之廠商資格。","laws":[{"name":"政府採購法 第36條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=36"}]},{"id":"s12-mc-144","type":"single","question":"新臺幣(下同)2,000萬元之一般工程採購，不得訂定何種廠商資格條件？","options":["廠商之實收資本額不得低於200萬元。","廠商須檢附納稅證明。","廠商須提出設立或登記證明。","廠商須檢附曾完成與招標標的類似之承作文件。"],"answer":"廠商之實收資本額不得低於200萬元。","laws":[{"name":"政府採購法 第36條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=36"}]},{"id":"s12-mc-145","type":"single","question":"下列何者係屬「與履約能力有關」之投標廠商基本資格？","options":["營業稅或所得稅之證明。","公會會員證。","維修人員經專業訓練之證明。","工廠登記證明文件。"],"answer":"維修人員經專業訓練之證明。","laws":[{"name":"政府採購法 第36條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=36"}]},{"id":"s12-mc-146","type":"single","question":"機關就外國廠商之投標資格及應提出之資格文件，得就實際需要另行規定，附經公證或認證之中文譯本，並於招標文件中訂明。其原文與中文譯本之內容有異者，以下列何者為準？","options":["原文。","中文譯本。","取對機關有利者。","取對廠商有利者。"],"answer":"原文。","laws":[{"name":"政府採購法 第36條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=36"}]},{"id":"s12-mc-147","type":"single","question":"下列敘述何者符合採購法規定？","options":["投標廠商應提出之資格證明文件，除招標文件另有規定者外，以影本為原則，但招標文件得規定影本應載明與正本相符，並加蓋廠商印章。","機關採最有利標之總評分法中價格不納入評分者，得評選優勝廠商比減價格。","機關允許外國廠商參與非條約協定採購者，得於招標文件中規定外國廠商不適用採購法第6章爭議處理規定。","採購法第26條第3項所稱同等品由招標機關審查認定，其功能、效益、標準或特性不低於招標文件所要求或提及者。"],"answer":"採購法第26條第3項所稱同等品由招標機關審查認定，其功能、效益、標準或特性不低於招標文件所要求或提及者。","laws":[{"name":"政府採購法 第36條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=36"}]},{"id":"s12-mc-148","type":"single","question":"下列有關投標廠商資格之敘述，何者為非？","options":["具有相當人力證明之範圍得包括投標廠商現有與承包招標標的有關之專業或一般人力證明。","廠商或其受雇人、從業人員具有專門技能之基本資格證明，除依法令就一定專門技能人員之人數為規定者外，不得對其人數予以限制。","政黨與其具關係企業關係之廠商，不得參與投標，但得作為投標廠商之分包廠商。","外國廠商附經公證或認證之資格文件中文譯本，其中文譯本之內容有誤者，以原文為準。"],"answer":"政黨與其具關係企業關係之廠商，不得參與投標，但得作為投標廠商之分包廠商。","laws":[{"name":"政府採購法 第36條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=36"}]},{"id":"s12-mc-149","type":"single","question":"下列敘述何者錯誤？","options":["資本額限制屬特定資格。","特殊或巨額之採購，始得訂定特定資格。","投標廠商應符合之資格之一部分，以分包廠商就其分包部分所具有者代之，機關不得拒絕。","特殊或巨額採購，投標廠商未符合招標文件規定之資本額者，得以銀行或保險公司之履約及賠償連帶保證責任、連帶保證保險單代之。"],"answer":"投標廠商應符合之資格之一部分，以分包廠商就其分包部分所具有者代之，機關不得拒絕。","laws":[{"name":"政府採購法 第36條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=36"}]},{"id":"s12-mc-150","type":"single","question":"有關投標廠商基本資格之敘述，何者為非？","options":["廠商登記或設立之證明，應以經濟部編訂之公司行號營業項目代碼表所列之大類、中類、小類或細類項目為基準。","有關廠商納稅之證明，廠商不及提出最近一期證明者，得以前一期之納稅證明代之。","位於金門之機關，因地處偏遠不便，得限制金門當地廠商始得投標。","投標廠商基本資格之訂定，應與提供招標標的有關或與履約能力有關。"],"answer":"位於金門之機關，因地處偏遠不便，得限制金門當地廠商始得投標。","laws":[{"name":"政府採購法 第36條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=36"}]},{"id":"s12-mc-151","type":"single","question":"有關投標廠商基本資格之敘述，何者為非？","options":["投標廠商之基本資格，應與提供招標標的有關或與履約能力有關。","有關廠商納稅之證明，廠商不及提出最近一期證明者，得以前一期之納稅證明代之。","臺南市某機關辦理採購，得依「投標廠商資格與特殊或巨額採購認定標準」規定，擇定我國實績為廠商特定資格之一。","廠商登記或設立之證明，應以經濟部編訂之公司行號營業項目代碼表所列之大類、中類、小類或細類項目為基準。"],"answer":"臺南市某機關辦理採購，得依「投標廠商資格與特殊或巨額採購認定標準」規定，擇定我國實績為廠商特定資格之一。","laws":[{"name":"政府採購法 第36條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=36"},{"name":"投標廠商資格與特殊或巨額採購認定標準","url":"https://law.moj.gov.tw/LawClass/LawAll.aspx?pcode=A0030099"}]},{"id":"s12-mc-152","type":"single","question":"下列何者不是機關辦理採購，得擇定之基本資格？","options":["廠商納稅之證明。","廠商具有維修、維護或售後服務能力之證明。","廠商具有製造、供應或承做能力之證明。","具有相當人力之證明。"],"answer":"具有相當人力之證明。","laws":[{"name":"政府採購法 第36條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=36"}]},{"id":"s12-mc-153","type":"single","question":"新北市八里區公所依採購法第40條規定洽請內政部國土管理署代辦查核金額以上之下水道新建工程，下列敘述何者正確？","options":["監辦該採購之上級機關為內政部。","監辦該採購之主會計及有關單位為國土管理署之監辦單位。","八里區公所得洽請國土管理署依規定簽報核定底價。","招標機關為國土管理署，故本案決標金額之統計應歸屬中央機關辦理之採購。"],"answer":"八里區公所得洽請國土管理署依規定簽報核定底價。","laws":[{"name":"政府採購法 第40條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=40"}]},{"id":"s12-mc-154","type":"single","question":"機關辦理採購，下列敘述何者錯誤？","options":["機關於招標文件規定廠商得請求釋疑之期限，至少應有等標期之四分之一，且不得少於10日。","廠商對招標文件規定提出異議者，招標機關應自收受異議之次日起15日內為適當之處理，並將處理結果以書面通知提出異議之廠商。","機關最後釋疑之次日起算至截止投標日或資格審查截止收件日之日數，不得少於原等標期之四分之一。","廠商對招標文件規定提出異議者，為自公告或邀標之次日起等標期之四分之一。但不得少於10日。"],"answer":"機關於招標文件規定廠商得請求釋疑之期限，至少應有等標期之四分之一，且不得少於10日。","laws":[{"name":"政府採購法 第41條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=41"}]},{"id":"s12-mc-155","type":"single","question":"機關辦理採購，有關分段開標之規定，下列敘述何者正確？","options":["機關辦理一次投標分段開標，未通過前一階段審標之投標廠商，其已投標未開標之部分，原封發還。","採公開招標者，機關不得規定廠商應將各段開標用之投標文件分別密封。","機關辦理公開招標或選擇性招標，應就資格、規格與價格採取分段開標。","公開招標案件得就廠商資格為單獨之一段招標。"],"answer":"機關辦理一次投標分段開標，未通過前一階段審標之投標廠商，其已投標未開標之部分，原封發還。","laws":[{"name":"政府採購法 第42條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=42"}]},{"id":"s12-mc-156","type":"single","question":"機關辦理採購，除我國締結之條約或協定另有禁止規定者外，得於招標文件規定，要求投標廠商採購國內貨品比率、技術移轉、投資、協助外銷或其他類似條件，作為採購評選之項目，但其比率不得逾？","options":["百分之三。","三分之一。","百分之十。","二分之一。"],"answer":"三分之一。","laws":[{"name":"政府採購法 第43條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=43"}]},{"id":"s12-mc-157","type":"single","question":"關於底價之訂定，下列敘述何者為錯誤？","options":["機關得基於技術、品質、功能、履約地、商業條款、評分或使用效益等差異，訂定不同之底價。","未達公告金額之採購，得由承辦採購單位逕行簽報機關首長或其授權人員核定底價。","限制性招標之議價，訂定底價前應先參考廠商之報價或估價單。","公開招標採分段開標者，底價應於資格審查後之下一階段開標前定之。"],"answer":"公開招標採分段開標者，底價應於資格審查後之下一階段開標前定之。","laws":[{"name":"政府採購法 第46條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=46"}]},{"id":"s12-mc-158","type":"single","question":"機關辦理採購，下列敘述何者正確？","options":["底價應依圖說、規範、契約並考量成本、市場行情及政府機關決標資料逐項編列，查核金額以上應簽報上級機關核定。","公開招標採分段開標者，其底價應於開價格標前定之。","機關基於技術工法之差異，訂定不同之底價，並無不可。","於宣布最有利標之得標廠商後再洽其議價。"],"answer":"機關基於技術工法之差異，訂定不同之底價，並無不可。","laws":[{"name":"政府採購法 第46條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=46"}]},{"id":"s12-mc-159","type":"single","question":"下列敘述何者正確？","options":["機關辦理公開招標，因投標廠商家數未滿3家而流標者，得發還投標文件。","機關於開標後因故廢標，廠商要求發還投標文件者，機關得保留其中一份，其餘發還，或僅保留影本。","機關於開標後因故廢標，採分段開標者，尚未開標之部分應予發還。","以上皆是。"],"answer":"以上皆是。","laws":[{"name":"政府採購法 第48條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=48"}]},{"id":"s12-mc-160","type":"single","question":"下列何種情形，非屬採購法第50條第1項第5款所稱「不同投標廠商間之投標文件內容有重大異常關聯」之情形？","options":["投標文件內容由同一人或同一廠商繕寫或備具者。","押標金由同一人或同一廠商繳納或申請退還者。","投標標封或通知機關信函號碼連號，顯係同一人或同一廠商所為者。","A公司及B公司為關係企業，該2公司參與同一標案之投標。"],"answer":"A公司及B公司為關係企業，該2公司參與同一標案之投標。","laws":[{"name":"政府採購法 第50條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=50"}]},{"id":"s12-mc-161","type":"single","question":"機關辦理採購，下列敘述何者錯誤？","options":["查核金額以上之採購，擬決標之最低標價超過底價百分之四未逾百分之八者，應先報經上級機關核准後決標。","合於招標文件規定之投標廠商僅有1家或採議價方式辦理，須限制減價次數者，應先通知廠商。","洽最低標廠商優先減價1次時，該廠商書明照底價承作，機關得決標予該廠商。","決標依採購法第52條第1項第2款規定辦理者，除小額採購外，應成立評審委員會，成立時機準用採購法第46條第2項有關底價之訂定時機。"],"answer":"洽最低標廠商優先減價1次時，該廠商書明照底價承作，機關得決標予該廠商。","laws":[{"name":"政府採購法 第53條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=53"}]},{"id":"s12-mc-162","type":"single","question":"機關辦理採購，下列敘述何者正確？","options":["機關洽最低標廠商優先減價1次時，該廠商書明照底價承作，機關得決標予該廠商。","議價案之減價次數，適用採購法第53條關於不得逾3次之規定。","決標依採購法第52條第1項第2款規定辦理者，除小額採購外，應成立評審委員會，並得以第94條成立之評選委員會代之。","未達公告金額採購，依採購法第22條第1項第9款規定辦理公開評選者，其評選程序得予簡化，不適用採購法第94條評選委員會之規定。"],"answer":"決標依採購法第52條第1項第2款規定辦理者，除小額採購外，應成立評審委員會，並得以第94條成立之評選委員會代之。","laws":[{"name":"政府採購法 第53條","url":"https://law.moj.gov.tw/LawClass/LawSingle.aspx?pcode=A0030057&flno=53"}]},{"id":"s12-mc-163"
